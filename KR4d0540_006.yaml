body:
  text: 玩齋集卷六元貢師泰撰序洪範定正序伏羲觀馬圖而畫卦神禹因龜書而叙疇至吾夫子繫易迺謂河出圖洛出書聖人則之則圖書似皆為畫卦出而叙疇若無與焉此千歲之下辨議紛紜雖更周邵程朱諸大儒之論猶莫知所適從也玩九疇之傳錯出乎五皇極之下蔡氏著書竟莫之正是學者不能無惑焉㑹稽胡君一中深有得於王吳二先生之説摭其所長而訂正之分經别傳以傳附經自成一書名之曰定正洪範然後義理明白脉絡貫通而神禹叙疇之義燦然如指諸掌夫龜書馬圖自周程朱子固未嘗易置其名今胡君直以圓九為圖方十為書而畫卦者兼取之以分先後天其亦卓然有見者哉雖然神聖有作動與天合使龜龍不出於河洛則卦固畫疇固叙也感麟而作春秋觀兔而知易象變通交互理無不在非深於道者其孰能與於斯易象圖序清江張理仲純讀易而有得焉於朱子本義所列九圖之外復推演為圖一十有二以明隂陽剛柔竒偶之象然後動靜闔闢往來交互變易縱衡上下坦然明著矣或者謂易之為道幽而鬼神明而禮樂凡天地間事物小大終始進退得失吉㓙存亡之故靡不兼該而具備今欲一切約之於圖其果足以盡天下無窮之變乎嗚呼君子居則觀其象而玩其辭動則觀其變而玩其占夫辭精微而難究象顯著而易明由辭以達象因象以命辭則辭易先後亦較然可見矣况易之畫取諸天地易之名取諸日月彖取諸豕象取諸象象固未始離乎易也然則斯圖之作非深有得乎易者其足以知之哉昔江陵項氏著玩辭以發明程子之易猶恐有西河疑汝之嘆斯圖之於朱子其亦類是也夫牧民忠告序牧民忠告者濱國張文忠公所著書也公以道徳政事名于天下其為學則卓乎有所見而不雜於權術其操行則確乎有所守而不奪於勢利凡見諸論議施諸動靜盖無一不本於仁義之心也故自為縣令為御史為叅議中書為中丞西臺皆即其所行著之簡策有曰風憲忠告曰廟堂忠告而牧民忠告則為令時著也間嘗盡得而讀之廢書而嘆曰是何忠厚之至哉因記弱冠時先子文靖府君語師泰曰我昔在朝當皇慶延祐間人物最盛一時相知固不少然求其俧同道同者莫清河元復初濟南張希孟若也二人嘗聯鑣過我慷慨論議日昃不忍舎去且相顧曰世豈復有相得如吾三人者乎吾三人孰先死則後死者當銘諸墓使子孫世世無相忘也後三十年師泰承乏閩海憲使而公之子引亦僉司事間語其故則相對悽愴不已遂請此書刻諸學宫以規夫牧民者嗚呼數年以來州郡多故黎民瘡痍每思一賢守令以安靖吾民而不可得乃知忠告之有補於世教也深矣使天下之為守令者家藏一書遵而行之雖單父武城之化不外是矣奚漢循吏之足論哉黄學士文集序翰林侍講學士金華黄先生文集總四十三卷其初藁三卷則未第時作監察御史臨川危素所編次續藁四十卷則皆登第後作門人王褘宋濓所編次也先生之文章刮劘澡雪如明珠白璧藉之繅綺讀者但見其光瑩而含蓄華縟而粹温令人愛玩嘆息之不已而不知其致力用心之苦也故其見諸朝廷簡冊之記載山林泉石之詠歌無不各得其體而極其趣以自成一家言余嘗論之文章與世運同為盛衰或百年或數十年輒一見先生當科目乆廢之餘文治復興之日得大肆力於學以擅名於海内雖其超見卓識有以異於人其亦值世運之盛也譬諸山川之風氣草木之花實息者必復悴者必榮盖亦理勢之必然夫豈偶然而已哉先生領延祐甲寅鄉薦先文靖公實為考官於師泰有契家之好其後同居史館又同侍經筵交誼尤篤比亷問閩南過金華得先生之集於王褘故叙而授之三山學官俾刻梓以惠來學先生登進士第授將仕郎台州寧海縣丞歴石堰塲監運諸暨州判官浮沈州縣幾二十年始入翰林應奉文字尋丁外艱服除改國子博士居六年以太夫人春秋髙乞外補遂提舉江浙儒學年六十有四竟辭禄歸養以中順大夫秘書少監致仕及復召入翰林侍經筵數告老不許乆乃得謝去今年七十有九猶康强善飲啖援筆馳騁如壯歲云羽庭詩集序赤城黄嵓之境有山曰委羽有士曰劉德𤣥隱居自放不求聞於人獨喜為歌詩情有所感輒形於言嘗讀孫綽天台山賦至羽人丹丘福庭不死之句欣然慕之若將有所遇焉遂名其藁曰羽庭及領鄉薦就辟部使者累官省署以安東諸侯則其遊歴益廣造詣益深而羽庭之積益富往往傳誦江海士人之口政譽詩名卓然並髙予間得一二讀之已知其志之不凡矣今年冬以使過姚江則徳𤣥適來治兵江上一見握手懽甚始盡示其所為藁誦數過為之嘆曰信乎德𤣥之可與言詩也夫學詩如學僊僊不遇不能成僊詩不悟不足論詩蟬蛻汙濁之中神遊太空之表非超然真悟者能之乎德𤣥不忘乎委羽之山羽人之庭其真有得哉雖然鉛汞之爊支為玉樹黄金出鼎輕若浮塵其得於僊者豈無大小耶得有小大則悟於詩者又豈無淺深耶不明於徼不入於道何足以語此或曰李白詩之僊賀詩之鬼然則果有小大淺深矣他日相見於天台流水間尚當與徳𤣥論之陳君從詩集序世之學詩者必曰杜少陵學詩而不學少陵猶為方圓而不以規矩也予獨以為不然少陵詩固髙出一代然學之者句求其似字擬其工其不類於習書之模倣度曲之填腔者幾希夫詩之原創見於賡歌刪定於三百篇漢魏以來雖有作者不能去此而他求今近舎漢魏逺棄三百篇惟杜之宗是猶讀經者舎正文而事傳註也盖三百篇之作有經有緯秩然不紊學詩者於此而有得焉則漢魏諸作自可齊驅而並駕况少陵乎此予之所以乆存於中而未敢以告人者也天台陳君從别十年矣間來三山以所為詩一卷求序其端讀之其聲清以和其律嚴以正備衆作而不拘一體其庶乎有見於經緯之旨者君從於予舊故敢以未嘗告人者告焉君從苟以為然則向之所謂方圓規矩在三百篇而不在杜矣遂序而歸之鵲華集序鵲華集者集賢直學士隴西侯李公所著歌詩也公居濟南山有華不注水有鵲湖皆天下竒勝處今其詩多作於四方宦遊地而獨以鵲華名不忘所自也公由中書掾歴官知濟州復彭村孔子廟罷虞城塞河役禱雨祝蝗皆有竒應麥秀四岐穀生五穗專務以徳化民終更老幼遮留以千數後人思之為立二碑頌徳一在州治前一在太白樓上轉太史院經歴僉山南亷訪司事辨滑州民父子寃逺近稱神明改僉浙東燕南入拜監察御史出為福建亷訪副使以疾留任城乞致仕進中順大夫禮部侍郎卒年六寸九以推恩贈今官公以文學敭歴中外淑茂而闓鬯縝宻而精明凡其見諸事業者皆卓然有古君子風所謂歌詩特其餘事耳平生所著無慮千數百篇因離亂蕩失所遺無幾然觀其澹而能華質而能文直而不倨簡而不嗇斂而不拘優柔而有容深潛而有光如卿雲乍舒祥飈至而甘雨隨之也如鏘金戛玉孤鶚舉而鳴鳳諧也如老將治兵不煩號令而士卒進退動合紀律也如龎儒碩彦禮行終日而降升揖讓自不違乎規矩之間也是盖本之以道徳發之以仁義不待雕琢剞劂而其聲音體裁有畸人寒士苦心竭力所不能至者夫言者心之聲詩又言之工者也不明乎理則龎雜而無叙不充乎氣則歉然而無章理明氣充言雖不期工將不容於不工矣嗚呼公之詩其有得於斯矣乎不然何其温醇雅正各極其趣之妙也師泰昔在成均嘗與公之伯子監察御史國犀同業既又辱交於季子治書侍御史國鳳而治書寔受詔經畧江南師泰亦以户部尚書權漕閩海朝夕幸得從事間出公集俾為之序顧惟荒陋何敢承命姑書其槩於首簡鄭彦昭詩集序閩海僉憲鄭君彦昭間集其歌詩為二卷題曰行役藁攬轡藁攜以示予予讀之而有以知其心之所存作之不苟也彦昭長身疎髯負氣尚義讀書芙蓉五嶺之下足跡未嘗一入城府及出則渡浙江上㑹稽涉彭蠡泛洞庭望匡廬九疑之雲登祝融踰嶺嶠以客于南海然後北走曹衛齊魯燕趙之墟以官于京師凡其高深遐逺怪竒壯麗之觀既有以資夫超見絶識而出入禁近校書儲宫峩冠珥筆以清百辟以綱紀天下乗風雲依日月凡其卓犖竒偉剛方峻特之行又足以徵諸事業故彦昭之為詩於行役於攬轡隨其所得莫不各極夫趣之逺體之正聲之和焉然則彦昭豈苟作者哉觀其詩可以得其心之所存矣今彦昭方佩使者印按行八郡亷車所至竒衺屏息識宜日進業宜日廣他日播之聲歌以鳴國家之治者又不止是而已予雖老聾尚當為彦昭擊節和之武經總要序昔黄帝以兵戰涿鹿湯武以師克暴亂然皆本之以道德行之以仁義非若後世出竒設伏以變詐相傾覆而已自春秋戰國干戈相尋孫武吳起之流始各以知謀相角勝以暴横相吞噬迨至秦漢以來撰述愈多其所為書見稱於東方朔者已二十二萬言載之西漢藝文志者至八百餘卷况歴世漸逺其詭異龎雜假托附㑹固不可究極矣然握機握符韜畧包桑之著亦未嘗不以仁義道徳為辭也宋皇祐間始大集群書擇其可用者作武經總要前後二集分門别類更為圖譜以相訂証然後營陳攻守之法水火器械之制莫不具載國家承平百年是書乆廢不用比年四方多故始下令徵求則江都之梓刻成均之掌故皆已訛缺而民間遺籍又往往閟不可見有志之士每竊憾焉髙昌鐡君清溪博洽有才以經濟自負其家維揚舊有善本因兵亂失之數購求不得戊戌之冬以經畧行軍司馬宣詔括蒼方假録於石抹申之㑹調兵不果明年秋道龍泉得之胡氏鈔未竟而去又明年春至延平郡守周叔量出示其所藏傳寫幾半值城陷并周本失之及夏至三山迺得憲使騰泰亨本始為之正訛考謬繕寫成帙凡諸圖誌悉加彩繪於是斯書遂為諸本之最雖然我世祖皇帝以神武不殺定天下深恩厚澤洽於民心雖古帝王之師不能過也今南征北伐兵猶未戢必欲銷天下姦萌扶天下善類廓清海宇丕變時雍則仁義道德之化固所當先而斡樞機神變通者此書其可少乎重刋石屏先生詩序詩不讀三百篇不足以言詩然多雜出於里巷男女歌謡之辭未必皆詩人作也詩不盡作於詩人而天下後世舎三百篇則無以為法者宜必有其故哉詩一降而為楚為漢再降而為魏為晉宋下至陳隋則氣象萎苶辭語靡麗風雅之變於是乎極矣至唐杜子美獨能㑹衆作以繼三百篇遺意自是以來作者不能過焉宋三百年以詩名家者豈無其人然果有能入少陵之室者乎當宋季世有戴石屏先生者嘅遺音之不作惡蠅聲之蠱聴力學以追古人而成一家言先生生於黄巖之南塘負竒尚氣慷慨不羈南遊甌閩北窺吳越上㑹稽絶重江浮彭蠡汎洞庭望匡廬五老九疑諸峰然後放于淮泗以歸老委羽之下遊歴既廣聞見益多學益髙深而奥宻故其為詩如逝波之魚走壙之獸摶風之鵬其機括妙運殆不可以言喻者其大要悉本於杜而未嘗有一辭蹈襲之嗚呼此其所以為善學乎至於音韻格律之升降則與時為盛衰有非人力所能為矣今其詩傳世已乆而又有八君子為之論著先生諸孫文璝校舊本以圖新刻可謂能世其家者予過天台文璝間以序來謁遂不敢以後學辭而書之首簡先生諱復古字式之石屏其自號云江淛分省陳都事城海寧詩序海寜故鹽官縣入國朝以户衆升為州其後又以潮決南㟁州治將盡入于海民吏驚懼捍以數郡之力而決猶不止朝廷遣使沈璧殺馬而祝祭之幸得寧遂改今名大抵境内地下淖沮洳髙者又皆沙土故城址漫無存者至正十九年春江淛分省以四郊多警檄左右司都事陳君元禮相其地勢而興築焉君至則集長吏父老議衆持不可且謂役非時君曰諸君言固當然城為民防非徒勞也在我處之耳明日迺下令聴民自定力之下上以均其徭有不實輒治之并以坐吏於是奸豪懾服貧懦感慰小大相勸萬手並作不數月而堅壁髙壘屹然為東南保障矣城既落州之寓公及其大夫士咸歌詩以美之而屬予序其首簡夫重門擊柝設險守固雖古昔盛世不能無者然其所以為固也在得人心而已矣得其心則即墨用之而有餘失其心則函谷守之而不足是故城可以力為而心不可以力致苟得其心則城有不固者乎今海寜城則固矣盍亦思所以守之哉元禮以予言為何如盧氏紀言序予以户部尚書使過錢唐客有高唐盧昇執書一編題曰盧氏紀言再拜請序其首簡予發而視之則知是書所紀皆其先世譜牒碑銘墓誌并所得歌詩雜著也盖盧氏自太公望諸孫徯食采於盧以國為氏及秦博士敖望於范陽魏青州刺史度世生四子號四房盧氏其後子孫散居四方至唐而盛為宰相尚書御史節度者幾數百人歴五季宋金衣冠不絶我朝有三盧氏其在髙唐而顯者則諱顒字仲傑由臺省掾敭歴中外累官𣙜茶都轉運使贈嘉議大夫保定路總管范陽郡侯諡莊惠即昇之大父也莊惠當至元元貞之間治行風操卓冠時輩故其生而與交者若永平王公鹿庵雲中李公雪庵東平李公野齋閻公靜軒王公瓠山徐公容齋申屠公忍齋張公寓軒天台趙公芳塘洺水劉公唯齋既皆極一時人物之盛及其死而為之紀事若東平陳公公望蜀郡虞公伯生宛平曹公克明關西楊友直河東張仲舉新安程以文天台林希元又皆當世文章之士凡所以褒贈顯揚可謂詳且美矣兵興以來海内騷動學士大夫流離轉徙其鄉閭墳墓猶且蕩廢而不能守况所謂圖史文籍也哉若昇者固善為其後矣然天於莊惠必有以黙相之者予於是重有感焉謝氏家訓序天台有著姓曰謝氏自其先上蔡先生以洛黨出居是州子孫散處三童古竹間幾三百年再遷小澧則宣城校官克家君也君嘗受知于素履鄧先生生五子曰瑾理珪珏璋理以武功累官行樞宻院都事總制餘姚予使過其地理迎謁甚謹且告予曰理弟兄五人從鄉先生周本道學甚幸不墜先緒今内外人百餘指合居共爨凡冠昏喪祭悉遵紫陽家禮而飲食起居之節則又取之浦江鄭氏焉尚慮行之不逮守之不固也理弟珪嘗著為訓請一言以垂永乆竊聞之奔馬之逸御之以銜飈輪之馳止之以柅家範之放正之以身盖身猶器也家猶水也器圓則水圓器方則水方子能正其身家其有不正乎然正身亦有道矣持之以敬行之以義示之以亷守之以信而又處之以均平撫之以寛厚則如水之在器雖欲不為圓方得乎夫操尺寸之度以絜長短而天下之物不能逃者有其道也昔之人若河東栁公綽東平張公藝九江陳褒滁州李昉皆治其家使乆而不廢亦知此道而已矣今子能正其身以及其家是猶圓方之在器長短之有度雖欲逺而去之其可得哉吾知謝氏福澤之未艾也理字玉成負才氣所至多善政云中山世家序中山世家者福建行省平章逹魯特奈曼兼善公族譜之名也公五世祖丞相忠宣王始封中山故稱中山世家云忠宣從太宗皇帝定河北有功傳至于今盖六世矣子孫日益蕃衍凡為丞相為平章為御史大夫為樞宻為將帥為部使者為監為守者踵相接其豐功偉績固已載之史冊書之旂常赫然流耀於當世然而家乗紀録猶或有未備焉則世家之作可後乎公以軍政民事膠轕之際迺能纂輯遺文叅互紬繹著為此編其亦真知尊祖敬宗之道矣師泰竊惟國家右族起自朔方風氣渾厚習俗簡樸其先世繫官行事往往放失不存雖以淮安忠武王之丕烈且不能無遺忘者况其他乎至正中嘗詔天下上諸功臣遺事令下踰年卒不可得師泰時在史館謬當執筆每竊病之今公之作是書也紀逺者可信録近者不繁使百年之澤五世之懿一覽而盡見何其明白詳盡也公間以書示師泰命為之序師泰因記前三十年公諸父江西平章公為江浙右丞時獲以屬掾從覲京師繼仕于朝復得數侍公之先大夫中齋公其於中山王之世既嘗聞其槩矣及游公之伯仲間則得其事尤悉夫姓氏之别漢魏以來代有其書迨隋唐而大備自中州至於代北自一字至於五字凡因官因國因字因名因諡之類莫不具究其源既家藏譜系復官置簿狀私書或濫則糾之公籍公籍有闕則稽之私書貴賤等威截然不紊用此道也五代以來茲法漸廢至於我朝奄有海㝢姓氏之蕃方之隋唐奚翅十倍且勲宗徳閥類皆不以氏稱其名諱又多複出非假譜牒圖籍則一代之文獻將何所徵哉師泰昔有志於斯而以膚文僻學不敢輒專撰述今於中山世家豈惟幸見王門之多賢庶幾公卿大夫子孫有所矜式云爾朱氏族譜序丹陽朱君文瑛譜其家自中奉公而下凡八世以示師泰曰朱氏本春秋邾子之裔子孫失國遂去邑為朱其後散處沛國永城丹陽吳郡錢唐義陽河南諸郡漢唐之時尤為顯著今文瑛族出於河南而系於丹陽者以吾曽祖仕于鎮江殁而葬焉故也甚幸先生賜之一言使吾族他日有徵焉予迺作而嘆曰古者國有牒家有譜姓氏之紀最為詳宻故貴賤有等士庶有叙歴世雖乆而不紊近代譜牒殘廢雖大家貴族猶茫然不知所從出致有拜汾陽之墳稱子騫之後貽笑當時而况閭閻阡陌之人乎今朱氏譜不妄引於已逺不忽遺於己疏支分派别原委粲然其用心忠厚矣使子孫能世守而不失則孝弟雍穆移風而易俗豈徒行之一家而已哉文瑛字子中歴亷訪宣慰兩司掾授鎮江路知事泉州惠安縣尹以紹興餘姚知州致仕云董母孝節詩集序至正十二年秋詔太師右丞相道濟公總師南征僉樞宻董鑰仲開寔將侍衛諸軍以從既禡于門入辭太夫人跪受教太夫人執酒命之曰董氏世受國恩功在史冊女當竭知盡忠以集大勛光其前行矣無怠及師次彭城復以書戒曰女能盡忠即盡孝矣慎亡憂老身為也時同列有以夫人語白太師者比凱還太師以聞上為之嘉嘆旌其門曰孝節仍賜上尊金幣三宫寵賚有差大夫士咸歌詩為太夫人壽而承㫖歐陽公為之序後八年仲開亷問廣東道出三山館于郡守喬侯家侯於仲開有鄉里之好平徐之役又以萬夫長在行聞其事甚悉因請孝節詩刻諸學官間過予求序其始末予於仲開世為契家而交誼又厚當太夫人受恩之日既不得歌詩以繼諸公及殁又不得升堂一奠以盡禮今迺獲見斯文於萬里之外能無惻然昔王大司馬將三千人在湓城時年已過四十其母魏夫人教之甚嚴或少忤意即加箠辱故其後勲業遂大過人今仲開統諸衛軍固不啻於湓城而太夫人手書忠誠激烈尤有嚴於魏者然則仲開勲業其止於王大司馬已乎刻詩學官豈徒為母教之勸庶幾為臣為子者有所法云張子固功蹟詩序國家用兵十數年海内騷動迨今生民未休息者實由議政之臣首以勦捕而失人心終以招降而緩天討故也盖必於勦捕則脅從者無以自新委於招降則怙終者無所警懼無以自新故人畏罪而志益堅無所警懼故人玩法而惡益肆比年以來朝廷雖已察緩治之非而更令招捕矣然而兵連禍結猶未盡戢者招其所當捕捕其所當招是非混淆懲勸失實所以毒流天下如火燎原愈撲而愈熾如水決下愈塞而愈横也况七閩去王畿益逺暴將貪兵毒甚狼虎其魚爛而禽獮者未必皆所當捕姦民黠胥乗間負險張旗鼓以脅取爵位據租税者未必皆所當招是以藩屏之任恒難其人而幕府之職亦不易其選也都事張君子固之分幕建安也外危於强寇四面之圍内窘於將帥叵測之患且城中兵寡食盡變在旦夕而子固周旋委曲勸奬餉賚使二叅政能一心諸將校無異志且招且捕莫不各當其情卒致累卵之城安如磐石而七閩郡縣亦賴以無虞者謂非幕府之賢可乎雖然專斧鉞而柄殺生者其功易定籌策而權可否者其事難子固以一人之知而行於千萬人之中以一人之謀而出於千萬人之上不賢而能之乎子固贊佐之功大夫士既詩以詠歌之吾友掲伯防葛元喆又皆為之序矣予姑即招捕之失書于左方燕集滄浪亭詩序至正辛丑秋八月八日三山書院山長朱堂來告曰明日丁亥將舎奠于先聖廟請以是日昧爽行禮諸生有進而前者曰書院在城西門外春秋祀日有司率不共事儀文簡略弗中令式先生國子師又以尚書使南方當祗謁郡學不宜拜書院予謂學院皆所以崇報也惟敬之存即神所在顧何擇哉且司校者方束帶趨事上官苟免訶詈又何暇知文事重輕耶於是廣信程伯來濮陽吳維清宜陽夏鼎諸生劉中鄭桓邊定相率謁拜于燕居之庭比至則建安江晃睢陽趙宗澤上饒張裴郡士周旭與執事者已儒服序立聴位及入就拜升降進退酌灌興伏莫不肅恭竣事迺退坐滄浪亭上壺觴既陳籩豆維旅賓主獻酬小大秩然凡山雲吞吐水波蕩漾淵魚沙鳥之飛潛樵唱漁歌之互答皆若有以助予之樂者諸生復欣然舉酒曰昔者守吏徒委事山長山長分㣲又無以任使令者故儀文遂簡略今人人既得各共迺職矣且郡學日出後大府方列庭下拜即起坐廟門内及有司行三獻禮畢則已辰巳故往往弗中令式今又得以時即事矣先生所以惠教諸生者抑何厚哉况當干戈搶攘之際辱有觴豆優游之樂詠歌涼風庶幾舞雩其可無一言以紀今日之㑹乎予曰甚幸遂合在坐之士凡廿人以韋應物齋舎無餘物陶器與單衾諸生時列坐共愛風滿林之句分韻各賦五言古詩一首而予得滿字云春日𤣥沙寺小集序至正二十一年春正月廿六日宣政院使亷公公亮崇酒載肴同治書李公景儀翰林經歴答禄君道夫行軍司馬海君清溪遊𤣥沙且邀予於城西之香嚴寺是日也氣和景舒生物鬯遂花明草縟禽鳥下上予因緩轡田間轉入林塢裵囘吟咏不忍遽行及至則四君子已坐乆飲酣移席於見山之堂矣既見則皆執酒歡迎互相酬酢亷公數起舞放浪諧謔李公援筆賦詩佳句捷出時亦有盤薄推敲之狀道夫設險語操越音問禪於藏石師師拱黙卒無所答清溪雖莊重自持聞道夫言輒大笑予素不善飲至此亦不覺傾敧傲兀為之抵掌頓足焉日莫將散迺執盞斂容而相告曰方今寛詔屢下四方兇頑猶未率服且七閩之境警報時至而吾輩數人果何暇於杯勺間哉盖或召或遷或以使畢將歸治法征謀無所事事故得從容以相追逐以遣其羇旅怫鬱之懷然而謝太𫝊之於東山王右軍之於蘭亭非真欲縱情邱壑泉石而已也夫示閒暇於搶攘之際寓逸豫於艱難之時其於人心世道亦豈無潛孚而黙感者乎他日當有以解吾人之意者矣迺相率以杜工部心清聞妙香之句分韻各賦五言詩一首而予為之序晨起夜坐詩後序予所居香嚴寺當山門外有古樟盤踞道傍大可百圍相傳為隋唐間物其根魁然突出者若磐石平布可列坐十許人樹南有小石橋橋傍兩䦨衡廣亦可坐五六人昕夕輒與諸生出坐樹下客有程伯來吳志夫張仲純亦時來相與憇息焉樹雖甚大而輪囷擁腫中空液滿不中繩墨其枝柯亦卷曲秃缺摧朽無所用獨其旉枿條達旁出蒼翠蓊鬱隂翳猶可蔽百餘步遇風從山下囘注盪激則蹄股交戰鼻口怒號喁然于然與橋下水聲相觸湱湱然若雲詭波譎而蛟龍神之也予嘗賦晨起夜坐二詩以寫其幽深瑰竒之遇矣伯來間顧予曰是若無所用者子何得焉而愛之甚也予笑曰樹在官道傍得不辱於斧斤以幸全其天者非以其材之無所用耶以其無所用而人因得以䕃以息且耳其聲以為笙竽然則果為無用與果為有用與今吾數人者盤薄偃蹇以自鳴其鳴又果異於是與伯來曰有是哉其於地則不輾於人則木鷄於才則橜株裾是名杜德機徳機為道樞道樞為天下谷谷則神矣非無欲者不能觀其妙請書以為序送謝元功東歸序至正十九年春正月予自政府退坐吳山之仰髙亭客有竹冠芒屩衣不掩骭直前長揖而問曰遊先生之門者亦嘗有瑰偉倜儻拔出之士乎予愕未答而心固已竒之矣既坐意氣軒軒然愈若自得問之則上虞人謝姓肅名而字元功也居亡何予奉詔漕閩廣粟當泛舟入瀛海予笑語元功尚能從吾遊乎曰大丈夫觸蛟龍犯風濤如行袵席上况南颿踔順一息萬里哉遂同載至海昌屬海上多警因留居州之北郊且六閲月矣元功日執經問難上手低面匑匑無違禮凡一詩之出一文之就與之折𠂻論議必當於理迺已有不當則赤面汗背若抱大恧遑遑焉廢寢與食一日從予步出東海上元功執策而跪進之予謝不可則拱立道左執弟子禮益恭夫元功方軒軒負氣一旦歛退若此於是知元功果竒士也少間慨然曰肅始辭吾母而西遊自謂一見丞相白事可以休兵息民以安東諸侯今不遇猶望歲大比一薦於有司因之待詔金馬條策大廷揚英吐竒為國大利又不遇比雖幸察薦於御史執政者皆非吾之志也不意得拜先生依光道德刮劘掐擢以為文章自顧其中之所得充乎其有餘雖不遇猶遇也縱遇其得孰多於不過乎肅歸有以見吾母矣請辭先生以東予固留之不得迺載肴崇酒而酌之曰士君子生於斯世也讀萬卷書駕萬里車將以廣吾業行吾志也然其出也必以時其進也必以道出非其時而進非其道雖位食五鼎身綰六印其天爵之貴盖無幾矣元功一不遇於丞相再不遇於有司又不屑屑於御史執政之察薦翩然而起浩然而歸若生駒健鵠不可控搏豈不真竒士也哉今元功之歸其鄉也於山則有兩眺四明百樓五癸蘿巖金罍於水則有曹江玉帶夏盖白馬其於人也政事則朱雋孟嘗文學則王充魏朗邯鄲淳蔡邕諸虞徳望則謝安王羲之忠義則李光劉漢弼孝行則曹娥朱娥仙人則魏伯陽劉綱其他才知行能之士固不可以一二數也且地氣完宻而淳厚多古先聖王之遺跡泛虞江而感重華陶漁耕稼之利登禹峰而思玉帛萬國之同近不出乎百里間而上下數千載可一覽而得又何必足跡徧寰宇哉況韜晦以俟時優游以養老尤君子所當慎重乎昔在虞夏之世有君疇務光者不臣於天子不友於諸侯不出則已出則必為帝者師在商周之世有伊尹太公望者躬耕畎畆漁釣水濱非天子致敬盡禮不輕於自用用則澤及四海功流萬世此其人皆傲視宇宙齊光日月豈肯降志辱身以就一切功名耶及道與時行則天下之重任自有不得而辭者元功亦嘗抱膝以嘅想髙風善政於百世之上乎吾知元功翩然之起浩然之歸庶幾有見於此者不然出則為操瑟齊門處則為終南㨗徑於道於時果何如也元功不以此而易彼吾將見千駟之乗萬鎰之金交聘於越東之野矣然則今日之遇豈少於向之不遇哉予雖老尚有望焉遂序以别送趙木仲東歸序永嘉趙木仲故宋宗室諸孫美鬚髯倜儻負氣與人交一不合即赭容怒去獨從見山葉先生游最乆葉之學出於綗室梅先生梅之學出於北山何先生而何寔本於紫陽朱夫子故其所得具有師法嘗以易詩教授荆揚間從之者甚衆或勸之仕輒笑不答未幾河南釁起王師徂征木仲幡然起曰吾尚能坐視生民塗炭乎遂扣軍門手畫十餘策主將竒之而不能用木仲裂策投地曰是齷齪無能為者不去將及於禍急絶江南還所過諸將莫不奔走迎謁開壁設座北面師事之凡用其策多竒勝御史部使者數論其有文武材宜用如詔書事上丞相府起僉浙東宣慰司副都元帥兼治縣慈溪大夫士爭走賀之木仲抵掌大笑曰諸君以吾得一官為榮耶吾即榮一官當國家治平時視軒冕富貴猶且泥塗而土苴之況今甿𨽻厮役皆得取寵爵厚禄馳騁車馬以相雄長曽謂趙木仲辱與若等伍耶吾將棹鯨海之月攬雁山之雲濯纓長流掛巾絶壁與髙人隱士箕踞放浪以養吾胷中之浩浩以俟夫朝廷治化之清顧不偉歟吾誠不忍以七尺之軀徇斗升之粟糾纒膠擾於是非榮辱塲也於是大夫士咸知木仲之出非為身謀退非果於忘世相與酌酒賦詩送之浙江之上酒酣詩成悲歌慷慨衆賓屬予序以别送金仲達御史序國家以豐爵厚禄網羅天下才俊其途固不一而得士之盛則莫成均若也至元大徳之間秉鈞軸握樞機卓焉以功業自任者不可勝道況自皇慶延祐以來大開文治群材輻凑其得士之盛何如哉至正中予為司業一載每見諸生升降揖讓之次講道論徳之餘或雍容温雅粹如圭璧或磊落瑰偉燦若珠璣或迭宕奔逸若神駒脱轅不可羈絡或英厲奮發若鷹鸇鷙鳥横飛疾擊凌霄漢薄四海而莫之能控焉者固已自竒而心許之十數年來盤薄江海諸生之動靜邈不相聞然未嘗一日忘于懷也去年冬奉詔董漕閩南道過餘姚適驛報御史至名聲籍甚問之諸生亦不刺金仲達也未幾予至三山明年春仲達亦來始得相與道故舊審出處迺知向之所與遊者皆歴華要登臺閤赫然為時名臣仲達學贍而才富貌温而氣剛砥節礪行尤自樹立如予前所論者盖兼有之方今海内多故干戈未息東南諸郡逺在海隅凡軍政之不修官刑之或闕吏弊之太甚民病之已革大姦大慝之未去御史皆得而按之然數者之失其來乆矣非可以一旦威制而力勝之也其亦周旋咨詢宣道上意使人人知尊君事長之道先義而後利狥公而忘私則三軍之於將帥如手足之扞頭目庶民之於官府如子弟之趨父兄善者知勸惡者有懲矣仲達其亦勉旃予雖老至元大德之治尚有望於諸君焉送鄭居貞之建安序夫君子之進於學也必慎其擇專其志厲其行持之乆積之深養之厚然後義精仁熟幾應於中而處天下之事不難矣新安鄭生居貞從予遊者再期每有問焉未嘗不即是以為教而生猶若有疑焉於其别復申之曰子亦觀於舟乎其膠也前不能以尺寸及水至風順踔千里在瞬息車之尼也鞭箠泥淖終日疲於跬步及走康莊注峻坂雖雷轉飈驅不足以喻其快豈惟舟車哉弓之張也矢之激也户之運也槖之鼓也水之決也火之燎也鳥之遇順而魚之縱壑也此其神妙不測何如耶是必有其幾矣幾應於中而事物之來如持衡懸鑑隨其長短輕重小大妍媸無不各當其情而養親事君居家治民之道舉不外乎是矣然擇之不慎則邪説足以干正志之不專則事或分於外誘行之不厲則往往一簣而虧半途而畫又烏能進於聖賢之域哉就有所進則亦安於一才一藝之成狃於一善一長之得而非明體達用之學也居貞厚養而深積持之且乆庶幾義精仁熟隨其所遇見之無疑而用之有餘矣所謂舟車也弓矢也户運而槖鼓也水火與魚鳥也其幾一動盖有浩乎其不能禦者即欲自己得乎雖然予言止是矣生今往建安建安朱子之國斯道之統寄焉休風善教必有存乎人者生更有得則還以告我送劉中守僉事還京師序予聞天於瑰偉卓犖峻特之士必有所抑遏摧沮頓挫而後志專學力奮焉有為以大其業而張其名不然其志不專其學不力雖有瑰偉卓犖峻特之士業不大名不張也西夏劉君中守以善書與修經世大典由郡文學辟東曹掾累官宣文閣博士工部員外郎比年四方兵起天子以閩海道逺守吏失職遣君浮海持節僉亷訪司事既至行按建寜邵武二郡時二郡大盜壓境民方苦暴斂君所過召父老慰問疾苦布宣德意至為之感泣然君性外慈内剛有不直輒攘臂挺起正言不顧用是多與人齟齬不合乆之竟以言去君闔門愈自刻厲讀書窮日夜不已興至即賦詩寫字或援筆畫山水意趣天出雖疏食屢空泊如也若是則中守得以專志力學於抑遏摧沮頓挫之餘矣天果以是大其業張其名耶夫克敵之將每勝於幾危徇國之忠恒信於孤憤故善學之士亦往往得於困心衡慮焉然非確然有以見天下之理即其所遇而無不安者能爾乎吾於是益知君之果為瑰偉卓犖峻特之士矣今復將涉鯨海之濤酹燕山之月以遊于京師其必有所遇也哉於其行序以别送許存衷赴漳浦縣尹序往予在史館與應奉程以文交最善一日以文以客來謁曰此漳南士許存衷慷慨負氣讀書知古今善騎射李至甫反南勝守吏多望風遁去將帥擁兵不進存衷率其鄉義士數百人導官軍直前大呼連奪其數砦賊勢不支以功巡檢定南今受命南歸願得一言以贈予作律詩一章遺之後數年代祠漳南詢其人不得又二年亷問閩海求之又不得今年分部三山存衷始以向所遺詩謁間語及京師故事恍然如夢覺而醉醒也存衷豐頤美髯沈毅有謀因薦之經畧李公俾令漳浦將别復求所以相其行者予聞漳在閩粤極南漳浦又漳之南山谷阻深民獠雜處比年强横繕甲兵據租税與吏抗吏既不禁反相為漁獵子家龍谿漳人也令漳浦又漳屬也固為難治矣然而民情物理子所周知飢渇之餘易為飲食子能以向者勇義郤賊之心為今日施惠保民之政處之以亷賦之以均燭之以明撫之以寛而又將之以不欺行之以無倦則民有不被其澤者乎古者治郡曰牧治縣曰字牧若童竪於牛羊飲齕臥起隨其所適字若慈母於赤子癢疴疾痛同出一體盖令視守尤近民也子果爾漳民雖强横其敢不率令治乎送朱元賓赴南靖縣尹序君子之用世得百里之國而治之使其民出租税勤役作以供公上而無愁苦嘆息之聲亦可謂賢大夫矣況處炎荒萬里之外其治理卓然有譽於人哉興化縣尹朱君元賓調官南靖將戒行凡交於元賓者皆謂南靖在漳南一百二十里自李志甫魏梅壽相繼反其民習戰鬬操强弓毒矢出没山谷無時尤難治況比年强暴各以力雄鄉里少不合意輒嘯呼殺掠縣令莫之誰何元賓豈宜輕身入其地耶予曰元賓之賛番昜也長吏稱其能幕府服其行士民懷其惠其在興化興化之人莫不父母而神明之去之日老幼攀號擁馬不得行部使者課治行為閩海縣令第一向予分部董漕以亭民歲給工直恒半入奸吏槖白金數千鎰俾元賓往給之元賓至則躬詣諸塲雖一錢必手授飢則出褁餌取水咽之去塲民嘆曰我等煎鹽老矣今日迺盡得官本雖勞無怨也元賓之才若此南靖雖難治吾知賢大夫施於政者恢恢乎有餘刃矣雖然民猶魚也水清而魚不撓則魚得遂其性元賓亦不撓其民使皆如魚之在水且將于于而來輸租税服役作更相勸告以保其子孫全其生理之不暇又肯操弓矢出没殺人以違縣令教乎近制縣令以治行聞者輒拜御史元賓將被顯擢宜速行無惑送翟終吉還南臺序世祖皇帝統一萬方既立御史臺以正綱紀又置兩行臺以分總其治而在江之南四省十道惟湖廣所部去王畿萬里近雜大理烏蒙白霫谿洞諸蠻外與交趾九真日南畨邦相屬其人輕獷好鬬苟委任一失當則悖亂蠭起朝廷每三歲一遣使者即其地與藩臣課吏殿最而上下其秩仍分遣南御史一人臨莅之所以嚴黜陟示懲勸也比年兵興道梗使者之至乆闕焉至正二十年天子思念逺人乆罹荼毒求賢守令撫安之迺詔使如故而御史之選寔當月君徳明御史曰吾職也不敢以地逺辭然非有良佐史不可迺選於衆而得翟君終吉終吉以經學傅律令檄即下慨然曰吾得與御史持節駕艨衝涉萬里鯨濤以望三韓之國臨百粤之墟然後踰嶺嶠上衡嶽浮沅湘以宣王命而揚風紀之威顧不偉歟既至閩廣之交山夷島寇連絡海上出没叵測數進而不可得則又曰吾聞大夫出疆得專命況御史哉湖湘雖未能卒至其他背法傷理以毒吾民者多矣獨不能盡吾言以伸鬱鬱無聊者乎於是即所聞見輒白御史戢貪暴植良善凡有利于民者莫不殫力竭慮務於必行閩以南大夫士咸曰賢哉史也吏中外者皆斯人若風紀有不振揚者乎遂相率歌詩以餞而徵序於予予謂惟仁人而後得好惡之正或反其所欲以咈其性雖脅之嚴威而民不從終吉何以使斯民惓惓不忘若此乎是盖能得好惡之正矣詩曰心乎愛矣遐不謂矣吾於終吉三誦焉送周克復歸省序畨昜周克復故贈翰林侍讀學士蘭屋先生之孫今江浙行省左丞伯温父之子也克復由國子生給事江西省以湓城録事從楊將軍戰毗陵有功判建寧府府當江東西之衝控扼兩關與賊連歲接戰克復至運餉不絶及圍城兩月克復又分守建安門一日礟著首腦裂血被面死舁歸踰時迺甦賊既退衆皆以次受賞克復獨謝去省其親於江浙道出三山謁予城西香嚴寓舎予與伯温生同年居同里仕同朝而侍讀公又與先學士交誼甚厚於克復行其能已於言乎夫士大夫之所以異於人而重於天下者道徳文學功名其次也不以道徳文學自勉而徒取功名猶為不可況齪齪求富貴者哉比年海内多故厮役椎埋之徒崛起行伍佩通侯上將印署文書輒生殺人服阿錫珠璣騎嚙膝從駢脅弩矢握刀以相雄長者踵相接克復世家子迺欲以其所不能者與若曹争能斂面低首蒲伏承順以出其下風其輕重得失果何如也今克復能於此時慷慨自退以歸壽其親亦庶幾不為富貴功名所摇動矣雖然富貴功名在乎天道徳文學由乎已勉其在已者以俟其在天者斯古之士所以卓然超出乎千萬人之上而傳之千萬世之後也克復其亦思所以異於人而重於天下者哉送蔣廷學調江浙省掾序毘陵蔣廷學以恭慎厲行婿于錢唐管左丞之門左丞諸孫叔堅赴福建行省理問官廷學從以行因得給事大府明年叔堅擢員外郎廷學遂使于朝以浮海功主簿興化之􅋖遊縣又明年叔堅拜南行臺御史廷學亦改授福州録事大府惜其才之隱於下寮也辟掾幕下甫三閲月慨然嘆曰夫人之所以出而仕者亦欲少行志爾苟志不行猶望斗食以養吾親今吾親逺在數千里外而吾迺不能具甘㫖為朝夕供雖得禄奚為哉即日白請歸以便養大府嘉之調江浙丞相府將治行閩大夫士咸歌詩以餞請予序之予時亦將北行顧惟曠歲遼隔不得過家上冢以慰問鄉里而廷學廼先吾歸日奉巵酒以壽其親于西湖六橋之間獨何得於天者厚與且予與御史交甚契故知廷學為尤深廷學外若怯懦中實秀發善書能詩吐辭輒出人表可愛也昔漢諸曹掾有位三公者廷學得以所能上下古今得失與丞相論可否則又豈不能少伸其志以行所學乎毋徒諉曰吾歸以便養而已試以予言語御史何如送脩敬宗序予始至京師時東平諸公能言金進士脩君為郡幕府有文學政事後又聞其子謙舉進士判沅州孫思善教授益都儒學皆克世其業思欲一交脩君家而不得兵興以來南北道阻自謂文物遺獻若修氏者可復見乎至正辛丑秋福建行省左右司員外郎管君叔堅拜南行臺御史其冬有掾乗傳來迎間過予城西寓館坐而問焉則名徳字敬宗脩其姓東平其里也予駭然曰子豈金進士脩君諸孫耶敬宗始具道其先世叙歴使予數十年向慕之私一旦若行空谷而聞足音之跫然適故都而見流風餘韻之存也敬宗由昇宣兩郡功曹江東西憲史辟今役長身魁貌善為恭謹歉焉常自退遇不直輒奮起不顧每與御史論曰御史所執者法也法張則治法弛則亂今法弛乆矣御史將執法以行權其在自治乎自治嚴則人知畏人知畏則重為惡重為惡則刑罰清而德化行盜賊不足平矣御史謂敬宗言然當共勉之予既辱知御史乆茲又與敬宗交聞斯言也寜不重為之慶遂書以别送曹季修赴建寜路儒學教授序上饒曹君季修將教授建安其友人清江張仲純徧求三山諸大夫士詩以為餞且過予曰季脩昔長樵溪書院時於僕有交游之好其情懇款篤至好學善讓使人乆而不能忘也今且别去先生幸辱教之庶其有所勉焉予乆未有以復而曹君遂行既而寇圍建安道阻不相聞者數月仲純每見輒以是為請及圍解道通仲純又請予惟仲純信士季修能得其心若此則其人之賢可知矣我國家統一海内首崇學校以厲風化州郡咸設教授其職視前代為益重然而典州郡者亦嘗知教授之為重乎為教授者亦自知所以為重乎不知其為重故州郡輒以屬視教授不自知其所以重故教授亦甘以上官事州郡此學校所以日壊而風化所以日隳也盖詩書禮樂教之具也仁義道徳教之本也舎詩書禮樂而專錢榖舎仁義道德而尚辭章教授其復能自重乎教授既不自知其重而州郡又安知其為重乎況竊錢穀以苟餔餟委辭章而事佚游者哉於是勾稽出入之防愈宻奔走逢迎之禮愈謹而先王建學立師尊賢養老之初意遂不可復振矣雖然建安朱子講學之地東南鄒魯也其典郡司校者宜皆知所以為重而無向者之患矣而予猶諄諄為季脩告者嘉仲純之請篤朋友義也送呼都克布哈右丞赴京師序江西既陷之三年為至正庚子民吏多間道來輸誠款省臣以聞朝議擢宗正掌判髙昌忽都不花伯英君為右丞以佐克復之任時其母夫人年已八十義不可逺去伯英以方鎮事重即日陛辭浮海南來冬十月至軍中與平章沙公定出關計明年二月次延闕師鄧鄧克閩已入據邵武勢方張君謂平章曰闕以荆襄􅘀狡之衆據有險要而我欲以千百罷弱之卒制之且弓矢甲胄扉屨餱糧悉無所具此無異驅群羊以逐虎狼也夫江西七閩寔為唇齒其民逃避者散在諸郡苟江西不可復則七閩亦不能守若并兩省而一之董之以重臣資其有以給思歸之士庶其可濟乎平章曰右丞議是迺條具其事俾送之江滸或曰君期月之間再涉鯨海得無賢勞乎君方慷慨談論殊無難色且曰向也以國事故不得顧吾母今也以國事入奏因得拜吾母以遂吾私又可以賢勞辭乎予迺慨然嘆曰伯英真忠孝人哉其於家國可謂能權其輕重者矣四牡之四章曰王事靡盬不遑將母既嘗為伯英重油然之思矣其卒章曰是用作歌將母來諗則吾人豈不預為伯英喜乎三嘆之餘書以識别送興同都事北還序至正二十一年秋廷臣言閩海逖在南服將吏或不能上體聖天子子惠元元之意使山野愚民冒犯鋒鏑無以自新迺遣集賢院都事興同奉詔航海以明年春正月朔旦至閩君既布宣徳意遂館于城西大中寺泊然自持非其人不交燕飲不合義即卻不赴日與布衣韋帶士論今古得失人物臧否由是閩人爭譽君一日客稱鄭生者言向有高昌崇福奴婿予家曽遺其大父别都魯迷失北廷都護宣命勅牒凡五道崇福奴死乆矣君髙昌氏亦嘗識其人乎君惕然起曰崇福奴於吾為從父都護則吾曽大父也昔所受命寔在至元間我先人求之三十年不及見今吾幸得之於炎荒萬里之外顧豈偶然哉迺請而藏之間出以示予予惟人子之於其親也見几杖則敬見衣服則悲見杯棬琴瑟亦莫不致其依戀愛慕之思況龍章錫命世澤之所存哉今君之為使也既能敷揚國命以無愧於職事又能盡得先世故物歸以告之祖禰慰宗族傳之子孫非其忠孝之實感動乎神人能至是哉傳曰公侯之子孫必復其始予知君之有以世其家矣君之還閩大夫士皆歌詩以為餞因書之首簡以為序君字道逺石林其别號云送李尚書北還序閩粤諸郡阻山岸海租入之數不當東吳一縣其民終歲勤動僅足給食而公私所資悉倚鹽賦比年横兵蠭起敓攘成風大者據州縣小者雄鄉里其入乎官者盖益鮮矣朝廷以海漕間不如數迺遣使㩁鹽易粟以助京餉然金革傷殘之餘急之則民困而變生緩之則吏懈而事廢其為使者不亦難乎自非行信於上下而譽交于中外其克稱是選哉至正十九年予以謭材謬膺茲任明年稍更定其法民雖稱便亦不能無忤於貴家巨室焉其冬有㫖罷分部仍以𣙜漕屬之行省又明年畿甸大稔始議以鹽賦十之六雜易一切供上之物於是河南李君彦聞實以户部尚書使來君既至則嚴法以防奸市平估以通𢡟遷逺近聞之商賈交集不數月得綾絁錦綺繒布絲枲十數萬將以今年五月浮海還京師適予行先於君迺過君别而為之言曰君之材過予逺甚且君在朝乆上下信之中外譽之嘉聲令望卓然見推於一時是宜君之倜儻磊落果於行而無所嫌畏也雖然君之所以自任與朝廷之所以任君者又豈止是而已哉凡官政之緩急民瘼之重輕守吏之臧否將校之勇怯山川地勢之險易人物風俗之澆醇宜皆有以復於君相者方今中原底定奸宄悉平立經陳紀更新治化君其可得而辭乎送翟生北還序户部尚書河南李君彦聞使閩海遣其甥翟允學來從予游予謂生將淬厲以為文耶則尚書方馳騁汗漫以鳴于時將博覽以為學耶則尚書方貫穿閎衍以揚于朝其或出此而猶欲鈎𤣥摘竒以求合所司幸甲乙之選則又尚書之所已能者今生之來學也亦何所見而取於予哉生黙不應惟日閉門西廡下取經史諸書晝夜誦不輟間有問則超然出人意表予於是知生之得於尚書者亦已多矣居數月予與生皆有逺行求一言以為别迺告之曰孔子之道載之六經朱子之學著之四書其本則道徳仁義其用則禮樂刑政生欲正其本以達之用無亦先明乎四書之㫖以求六經之藴乎六經既明則學益充而文益粹豈徒決科有司以希榮一時而已雖推之經綸參賛豈外是哉然朱子之學寔得於河南二程夫子二程之遺書具在生河南人也歸而求之有餘師矣予豈復有益於生乎哉試質之尚書以為何如送王仲𢎞歸建安序予之僑于城西香嚴也七閩之士多來見見必有所挾焉或歌詩或文章或書或畫或醫卜隂陽之屬莫不軒軒然有自得意最後王生來謁問焉則志道其名仲𢎞其字建安其里也獨恂恂畏謹上手低面欿然若無能者然一聞事不直輒赭容争辨不少讓時予東軒有故書敝畫堆積几上生指顧曰是何散逸而不之理也吾為先生裝潢之可乎予謾應之生即抱置别室閉户數日則向之故敝散逸者皆籖軸題識一新矣予因問生方積學礪行以求聞于時又何暇遊心於茲藝乎生笑曰先生知吾者乎吾聞儒者之道髙明而廣大奥宻而精微既非吾之昧昧者所能知而今之仕者率多脂韋苟禄以幸免禍而肥家吾又豈能含垢忍恥與若曹伍哉且九流百家之技去儒者之道益逺又非吾之所屑為是以因其藝之近而衣食其傭有餘則以遺飢餓疾病之遇諸塗者不使留銖錢龠粟以累吾之心也庶幾於已無甚勞而可以養吾之生於人無所求而可以從吾之志吾之所以安於茲藝而不辭者盖不忍以彼而易此也予迺作而嘆曰仲𢎞其知道者耶何其善於擇術也宋清之醫利於報承福之圬賤且勞孰仲𢎞比哉於其歸序以别送曽仲衍之平陽州同知序平陽州同知曽衍奉寛卹之詔自直沽浮海至三山既事將赴官予適應召北還偕至連江之上拱而請曰衍無似向從事江西行省承檄諭賊旴江被執械繫數月既出倅南恩以使來閩者二年矣比浮海至京師以功佐是州惟是多艱未知攸濟願得一言以為勉予以薄遽辭則其請益勤迺酌酒於道而告之曰仕必論世也則子之先文定文肅文昭三公名於前叅預僉憲二君繼於後以言乎學也則學士虞公叅政危公為之師而凡與子從游者亦莫非賢大夫士其於聞見所得既多宜無復有為子告者矣且自用兵以來豪横蠭起據郡邑以私天子之賦税者比比皆是雖臨以將帥監守之重猶不少伸其志況同知寔州佐者乎為州佐而志不得伸則吾又何以告子哉然聞平陽大州也其治並海而阻山其民勤生而好義比年又得周君宗道為之理因民心以緩其下節軍用以供其上子誠能不易向者艱難堅苦之操而又施其所得於父兄師友者為之政不矯於外不欺於内使此心之微可以交於神明而白之上下則雖文定之道徳文肅文昭之功業皆可漸致矣又何往而不得伸其志哉他日試持此以見危君未必不以予言為然也贈醫者蔡德芳序福建行省理問吳君間過予請曰醫者蔡徳芳善療小兒出入吾門凡所治投匕劑輒愈數予之錢辭益以束帛又辭强所欲則曰願得貢尚書序吾醫然不敢請也吾諾之甚乆先生能為僕遺之言乎予曰徳芳知予哉予聞醫不通神不足以為醫甚矣醫之難言也況嬰兒在襁褓中腑臟之未完脈理之未充血氣之未實口不能言遇疾病徒以意取之一或不當則失治矣故諺有之寧醫十大人無醫一小兒古之善為術者無過扁鵲其過秦知秦人之愛小兒則為小兒醫然則小兒醫其始於鵲乎鵲之為醫也可謂神矣史記載鵲遇舎客長桑君而竒之授之懷中之藥飲之上池之水自是眎病盡見五臟癥結後之醫者復有如鵲者乎鵲之書既不傳近世若俞范王徐孫崔張劉錢陳諸君所著少小蒸變宫氣玉匱金鎖寶鑑之書其為術雖去鵲逺然又豈無獨得之妙乎徳芳醫小兒往往獲竒効宜亦有得於諸君矣吳君曰吾嘗聞徳芳之言夫病與藥值則惟用一物固不在記覽齊和之多也吾亦凝吾心精吾思使意運於物之表故幸而中焉爾吁徳芳言若此其果異於人哉因呉君之請遂序以遺之送心泉上人還福州序予既分部畢事休居福州西門外鳯凰山之南山南多浮圖氏宫其徒好事者聞予嗜幽逺而樂閒曠也往往躡屨褰裳以來相從而予亦愛其人之不規規焉為事物之所羈束遂相與窮髙極深探竒搜隱望雲鳥之往還俯淵魚之游泳或䕃樹酌泉或掃花坐石箕踞笑傲盡日迺去乆之有僧稱心泉者持詩一章來謁問之則長樂儒家子姓魏氏其先本浮光人而祖朂登宋進士第官至太常卿曽祖一翁累官知制誥心泉兄弟五人而三為浮圖學心泉季也象山秋谷其師怡山方石其祖今以書記主􅋖宗之塔寺予於是取其詩而讀之音節幽逺志意閒曠超然之得若有契予心者故於諸浮圖中尤深愛之予間有作輒出片紙録去居歲餘其勤如一日及予治任北歸心泉逺餞於連江之邑登崇山度長溪胼繭頳汗殊不以為勞既别復留徘徊顧瞻若不忍須臾暫去抑何其情之厚也予再居閩幾三年凡見道路設祖帳觴豆以為餞者非其勢相壓力相制則其情愛狎昵之私有甚不得已焉者舎是則漠然若不識矣孰能慷慨重義氣執杯酒走數里為别哉心泉學浮圖者其於人初無與於休戚而情之厚迺獨異於是其果不為薄俗之所移乎其果墨名而儒行者乎遂書以為别送元舜宗堯二師歸浙東序至正壬寅夏予自三山被召還京師道出四明凡方外之士以詩文名者莫不來謁而定水復禪師延慶貴禪師相與尤勤最後天寜慧禪師率其徒來請銘其師孜舜田之塔適予治行不果為明日解舟至餘姚之廟山見二僧來前問之則孜弟子元舜宗堯也首以塔銘為趣予謂時方盛暑日如熾輪子何必觸熱冒險而逺行耶秋深氣清候予文成當副所請二師俛進曰此來必得先生文迺歸及絶海抵錢唐皇岡之野二師亦復繼至予既寓海村卧病兼旬求多謝去而二師日款門請益堅乃力疾為之銘而後見焉將别二師復請曰銘固幸矣先生獨無一言以賜我乎予嘗過㑹稽雲門天台雁蕩天童育王諸山徘徊瞻晀見浮圖大刹往往猶多晉宋梁唐以來顯志而故家巨室不數百年彫謝銷落殆無存者天於彼此豈故有厚薄哉盖浮圖氏立志堅勇有不為則已為則務於必成亦有嗣法者行同心一故能立大功成大事雖歴盛衰萬變愈昌熾而愈無窮也予於二師之請銘益有所感矣玩齋集卷六
