body:
  text: 玩齋集卷五元貢師泰撰五言絶句越城馬上積雨變新緑微風落殘紅醉騎􅍁段馬日莫越城中孟浩然畫像白日何茫茫青春方浩浩驢背天風來吹我烏紗帽蘇子瞻畫像老龍起深夜來聴洞簫聲酒盡客亦醉滿江空月明無題隔樓理絲竹切切動人情飲酒且莫散坐待新月生墨竹敧枕夢江濤瀟湘生晚緑二妃邈何許千里一黄鵠右風雙鳯浴瑤池毛羽空翠滴僊人騎上天但見遼海碧右雨蒼龍在海上千載蜕神窟忽然凌空飛鱗甲耀白日右老文苞解晴日纎粉落輕飊青鸞忽飛起窓户自瀟瀟右嫩張伯雨丹房偶題翠禽立紅桃白鶴歩青草與子半日閒方見靜中好寳應舟中見月天風吹㡌落忽見月如弦記得開船夜閶門一鏡懸題海棠鳴禽圖孤禽立花上似為不平鳴天地無窮意何人解寫生龍虎山十詠巨靈劈山石飛出黃金鷄至今山下人猶聴雲中啼右金鷄山長溪走蛇蜒怪石露贔屭孰識背上文世無神禹氏右石龜渡載玉出白域獻琛自南溟僊人一叱之化作青崚嶒右象山寳劍落深潭時時見光怪鱗甲飛上天白晝風雨快右龍井僊子出海上凝冰作肌膚手持青霞佩身坐白玉壼右藐姑山天星二十八下作漢廷將功成歸帝傍精彩射石上右靈臺山兩龍出行雨下吸幽澗泉噴沬著草樹明珠爛清圓右雙瀑澗大道如流泉三才本一氣誰人鑿吕梁留險在天地右三石洪鑄鐵在厓石仰視何嵌空明月照不到白雲出其中右青石巖濕翠外盤盤寒玉中浩浩不與舅氏同乃有真人號右白水磜讀范文正集和黄山谷韻憂思同禹稷致事期勲華四海無二帝六合當一家我田宗人田我屋宗人屋百年何所有祠前幾株木英風凜遺直絶識動樞機既有韓招討當使我公歸朝議方多異西師猶未班公心如鐡石要在取横山七言絶句龍駒圖八尺龍駒未被鞍一人牽過萬人看自從夢入將軍筆青草落花主莫寒畫松蒼龍蛻骨東海上太隂黯澹垂髙空六丁驅起夜行雨萬里不斷蓬萊風明仁殿進講五首春日君王出殿遲千官簾外立多時觚稜雪轉寒無奈先許儒臣到講帷黄綾寫本奏經筵正是虞書第二篇聖主從容聴講罷許教留在御牀邊殿前冠佩儼成行玉椀金瓶進早湯自愧平生飯藜藿朝來得食太官羊黄金為帶玉為䄡劍㦸如林衛紫髯也愛儒臣勤講讀向前輕掲虎皮簾奏對歸來日已西獨騎瘦馬踏春泥行從海子橋邊過猶望宫城栁色齊送人歸廬州淮水春深緑似苔故人天上恰歸來扁舟繫在門前樹猶記行時手自栽題淵明小像烏帽青鞋白鹿裘山中甲子自春秋呼童檢㸃門前栁莫放飛花過石頭送陳玉樵著書還江西相如奏賦宜春館子雲待詔承明廬先生有書不蚤獻白髮如此來公車去年有詔行馬政一日買驢三百錢莫笑江南客徒步獻書曽到玉除前湓城雨過枇杷熟緑水新生杜若花畫船多載采石酒醉眼看山直到家和馬伯庸學士擬古宫詞七首城上鴉啼曙色催五門三殿一時開玉皇不許群僊見隱隱車聲天上來緑池香水出芙蓉十二釵寒妬玉蟲只恐禁園今夜雨華清明日又西風寶扇微開萬樂從紫衣扶輦出行宫近臣侍罷櫻桃宴更遣黄門送兩籠紫雲扶日上盤盤花氣薰衣露始乾行處不禁春色惱回身却倚玉䦨千睡思厭厭易入眉繡簾低下燕歸遲黛鬟不整雙梁軃滿院楊花夢覺時殿頭昨夜報春殘盡放宫人賞牡丹獨有沈香亭北畔一枝偏許八姨看雲影微開日脚垂杏花深院落遊絲不知誰動秋千索驚起黄鸝過别枝雙鷹圖青松之下白石上􅑷身對立意沈沈妖狐狡兔莫漫喜落日一呼烟草深八月霜風吹羽毛何人為汝解金絛雙翎如劍劈雲去宇宙蒼茫秋氣髙雪羽初來東海頭西風萬里白鵝秋漢家不校長楊獵因得將軍脱錦鞲題出塞圖君恩如海春如水一入長門見面稀青草琵琶沙上路淚痕空濕嫁時衣沙磧微驚數騎塵漢廷便欲議和親當時衞霍兵猶在未必君王棄妾身題樵漁圖長松如盖復如輪袒腹支頥倚樹身誰謂樵夫避辛苦乾坤許我一閒人一株烟雨一竿風江海茫茫望眼空不是渭陽曽遇獵世間誰復識漁翁和胡士恭灤陽納鉢即事韻紫駝峰掛葡萄酒白馬鬃懸芍藥花綉帽宫人傳㫖出黄門伴送内臣家野濶天垂風露多白翎飛處草如波髯奴醉起傾渾脫馬湩香甜奈樂何蕎麥花深野韭肥烏桓城下客行稀健兒掘地得黄鼠日莫騎羊齊唱歸新教生駒不受騎小紅車裏簇歸時鈎簾醉卧􅉊毺月不省人間有别離野館吹燈夜未央薄寒偏透越羅裳出門不記人行路馬首惟占北斗光至正十一年秋七月巡按松州虎賁分司時山谷寒甚公事絶少明日即還為賦此秋風摵摵衣綿薄夜雨蕭蕭燭焰低萬里江南才夢覺此身元自客遼西雲葉繽紛雪弄花小營近午却排衙分司御史渾無事又鞚青騘踏白沙詠塵春城花露欲生泥十二街頭漫漫飛落絮遊絲共無頼半粘香汗半羅衣題鮮于墨跡墨花香潤紫毫圓寫徧湖山忽夢僊十二樓髙明月夜玉笙吹鳳下秋天題吳宗師看雲樓四面忩開縹緲間無心飛去又飛還晚來盡捲西郊雨却伴長松老鶴閒寶應待邵少監不至舟遂先行亂帆如馬出髙城百里平湖半日程自是南風送南客何妨同約不同行朝發采石莫泊儀真舟中望月萬里滄波一席平猛風忽變又潮生今宵共看淮南月却憶江東昨夜明赴京留别里中劉李二生白沙渡口數行酒采石江頭萬里船别後相逢定何處一車行李五門前發通州日日思歸未有期及歸翻恨數年遲開船聴得呉歌起絶似閶門送别時贈吕梁老兵二十年前福建軍髩絲垂領眼俱昏一瓢乞食黄河㟁猶遣兒孫應戸門舟泊黄河有牧竪籠稚兔以嬉因買而釋之遂作是詩目晴圓轉褐衣涼分得山河大地光今日開籠放生處桑隂麥穗正茫茫送王元伯遊金陵并柬樊時中都事王徳常管勾山頭老屋一尺雪江上片帆千里風笑呼斗酒來濯足誰識書生逆旅中閉門十日九風雨熟睡不知春水生樹上啼烏忽驚覺故人只在石頭城次成誼叔趙大本二臺都事肅章門聚散詩韻銀鞍白馬錦障泥立仗時多出駕稀别有天閑真汗血春秋長從六龍飛題畫樓閣叅差烟水村涼風槲葉下紛紛何人理釣秋江上驚起新來白鴈群漁父一輪明月一絲風吳水西頭楚㟁東日日城中賣魚去却教鷗鷺守孤篷灤河曲椎髻使來交趾國槖駞車宿李陵臺遥聞徹夜鈴聲過知進六宫瓜果迴白沙岡頭齊下馬為拾閼支八寶鞭忽見草間長十八衆人分插帽檐前水僊太液池邊雪始乾曉粧初試佩珊珊簾鈎欲下東風細猶夢珠宫扇影寒十二瑤臺風露寒銀河澹澹月團團龍宫自與塵凡隔别有銖衣白玉冠畫蘭西望沅湘不盡流紅芽緑葉自生愁王孫去後無消息風雨山中日日秋題錢舜舉折枝海棠玉環睡起嬌無力膩粉微匀酒暈生不是開元寫遺恨世間那得見傾城題山水圖孤峰直出青天上亂瀑斜飛白石間老我江湖歸未得何人解寫敬亭山重過丹陽寄錢成夫髙荷矗矗荇田田數騎來迎野水邊只為一春頻往復縣人識得侍郎船青山西去水東流兩㟁飛花送客舟何事閶門行一月不能三日到宣州過滸墅廣福寺留題幾人飲散閶門外落日蒲帆獨自開偶向龍華寺前泊一株髙栁記曽來龍華寺贈栢庭上人辛夷花落滿閒庭藥徑斜依翠栢屏白日山門無客到老僧自誦法華經姑蘇臺當時何事太情多不悟危機出苧蘿一夜月明天似水吳王臺上越王歌余過呉中得畫一幅孤峰拔起有類鴈蕩僊都者因題贈宋居仁鴈蕩秋深玉柱寒老夫曽此駐征鞍開圖一見青山色猶似當時馬上看題怪木圖千年老樹化青牛風雨空山不盡愁一日爭迎作神主踏歌槌鼓水西頭秋日與陶唐佐游麻姑萬松庵萬疊青山一徑開寺門秋雨長莓苔莫憐此處行人少還有僧從外國來遊里中麻姑西觀三首道人鈎簾坐堂上盡日好山相對青藥苗當户渾不理手持一卷黄庭經樓閤參差烟樹間石橋横截水潺潺我來欲覔燒丹處蒼术黄精正滿山石上菖蒲水上蓮一天涼月露涓涓碧壇夜半燈如雪猶自朝真北斗前題𤣥妙觀嵇月庭所藏鍾離像槲葉為衣草為履鬅鬙雙髻任風吹浮雲捲盡青天濶正是神光夜出時題番昜劉伯方靜觀齋二首夜來風雨過前村百尺深溪到底渾惟有道人心鏡淨水流花落不開門巷陌深深白日長春來只有燕飛忙滿階落絮無人掃銷盡爐中百炷香野浦歸舟圖天柱雲門倚半峰樹林青處見丹楓扁舟獨釣秋江雪猶似閒身在越中書扇勉錢道夫桑蠶作繭麥生蛾𤓰瓠牽籐緑漸多白日軒窓浄如水不妨臨帖更吟哦西湖竹枝詞四首栁州寺前湖水平阿誰湖上唱歌聲畫船買得十様錦行近荷花須盡聴紅裙女兒坐船頭朝朝莫莫白蘋洲近來學得新行令為郎把酒一澆愁芙蓉葉底雙鴛鴦飛來飛去在横塘人生多少不如意水逺山長難見郎葛嶺西邊師相宅潭潭府第欲連雲别買樓船過湖去可曽看見岳王墳贈錢塘琴士畫船載酒西湖上一日笙歌幾萬錢獨抱孤桐向何處夜深彈月上青天過桐江雨後滄江一鏡平青山缺處掛漁罾漢家多少雲臺將千古清風屬子陵釣臺嚴陵釣臺詩古今作者甚多或髙其隱或議其果二者皆不為無見予故並存焉觀者應為一莞也江流浩蕩石㠝岏千里來尋一日間慚愧白頭奔走客題詩也到富春山百戰關河血未乾漢家宗社要重安當時盡著羊裘去誰向雲臺畫裏看青山如馬復如龍滄海東來第幾重不是狂奴輕萬乘世間誰不受牢籠江山縣道中石脚插溪清見底白木縛橋斜跨水水流一似橋上人橋上人行家萬里興化道中紫蔗白頭金橘坡荔支龍眼總婆娑驟暄情思如中酒喜得清隂馬上過題楊德章監憲賀蘭山圖太隂為峰雪為瀑萬里西來一方玉使君坐對賀蘭圖不數江南衆山緑處州弋溪驛四面青山風雨多石稜轉處掛漁蓑推篷不記來時路只見雙雙白鳥過流水一灣山四圍青林黄葉雨霏霏竹鷄啼罷人行少忽有釣船溪上歸袁莊贈化東庵王道人夢覺流鶯花外聲一簾疎雨稱幽情披衣步向山門立青草萋萋笋亂生曲岸西頭屋數椽緑隂深處好移船姓名正恐人知道忽有野僧來近前吳淞江上謾興亂蟲撲面蝙蝠飛木槲飄蕭半掩扉老僧看潮囘寺晚林下惟逢一犬歸白月滿天江水平銀河垂地寂無聲披衣獨坐過夜半撥刺跳魚時一鳴門外梧桐髙百尺月華依約弄清隂夜深移在窓紗上不隔思家一寸心露冷草根鳴蟋蟀雨晴花影轉蠨蛸一家四散知何在獨對林間喜鵲巢書扇餞徐大章往黄灣海村四月橘花香日莫牽船出下塘别後莫教音問少蒼頭時遣送文章書扇餞潘濟民往黄岡黄岡只在海東頭野水連天蕩白鷗昨日相逢今日别藕花深處謾停舟題朱肅畫芙蓉零落渚宫秋翠盖紅衣漫不收猶有雪鴣來上立夕陽無限逺人愁書扇餞潘徳全徃彭坡潘家兄弟多相識白面書生氣更豪一見便還東海去健帆如馬入雲髙題劉生庸道五莊草堂圖南北兩峰相對青萬竿修竹一茅亭何時共坐西湖雨白髮籌燈講六經題朱生質夫所藏梅花圖水晶簾幙珊瑚鈎萬玉花間一鏡秋睡起瀟湘寒凜烈却疑飛雪在羅浮夜深瑤女出寒江分得南枝雨一窓可是貞姿共清絶神僊肌骨更無雙五言排律上京大宴和樊時中侍御一元開大統四海㑹時髦畿甸包幽薊天門啓應皋群黎皆屬望百辟盡勤勞蕃國來琛獻邊陲絶繹騷劍韜龍尾匣弓屬虎皮櫜列聖尊皇極元臣異節旄宗盟存帶礪世胄出英豪歲駕嚴先蹕居人望左纛平沙班詐馬别殿燕椶毛鳯簇珍珠帽龍盤錦繡袍扇分雲母薄屏晃水晶髙馬湩浮犀椀駝峰落寶刀暖茵攅芍藥涼甕酌葡萄舞轉星河影歌騰陸海濤齊聲纔起和頓足復分曹急管催瑶席繁絃壓紫槽明良真曠遇熙洽喜重遭化類工成冶聲同士赴鼛隆㤙雖款洽醉舞敢呼號拜命榮三錫論功恥二桃重華躋舜禹盛業繼夔皋燕饗存寅畏游畋戒逸遨乾坤春拍拍宇宙樂陶陶争獻公車頌光榮勝衮褒輓馬伯庸中丞世祖投戈日先公出守初邦人懐禮樂家學贍詩書一舉登金榜頻年步玉除星移供奉燭風動使臣車忠諫陳無逸雄文賦子虚群公推雅量多士服清譽太史仍兼制春官總傅儲槐雲衣纚纚華日佩舒舒長樂方調膳中臺旋賜輿尊嚴深翠栢清潤照紅蕖德業真無比恩光孰可如休官唐殿李知止漢廷疏野曠秋呼鴈江清晚釣魚石田霜後稻沙圃雨中蔬正爾安民望胡為夢帝居大星離次舎白璧翳邱墟惟有新詩在千年起歎歔剪燈聨句元夕同吳子彦劉子清侯敬文㑹飲水陽陳善甫家用剪燈聨句云夜暖拈香繭春寒落剪刀勞心連鬱結貢綺思出長繰㸃綴輕蟬翼吳裝粘細鳯毛風花凝瑣碎貢雲葉護周遭影爍金垂燼侯光融玉作膏舞裀圍落絮劉歌扇逐飛桃帶轉銀幡小貢輪迴寶盖髙蜘蛛圍露網吳顧兔墮秋毫鶯擲翻紅雪侯魚跳起碧濤春陽嘘蛺蝶劉秋冷蜕虭蟧翠薄荷分鈿絲柔栁散條青童來降節玉女翳纎翿碎訝珠胎迸尖愁燕尾翺㣲茫縈錯落斜隙漏葡萄飴釡空燒蠟棚山謾結鰲浮塵籠漠漠流水眩滔滔纂綺難為宻裁綃祗自勞嬋娟妬清夜蝶蝀落晴皋製異宫人綬縈懷學士綯未曽分寶炬先許照襴袍劇賞尊頻倒窮搜筆屢操盍簮嘶騕䮍奮袖舞豪曹酒足華筵散詩慚白戰鏖時平無夜禁繁弱且歸􅌢玩齋集卷五
