body:
  text: 玩齋集卷七元貢師泰撰記備萬齋記出杭州新門東北二百歩又東折入委巷有屋四楹在敗垣廢圃間蒿萊不除問之徐氏業也遂傭其半苴漏補罅移木牀瓦竈就居之四壁空無長物因大書備萬二字於其顔或過而問曰飲食以備飢渴裘葛以備寒暑僕御以備使令子今無一物之備何謂備萬耶吾知子之不為是也豈嘗有見於孟氏萬物皆備於我之言之意哉予乃笑而答曰吾亦知我之不為是也夫我於天地間亦萬物之一也以一較萬其猶稊米之於太倉乎以萬歸一其猶太倉之於稊米乎故凡形色之可接者聲音之可求者氣類之可感者其數無窮也其變莫測也固非一身之所能備也而不知自物觀物則物物也物且萬萬也自我覩物則物豈外我一身哉且人也物也同得隂陽五行之氣以成形也亦同得隂陽五行之理以為性也何其正通偏塞之不同耶蓋知覺運動之蠢然者物與人固無異也仁義禮智之粹然者人與物果無異乎是以散之為萬殊斂之為一理以一貫萬其所以為備也亦大矣雖然體之而不實則羣疑之起足以害吾道行之而非恕則一念之私足以戕吾仁若然則一自一烏乎萬萬自萬烏乎一非知道者其孰能與於此客唯而退遂書以為記經訓堂記經訓堂者安陽韓諤致用之所作也韓氏自魏國忠獻王以經學致位将相功業日盛收書萬卷作萬籍堂于安陽里第其子文定公既增廣之文定之子申國公益置七千餘卷作叢書堂六庫相傳之盛當時河朔士大夫家號稱積書多者罕及之傳四世至尚書左司公膺胄始從宋南遷會稽時散失已無餘矣又四世至義行明善二先生皆以道徳文章名於時聚書復數千卷作經畬齋義行之子務徳君承之作種學齋今致用又取兩世之書庋而置之揭以今名厯數百年更十數世而藏書之富綿綿不絶吁亦難矣哉然六庫兩世之蓄諸子百家衆史兵農毉卜之書皆在焉致用獨有取於經訓者豈無見耶蓋六經在天地間如元氣流行日星昭布大而父子君臣之道近而夫婦居室之間幽而隂陽鬼神變化之理明而禮樂文物法制之詳微而昆虫草木之夥讀之者隨其力之所至雖淺深髙下造詣之不同實未有外乎此而可以為學者也昔昌黎文公訓其子符嘗有經訓菑畬之句非深得於六經者其能卓見聖賢為學之要乎文公忠獻宗也忠獻致用祖也二祖以文章功業顯於唐宋致用歸而求之有餘師矣師泰也何足以知之姑為記知學齋記人亦孰不欲學哉善學者知所以為學而已矣知所以學則用志専而成功易學而不知所以則倀倀然無所向雖日疲神於六藝之文殫思於百家之言其為學果何如耶然則學固在乎知知亦有其要矣天台徐大章以知學名齋間過予海昌寓舍願聞一言以發其歸趣未幾復以書請曰一䕫嘗受教於家君矣學以立言明道非徒記誦詞章云耳然堯舜湯文周孔之道見於經其言宏博奥衍既未易知而漢之司馬遷揚雄唐之韓愈宋之歐陽修卓然自為一家之言又未易得其門牆而入也先生獨不能啟死虚滯使如春陽發動層冰頓釋乎予發書三復而嘆曰善哉大章之為學庶幾得其要矣夫予亦何足以知之然竊聞之言非道不立道非言不明立言明道固不可岐而二矣亦豈可不知先後輕重之叙也耶不知其叙而遽學焉則終不足以領其要矣是故道明於已而發於言則言不期文而自文譬之江淮河漢之流行波瀾起伏将有不得不文者不明於道而徒言之則如斷潢敗潦雖欲文得乎且是道也非逺人以為道也本之於人心天理之正行之於彝倫日用之常因微以至著推近以達逺由小以及大可以參贊可以位育可以成變化而行鬼神斯其所以為學也斯其所以為堯舜湯文周孔之道也然而楊墨仁義而異端老佛慈愛而殘忍其他若申韓管商公孫衍張儀之流其始亦非不欲明道也而卒至於糜爛磔裂不可究極者不知所以為學學焉而不得其要故也是則堯舜湯文周孔吾學之標準也易書詩春秋禮樂吾學之尺寸也執尺寸以定長短望標準以趍逺近道其外是乎不然苦心刻意作為文章雖能並驅齊駕於揚馬韓歐之間果為知學哉大章不棄予言遂書以為記一經堂記一經堂者海昌朱肅齋氏名以訓其子而叅政周公伯温之所書也肅齋之子鐩從予遊閒致其父言請為之記予謂六經並載聖人之道何獨取於一經哉豈不以漢韋賢嘗以一經教子故耶不然則将先明一經而他經從可明矣夫經之目有六曰易書詩春秋禮樂或道隂陽或紀政事或詠性情或正名分或以正行而和心雖其為説不同而其道則未嘗不貫於一也自三五以降厯世益逺然其垂訓立教者不過數十言而止至吾夫子贊序刪正更加述作上以紹前聖之既往下以開後學之方來人文可謂極盛矣實亦不過數百卷而止爾以數百卷之書明數十言之㫖簡易精潔如天地運行如日月照臨其道未嘗不廓然而公粲然而明也及秦漢諸儒各出已見務為専門論議詆訾朱紫混淆其簡冊之多棟充牛汗既已湮塞聖道磔裂經㫖不可究極矣而近世科目之設則又餌之以著述誘之以詞章蠱之以記誦假之以經術遂使海内之士疲精竭力靡然向風恣為新竒之言巧飾頗僻之見一切逢迎苟合以徼進取而六經始為釣功名利禄之具矣嗚呼大道之晦一至於此可勝嘆哉向非周程張邵朱吕數君子者出孰能發微言於既昧之中尋墜緒於不傳之後乎而今之學士大丈執其全書因以潛觀黙識旁通曲暢則亦幸矣然有讀書萬卷而終身無一言之得者有得一言之要而終身守之不失者其故何也道之明與不明而已是故明經所以明道道明則經無不明者而鐩也又文公諸孫强志善學其庶幾有得於此矣夫不然雖日誦六經猶為無益况一經哉重修西湖書院記江南浙西道肅政㢘訪使丑的公重修杭州西湖書院成郡監諤勒哲特穆爾旺温守社從庸謝節提學馬合謨洪欽以士人宋杞等狀來請文曰西湖書院在杭州西湖之上故宋岳武穆王飛之第後更為太學至元丙子天兵臨城學廢禮殿獨存其地與憲治實皆為岳王第故來長風紀者莫不以作興為先務三十一年容齋徐公琰始即舊殿改建書院且遷鎖闌橋三賢堂附祀焉三賢者唐刺史白居易宋處士林逋知杭州蘇軾也置山長一員主之遂易今名延祐三年周公徳元徙尊經閣建彝訓堂創藏書庫益增治之至元元年特黙格公胡公祖廣重葺大成殿開志仁集義達道明徳四齋以居來學扁三賢祠曰尚徳别室以祠徐公曰尚功於是書院之盛遂為浙東西之冠矣越二十年城燹於兵書院亦廢象設陊剥庭廡汙穢居人馬跡交集其中書籍俎豆狼籍弗禁明年三賢堂燬又明年尊經閣壊學官廪稍久絶仿徨莫知所措公朔朢謁拜顧瞻嘆息曰兵革之餘雖瘡痍未復教化其可一日而廢乎况勉勵風紀之任而書院又密邇憲治也哉於是出私廪白粳二百石謀作興之丞相康里公更益白金五十兩乃克裒堅萃良撤朽易腐輪奐再新始事於至正十八年冬十月迄功於十九年春正月諤勒哲特穆爾等承命董役幸底於成今尊經閣巋然特起三賢祠棟宇輝映設以重門繚以周垣殿堂齋廡庖湢庫庾無不悉治此皆我公之力也不有紀述其何以勸顧惟公之曾祖太師中山王勛業卓冠祖文奕世繼美公由近侍拜三臺御史厯四道㢘訪使以宣慰都元帥督兵饒信克復三路二州五縣全活數萬人其詳具載武功録及監憲浙西又能以經濟之略叶和逺邇寛裕之徳撫綏軍民雖當﨑嶇戎馬之間不忘詩書禮樂之事可謂識見超卓深知治本者矣由是而風移俗易使人皆知尊君親上之道而銷其乖争陵犯之風其所繫不亦重且大乎是不可以無述用不敢辭勉齋書院記至正十九年冬十月福州始作勉齋書院明年秋八月告成丁亥㢘訪使者率郡大夫士行釋奠禮己丑經畧使李公國鳳謁祠下用便宜署今額以儒人張理為山長執事者間具本末請記於貢師泰曰書院徧天下而閩中為盛大率祠徽國朱文公師弟子居多若延平武夷考亭建安三山泉山龍溪雙峰北山之屬皆是也勉齋先生實文公髙弟獨無専祠顧非莅政者之缺歟昔者僉事張引嘗圖經始以調官浙東不果經厯孔汭銳意作興以拜南臺監察御史又不果未幾行部閩廣適郡士林祖孟祖益請以太平公輔里故宅一區為學宫厥位面陽廣輪合制遂倡成之而㢘使沙木斯鼎副使元努僉事額琳沁布喇特納劉諤勒哲鄭潛經厯達爾瑪蒙古知事黄布延特穆爾照磨傅居信叶心相事議若出一且移鄭君董視而佐以屬吏王蘭焉行省平章布哈特穆爾聞之亟發白金五十兩及租田一百五十畝奇以給以贍於是即舊以圖新拓隘以增廣禮殿中崇象聖人之燕居寺宇旁峙嚴先生之祀事堂曰道源著師友之授受也閣以雲章以鄭君正字端本時所得皇太子書麟鳳龜龍四大字刻置其上也堂後疊石山曰小鰲峰不忘先生讀書精舍之名也齋左曰凝道右曰尊徳棲士有舍待賔有館燕休有室更衣有次庖湢庫庾各有其所重門衙衙層廡翼翼瞰以方池度以石梁其周九百八十四尺奇東西廣九十一尺深視廣之四雄規偉觀穆然靚深然後斯道之統有所尊而講學之士知所同矣惟子之學蓋亦得於先生者請文諸石以紀其成顧師泰荒陋何足以知此然竊聞之斯道也伏羲神農黄帝堯舜禹湯文武周公之所以為治孔子顔氏曾氏子思孟軻氏之所以為教不幸而變於管商慘於申韓雜於荀揚暴於鞅斯磔裂破碎於毛鄭賈馬王范之徒幸而唐之韓愈氏能以所得著之原道之書然其於性也主三品於仁也専博愛則猶未免於不詳不精之失焉至宋全盛濂溪啟其源伊洛遡其流度江再世文公始集諸儒之大成使千載不傳之道復明於天下後世吁盛矣哉於時門人弟子聰明卓越固不為少然求其始終不渝老而彌篤者先生一人而已先生因劉子澄一拜文公於屏山之後即慨然以斯道自任聴風聲於屋頭對孤燈於天曙其堅志苦思為何如也自是得執子婿之禮從登廬阜涉彭蠡過洞庭望九疑宦遊淮江湖湘吳越甌閩間不惟口傳心授於師門者愈久而愈博而其所見名山大川淵深髙厚皆有以助夫精微廣大之學矣是故徵諸事業則城安慶禦漢陽最為偉蹟著之方冊則四書通釋儀禮通解尤為有功蓋先生有志於斯世卒以陸沈下官不能大行其學固可深慨然聖賢墜緒非文公無以明文公遺書非先生無以成則斯文吾道確乎其有所歸矣先生沒其傳之著者在閩則宓齋陳氏信齋楊氏在浙則北山何氏江以西則臨川黄氏江以東則雙峰饒氏其久而益著者則西山真氏衍義諸書凡今經帷進講成均典教皆出先生講論之餘也嗚呼先生之道傳之後世先生之書行乎天下孰不想慕其髙風漸被其餘澤况鰲峰箕山之間雲烟蒼莽神氣流行愾然肅然猶若有見乎其位聞乎其容聲者乎書院之作其有功於世教豈曰小補云哉遂記不辭先生諱榦字直卿御史瑀之第四子累官至大理寺丞轉承議郎致仕勉齋其自號云象山樵舍記江東諸郡治萬山中而山水之勝則在廣信廣信諸縣治萬山中而山水之勝則在貴溪若夫貴溪之尤勝則莫若象山象山自閩南行數百里至縣境巋然突起其勢上負而下墮若大象然故以名昔宋文安陸先生居是山以樂聖賢之道故山名益顯於天下後世今縣士程伯來父築屋讀書其中自署其顔曰象山樵舍蓋聞先生之風而興起者也夫山之勝峭而為巖谺而為谷散而為峰巒林麓窪而為溪澗池沼平者田疇聚者村落與凡神仙之居隠逸之廬浮圖之刹參錯旁午殆若棊布而星列焉且仙嵓雲臺逍遥琵琶諸山去樵舍近在咫尺伯來乃無所取而獨惓惓焉惟兹山之慕其真有見於先生者乎豈徒負薪行歌托名隠逸以僥寵榮而已耶蓋先生之道髙明而廣大先生之學簡易而精微雖其所入者與徽國文公小異要其終未始不各極於至當之歸也門人弟子因鵞湖太極之辯一時互相論議遂使後之學者不能無惑焉嗚呼彼亦安知二先生之所以然哉今伯來仰兹山之髙而聞其道讀先生之書而知其要将不待言語文字之間而超然日進於聖賢之域矣顧予何足以知之詩不云乎髙山仰止景行行止伯來其尚勉之福州路儒學復田記國家廟祀孔子建學籍田以教養天下之士自江以南惟閩廣為盛而閩處八郡之中租入尤號富饒比年典司不謹姦弊滋甚遂使嵗入之數日以耗損教養之具或不給焉㢘訪使贍思丁公聞之慨然曰是必有豪强侵之者不然則漁於姦吏憲治所在敢爾乎乃命郡守申延嘉努稽圖按籍教授沈質初周履旁詢悉發諸豪民所侵在閩縣者得南洲田三百畮竒銀租若干兩魚蕩數百頃銀租三十兩兔壕莊田若干畮時昇里田一百畮奇嵗皆分其收之半在侯官者大小馬鄭漈洋田二百畮奇銀租一十三兩今增至五十三兩曇石莊銀租九十兩今增至二百兩新復田八十五畮銀租二十六兩在長樂者善田等田若千畮米增七十五石奇學産於侯官為最多其十四洲田畮幾五千米石二千三百六十僅入其半今悉復如數而又歸浮圖氏先勝洲侵田三百畮奇是舉也憲史武鼎治中買住學正張熙孫皆與有力焉於是在泮之士盧曄等相率狀其事來請記嗚呼昔之侵者今以歸昔之漁者今以復變耗損為富饒監憲公之用心亦知所本哉雖然學校之職教與養而已矣養之而非其材則稂莠足以害苗教之而無其法則紅紫得以亂朱今教養既有其具盍亦思所以去其害苗而亂朱者乎不然佻達貽子衿之譏貪殘興碩鼠之刺倉庾雖實亦何益於學校哉紀之石間用勸來者福州三皇廟學田記三皇有廟毉者有學其制雖昉見於前代而合廟學為一則又我國家之盛典也然廟以崇祀牲幣粢盛之物不備是為凟禮學以明道餼廪供饍之具不稱是為慢士瀆禮慢士皆為政者之失福州三皇廟在城東北隅向予㢘問閩海時顧瞻棟宇荒陋俎豆狼籍師生散去學業不講語諸有司則曰無以贍也方謀所以經助之會遷去不果後五年以分部復來則廟學視前稍加飭焉問之主者謂宣城葛君秉璧之提學也㑹今平章普公之至大興學校而僚佐賔屬議以克合始取閩縣民田沒入於官者二百六十畮奇𨽻諸學官而部使者諸君又皆風勵勸勉以相厥成然後春秋祀饗朝夕供具一如令式而俎豆絃歌升降講習皆足以稱大藩之觀矣竊惟三皇之道猶天之元氣也元氣無不用故道亦無不該凡後世之叙倫明紀以淑諸人飲食作息以保其生者何莫非三皇之道也豈毉家者流所得而専祀哉況今所傳素問難經靈樞本草之書鍼刺砭按摩齊和呪詛之法其言多假托附麗問難以神其術未必皆出乎三皇也然讀其書於學固可以推廣夫好生之徳仰其神於廟又可以想見夫生成覆載之功觸類而長之庶幾猶得其所存於萬一爾嗚呼掘地而泉至蓋水無不在也穴隙而光入蓋明無不照也三皇之主於毉其亦若此夫他凡預田事者具載於碑隂故不書文昌祠記梓潼神祠在蜀郡梓潼縣累封輔元開化文昌司禄宏仁帝君今郡縣所在亦多祀之其創於福州儒學者實至正九年憲府諸君之所始也祠當麗澤亭之北杏壇之東重門周垣亦既嚴飭且刻石以紀其事矣比年横兵攘敓遂壊不葺石亦斷裂無存㢘訪使徳卿恩公聞而嘆曰神載祀典國之所重何瀆慢若是耶亟命司校者修而復之即事來請予記按梓潼為蜀郡蜀郡上直參宿參有忠良孝謹之象其山髙深博厚而水七曲實神明之所窟宅或謂斗魁為文昌六府主賞功進爵故掇科之士尤謹事之或謂神為張宿之精詩所謂張仲孝友者是也此其説固不可深考然神得以通祀於天下者其亦忠孝之所推與方今人心思治海宇漸平斟酌元氣運斡化機其不有望於神明之佐理乎今公勵新學校當干戈搶攘之餘而能惓惓於一祠之興復者亦必有所見焉嗚呼聖人之所以為教學者之所以為學忠與孝也忠孝原於心而通於神明臣之事君子之事父亦惟盡其所得為以求無愧於已而已矣是故行不侔於神明不足以為忠孝然則是祠得邇於郡學者獨非聖人神道設教之遺意乎乃為迎送神之曲俾歌以侑祀曰神之來兮連蜷乗白騾兮驂後先雲瀫瀫兮靈光縣肴醑蒸兮旅豆遵鸞聲止兮神語傳神之去兮砉歘猋輪旋兮弗弗山嶔崟兮水七曲是文達兮錫之遐福春秋報祀兮奚間閩蜀上虞縣復湖記上虞縣西北五鄉曰永豐上虞祈興寧逺孝義五鄉有三湖曰上妃白馬夏蓋而夏蓋實承其委其周一百五里其門三十有六其溉一十三萬畮其賦一萬石奇中有潭名梟鏡雖大旱不竭而其支流餘閏又足以逺被會稽之延徳餘姚蘭風一都三保之境其為利也亦博哉湖自唐長慶中民始請割田為之仍令受水者包其所輸至今五鄉田租倍他産然其地勢倚江枕海鹹鹵浸淫傷敗禾稼東南又多大山深谷一遇暴漲則奔潰莫禦旱即枯涸可待故其隄防啓閉之法視二湖為尤謹疊堰分埭以時蓄洩限量晷刻以節多寡序次先後以均逺近而後民免凶荒捐瘠之憂官無侵奪分争之訟矣宋政和初越守王仲薿嘗廢湖為田得不償費南渡後吏部侍郎李光疏於朝盡復為湖嘉熙丁酉幾敓於福邸五鄉民張康等闔詞争之迺已始末具見碑志及通鑑長編國家内附以來屬時屢豐水利不講居民迺竊縁堤髙仰以私播種元貞間或言之營田使者得田三十頃粟五百石然自是蔓延莫禁湖之存無幾即有旱乾水溢則五鄉咸受其害矣至正十二年翰林應奉林希元來為尹遂定其墾數餘悉為湖十六年夏旱豪民乗間侵種其禁復弛縣尹李睿力復之明年春行御史臺移治會稽駐兵縣境或妄言湖膏腴可屯田典兵者忽於識察一旦竭如焦釡所得僅百許石而官民失利不可勝計御史察知其弊俾嘗賦於官者田如初他皆諭罷明年春又有獻之長鎗軍者賴分省阻止之於是積水盈溢恵及逺近而湖之利益博矣又明年父老乃相率謀於邑士徐煥文魏延曰湖食我民生死倚之不有紀述将何以示來者煥文等以予之嘗信於其人也具以狀請竊惟溝洫澮川之制廢陂湖池塘之利興而孫叔敖史起鄭國文翁鄭當時兒寛召信臣之流各以治能名於時其載之史傳者班班可見迨我國朝内設都水監外立庸田司郡縣守令皆知河防兼渠堰凡所以為生民計者可謂周密而深逺矣尚何弗修厥職往往使已成之業湮廢崩潰哉且是湖也旱則決水以灌田澇則導水以注海用力寡而成功多與諸湖較之實相倍蓰是以不敢重違父老之請而叙次其故用刻諸石豈徒為豪强姦貪之警庶幾長民者知所勸焉上虞縣覈田記古昔聖王之治天下也曰分田定賦以一其民而已矣後世田賦不正徭役不均豪民得以肆其侵暴黠吏得以縱其奸貪然後法制大壊而斯民始不堪其生越上虞縣大徳間定墾田總之凡三十三萬二千三百畮奇其兵竈驛學寺觀免徵者四萬七千畮官民實徵者二十八萬五千二百畮具載典冊可謂較然矣嵗久法弊因去其籍且推收之法不行而鬻質之數不實遂使詭名寄户飛隠走貼虚增張并之弊紛紜雜出而真偽莫能辨矣至正十八年夏四月安陽韓侯諫來為尹會治兵縣境一切軍資悉取於民重輕失當怨讟載道侯為此懼将有以處之而未暇也明年春分省論功陞行樞密院都事仍總制縣事迺進父老曰若等苦吏横斂久矣我欲為若等定令使不得重輕為市何如皆俯伏頓首曰幸甚侯乃下令聴民自陳即有不實并以坐吏仍選鄉里大姓有禄位徳望者覈視之而侯坐堂上執朱墨勾稽覆騐窮晝夜不少休其法每田一區署由一紙載田形地方畝數與凡執事者其上俾執之以為劵而圖以魚鱗冊以鼠尾分以兜率總以歸類然後奸欺屏息田賦正徭役均而庭無紛争之訟矣又距縣西南數百步有湖曰西溪當故宋時民有私其髙仰以為田者或獻之福邸内附後籍入皇太后宫即其私租畝嵗輸穀二石二斗曰籍田其田並湖居民稍復侵耕輸穀五斗曰蕩田又窪下者輸穀四斗三升曰葑田嵗久籍田力薄更失水利終嵗勤苦得不償費而蕩葑之利日饒侯為度其土宜第其租入民皆稱均其冬予以總漕閩廣道出上虞父老遮拜道左具述其事嗟夫治民亦多術矣要莫大乎得其心得其心有道亦不背其所好不施其所惡而已或奪其利以戕其生勞其力以咈其性則民心其可得哉侯能因民好惡以出治其庶幾長民者之道乎且聞侯之始至也會萬戸馮輔卿以兵來守将預徵民租侯言方旱饑請待新穀之登民甚便之鄰境構兵遊軍已入縣将校慮有伏欲盡燬民居侯白叅政公遂得免長鎗軍來分鎮或言縣多湖田膏腴可屯種侯力争水利不可失亦得免又大修孔子廟復忠恕堂聘名師廣弟子員日與講論忠君親上之道縣人化焉故并記之侯字自行故宋魏國忠獻王十世孫少孤能自力學以義兵數立戰功丞相便宜擢台之臨海縣丞遂來為縣累官都事云義阡記松江通守謝侯禮既作義阡間至錢唐謁予曰𦵏不如禮曰埋不得埋曰棄今吾郡之民不幸而棄焉者或有之矣吾為守而未能使之化又不能恵吾民於心獨無欿然乎今得地五百畮散在九龍山中各垣其四周以限芻牧之入鋤耰之侵使凡孤貧無依羇旅無歸者皆得𦵏焉猶懼夫𦵏者力有不贍則又割田五百畮嵗徵其入以助之凡斂而棺者予地二十尺米二石火而函者地五尺米五斗仍深其坎崇其封大書居里姓名而謹志之他日子孫或有徙瘞者給米如𦵏數之半庶幾長民者之道焉予聞守言為之太息曰先王定為喪𦵏之禮自天子以至於庶人其塋域大小日月逺近皆有截然之制不可踰也自浮圖氏之教行而火𦵏遂興郭璞管輅之學出而拘忌益甚火𦵏興故有沈其遺於水者矣拘忌甚故有拆裂暴露而不顧者矣今侯之為阡也不徒孤貧羇旅有以慰其魂魄於風凄露泣之時庶使火焚水溺與夫拆裂暴露者惕焉感動而知所以掩其親矣然則侯之化其民也豈小補哉福州行省檢校官廰壁記至正十六年春三月詔復福建等處行中書省即故宣慰司為治文武佐屬各有攸署獨檢校官缺焉後四年諤勒哲特穆爾邵侔來視事顧謂同列諸君曰檢校主治文書迺無専治可乎諸君曰固當屬以軍事未遑今宜有以成之矣遂請諸大府度地省治之西偏發官銀若干以資經始其不足者以俸錢給仍移同列鄭鼎納延董其役曾不數月工師告成前闢治事之廰後為燕息之堂待賔居吏位次秩然明年春諸君相率過予請紀其事予惟國家統一海宇既立中書省以總天下之務復立行省以分中書之治至元二十八年始設檢校官二員又明年增至四員其在行省者半之比年兵興多事添置遂無恒員凡諸曹所治銓衡賦税禮樂輿馬刑政營繕之屬署牘叅錯旁午出入山委林比檢校悉得録其繆愆稽考以為重輕上幕府議一不合則吏抱成案往來力争可否不得則檢校並上堂立具列卷前後反覆辨論必如律令乃已其職任之重若此今諸君之興斯役也豈徒燕嬉飽食以寧其軀娱其心而已哉蓋居髙處明則神清而氣舒瞻視嚴肅則望重而人畏神清氣舒故内絶壅蔽而慮無不周望重人畏故外絶干撓而令無不行慮周令行而後檢校之職盡矣雖然檢校為諸曹設也諸曹有所闕遺苟阿順不言則檢校失也檢校言之不即改且羣聚騰訕焉則諸曹過也檢校不挾其所得為者為功諸曹不以其所不能為者為諱則上下協和百職具舉矣百職具舉藩屏其有不乂安者乎福建行省檢校官題名記福建行省檢校官既創治事之廰請予記諸壁間矣間復聮謁曰凡官署必刻石題名今石已礱而文未具甚幸先生終恵焉予於檢校多相善且其意又甚勤能無一言以為勉乎切惟中書總天下之務行省分中書之治諸曹掾皆宰相親所選擇以待用於他日者其所治文書自莫府上之堂反覆論辨比完署宜無有過差矣今檢校以七品屬職迺使復閲其牘舉其稽愆而繩糾之何哉蓋中書機務萬變不齊藩屏之寄尤為重繁諸曹掾於一時迎奉唯畫之際欲盡當其輕重是非可否亦寧免一失於千萬也况羣小使役於下者無斗粟一錢之給徒操數寸之管竊弄文法以思贍其家爾又安能盡必其無弊耶此檢校之設所以不得不重也且御史嵗一視案遇小過輒有讓與其讓於御史曷若補其闕遺使無讓哉然則檢校獨非諸曹御史乎諸曹以御史待檢校則檢校益當知所以自重矣載其姓名於石豈徒紀嵗月論官資以夸於人而已庶幾較得失辨賢否者有所徵焉福建㢘訪司題名記至正二十一年秋天子以閩海道逺吏多失職乃命福建行中書省右丞恩寧普公為㢘訪使冬十二月公既視政逺近懾服明年春吏白㢘訪司繇按察司改置三十餘年始具載使佐姓名於石今又四十年書刻殆徧矣宜有以更之公謂官署題名尚矣非徒紀班資姓氏嵗月而已也庶幾使來者上下其人之賢否以為懲勸焉其刻石如故事於是吏更以公命來徵予文予曰風紀固重矣然所以為重者實又存乎其人誠如公言則凡登名於兹石者其有不惕然悚懼以思盡厥職者乎遂書以為記重修福州治記福州中七郡而治連山東馳衆水皆滙於海地氣旁薄物産蕃阜自無諸以兵佐中國常衮觀察其地朱子以道學淑諸人千載而下號稱鄒魯國朝始建行尚書省提刑按察司後更省為宣慰司按察為㢘訪司近又罷宣慰司立行中書省大官臨莅其上守吏惴惴日事迎謁間一據案署牘輒復起去故郡治弊壊幾無以芘覆左右愕視嘆息卒不暇議所以修治者至正庚子春予董漕閩廣舘於府中因謀葺之或曰子幸以老請居幾何時顧欲勞且費耶予惟君子之所以處其身也不以物我而有豐嗇不以近久而易勤惰况即舊以圖新因廢以補陋其猶易於成功乎於是稍節俸入俾通守阮世隆主治之而監守僚佐咸曰吾儕之所不暇甚幸尚書之辱貺也乃皆協心相事曾不踰月工以告成而聴政之堂退休之室公牘之署與夫凉軒燠舘重門修廡廓焉若闢奥焉加深矣既事進執事者于庭而告之曰南方不靖踰十數年将士苦於戰鬭民庶勞於餽餉海隅遺黎殆無以生今是之葺豈徒與大夫士娛其心便其體而已哉凡有事於斯堂者亦将惕然而感惻然而懼蚤夜孜孜思有以勉吾力之可為以盡吾職之當為庶其無負於君國子民之道爾不然刑賞出於愛憎曲直徇於賄賂朘其民而肥其身聚於上而怨於下馳騁出入自以為得計天地鬼神其可欺乎記諸壁間用勸來者且以自警云髙風臺記出福州西城門三里許鳳凰山之下有古寺曰香嚴寺之西隙地為故圃圃之中有邱隆然翳以榛莽蒙以篠簜掘礨叢襍垤窪莫辨羊豕得以為囿狐鼠得以為窟雖寺之僧亦棄而不顧也予間過之見孤樹特起蔥蒨蓊鬱疑必有殊勝始命僮開蹊累級攝衣而登則上廣旁峻周以堅甓石牀横布陳跡具在迺知故臺也於是翦茂草除惡木斬突夷㘭刓贏補罅然後方整峭拔岌焉增髙而益曠矣已迺拂石而坐倚樹而觀方山聳其前蓮峰矗其後左滄海右長江雲烟蒼茫極目無際諸生劉中鄭桓喜而進曰是臺也蔽於近而超於逺晦於昔而顯於今脱其蕪穢處之髙明顧非幸歟且重桐江之絲髙南州之節雖其風未足以語希瑟之詠而逸氣雅操猶可以激頽波而清薄俗也願請所以名之者語未既忽有風自南來飄冠巾襲毛髮徘徊乎几席之間泠泠然渢渢然周流動盪若有以宣通夫壅滯而還復乎淳熙者遂名之曰髙風諸生復請亭其上而志諸石故記鳴鳳亭記予既作髙風之臺将亭其上而不果平章道隠公聞之使以錢來僦工而一二同志亦相其成寺僧悟騰覺馨躬操畚臿負木石為其徒倡曾不數日遂落成矣客請有以名之予謂鳳凰之山左右翼張若飛鳴而來下者名其在兹乎適左丞周賢公至而喜曰吾舊藏先從父平章公手書鳴鳳二大字即以是扁庶其成子之志客曰美哉翩翩乎與髙風頡頏下上矣然聞鳳仁鳥也當黄帝時嘗處齊宫巢阿閣其後絶不至及堯即政七年始止於庭舜樂九成而復來儀周成之世最稱明盛亦僅集郊藪要皆千數百年迺一出出則天下必大治吾夫子思見之而終不得故曰吾已矣夫漢史雖數載其事或疑其非真鳳也子今徒取山之形似者以名亭不亦甚逺乎予乃囅然而笑曰人瑞鳳也鳳瑞人耶鳳兮鳳兮吾誠不得而見之耶方今泰治将復屢詔求賢圭璋聞望之士馮翼孝徳之賢行将雝雝和鳴於朝又何必巢閣儀庭迺為鳳哉因卷阿君子之詠動匪風下泉之思三嘆而書諸亭亭後於臺成十五日揭而扁之又後亭之三日實九月丙子也黄氏義田記四明城南有黄氏者兄弟六人曰景振景文景誠景華景行景賢志剛氣和且能拓其入以致豐約其出以為羨久而家益饒景振間飲諸弟而告之曰我等雖未能力學以施諸用猶幸不失先人之遺顧吾宗多貧窶其可不思所以為淑後之計乎請以租田五百畝倣范文正公義莊之制而稍損益之其庶幾盡吾情哉行之未久兄弟相繼物故獨景賢在一日慨然曰自兵起南方征徭無度雖破家不足以給用況所謂義田乎今幸大府令有司計畝受役民力亦少紓矣若是而不思有以繼吾兄之志将何以慰其魂魄於地下哉於是更益田一百畝市里人王氏地若千步搆屋若千楹以貯其嵗入斟酌時宜定為規約凡所以贍宗族時祭祀給廬墓之營葺婚喪出入助各有差然後黄氏之賢藉籍乎四明之境天台陳君從來三山數以田記為請君從予故人也其言既可徵又喜黄氏兄弟好義之力迺作而嘆曰義出於人心而本諸天理國之盛衰家之興廢在義與不義而已一事之行苟合乎義猶足以使人感服而興起況割已所有以恵衆人乎黄氏子孫能世守之不失則其為義也益逺矣林氏祠堂記福州長樂縣羅田林氏既為祠以合祭其先族之長曰崇孫實主祠事間遣諸孫頤以狀來請曰林氏始祖諱遷者以唐貞元八年自董平山來婿羅田羅氏遂為里人遷生相相生恵蒙恵蒙學浮屠法太平六年廬親墓有孝行天嘗雨之錢朝廷因旌其門宋建隆開寳間相之從孫珍為殿前都虞侯彰武軍都巡驛使珍五世孫栗累官兵部侍郎在孝宗朝為名臣殁諡簡肅嘗置祭田若干畝且譜其族簡肅之子行知經略廣東經略諸孫春一通判泉州當内附初棄官歸隠更為譜甚悉後至元庚辰崇孫謀於諸孫徳生公劉始買宗人宅一區為今祠中堂四楹東西兩廡門庭庖庫祭器具完又於堂之西别為屋兩楹櫃藏逺近之主朔朢則合族之人羅拜祠下節序薦以時食春秋卜日謹奉主列叙堂上執事者深衣幅巾行三獻禮至正甲申復益田十五畝聘名師即兩廡教其子孫之來學者然後尊祖敬宗之道稍備而子弟彬彬然亦知所向矣願紀顛末以訓後人予既諾而未有以復則頤之請益堅頤昔在京師從予遊甚契今又與予友程備夫數來相謁其可無一詞以告之乎夫自廟制廢而祭祀之失久矣祠堂雖非古制而近世士大夫家能行之者猶以為難況閭閻市井之間乎且自兵變以來故家巨室莽為邱墟雖欲洒掃一室以致灌薦且不可得又安能求其門堂寢室之具備哉林氏居閩海之濵厯二十一世五百七十餘年而猶克保其逺裔於凋謝散逸之餘守其遺祠於干戈搶攘之際抑何世徳之逺歟雖然禮有隆殺廟有祧毁今既各祖其祖而又合祭其逺近庶幾有徵於時祫之遺乎吾於林氏益知閩俗之厚矣興和郡守康里君善政記至正十九年冬十月予以使事道出會稽得拜南行臺大夫康里公於鍾離里第見其風采凝峻綱紀振肅百司庶府竦焉唯謹莫不潛孚黙感以興起其好善惡惡之心退而與其賔佐花君仲實言則曰子見大夫公卓卓若此亦嘗識公之子今尚書剛君近仁乎君之守興和也始至之日屬大旱苗且槁急禱之甘雨隨澍時鈔法大壊偽濫滋甚吏輒擅官本以自殖齊民羅立庫門外終日盻盻不得易一文君制為均倒之法奸欺屏絶仍下令商賈貿易悉從其便由是食貨流通逺近稱善先是官馬分飼城中芻粟不給民甚苦之君散諸郊野農家遂稱均平君所居之庭植小榆髙僅踰丈有鵲來巢其上飛鳴飲啄若與人相忘者衆咸異之郡士謝本李克道劉滙各為歌詩以稱道其事於是君之治行為朔方第一朝廷聞而嘉之遣使賞勞甚厚此其父子繼美雖漢張安世萬石君家何以過哉予惟曩職兵部侍郎時君方為郎中及以庸田使者平糴東吳則君受大師命實司董輸所至號令風驅電馳固已知君之材俊如神駒健鶻不可羈束而控搏矣今聞仲實言於吾心獨不忻幸而願見之乎叙而書之庶将識吾情焉道山亭禱雨記至正二十年夏閏五月不雨六月壬辰雨既而又不雨有司徧禱弗應民甚憂之戊申㢘訪使贍思丁有嗣副使元努國器僉事額琳沁士𢎞布喇特納仲賢鄭潛彦昭經厯達爾瑪蒙古清逺知事黄布延特穆爾顔肅照磨傳居信忠卿相與謀曰夫閩山髙水深神多靈異能出雲雨禦菑患以芘其民今旱若兹禱且弗應吾誠其有未至乎不然則是政失其平行愆於常雖有告不吾聴也迺皆出宿於外為壇道山之亭而祝祭之曰冦逞於暴兵横於貪殘傷之遺已無以生神又不我恤使之遑遑然無所控愬亦何至斯極也用敢白於神今日不雨至明日明日不雨至三日三日終不雨則吾徒固無所逭其罪神亦獨能辭其責乎既事靈風肅然神若歆止五漏将盡隂雲四合厥明風雨大至池沼溝澮皆溢水㶁㶁流不止焦枯既蘇歡呼震野於是大夫士相率為歌詩以頌休美而求予記其事嗚呼山川之神不逺吾誠誠吾心以致夫神神其有不格者乎書曰至諴感神傳曰神依人而行兹雨也其有以哉是宜書密庵記予往時在錢唐見金華黄太史亟稱吳郡張子英為宋世家入國朝其父大監公以文學遇知成廟有文名至子英讀書工詩尤善鼓琴予未及識也數年後過錢唐則子英以功同知崑山州矣雖數來見然皆旅進於衆賔之次未嘗與之叙殷勤接談笑也今年予以分部過海昌屬其子爵為州倅迎子英來養方日過予論議且間示太史所為著閒止齋記於是與子英交始密而信黄公之言為不誣矣一日子英謂予曰閒止在西湖故宅之東兵變後失其業久矣今來海濵僦屋湫隘無以佚吾老兹即舍館之傍治小閣以時休息名之曰密庵先生能辱記之乎予謂密之一辭見於詩周頌基命宥密禮中庸文理密察而又雜出於經傳百家之書皆可考而徵也然聖人治心之法則莫切於大易繫辭洗心退藏於密之言蓋易本卜筮之書蓍動卦静而爻之變無窮因卜筮以求聖人之心因聖人之心以觀天地之化其機微神妙孰有密於此與故夫物之未感也其理具於人心而寂然不動及其出而應物則圓神方智各見於功用之實而天下事物吉凶禍福舉不能遁其情此聖人之所以為教也彼所謂善馭世者揣摩捭闔以鈎民情知非不密也而卒失之知雕龍炙轂堅白同異言非不密也而卒廢於言勇示之怯强示之弱衆示之寡進示之退取示之與争示之讓盈示之虚術非不密也而往往敗於術然則子英之為密也其亦嘗慎所擇不乎是故天不密則三光不明而四氣失序矣地不密則山崩川竭而萬物不毓矣人不密則七情蕩而百疾生矣天地之氣所以周流不息者猶本於至密孰謂人中天地而立而可不慎於至密乎子英苟能於是而自勉焉則庶其為學也益密矣子英曰謹受教遂書為庵記裕軒記越士王元實治小室於居宅之旁門竇側出僅可布榻名曰裕軒其友括蒼劉伯溫既為之記他日予過元實則復以記為請予謂元實之軒甚隘而强以裕名豈外示狹陋而内實寛廣乎毋亦自晦其光以求全乎不然則是會稽之山多金玉鏡湖之田多膏腴将即此致富優游以自裕也元實笑曰内寛外狹孰與表裏之一韜晦自全孰與中正之守金玉良田孰與仁義之利吾固不敢以此而易彼也予時甚髙元實之志而迫以使事不果為及再過會稽則禮部之召嚴又不果其後東方震擾連嵗用兵言久不復亦忽忽忘之矣今年夏從子穎之來自越未幾外姪李允亦至皆致元實之請益堅於是知元實之果異於人人也大抵君子之為學在裕其心而已矣心得其裕則以之處富貴而不驕以之處貧賤而不諂以之處患難而不變甚至於死生存亡之際綽然守之而有餘焉元實當干戈擾攘而偲偲焉不忘一言之戒其亦庶幾有見於此夫苟能推是心以往則無往而非裕矣雖然人亦孰不欲裕其心也而鄙吝之私有以塞其廣大之量沈昬之氣有以蔽其髙明之域驕蹇桀驁一物不容而卒至於無所容其身者何也蓋不能順乎理故也理順則天地不能違況於鬼神乎況於人乎故沛然若巨魚之縱壑浩然若大鵬之運風此其為裕何哉在元實必能洞識其幾矣是為記皆夢軒記三江之口九峰之下有奇士曰陳汝嘉履儒者行衣道士服蓽門蓬户與世泊然更軒其東偏雜置黄帝老子莊周列禦冦與夫毉卜種樹之書於其中日歸自外朗誦長哦倦即隠几而卧形與夢接嗒焉蘧焉不知人世之有物我榮辱是非得失憂喜也因取鄭人斃鹿覆蕉互皆有夢之説名之以皆夢間過清虚子而問曰人於天地間生一夢也死一夢也夢之有覺猶死之有生覺而復夢猶生之有死生死皆夢也夢亦生死也生果覺耶死果夢耶吾不得而知之矣先生試語我乎清虚子曰生死百年夢覺一時一時之夢百年百年之覺一夢人徒知生之樂死之苦而不知生之勞死之佚也昔之善喻者常有華胥之游胡蝶之適邯鄲槐安之樂其殆有見於此夫以死為夢烏知生之非夢耶以生為夢烏知死之非夢耶夢死夢生又烏知非夢中之夢耶夢中占夢又烏知非死生之夢耶變化紛紜真假莫辨若是則天地十二萬九千六百年之數皆夢也又奚暇論百年一時之逺近乎以有限之嵗月接無窮之變遷苟非廓然超出乎六合之表洞然遐觀乎八荒之外逍遥汗漫以與造物者游則幾何其不為巾笥之龜文繡之牲乎雖然此直莊列之徒過於矯激托此以自髙爾在吾聖賢之教則有不然者夫人以稊米之身參天地之大極古今之變通幽明之故其所以自任者亦甚重矣或者失其所重肆情縱欲酣醟沈酗如醉如醒終其身而不悟是殆為真夢者吁可悲也哉安得鑿瞢闇之牖以通其明啓大覺之闗以導其出辟中正之途以指其歸使之豁焉醒光焉覺靈扃洞開照耀白日然後知夢為真夢而向所謂皆夢者皆非夢矣汝嘉曰吾夢幸覺請書先生之言并以覺後人遂為記清虚子别號喌喌翁云鶴齋記江東薛茂𢎞少精敏負奇氣讀書萬山中窮日夜不已客有慰其清苦者攜白鶴來贈茂𢎞甚愛之一日鶴去思之不能忘也遂圖之齋壁以為玩其後茂𢎞遊京師學道於朱公本初從代祠華蓋謁蜀郡虞先生先生與之論詩愛其清新流亮氣韻髙爽翛然有出塵之思嘆曰是非憑虚御風翱翔八極者不能道也因取杜工部詠薛少保畫鶴詩意名其齋曰鶴茂𢎞聞之喜曰是善名我遂不辭去今十數年先生跨鶴仙去而不復可見矣予間居西湖方欲問孤山之梅訪林逋之鶴忽有羽衣長身揖而前者問之則薛茂𢎞氏袖出先生所題鶴齋詩一首乃相與坐石而歌援琴而鼓鳴皋之曲其聲琅琅上徹霄漢再鼓洞天之舞其聲窈窈不絶恍若霓裳素節飄忽軒舉與羣仙頡頏下上也松隂滿庭月色如水相顧一笑而去梅邊小隠記福州出東門外數百步南入委巷有庵曰海印兵後廢不葺風摧雨漂蒿萊出垣端里之人曰吾聞烏石山地平寺有雲磎上人者手無一錢能佐其師起大招提若禮之來兹庵其復興乎上人既至則易腐為堅拓隘為廣芟蕪而嘉草生滌汙而清泉列供佛會僧各極嚴浄復治小閣牖其北以向明堊其中以尚潔檻外植竹數竿雜布花石清風徐來香氣滿坐題曰梅邊小隠上人説法之暇即趺坐焚香髽兩童治茶具與客彈琴哦詩客間問曰佛果如是乎謂汝梅邊耶則梅無有也謂汝隠耶曾不逺乎煩囂之聲也則将即多聞以為觀耶抑亦捐衆有以為空耶上人笑曰子非梅惡知梅子非隠惡知隠知梅非梅故凡接吾目者皆梅也知隠非隠故凡寂吾心者皆隠也梅乎隠乎其果傲兀沉酣於色香之界乎我觀華嚴得衆妙法我從黄梅悟無上乗客曰是佛道也遂書為記休休亭記長樂縣南行三十五里曰羅田宋兵部侍郎簡肅林公故宅在焉宅之南有二大榕樹䕃可數百步公諸孫宗正築亭其下顔曰休休間過予求記予往在京師宗正方抱其師余君所著樂書上之朝時其志甚揚氣甚鋭論甚辨别後數年予以部使者來閩南則宗正首來謁視其揚者若已抑鋭者若已挫辨者若已訥又七八年以户部尚書來董漕事復見宗正則向所謂若抑若挫若訥者益縮恧斂退無復有意於人間世矣予乃慨然為之嘆曰子方當强仕之年慷慨尚義縱不能擊强殄寇如鷹鸇之逐狐兔亦豈不能長揖将相開口一論天下事乎何其遽為休休之名也不然則必有咈然不平於中者矣宗正乃笑曰先生徒疑吾咈然者之為休休不知吾悠然者之為休休也吾昔以鋭故挫以揚故抑以辨故訥今吾幸縮恧斂退則夫訥也抑也挫也雖日呌囂隳突乎吾前膠擾噂沓乎吾後吾方漠焉頽焉若無與於其身之休戚榮辱者則今之視昔其為得失何如也是故放浪而歌箕踞而坐風來酒醒樹隂滿地於斯時也吾且不知天之為髙地之為逺又烏知有人間世耶言既掉臂而起玩齋道人遂書為休休亭記思庵記天台黄巖之陽有山曰方山山之下有屋曰思庵蓋州人施氏墓祠之所在也施之先紹興知府諱某者由永嘉檉江來居黄巖遂𦵏其地傳三世至愚隠翁諱某始立祠墓側宋杜清獻公範扁以今名愚隠之孫諱紹祖者拓而大之又三世矣比年庵燬於兵其諸孫經營葺構復其舊觀集賢待制趙君雍為書故扁以示不忘也予應召過四明其七世孫應元從事分省受遣從至海上間語予故且請為之記予謂人子之於其親也無往而不致其思焉生則思盡其養喪則思盡其哀祭則思致其敬是以親喪之日有限而孝思之感無窮也故君子見風雨霜露則有怵惕悽愴之思見山川草木則有往來游息之思見杯圈几杖則有口氣手澤之思及其當祭之日僾然若有見乎其位愾然若聞乎其嘆息之聲自非孝敬之至通乎幽明而達之上下者其能潛孚黙契於冥漠之表乎況是庵也積百年之澤而傳之今日合累世之祖而聚之一堂昭穆之位有序而不紊宗祧之祀既逺而不遺則其所思也永矣雖然思敬其親當愛其身施氏子孫能思敬其親矣盍益思所以愛其身者哉遂為之記谷叟莊記谷叟莊在黄巖州南九十里州人鄭静思之所營也静思世居州之天長街為聞家及静思懐奇負氣不樂軟熟從人始築室谷嶴居焉谷嶴萬山中東接松門西連鴈蕩大間泉村諸峰峙其南北望之巖崿峭怒阻絶若不可處及入其境則豁然開張水紓土曠宜於釣耕嘉卉異石紛披林麓靈飈蕩和香氣不絶又其俗朴野多古衣冠無他嗜好可交也静思於釣耕之暇葛巾芒屩曳策長松之間披草而坐傾榼而飲飲而醉醉而醒不知天之髙地之迥也山人愛静思之居是谷也故稱之為谷叟静思亦樂谷之有是居也因自號曰谷叟莊或謂静思年方茂非叟居無積非莊出而用於時非谷或曰老於事即叟富於學為莊谷虚斯能盈也予不知其然故并記之凝虚樓記平章普公兼善至閩之二年誅鋤兇强煦毓罷氓威恵並施逺近懐畏乃即居地之東偏創樓四楹軒忩中敞闌楯外植間與僚佐賔客拾級而登倚衡而望憑虚凝注閒逺幽曠凡其沙鳥淵魚之飛泳烟嵐雲樹之晦明又若有以助夫心目之所得者因題其上曰凝虚其屬師泰為之記惟公勛舊重臣卓行髙識固已超出乎衆物之表矣顧師泰何足以知之雖然不可以無告也竊聞盈天地之間者氣也氣盈則為物散則為虚凝其虚使不得散斂其散以葆吾之虚其庶幾長生久視之道乎公曰姑舍是今夫日月星辰凝於天者也山川河嶽凝於地者也天地凝而人物生焉是故人物本虚也天地亦虚也知虚而後能凝能凝斯虚矣然求其所以為虚者非深思遐想於窅茫恍惚之間冥行妄作於幽潛深黙之地也廓吾太虚之量而天下之物無不容推吾太虚之靈而天下之事無不照以之事君則上下恭順以之事親則内外協和以之交神人接事物無往而非惻怛慈愛之仁焉於是三光明品物遂景星卿雲甘露醴泉器車丹甑靈芝朱草麟鳳龜龍諸福之物莫不畢至矣且道猶水也人猶器也水與器二物也水冰於器則一矣大矣哉徳之不至道烏乎凝公曰昔聞諸先生長者亦若子之言也敢不虚心以踐實學遂為之書雲楚莊記治書李公經略江南之明年道出括蒼得士劉彦明置諸幕府又明年至三山其史裴君直以功檢校福建行省遂用彦明代彦明江右人清修善學每見予言家寓澧州之西四十里有山環舍曰雲楚因築屋其中曰雲楚莊昔在京師嘗語參政危公太朴得書二大字今裝潢成卷願請一言以為之記予聞澧故南裔崇山地在洞庭之西巴黔之東其治且多谿洞民獠雜處危峰峭嶺平地拔起仰視莫窮其端楩楠豫章千嵗之木嶊嶉磅礴隂翳不見天日水行石間暴悍盪擊若霆轟鼉吼虎豹摶噬奔馬怒猊蹄股交觸也孤雌哀􅆐晝夜呼嗥不絶射工沙蝨含影竊發故騷人羇客過焉輒起其沈鬱離憂之思而仕者率亦怖慄駭汗往往以得代去為幸澧之士風若此彦明何獨棄鄉里邱隴而樂居之乎蓋澧雖去中州逺民獠雜處而雲楚實山舒水緩泉甘土肥宜於秔稻嵗大旱他境皆焦槁如赭其野方芃芃然同穎並秀謳歌鼓哺之樂徵於和氣者靈芝香草又時或生之彦明讀書之暇登髙臨深於是蒼然之色接夫目泠然之聲入夫耳淵静宏逺之趣與神俱逝而識度超廣不覺吞雲夢者八九矣然則向所謂沈鬱離憂怖慄駭汗者果何自而至耶人以迹求我以心得彦明有焉遂為記終慕庵記終慕庵者鄭君彦昭母夫人江氏墓祠之名也彦昭由御史出僉湖南憲航海至樵州值太夫人憂道阻不克歸𦵏遂權厝於城南夀山下之烏槎岡岡距城二里許峰巒四面環合外密而中寛風氣完厚長林清泉相與映帶嘉花靈草紛披巖鄂四時香氣不絶其支龍蜿蜿蟺蟺若翔蛟矗龍乍起乍伏忽焉勢降而形委也彦昭既即其上大為之封種松竹數百株以庇以䕃又築屋若干楹以祠以廬以致其終身之慕而題之如此夫慕者愛而思之之謂愛莫先於愛親愛親篤則思親亦至思愛發於天理之公其始非不同也及夫外誘而内遷忘其所當慕以慕其所慕而慕親之心遂不能不為之移矣昔之人有舉天下之欲不足以移其終慕之心者其惟大舜乎舜處人倫之變卒致底豫之化天下後世孰不聞之然求其所能深知聖心者孟子一人而已矣世之學者不惟不足以知舜之心其亦果知孟子之心乎或曰孟子且難知彦昭名庵而又取夫舜之所難知者不亦逺乎予曰聖人人倫之至學聖人之道而不以舜猶為方圓而不以規矩也嗚呼彦昭亦可謂善學者哉比年賊陷邵武四郊焚蕩殆盡獨太夫人塋墓無恙所種松竹方鬱然深秀識者謂天於彦昭亦厚矣今彦昭以閩海僉憲行部過太夫人墓下顧瞻雲山恍馬魂氣之流行履兹霜露愾焉音容之如在焄蒿悽愴接乎目而感乎心者無往而非吾親之存則終慕為何如哉是宜記松蘿山房記予寓香嚴東軒之明年休寧金煥孟章始來居寺之西廡孟章能五言詩善學好問每見予執諸生禮甚謹間請曰煥家縣西十五里棠谿之上馬鞍五雷梧桐諸峰環列拱會而松蘿之山尤為深秀遇風行山下蒼翠盪摇笙籟交作翛翛然不知復有人間世也自兵變以來先廬數十楹悉燬於火惟山房之在松蘿者獨存無恙吾親不忍舍墓逺去因是以蔽風雨焉煥繇江右來閩中且六七年矣晨夕思欲歸養輒以道阻不可仰青天之遼濶見白雲之往還則松蘿巖壑未嘗不巋然􅍶然於心目之間也比聞中原底平荆吳欵附煥之歸省有日矣願請一言以記山房之存庶幾可以攄煥抑鬱之懐而慰吾親之心也予聞生言惕然為之感曰予與生皆江東人宣距歙為最近而予之故宅在漪水上者既皆莽為邱墟墳墓之在姑山者又無他子弟為之守當雨露霜霰之交徒執爵拜跪北向長號而已今生家幸有山房以安其親而保其墳墓視予流離奔走無以棲其身而時其祀享者其所得於天不已多乎山房之記誠不可以無作遂書以遺之娛親堂記至正十九年春予奉詔總漕閩南道出海昌屬海上有警遂留居州民張世榮家世榮恭慎有禮節一日率其兄弟子姪羅拜請曰吾父今年七十九母年八十兄弟三人共有兹屋雖弊陋狹隘幸吾親居之安也又幸尚書之即吾家辱賜之名揭諸中堂以娛吾親世榮庶其有榮耀哉予曰即此是矣遂名之曰娛親復再拜曰世榮有田三十畝有桑數百株在城東之野外耕内織晝夜不輟僅給公上蓽門蓬戸菽水常不足而姊妹之或歸或留者又皆貧無以養将何以娛吾親乎予曰所謂娛親者非為是也順父母之心而不咈其欲斯可矣自予之居而家也見而二老人蒼顔白髮耳目聰明出則曳杖阡陌閒問村田事入則撫諸孫含哺而嘻熙熙于于志意自得於時艱難若無所聞知者謂非有以娛其心能爾乎夫人子之養其親也在有以娛其心而已心娛則意適意適則氣和氣和則神怡神怡則身安身安則百邪不能干而夀考維祺矣且奔馳逐禄孰與耕織之逸殫力華構孰與蓬蓽之安食備甘脆孰與菽水之樂清歌艷舞孰與家人之歡是以古昔聖王舉髙年之典行養老之禮飽之以殽胾燠之以繒帛載之以蒲輪扶之以几杖班白免負戴之勞耋耄受尊榮之錫故其人夀常百餘嵗其次亦八九十凡若此者皆有以娛其心故也十數年來海内弗靖民物不得遂其生雖詔書屢下優禮髙年而有司迫於多故方朘剥不少已殘民遺黎得不死足矣又焉敢望娛樂其心志哉今張氏兄弟乃能安居力業以奉其二老人使無憂愁歎息之苦而有怡愉懽忻之適顧非幸與嗚呼予於是重有感矣遂記不辭𤣥石記至正十九年春予自錢唐東遊越江之濵見巖石奇勝輒停舟撫玩舟人進曰奚好此為我昔沿洄江上得石類山者髙可二尺色正黑擊之聲鏗然以重不可舉也委之而去他日語里人徐生生舁置敗垣荒圃間且十數年矣生亡而屋廢石猶在焉歸當語其子為公獻予姑諾之及還數月舟人果以徐氏子見云石已到江岸遣吏視之還報石粗惡無足取由江岸移至館舍傭錢當二千徒費爾且時亟治閩裝不暇顧也明年春杭人沈氏賈於海登舟而見棄石知予所好也因載至三山以歸我卧諸北牖下又垢食其體殊不見其為美也久之予因休沐始命工刻木座滌濯而植之於是嵌竇峭崿軒若舞袖莊若拱璧涌若波譎滃若雲詭煜然若芝亭然若蓋𤣥膚白理縱横包絡若龜兆若蠶絲而曳雲㸃雪之文若星斗錯落下上也予然後駭而奇焉觀者亦莫不驚異之矣夫斯石也翳於泥沙者不知幾何年既出而辱於田夫野老又十數年幸而歸於予則亦幾於遇矣然東絶江南浮海徘徊轉徙以相從於萬里之外又逾年而猶未能盡知其美也其果得為遇乎嗚呼予於兹石重有感焉夀慶堂記湖廣行中書省右丞哲林仁傑君之叅政江浙也母范陽郡太夫人年幾九十實留桂林乃名其堂曰夀慶以寓其惓惓愛慕之意左丞周伯溫父為篆而揭之大夫士又從而歌詠稱美焉予時適忝同列嵗時登斯堂未嘗不嘉歎君之篤於親也至正壬寅春正月君以赴官道過閩海訪予城西寓舍一見道故舊已即以堂記為請予謂君堂在浙河之上今既去尚何記為君曰吾本西域人因官為家時太夫人春秋髙義不可逺違膝下迫於主将之命東西從征復嶽鄂諸郡平漢陽剗蘄黄順流下九江過安慶道江東以達於錢唐大小數百戰不自意屢以微功薦受上賞繇千夫長陞閫帥不十年間致位丞轄皆太夫人之教也夫當艱難危困之際南望引領思欲一見太夫人不可得及備位樞省有禄可養矣又以道梗不獲迎致於我心有戚戚焉斯堂之作庶幾可以慰吾朝夕白雲之思云耳今也復蒙朝廷厚恩得遂過家一拜太夫人而所部将吏亦皆紆朱拖紫以從吾後卷韝奉觴鞠跪上夀則向者浙河名堂之書獨不可移扁桂林之堂乎先生記復何辭乎迺作而嘆曰人亦孰不欲夀其親哉然夀其親者非徒擊鮮烹肥以適其口居髙處奥以便其體而已惟能砥礪名節激揚志氣外為國家宣布威徳内為宗祏顯揚休光斯乃可以娛其親之心而古人所謂養志者也夫心娛則氣和氣和則神怡神怡則怡愉康寧百福攸萃人子之所以夀其親者孰有加於此哉今君一出而忠孝兼得其亦庶幾養志者乎且君之功業如日升月恒由是而益著太夫人夀祉之慶亦方殷而未艾也他日安輿北來尚能為君頌之遂記不辭大隠記予自東嶼放舟秦川館於川上之資夀寺寺僧夀量扶杖而前曰病久未嘗見客聞先生來甚喜敢力疾以見明日則又至曰吾嘗踰閩關上會稽絶江浮淮以遊於湖湘之間泛彭蠡過洞庭登祝融望大庾還至天目傳法於中峰入徑山講道於虚谷然後歸隠於兹三十年矣寺凡再燬於兵今幸復有成緒而棲禪之室在法堂西南隅自東北折行入焉最為深逺蓋奥窔間也因題其顔大隠先生能為我記之乎予曰汨於外而蕩其中役於物而拘於我固不能無小大之殊上人一内外忘物我不隠猶隠也又奚取小大哉上人曰混常為真乃知真常即有為空乃知真空子非小隠烏知大隠耶且身市朝而心山林者固為少賢於人然亦不免寓於隠而已初未嘗超出乎人間世也若吾所謂隠則不啟鍵不運几跏趺冥黙之中逍遥極樂之界萬物轇轕乎吾前吾視之亦隐也萬事紛糺乎吾後吾視之亦隠也二相不生一念惟寂斯其大隠哉不若是而欲以人間世論隠雖唐虞之君疇務成昭商周之伊尹太公望猶為寓而已子能通其説始可以論道予乃大笑曰此竺乾氏教非吾所謂隠也遂録其言為記再來泉記杭州三天竺名天下而下竺尤奇勝晉慧理法師所謂靈鷲小朶峰飛來者即兹山也山之西崦有泉側出巖竇間下被草石纍纍如貫珠故名纓絡泉亭其旁曰香林久廢不治至正四年行之安法師來主寺乃復葺之具鑿方池接竹引泉以供食飲甘美殊絶用之瀹茗味不在無錫恵山泉下後十年行之退居草堂泉亦隨涸又三年丞相康里公選於衆起季蘅若法師於越之雲門既至三日與其徒方舟登斯亭扣巖而祝曰泉得再來庶徵吾縁乎越五日方舟過焉泉果涌出因走告其師率諸僧往視之罔不驚駭贊嘆以為山川之靈而季蘅䖍篤之報也明年冬予以休沐入山中有僧照庵邀坐亭上具白其故照庵苦行超卓知其言之不妄矣顧惟兹山近接人境非若窮巖邃谷幽絶險阻可以詫神變滋幻化也然自慧理一呼白猿躍出其後若三生之石静覺之梅重榮之檜靈異迭見而泉今再來亦何奇也或曰寺之興廢於泉盈縮驗之予曰不然聖王之世山不童澤不涸甘露醴泉莫不畢至兹泉将為國家休禎之符豈徒係一寺興廢而已哉時雖樂記之而寺僧固未之見及予以使事留海昌方舟始來徵予文遂書以歸之香嚴寺復田記福州西門外香嚴寺有圍田七十五畝奇在福清州萬安鄉萬安里之上洋積水溉田者又四十五畝奇宋大中祥符間開山了宗振禪師及其弟子廣利的禪師之所營利之入於寺者四百餘年矣間以道逺失於防護隄食於水久廢不治州之靈石寺塔庵僧遂侵而有焉香嚴僧自嚴白諸州州移諸佐佐下里會凡執事者即其地視之信乃以歸之香嚴未幾吏受塔僧賄竊更成案反誣香嚴妄疑不決者二十年矣至正辛丑嵗知州林君閲牘履畝而直之然後得復如故嗚呼田之侵甚明可片言而決今乃至二十年況民隠有難於田者乎甚矣貪吏之敗事也書其顛末以誌諸石豈徒守寺之僧有所徵考庶幾長民者皆知警焉福州𤣥沙寺興造記閩山之南有真覺禪師存公始創寺於侯官縣之象骨山下曰雪峰其徒宗一大師備公又别創寺於懐安縣東飛來峰之下曰𤣥沙實梁開平二年也晉開運四年寺廢於兵宋天禧三年耀之珠禪師乃復興起其後日益盛大穹樓傑殿重門廣廡金碧輝映與山上下始為一邑諸大招提之冠然厯嵗滋久木朽石泐不能無傾圮者且寺故有田在閩清縣南白洋池峬之上地髙土瘠灌溉不通日就蕪廢寺益告匱今藏石珍禪師來主兹山慨然嘆曰此望刹不當如是也乃出其所有以資經始衆僧樂助志若合一而里之大家葛夢鼎義士陳以仁等亦來勸施於是首即黄石上流鑿渠導水以灌田之在白洋者而並渠之家咸得食其利渠長若干里廣若干尺疊石為堰以時蓄泄雖大旱水㶁㶁分流畦町間嵗遂常稔乃節浮費積贏餘大整觀音殿羅漢堂經藏禪祠而復創行堂若干楹寢室若干楹浴院若干楹既又堂道出北門者五百步山路直寺門者六百步奇凡器物之窳敗象設之黝昧亦皆易故就新然後儀觀宏敞締構精緻而山林巖谷亦為之增光矣至正辛丑春宣政院使㢘君公亮經畧李君景儀翰林經厯荅禄君道夫與予同飲寺之見山堂始識藏石師於坐間自是數來相見見輒坐予之東軒煮茶焚香終日乃去或有問焉黙無以應屢叩之惟瞑目頷首而已衆疑師無能者今觀其在寺所著事功磊落雄偉若此非其人願力堅確知慮深逺卓然有以異於人者能之乎吾聞古之人負才學知能而不得施諸用則往往寄迹浮圖老子法中以自晦若藏石者其亦有所負而無所施者乎誠齋記宣城葛君朝用負才氣績學砥行而隠於毉遇人疾無問貧富貴賤輒往視之投匕劑立愈部使者耶律行已折節與交以其久而有恒也因號之誠齋而叅政周伯温父又篆二大字以遺之間過予求記朝用與予居同里今又同客七閩三山之下情其能已乎遂即所聞以告之曰大哉誠乎其天地萬物之始終乎天地萬物不能外乎誠毉尤死生之所繫其敢一息之頃一念之微不本於誠哉夫人之生也七情蕩於中六沴感於外調攝一失其宜則衆疾交攻矣然證有標本脉有虚實察虚實於豪芒之際治標本於緩急之間非誠何以哉藥餌有真偽炮製有精粗劑和有重輕真偽之辨精粗之别重輕之權非誠何以哉鍼砭補瀉取於呼吸呪詛符篆交於神明非誠何以哉是故至誠之道可以格天地神變化可以銷金石入水火古之善論毉者莫若黄帝歧伯其次長桑越人和緩之流然所以能神其術者亦豈逺乎誠哉況朝用之先曰𤣥曰洪在吳晉時皆以修煉得道而洪丹陽人宣故丹陽屬也漉黄金丹砂以役使鬼物恵康斯民其來逺矣五世祖吉州僉判斐又棄官為毉迨今號専門朝用其真有得於誠之之道乎朝用今被命為八郡毉師行将有民社之寄試推其所以為毉者施之於國家天下其功效寧止是哉玩齋集卷七
