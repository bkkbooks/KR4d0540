body:
  text: 玩齋集卷二元貢師泰撰七言古詩題伊尹耕莘圖碧海晝沸白日淪禹鼎欲徙湯網仁長繩短箠行蹩􅍷驅牛獨耕莘野雪有時仰面一長吁青天漫漫風烈烈身居畎畆堯舜心忍看民生墮昏沈乾坤闔闢係出處幡然起作商家霖先農有詩亦有譜後世南陽詠梁父段節婦吟河可塞山可移志不可奪義不可虧妾為段家婦年紀方及笄上堂奉翁姑入室擕兩兒兒死夫亦死此生將何為昔如雙鴛鴦今日為孤雌昔如三春花今日成枯枝寒風吹短髮明月照空帷百年在世能幾時父兮母兮不我知青天在上將誰欺金谿縣葛烈女廟金谿廟前草離離金谿廟中兩女兒青山猶似舊時色流水不盡行人悲翠翹珠珥垂孔雀廟門深鎖藤華落靈風蕭颯半空來髣髴音容啟珠箔憶昔里中初賦銀銀賦日急家日貧父身搒掠痛欲絶女心憤結何由伸鬼狐夜號天漆黒大冶騰騰火光烈可憐踴躍雙蛾眉變作兼金白如雪君不見緹縈上書更肉刑木蘭逺赴可汗兵固知才畧過男子不如孝女英烈能捐生又不見湘妃江邊淚斑竹韓憑冢上連理木固知精誠可相召不如孝女感化獨神速赤龍並駕叅嬋姢萬古日月懸中天人生雖死名不死吁嗟丈夫應愧爾送國子張教授九烏彈羽鰲斷足六龍飛光晝相逐何人造書泄機巧夜夜天隂聞鬼哭岐山鳯逺科斗空弋鳥殳蟲漸湮伏太史方垂鼎足金丞相已變釵頭玉下邽拘囚死復生三千晚奏雲陽獄自從毛錐擅楷法今古紛紛踵遺躅天生真人起北方吏遣浮圖出身毒六書垂世盡諧聲八體彌文貴句曲黄鍾大吕徒恊和鉄畫銀鉤謾摹録大音直與造化同隂翕陽舒驗䟽數先生典教元非輕直使昌言被殊俗歸來繫馬在堂堦莫厭微官就羈束人生得志亦有時萬里晴天竚黄鵠黄河行黄河水水闊無邉深無底其來不知幾萬里或云崑崙之山出西紀元氣融結自兹始地維崩兮天柱折於是横奔逆激日夜流不已九功歌成四載止黄熊化作蒼龍尾雙䜫鑿斷海門開兩鄂嶄嶄尚中峙盤渦盪激回湍衝射懸崕飛沙斷崕決石瞬息而爭靡洪濤巨浪相喧豗怒聲不住從天來初如兩軍戰方合飛礟忽下堅壁摧又如豐隆起行雨鞭笞鉄騎驅奔雷半空澎湃落銀屋勢連渤澥吞淮瀆天呉九首兮魌魋獨足潜潭雨過老蛟吟明月夜照鮹人哭扁舟側掛㠶一幅滿耳蕭蕭鳥飛速徐邳千里半日程轉盼青山小如粟吁嗟雄哉其水一石其泥數斗滔滔汨汨兮同宇宙之悠久汎中流以擊楫兮召羣僊而揮手好風兮東來酹河伯兮盃酒題髙麗李衆甫員外稼三韓山前春草緑柘枝連村桑滿谷大牛飯罷濈雙角小犢跳梁野如鹿夜來東原雨新足九扈向人催布榖畫省郎官朱兩轂歸佐明王理藩服土膏初起如雪沃淺種深耕貴匀熟豈獨勤身化殊俗要使扶餘皆菽粟新亭翼翼滄海濵手持酒肉親撫循鳴箏擊鼓更吹豳大田多黍髙過人車載輦負聲轔轔甌婁汗邪錯雜陳露處有積居有囷鬱金煮酒煮已醇葵羮香飯調酸辛句驪唱歌田畯神我有炰炙供嘉賔醉來欹帽更迭舞韓娥拍手山月吐為郭宗道祭酒題韓滉移居圖田夫生長田間住辛苦移家向何處老牛帶犢驢引駒婦姑騎過前村去牽衣裹兒囊在肩瓠壺瓦缶縣蒲韉一童鬅鬙隨左右兩髯傴僂相後先新來茆屋徒四壁東鄰西鄰不相識種田未了主家租又恐官司着差役唐朝宰相韓晉公念爾流離多困窮當時落筆豈無意正欲廊廟知民風願得轉徙安居室周公亦曾作無逸分題得蕪湖月送宋顯夫赴山南僉憲蕪湖月碧天無風江似雪與君迢逓行相隨一似都門别時節揚州覔得賣鹽船夜來泊向蟂磯邉磯邉潮平人語靜但見一鏡當空懸君心明白有如此光照荆州幾千里郡曹隔岸俟新官識得繡衣前御史山南父老來勸酒前日清光還在手分題得姑蘇臺送呉元振赴江浙省左丞姑蘇城外江水緑姑蘇臺是呉王築呉王燕罷越王來舘娃夜冷宫門開落花飛去春無迹江邉却起姑蘇驛馬頭旌節何皇皇候吏傳呼謁道旁孤山梅白堤栁黄相君入坐中書堂為紹興虎兒治中題畫魚大魚跳波長數尺三十六鱗如列㦸江湖淡蕩起烟雲宇宙蒼茫變朝夕子英方騎一角蒼琴髙忽跨雙尾赤中堂展玩風驟起猶恐神光化空碧雪後會飲瑞應宫蓬萊僊人厭煩熱掃盡炎埃為玉屑乾坤滉瀁寂無聲宇宙糢糊氣方結初裁六出學春嬌漸疊重花妬霜烈隂風忽起勢欲攪冷日全遮凍纔徹千門落絮亂棲鴉萬樹梨花噤啼鴂穿簾入幕自纎妍積户堆䆫更澄澈時從壁隙印尖斜還向庭隅補虧缺篆文一一寄鵝羣縞帶雙雙繞車轍重湖翻捲浪崔嵬曠野平堆山􅏭嵲髙屋風吹盡日寒中堂月照通宵潔珊瑚色變琪樹開琅玕光射瓊芽茁薄如鋪簟厚如茵圜者為環斷者玦亭臺蝶化亂翩翻巗洞獅成爭噬囓党家金帳謾麄豪王子扁舟正竒絶始疑瑤池會王母羽葢雲軿擁旌節又疑廣寒會羣姝徧舞霓裳樂將闋幕中武君真可人載酒滿船邀我别東蒙道士號疏放頭戴七星衣似鉄昨朝呼我山上飲錯認梅花醉中折今晨又請出西門有似生駒脫羈紲龍團旋試坐盤桓鶴氅輕披行蹩􅍷須臾燭龍飛太空萬家冰柱懸玲瓏願將和氣先貧窮為歌豳雅祈年豐寄聶髙空隠居旴江之水深且清朝流莫流繞旴城城頭多青山羅列如旗旌髙空先生澹無營有園數畆屋數楹前當闤闠後林麓不種桃花種松竹竹髙十丈松百圍還來照我軒窓緑先生黒髮今白頭坐閱七十春與秋架上書可觀床頭酒可篘或巾車兮逺邁或散䇿兮近遊麻姑壇前蓮變色華子岡頭月如玦朝來兩僊人為我留秘訣石室探青霞砂床拾紅雪長生大道無他求要知富貴如雲浮千鍾粟萬户侯飄忽真成水上漚鳯凰不來黄鶴舉只今誰與先生侣旴江江上一釣絲好共閑鷗作賔主題山水圖前山後山雲亂起山脚入溪清見底溪南更有山外山散如浮塵聚如米老楓枯櫟葉紛紛下有人家深閉門釣絲欲収風浪急却回雙艇來籬根老翁曳杖行傴僂一童負樵一童斧筆端意度盡神妙卷裏衣冠自淳古商周寂寞經幾秦後來莘渭寧無人茫茫耕釣去不已武陵竟隔桃花春題江隂丘文中山水圖老龍渴飲池中墨飛上半天成崱屴雲烟著地凝不開白晝神驅太隂黒筆端巧奪造化功咫尺峰巒千萬重長林似洒楓葉雨虚亭不動松花風隔江更有山無數江上扁舟纔半渡他年白髪許重來為君别寫容城賦題太醫宋居仁萬竹軒文江江上萬竿竹日莫天寒森似玉僊人竹間結茅屋窻户蕭蕭護深緑天風忽捲篔簹谷坐㸔琅玕怒相觸蒼龍起舞青鸞宿髣髴雲霄度僊曲山中伊誰伴幽獨此君何人真不俗杖策東林復西麓千載風流一時足黄金鼎煉丹砂熟白玉壺懸湛瓊醁野鹿銜芝虎収榖長松吹花落棋局便當乞取長生籙月下吹簫弄渌子虚道人歌吾聞涉海有蓬萊登陸有天台攅峰與絶壁萬仭髙崔嵬翠屏白石掛飛瀑赤城丹霞駐空谷子虛道人位其麓流水桃花繞茅屋問之不笑亦不言却向青雲借黄鵠黄鵠兮無迹青雲兮何極崇真宫中晝日寒一瓢作宇僅容膝吁嗟兮子虚抱道兮不居呼牛應牛馬應馬謂僊非僊儒非儒不騎任公之碧驢不跨東海之生駒不學汝南市上懸一壺又不學葉令朔望飛雙鳬紫丸入口百病蘇邯鄲枉記石室書邇來年六十頭髮㸃漆黒形輕類飊舉骨瘦如鶴立腰纒一百錢即去買酒喫醉醒撐目忽大呌海天漫漫山月碧許由巢父呼不得江南春水白鷗飛六幅新蒲向日歸書河上成安驛扁舟落日成安驛驛前危檣宻如簣㟁髙浪急不得前爭先進寸復退尺須臾纜定心稍安獨據胡床坐深夕水邉燈影正晶熒陌上鈴聲還絡繹纔聴打鼓接官船又見驅車送行客攬衣近前試問誰往來一日多數百中原征需苦繁劇江南轉輸嚴督責況今使者類狼貪水陸鮮肥隨口索致令編户疲差役生計蕭條徒四壁已將弱女納官錢更遣中男補丁額曩時河上幾人家今日飄零竟無迹請君置此勿復言言罷空令愁思積幾㸃殘星散空碧船頭别我東芴白題太師贈長學士墨竹墨池飛出雙鳯凰青霞碧雲搖日光九重阿閣幾千尺如聴羽節飛鏘鏘集賢學士瀛洲客朝回拾得連城璧便思手把釣魚竿萬里江南秋水碧題陳仲明所藏雙松圖六丁驅雷山石裂乖龍角鬬雙屈鉄太隂忽閃鱗中開墨池翻濺呉江雪阿誰挽之茅屋東萬里不斷笙竽風天台石橋俱謾爾坐中别有蓬萊宫次赤城驛老夫辭家今一月馬上行行過各節山空野曠風栗烈木皮三尺吹欲裂貂帽狐裘冷如鉄癡雲作雪還未雪自是天公念駑劣上髙下髙隨小驖褁轡哦詩亦清絶人生何苦事羈紲候吏來迎稍羅列入門登堂火微爇須臾凍解通身熱過浦城浦城三百六十灘灘灘巨石鳴飛湍四山欲雨風亂起霆驅雪迸駑晝寒青竹縛篷白木榜側坐敧眠任搖蕩潭深墨黒蟠蛟螭壯士猶然懾精爽老夫平生疏且愚安得涉險同坦途形如健鶻膽如虎此心只與青天孚騰波寳劒今在不夜夜光芒燭牛斗題楊元初理問送行詩卷玉堂學士關西楊當時長策動四方九鼎一筆絲綸光星斗錯落成文章白首作史誇三長書成石室金匱藏翩然拂袖辭帝旁十年歸卧衡與湘妖狐黠鼠爭陸梁芒角煌煌横攙槍阿𤣥昔日焚香囊祇今馬上能挽强虎皮裁鞍騎驌驦龍泉之劒百寳裝萬夫披靡同驅羊既佐大將平武昌鏖殺袁賊走潯陽旌旗蔽日浮艅艎大江東下孰敢當耀兵桐汭勢愈張呉興嘉禾稍聚糧短衣一譟還錢唐軍門捷書報天子遼海雲帆日千里宫墻馳道平似砥披圖畫奏天顔喜左轄之功近無比賜以裘馬及弓矢錦袍文犀靸珠履凉州葡萄甘且美幕中元初名最韙黄金横帶官作理海若率職波不起百艘南還疾如駛呉山越山青靡靡大開中書聴宣㫖十萬甲兵齊拜跪樵牛作炙膾頳鯉一時光耀盛百禮玉堂僊人元不死吁嗟畫圖何所似麟閣雲臺有如此題二馬圖鐡喙騧連錢驄何年墜影江水中蒲梢西來八尺龍天閑十二為爾空五花雲錦吹東風楊白花楊白花無定止昨日宫中飛今朝渡江水江水茫茫千萬里綿輕雪薄春旖旎把臂踏歌歌未已石頭城邉風亂起楊白花無定止題上虞謝元公春暉堂東海有母母有兒萬口一出稱孝慈兒在襁褓寒且饑母雖不言心自知兒大讀書又讀詩贈以長劒逺從師十年走客江水湄氣吞雲夢八九之星斗錯落文章竒神駒如龍來月支真珠作轡金作羈追風掣電不受騎便欲一蹴超天池天池瑤草净如拭移得靈根種堂北阿母升堂日五色照見舞衣華翠織寸心有限恩無極浩蕩春暉誰報得玉桃上壽兒侍側兒當作官五鼎食白髮如斯應載黒此時方知教兒力文昌星髙輝南國學圃吟江邉乞地學種蔬周遭步量弓百餘十日去耕十日鋤耕鋤未畢僕已痡東家倩人不受呼西家倩人納官租菜苗蟲食且半枯昨朝許有今朝無出門抱甕空躊躇南鄰老圃笑我迂共倚大樹立須臾手把一卷神農書口稱此事焉可誣治土貴熟甕貴腴三犂兩耜工力俱燥濕得所避亢淤由不辟确堅已觕深畦淺壟畫成區四分井字旁通渠瀏瀏野水翻渴烏然後種藝皆榮敷寒暑按節順弗踰風和日媚雨露濡水菘山芥菠䔖苽韭黄薤白䓗蔱蘇緑葵青藿華覩姝藻荇芹茒蘋蘩蕪𤓰瓞茭藕苔筍蒲蔓菁蘆菔連根株牡丹芍藥萼重趺茄房豆莢懸瓠壺紫薑紅蓼鬱雕胡玉延蹲䲭巧相扶皮毛脱迸明月珠長頸短脰膩理膚冰漿雪液如凝酥翠鱗銀甲虬髯鬚魁首肥顔施丹朱琅玕琥珀鉤珊瑚鑱劚摘掇視宻疏多盈筐箱少盈裾削剥淹漬役膳奴甘膬鱻微薌味殊主奠翼翼賔于于熟可羮芼生可咀適口絶勝羞僊㕑子欲學圃不早圖只今後時將何如列鼎肉食稱鄙夫炰膾日厭葷與魚請子置之勿次且褒衣博帶歸爾儒吾計子食當晨晡家園自足供所需余嗤翁言亦何愚翁實勤苦少暇娯白鬚黒面形瘠癯暵即胼胝汗轆轤澇即腰脛没垢汙矧兹惡與苦荼加以臭蒜雜穢荽邪蒿濁莧兼滑榆多食嘔泄神志瘉得失往往如瑕瑜西伯愛歜垂聖謨太官專服國以墟曽晢嗜棗宣尼徒亦有請學譏樊須孤竹採薇終餓殂屈到好芰竟離居元亮隠菊多令譽諸葛元修名豈虚陶家虀瓮庾家葅黄金不聘蘇東湖是非榮辱理不渝世間萬物皆乗除翁言固辨亦過諛鄰家有酒且共沽醉酣仰面一長吁忽見黄鵠翔天衢當塗李伯羽母夫人貞節詩碧天夜落星如雪甲士長弓射孤月孤月照孤城千鈞懸一髮娉婷女兒方及笄誓將死節愧當時頸血不汚春花枝夫家桑梓青隂垂生子伯仲好羽儀㫖山之名天下知誰其作銘呉太史蛟龍筆底烟雲紫古來賢母有如此秦郵露筋廟飛蚊撇天連白草落日荒原泣姑嫂嫂留旁舍姑獨行花顔夜委長淮道亂聲皷趐腹正饑利觜􅏐膚血方飽妾行豈不念辛苦死重如山生似羽欲識當年一寸心廟前老樹啼春雨呉中曲送楊伯幾南遊鯉魚風起波紋緑枯葭折蘤啼寒玉榜聲催曉渡江心驀聴呉娃舊時曲楊郎年少輕别離三尺光芒練帶垂虎邱山頭候月出靈巖洞口看雲飛梅花雪㸃身上衣慈母倚門聴馬歸送左祥卿之香山縣尹九星排玉雙門開抱旗石皷青嵬嵬帝子城頭跨龍去僊人海上騎羊來禺南燕北天萬里五月河邉青雀起鸊鵜膏暖射晴虹海月光寒烱明水宓子琴中化易成吟得新詩字字清馬立階前待衙退刺桐花裏鷓鴣鳴送王士鳯之龍泉縣北鄉巡檢豹囊弢弓鳴鏑懸白玉為玦鉤重弦雙魚倒勒躍如電山人爭識將軍面將軍傳令出白斜桴皷無聲衆不譁前村草長黄犢飽四封寂寂多桑麻三年最書還北向當日賢侯在天上腰間寳劒重提攜新恩却賜龍泉歸送刁萬户奏事回蜀肉鬃驕馬來青城朱英畫㦸擁朝京溪子二石霜月盈魚腸三尺秋水横九門洞開論五兵却賜龍章歸栁營雄威纔發貔虎騰猛氣已使豺狼驚杏花春雨别行旌兩玉舟深猩血盛太白連雲萬里程夕陽到處聴鵑聲送涇王府蒲司馬西還重弓滿引鳴鏑和翻身躍馬渡長河日髙射獵王半醉軍中司馬功最多白狼西來獻天子腰間玉龍鱗甲紫寳書緘奏動宸京黄封御酒貺邉庭弦蒲汭鞠幾千里芳草萋萋春似水鳥聲山色不勝情枚生作賦才闕比送鄭伴讀歸省山東緑烟曉發扶光遲畫橋鳴鴉度低枝郎君恰恰燕山歸僊人笑迎兒女隨手攜松杖髙過眉雙舟滿江堂上巵五色戲着囊中衣香雪飄飄吐盤螭風吹雨脚沸朱絲黄花醉飲秋正宜況今太平天子時送張介臣伴讀歸省濟南白天迷濛日脚消雪花散亂風飄蕭重裘着體如壓鉄呼酒不來寒正驕東風疋馬去千里仰視王屋當雲霄到家方慰母心喜入門更聴兒啼嬌華燈夜照舞衣熱髣髴鳴鳯和笙簫暗黄着栁垂長條虎闈春信趣還鏕一林遲子城南橋友人赴陜西作縣角聲吹起滿城雪北風蕭蕭嘶小驖銀瓶細溜蒲萄熱三疊歌殘人欲别長安西去山嵯峨野曠春濃詩思多縣深花拂琴絲和小吏呼籌衙又過莫忘都門送時節楊栁枝寒不堪折輓陳堯草廬呉先生門人也有俊才卒年十八其妻亦痛哭而絶垂舟沃酒魚口熱小袖萊衣雙鳯結春歸白玉不禁寒雪兔西沈半山缺望夫化去孤石烈死與韓憑誓同穴鬼狐寒食上新邱隂風自掃梨花雪上元送别越王城中燈火明郎君早發越王城春酒一壺歌一曲楊栁風吹波面緑闗山月送殷文學還浙西白波洶湧風初起緑烟漸墮冰壺裏林鳥沙鷗寒不棲萬頃玻瓈浮如水攬衣推户仰視天一寸鄉心幾千里僕夫在門嚴戒程宵人呼籌催罷更街頭蕭蕭馬初過城中商角鷄亂鳴嗟哉我亦天涯客握手欲别難為情遙憐後夜相思處楓葉滄江一舡輕歸彦溫赴河西亷使賀蘭山前河水西金沙路平香草齊綉衣玉節往問俗驄馬顧影時驕嘶當年長身多意氣拔劒歌呼人半醉只今太平七十年盡把英豪化仁義甘州枸杞紅玉重涼州葡萄醬滿甕九重有詔趣還朝莫惜駞囊少分送玩齋集卷二
