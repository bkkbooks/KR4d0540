body:
  text: 玩齋集附録年譜大德二年戊戌時成宗在位公以是年五月二十一日生於宣城之南湖大德三年己亥大德四年庚子大德五年辛丑大德六年壬寅大德七年癸卯大德八年甲辰大德九年乙巳大德十年丙午大德十一年丁未公十嵗至大元年戊申至大二年己酉至大三年庚戌至大四年辛亥皇慶元年壬子武宗即位皇慶二年癸丑侍父提學江西會草廬吳先生堂試中第一延祐元年甲寅仁宗即位延祐二年乙卯延祐三年丙辰娶寧國路總管之女張氏延祐四年丁巳公二十嵗延祐五年戊午入太學自宣入京延祐六年己未延祐七年庚申至治元年辛酉英宗即位至治二年壬戌至治三年癸亥泰定元年甲子晉邸中江浙鄉試泰定二年乙丑泰定三年丙寅泰定四年丁卯公三十嵗天厯元年戊辰明宗即位公改治詩經中國子選太和州判官未赴自京歸宣天厯二年己巳丁外艱至順元年庚午寧宗即位至順二年辛未除歙縣丞未赴至順三年壬申辟江浙省掾元統元年癸酉托歡皇帝即位元統二年甲戌棄官以中書檄行省不得用部下士為掾以江南三省對調公不從上書丞相辭去不仕至元元年乙亥至元二年丙子至元三年丁丑除翰林應奉文字同知制誥兼國史院編修官以兄來官翰林辭避南還養母公年四十嵗至元四年戊寅葺愛日亭至元五年己卯丁內艱至元六年庚辰至正元年卒巳為蚓竅鷃適粟中春等所以圖宴息至正二年壬午至正三年癸未至正四年甲申除紹興推官既任考文江淅至正五年乙酉至正六年丙戌至正七年丁亥召為翰林應奉奉旨編纂遼金宋史公年五十嵗至正八年戊子遷授經郎兼經筵譯文官至正九年己丑遷翰林待制奉旨兼參贊經筵官進講經筵明君子小人之辨上喜錫賚甚厚至正十年庚寅改國子司業割司業俸并節行供浮費積資廣學舍六十間以及諸生宿處至正十一年辛卯四月奉制不拘南士擢吏部郎中三日後拜監察御史分巡東道至正十二年壬辰奉制再除吏部侍郎至正十三年癸巳冬調兵部侍郎以兵部侍郎差次口北十三站豪貴懾服貧民蘇息擁拜遮道作榆林有感詩至正十四年甲午八月除庸田使和糴二百萬以供軍至正十五年乙未正月除江西廉副未任升福建廉使六月任十月除禮部尚書道出建寧十一月除平江路總管十二月二十八日任至正十六年丙申正月三十日城陷於張氏公抱印求死不獲作幽懷賦以自見隱居吳淞江上主釣臺山長吳景文易姓名為端木氏號戾契子喌喌翁至正十七年丁酉八月扈印納於浙省十月丞相達公九成以便宜除兩浙轉運使隱居杭之西山公年六十嵗至正十八年戊戌八月升江浙參政居杭州作備萬齋至正十九年己亥正月除戶部尚書奉詔漕閩粟皇太子書務本二字賜之赴閩道梗二月遷居海寧之北郭時鐩得列弟子員後八月自海寧航海達閩而眷序僑寓如故冬值兵入境鐩具舟迎夫人眷序過家留居東野草堂至正二十年庚子九月除祕書監卿還京師公寓閩中香嚴寺作高風臺至正二十一年辛丑公寓閩中至正二十二年壬寅公年六十五七月七日自閩中歸舊寓命其地曰小桃源冬十月十日殁於寓所至正二十三年癸卯是年春鐩割地以葬實閏三月三日也閩士因廣高風臺改先生祠以綿祭祀紀年録公姓貢諱師泰字泰甫號玩齋寧國路宣城縣人也先世居大名開州長垣縣之蒲城七世祖宋武德大夫都總軍將使諱文顯扈蹕南渡因居秣陵遷宣城卜居南湖六世祖賢尚書省評事五世祖諱之琳承信郎四世祖諱大用朝奉大夫曾祖諱應霆前元贈中順大夫禮部侍郎祖士濬纍贈太中大夫僉太常禮儀院事先以其子奎集賢學士官贈大監奉敕命儒臣程公雪樓為之文奎字仲章號雲林先生歷官至翰林學士奉敕葬於宣之生田里諡文靖侯卒年六十一伯庸馬公常銘之生二子長師謙次師泰即公也延祐間雲林公待制翰林以公從學國胄時雪樓程公草廬吳公于翬魯公伯生虞公元功歐陽公相繼為監官公遊諸公間涵濡漸漬所得者深泰定初中江浙鄉試天厯間釋褐除太和州判官未上丁外艱制終授歙縣丞未上辟江浙省掾至元中應奉翰林文字同知制誥兼國史院編修官丁內艱至正四年任紹興路推官凡所詳讞多致平反豪猾斂手朝廷大臣有薦公治理為江浙第一者復召入朝為翰林應奉自是參贊經筵司業國子轉吏部郎十三日拜監察御史南士入風憲自公始尋除吏部侍郎十三年改兵部侍郎差次北口十三站其地多豪貴往往挾勢抑貧民公至之日務平馬政權要謗議騰沸執政欲左遷其官公處之泰然作榆林有感詩以道其志而驛戶送拜遮道執政察知之擢都庸使者持節江浙和糴二百萬石事集而民不擾十五年春除江西廉副未任調福建廉使十月擢禮部尚書改平江路總管上任踰月張士誠以高郵兵至城陷官屬潰散公獨抱印隱居吳淞江主釣臺山長吳景文家易姓名為端木氏作幽懷賦以自見十六年八月浙省丞相達公九成起之曰君之守平江也在官未三十日人心未孚且握兵捍患自有省臣在非君之過也即以便宜版授公為兩浙運使既任商賈慶於市亭民賀於野姦貪懾服鹽法通流由是丞相益加敬焉明年升江浙參政十九年正月朝廷除戶部尚書奉詔漕閩廣粟海上有警留居海寧與諸生謝肅劉中朱鐩等講明道義露晨月夕時援琴賦詩以釋憂憤八月自海寧航海達閩轉漕京師而眷序仍留舊寓冬值兵入境鐩具舟迎夫人眷序過家卒底於安二十年九月朝廷以祕書監卿召還道梗公寓居香嚴寺與經略李公景儀倡酬歌詠以遣興作高風臺以娛情二十二年夏五月自閩浮海歸於海寧舊寓命其里曰小桃源方杖䇿優遊留情溪壑而瘴癘作楚卒以不起享年六十有五娶寧國路總管之女張氏封廣陵郡夫人子男三人長昱行樞密院掾史次晟旻皆早世女一人耆軒適海寧州判官張肅孫男四人宗堯宗禹慶童定童尚幼女靚中公病既篤呼弟子謝肅朱鐩語之曰余平生苦志勵行期於無愧於心耳非託於文字則當世立言之君子無所取徵爾尚托其梗概以副吾志鐩既遵治命以葬瘞日薄遂不果肅方宦遊東齊未暇及也惟鐩跧伏田野得親近公之子昱故能詳其本末然公之功名事業著於人人姑敘其事以俟太史氏採擇焉門人朱鐩撰玩齋集附録
