  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0540_WYG_003-1a, image: WYG1215/WYG1215-0545a.png}
body:
  text: 玩齋集卷三元貢師泰撰五言律詩冬至子月先三正初陽動六虛氣從溫室候雲向曉臺書自許心猶壯誰嗤髮已疏乾坤萬里客何計樂樵漁太平三山值風天塹東南地長江日夜流大風吹水立驟雨挾山浮浩蕩掀黃鵠欹傾舞白鷗莫憐舟似葉此亦壯哉遊蕪湖昨日何處别今朝此地留青山逼岸起白水滿江流雨隱巡鹽鼓風腥挂網舟何時歌欵乃同買緑簔遊遊麻姑萬松菴秋日訪招提雲深處處迷殿門松影直庭檻藥苗齊接竹通流水編籬護野畦道人偏愛客留得樹頭梨又積雨變秋思清遊愜道心過橋分履迹問寺逐鐘音紅墮鳥爭果緑深魚占隂何當脫塵鞅重此契幽尋贈方外間人白日青天外壺中别有春江湖萬里客宇宙一間人採藥雲歸袖看花月滿身何時重會面醉拂布袍塵遊江隂君山孤嶂臨滄海千山湧大江逺帆歸市獨髙塔倒波雙鷗鷺爭洲溆蛟龍怒石矼壯遊心未已飛雨灑樓窗遊滸墅龍華寺偶到龍華寺因同半日留禪林將結夏客路尚如秋衆樹緑偏靜一花紅更幽最憐髙岸栁容易繫行舟遊虎邱海上地偏勝吳中山更竒畫圖雲洶湧冠佩石參差花落談經坐苔封試劒池倚闌煙水闊千載一鴟夷聽雨堂為周叔量賦聽雨髙堂上君家好弟兄樹深催暮色竹密助秋聲列坐情方適連床夢屢驚却憐江海闊鴻鴈每孤征題韓與玉所藏春山行旅圖乾坤春浩蕩江海日舒徐孤客千山騎雙童一篋書桃花溪口渡松葉嶺頭居何日西湖上從君晚結廬台州寄楊子秀路轉千峰合溪通一帶斜飯炊黃渡雪酒染赤城霞未訪仙人宅先尋博士家近聞歸隱處盡種碧桃花興化湄洲島祠天妃還清朝嚴典禮宣閣遣詞臣衣帶天邉雪花逢海上春稍能更祀事亦足慰疲民萬里行方逺朝來更問津又夜宿吳山上朝行莆海東地偏元少雪天闊自多風不見波濤險寧知造化功百年神女廟長護海霞紅題程以文竹雨山房山人愛種竹竹髙上雲端屋近琅玕潤林深翡翠寒好栽鳴鳯管莫截釣魚竿白髮相鄰處時時一問安又天上春雷起山中夜雨過林聲遙帶瀑池影淨生波對坐此君獨迎門稚子多何時深翠裏擊節共長哦梁山濼涼雨忽飛過濕雲猶湧來渚花紅陳陳汀樹緑堆堆一鶴搏空起雙鳬觸浪開梁山非舊俗禾黍滿髙臺東昌次孟景章韻溪滑魚苔淺沙柔馬藺長一鷗當水浴雙燕背人翔客路頻看月征帆尚帶霜灣灣見花栁回首重思鄉送陳子敬赴南昌尉送君南作尉黃綬去翩翩縣倚邉江郡花迎上水船自憐官主印人喜吏如仙定見雙鸂鶒飛來御史前送國子伴讀張德貞歸湖南薊北湖南路孤舟萬里程晴天黃鵠健春水白鷗輕芳草歸時恨間花别後情定知袍笏貴不似綵衣榮南城監試和同院張進逺韻清朝隆禮治仙館榮賢良冠冕山河大文章日月光九關嚴虎豹千仞下鸞凰此日橋門盛何論漢與唐送李盤野秋水芙蓉岸孤帆天上歸青山四面起白雁數行飛里父供新釀家人浣舊衣封侯定何事且理釣魚磯題劉子明西雲亭野樹偏宜晚江花欲變秋幌明霞散綺簾暗月沈鉤解補青山闕還生白髮愁何時作霖雨却共水東流送國子生哲德明歸淮西覲省落日青山外西風白雁邉幾人同飲酒一客自開船江蟹經霜美淮魚出水鮮遙知到家日白髮語燈前送華以愚南歸禁城秋雨後奈此薄寒何江上書來少吳中客去多莫帆依橘柚晨爨就蒲荷遙想歸榮處鄉人日醉過分題得獲麟堆送李伯貞亷使往山東正朔周王紀春秋魯國書瑞圖齊鳯鳥麟趾應關雎絶筆懷西狩揚鑣過舊墟泰山青萬古相對一躊躇送偰元魯應奉代祠海嶽天子臨丹扆祠官侍玉除香從中禁出祝遣北門書海若通方貢山靈候使車青春隨處好六轡且徐徐送蒙古彭教授往髙州萬里髙州路憐君此日行藤隂頻駐馬榕葉亂啼鶯人到烏蠻異官同博士清定知江海上殊俗盡諧聲居庸關觀新寺渡水復渡水上山重上山黃金鑄菩薩白玉凍潺湲數騎朝還驛千夫夜守關帝城行欲近喜色動衰顔將干嶺絶頂低髙斗重關壯北門隴雲浮地白谷水帶泥渾宇宙神功大山河帝業尊小臣叨載筆華髮感深恩赤城山近雲連驛沙虛雪擁村瓠壺縣榖種土銼爨柴根凍雀來依幔晨雞立傍門客中甘淡泊不必問盤飱題黃觀瀾卷碧天看不盡滄海去無邉氣湧風雷動光涵日月縣竒文方浩瀚餘景尚漪漣好種珊瑚樹他年繫釣船送趙宗吉赴河間太守闕下聲名舊河間治化新一麾方到日五馬已行春報最寬明主緘書慰老親何時鳯池上重與掌絲綸題雪軒白天隂欲合冷日景微遮風徑將飄絮春嬌且弄花照窗冰柱直印几玉文斜試聽吾伊處山南有幾家圓修寺雨後書懷三首長風動髙樹踈雨落空庭傍几香煙白開簾樹色青病軀便倚杖老眼倦翻經為問新來雁何時過敬亭又晨起坐堂上白髮亂如絲野鼠銜梨果山禽繞竹枝寸心甘自許多病竟誰知賴有溪南友時時慰渴飢又開窗對修竹日莫更深寒感慨情偏極棲遲淚不乾酒醒驚絡繹衣薄怯闌干烽火何時息餘生得少安和前韻病多疏白墮心靜熟黃庭日莫藤蘿暗天寒橘柚青蝸涎緣畫壁蛛網綴函經睡起成長嘆浮生一草亭又眼花風瑟瑟心緒雨絲絲狡兔成三窟鷦鷯寄一枝青雲慚故友白髮感新知最好南山石相看可樂飢又日移棋局晚山落酒杯寒欄蝶穿花濕窗禽飲硯乾夢魂空宛句音問阻長干多病文園客秋來強自安春晚書懷東吳喪亂後消息竟何如日望平安信空傳報捷書壯心徒感激老淚獨欷歔坐對垂楊晚行人江上疏又江黑雨將至水髙潮正來花隨兩岸别鷗逐片帆開世治逢多難吾生愧不才飄零添白髮見者莫驚猜寄靜庵上人細雨桐花晚微風麥氣秋王符偏好學宋玉不勝愁世事同蕉鹿人心類棘猴何時虎溪上還共逺公遊憶姪景相望亦何逺夢中頻見之干戈連數歲書問動經時寂寞揚雄賦飄零杜甫詩江東春樹緑偏重阿咸思又自汝南臺去棲遲兩見春鼓鼙江上月烽火海邉塵衰病全非昔傳聞總不真近知更大將旗幟一時新憶吳會草堂芭蕉寄汪仲恭别後芭蕉樹青青定長成月移窗上影雨送枕邉聲愛惜煩吾友飄零愧此生更需花實大同飲露華清和馬仲臯立秋韻酒盡青山莫書從白雁過長風斷疏雨缺月挂明河故國逢人少新秋到客多不知滄海上何日罷干戈又一向城東住荒涼客少過疾雷時送雨陋巷忽成河自許丹心在誰嗤白髮多平生二三䇿可是勝橫戈題朱質夫東野草堂幽人海昌住草屋向村墟擊竹頻呼鶴分泉謾種魚梨花春巷冷榆葉夜窗虛細雨篝燈火匡床正讀書題奧屯秋江墨迹滄江渺何許歲晚正愁豫密諌囊無稿間吟卷有書青天來鸑鷟秋水照芙蕖風致今誰似令人憶使車贈李可度當年丞相掾孤劒泊天涯白日懸心事青春老鬢華定憐鴻有路終愧燕無家志士須聞道人情付落花赴京道中風雨新河口孤舟此日行送多親友義别見弟兄情路識春山熟洲迷雪水生臨岐重回首一雁起江城茅市簡友人顧我行方逺憐君意倍親雪篷依渡口雨笠待河濵酒熟還留飲詩成不厭貧相期重下馬花栁隔年春贈張士方昔年東海上曾共繡衣行小吏銜寃久分司用法平江沙清可數海月晦還生隂德今誰似于公有令名以拄杖贈程以文先生海上桄榔樹殷勤舉一枝功能扶正直力可濟顛危文玉膚生潤玄犀質換竒何時同野服江海逺相期茂上人古木圖老龍起聽法蛻骨在空山雲逈青天濶風來白日間曲身雖偃蹇直氣自孱顔株坐誰偏似禪歸晝掩關雕窩驛雕鶚入雲去空巖遺舊窩冷煙迎日少晴雪背隂多擾擾羣烏集蕭蕭數騎過此時孤館客歸思竟何如洪棧驛萬壑從東下羣峰向北圍牛車絙水去驢馱負薪歸隙日斜窺户尖風直透衣羇懷正無賴一鶚向南飛王元吉蘿月山房每愛城南宅空庭坐夜分隂垂青裊裊光漏白紛紛卷幔飄花雪開尊度碧雲何時搴薜荔猿鶴與同羣毅上人蒲室上人蒲作室絶似睦州禪父母今誰養弟兄惟汝賢齋房連紫竹佛座擁紅蓮明日長蘆去春江正拍天許光逺先世讀書樓髙樓當海上有客正看書門對千峰暝闌回萬象虛榜聲飛宿鳥燈影避潛魚留得題詩在諸孫更卜居會稽韓道士滄洲風雨四山至空江生早寒白鷗秋水上黃鵠暮雲端杜若人移棹蓬萊客倚闌何時分一曲同把釣魚竿玩齋集卷三
