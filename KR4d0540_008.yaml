body:
  text: 玩齊集卷八元貢師泰撰傳說問戒銘贊題跋偈祭文喌喌翁傳喌喌翁不知何處人亦莫詳其姓名遊吳越間遇山水佳處輒留居焉好種花竹彈琴奕碁賦詩客有遺之雞翁曰是有德者不宜束縛即解縱之久而雞益多翁每食則亦喌而食之有不至者連呼喌喌羣雞皆來翁大喜因自號喌喌客或問曰子學堯舜禹湯文武周公孔子孟軻氏之學而不以號乃有取於喌雞聲乎翁曰是何言歟夫人食則生不食則死豈唯人哉犬馬牛羊皆然豈唯犬馬牛羊穀粟花果皆然穀粟花果食於土者也犬馬牛羊食於人者也至於人學堯舜禹湯文武周公孔子孟軻氏之學其志亦將以待食乎君者也是故三代而上食其臣以五等之爵秦漢而下食其臣以萬石之祿魏晉以及五季趙宋食其臣以九品之官然則臯蘷稷卨伊傅周召皆待其君而食者待其君而食與待人而食者無異待人而食則與待喌而後食者果無異也客曰子何以其食為哉亦曰道而已矣不以道而以食則臯夔稷卨伊傅周召其志亦將以求食乎翁曰是何言歟謀道者固不謀食然亦未有行道而不食者也吾既不能自食其力又不能待君之食徒持文墨議論安坐以噍食於人也其能免衆喙之嘈嘈乎客姑去吾喌吾雞矣遂命其徒木雞生書為傳趙氏節義傳至正十六年春三月十日淮寇陷金陵民吏多死之然求其內外盡節服義以無辱其身者吾得趙氏焉趙氏之先歸德人國初時有諱應德者始居金陵嘗編修史館尋棄去號直心居士生子鑑纍官江浙行省左右司都事卒贈奉訓大夫徽州路婺源州知州鑑生五子曰龍澤有學行以御史薦為郡文學曰雷澤讀書明律令纍官奉訓大夫兩浙都轉運鹽使司判官所至有能聲生二子棟楷曰泳澤為伯父鎰後曰宗澤勤慎善謀由臺幕府史吏閩憲轉户部令史曰滙澤博覽强記能詩文始寇至時雷澤被臺檄督餉句容滙澤棟皆從行宗澤亦以使事留錢唐獨龍澤家居宗澤妻衡棟妻夏楷妻劉倉皇亡所措衡泣顧夏曰婦人義不辱我與而夫皆出萬無生理劉夫幸在尚善自保言訖赴屋後池水死夏亦死劉曰妾夫雖在能衛我乎亦隨之溺明日賊果大掠執龍澤詰所藏不得則驅之拜龍澤罵曰我食學官雖五斗粟安能屈身拜賊耶賊怒殺之又執楷榜求其父運判君楷知賊將脅之用終不言亦殺之雷澤乃得變姓名去其妻申聞之垢面敝衣徒跣從至今莫知所之或傳在句曲山中史官曰臣死君子死父妻死夫使家有其一已為難矣況三者並出一家乎雖然知死者之難於生而後知生者之難於死然則趙氏之或死或生要皆無愧於心哉雙孝傳故杭郡監贈范陽郡公伊普迪哈魯鼎諤爾根氏其先祖扎瑪里鼎從憲宗皇帝南征死釣魚山子孫世為聞臣郡公娶夫人虎篤聰慧孝慈出天性處內外無間言始至時年二十四姑也赫伯哈敦年已五十性嚴毅寡言笑夫人事之曲盡婦道姑嘗有病侍粥藥目不交睫者纍晝夜雖疲極無倦容夫人養姑十年始終不渝人皆以孝婦稱郡公間抱危疾藥餌無所容衆醫環視束手夫人號泣曰婦人以夫為天今疾亟且死妾何生為遂拔刀誓天刲左股肉齊和以進强郡公咽之有頃張目視夫人曰是何良劑也翌日疾遂瘳生子曰沙木斯鼎夫人既沒繼室史夫人真定人性貞淑善女紅讀書知古今事其來歸也二十二事姑尤孝謹一日起居者三飲食必請所欲品嘗㫖否乃敢進及暮則枕衣席溫凊已乃敢退遇有疾則日夕坐卧榻下衣不解帶雖厠牏便器亦躬為浣滌姑嘗語人媳婦孝我今無以報願子子孫孫娶婦皆如媳婦姑年八十感劇疾三日不蘇夫人割臂肉為粥焚香泣禱曰天乎天果恤諤爾根家吾姑食此庶其生乎仍願減妾五齡以益姑夀明日果愈又五年乃卒姑將瞑猶執夫人手曰汝事我二十五年如一日天地鬼神亦知之我死矣幽冥中忍忘媳婦乎言訖而逝初夫人之來沙木斯鼎繇潛邸近臣纍拜福建行省參政南臺治書以資善大夫監憲閩海茂巴爾斯江西行省左右司郎中古嚕蘇宿衛內廷哈沙珊延平府判皆能以功名顯其親而監憲尤慈仁寬愛為時推重故凡右族之稱孝者皆首諤爾根氏二婦云史官曰刲股割臂勇士猶或難之況婦人女子乎諤爾根氏二母操刃自臠曾無縮恧非真有所見者不能也嗚呼至孝通於神明信哉海樵說新安汪仲恭為豫言其家住五嶺芙蓉之西閒嘗樵其絶頂俯視東海眇若一粟今身即其地徘徊俯仰不覺三載爨荒茅敗葦於野水之濵即欲歸樵而不可得因自號海樵子其為說以慰我乎豫謂仲恭之號亦竒矣大海之東衆水所歸其大無量其深莫測其翕而靜則汪洋瀚漫淵渟波浴日月涵星斗籠絡宇宙包羅萬象其噓而動則怒濤狂瀾橫奔而疾擊衝飈鼓之摧山靡谷迅若電掣震若雷吼蛟龍黿鼉神鬼百怪變化之物翕忽萬狀其危且險使人神怖膽掉若此其可畏也故凡操舟鼓枻以出沒乎其間非豪商巨賈則網罟而漁者也其州居而岸處非鹺夫蛋户則習知其事者也仲恭縱不歸樵於芙蓉之西獨不樵於山乎不樵於山而樵於海其志可知矣仲恭學道士也天地間莫大於道亦莫大於海知海之大而後可以語夫道矣海無不受也道無不該也知道之大而後可以樵於海矣人見仲恭樵於海豈知樵海之非樵歟知樵海之非樵豈知不樵海之非樵歟方吾之樵也無登涉之危無荷擔之勞浮苴來吾前斷梗出吾後隨所遇而取之不盈也及吾之不樵也則漫漫而遊悠悠而望任所之而無往非適也然則樵固海也不樵亦海也海在是道亦在是矣是故因其大可以廣吾量就其深可以蓄吾德體其翕而靜可以凝吾神乘其噓而動可以充吾氣量廣而德蓄順凝而氣充然後藴而為學問則浹洽而精醇吐而為文章則雄渾而雅潔發而為事業則震奮而光明豫嘗論世之學者非其神融心領超然特悟其所得未必皆真也昔者惠文之養生得之於解牛九方臯之相馬得之於驪牝宋元君之畫史得之於磐礴屈原氏之離騷得之於放逐司馬遷之史記得之於游觀張旭懷素之草書得之於舞劍酣醉杜子美之歌詩栁宗元之文章得之於窮愁遷謫事固有殊情而獨感者不若是而謂之真得皆妄也仲恭之樵海其亦有所得矣夫不然操刀荷蕢以雜出乎斥鹵之鄉者紛紛也號雖竒何益於道哉吳觀尚賔字說觀上則曰觀以四隂尊二陽有觀望之義也聖人於此所以寓其憂世之心者至矣然初之童觀二之窺觀三之觀我生皆以位卑望逺而未能廓然有所見焉獨四切近於五密覩人君之盛德國家之休光其占為利用賔於王蓋賔者主之對以君臣之分而行賔主之禮非素行顯著其何以克稱哉聖人於此復推其象曰尚賔豈不以作賔王朝士君子志尚之所在乎觀也年富力强足以積學盍亦勉夫作賔之實以母負尚賔之志可也易之道每嚴於君子小人之辨而觀之六爻尤拳拳焉觀也其勿墮於小人之朋而為君子之賔乎此固而父之望於觀而亦朋友之所以重為觀勉者克潛曰博矣哉先生之教也遂書以為說名吳晉說景文一日過豫左手挈其幼兒右手持尺紙曰兒見兄字亦欲得之宜無靳也余曰老愛幼常情也然敢以子之情而瀆吾禮乎景文笑曰吾亦安能察於禮而薄於情乎且指其兒拜不止乃取易筮之得坤下離上之卦為日出地上順而麗乎大明之象且其繇曰桓桓康侯德廣以修三接愈恭承王之休其將進而不已乎遂名之曰晉晉進也年進則學進學進則德進德進而後可以進於仕矣余雖老俟兒學與德成三加而仕尚當字之兒拜景文亦拜余答拜因書為他日徵焉鄭居貞字說豫以戶部尚書分治閩海之三月僉憲鄭君彥昭遣其子桓來受學則又進曰桓冠而未字敢求所以美其名者豫乃取易屯初九盤桓利居貞之辭字之以居貞桓復再拜曰甚幸先生之終惠也使知所厲焉豫惟桓之一辭散見於易詩書春秋禮記雜出於諸子百家之書長發之桓撥牧誓之桓桓諸侯之齊桓魯桓器之桓圭桓楹或取其威武或尚其直大莫不有頌美之義焉獨屯之盤桓以震坎初交而繼乾坤之後蓋萬物發生之始其象則雲雷興而未成澤其字則草穿地而未甲坼其義則君子方經綸天下而未寧也當屯之世非賴剛明有為之才不足以濟難初九雖以陽德而居下位其所應者又隂柔險陷所宜盤桓善守以俟時之通而不宜急遽倉卒以致禍也然而貴而能下賤寡而能御衆則建侯之利其終得而辭之哉且五非不尊也以屯膏而施未光初非不卑也以居貞而大得民嗚呼君子之進退出處固視其時之難易可否亦曰思不失其正而已矣桓乎桓乎其將進於道乎陳文彪炳文字說華亭陳仲明名其子曰文彪間過余而請字焉余按彪虎之文也在易革之九五曰大人虎變其文炳也字以炳文不亦可乎或謂革之為卦離下兑上九五位中正而應六二以一身之光澤為天下之文明是乃大人君子之事豈後學小子所敢擬議哉余曰然易道通乎上下而變動不居者也希聖希賢獨非學者之事乎夫火然則水乾水決則火滅卦之象也文明以說大亨以正卦之德也合象與德而革之義無餘藴矣且以二體言則兌為虎於時為秋離為文於時為夏夏而希秋而毨以至於炳豈一朝一夕所能致哉然則虎變之文正學者自新之極功也陳氏子年富氣鋭方勇於學庶幾觀象玩辭而有得於此雖然名者實之賔質者文之本修其實以稱其名厚其質以充其文則名不虛稱文不徒飾矣不爾則外事華藻內實歉然將何益哉傳曰文質彬彬然後君子炳文其尚勉之花君美御史字說南臺御史髙昌呼都克布哈君間為豫言昔與柯君敬仲遊辱以君美字及友林君清源復得解其義而搢紳先生不鄙而稱述焉竊嘗佩服周旋而進於道然猶懼學之未能至也願一言以自勗豫惟往年嘗識君於江浙繼復邂逅於甌閩間觀其風神俊偉論議英發時固已知君之才器超卓過人逺甚今以使事道出會稽則君方衣繡持節按部海濵而聲光譽望赫然動乎東南豫益知君之美德信乎名實之相稱矣夫美者善之在已而充實者也存於內則為和順之積見於外則為英華之發施之家則孝友雍睦而歡然恩愛之相親行之天下則安靜和平而藹然治化之無間然則美豈誇辭溢譽而已哉易不云乎美在其中而暢於四支發於事業傳不云乎充實之謂美充實而有光輝之謂大光輝所以成已事業所以治人君能因是而益勉焉則學有弗至乎豫曩侍君之季父平章公於是有契家之好今得見君之樹立若此豫心安得不重慕而起敬之哉因君之請遂喜而為之說中中子說金華王子章故宋文憲公魯齊先生之諸孫也以文學倅海寧既代且老猶日孜孜進德不已更號中中子今年春豫以戶部尚書總漕閩廣道出海寧子章首來謁問所以中中者豫曰子以文學世家而能自立若此其將有得於中中矣夫人以稊米之身而能備萬物之理參天地之大者心也其寂然不動無少偏倚者中之未發也隨感而應使無過與不及者中之已發也存之於未發之先而復察之於已發之際則中其有不中者乎自堯之執以授舜舜益之以命禹湯武建之以立極孔顔擇之以為教子思子發中之用孟軻氏明中之權而中中之道始備矣夫易之為書凡其曰正中曰得中曰在中曰居中曰遇中曰利中曰尚中曰以中曰久中曰大中曰中行曰中正皆得位而有應者也曰過中曰失中曰中未得曰中未變曰中未光皆失位而未得應者也然則神聖設教以前民用亦莫先於中天下之道其有加於此乎天得中而清地得中而寧天地一失其中則日月薄蝕而四氣不順山川沸崩而萬物僭差而況於人乎是故農失其中則不得以為農工失其中則不得以為工賈失其中則不得以為賈以至於醫卜百家之流莫不欲得其中而況於士乎自世衰道微往往汨於私意以淪胥其恆性是以存乎內者不能無偏倚之患著乎外者不能無過與不及之差不及不知所以進之過又不知所以抑之而中道或幾乎其息矣中道既息其視農工商賈醫卜百家之為反有弗若亦可悲夫今子章能以中中自勉而不知年之老庶幾知所用力者由是而日加敬畏焉使靜有以養其天理之公動有以遏其人欲之私則體用相須內外無間而堯舜湯武孔孟相傳之統與夫大易進退存亡之道舉不外乎此矣嗚呼微哉遂書以為中中子贈中中子問客有號中中子者請問中中于戾契子戾契子曰天不中則日月薄蝕而四序僭差矣地不中則山崩川竭而萬物不育矣人不中則倫理廢而入於禽獸矣聖人之道大莫大於中者子亦何能遽領其要哉中中子曰固矣天烏乎中地烏乎中人烏乎中吾不得而知之也且子之於中亦戾契矣又孰知中之為中哉戾契子啞然而笑曰夫道散若牛毛得若麟角而子不知戾契之非中又烏知中中之非戾契乎子必欲聞至道之要其斂爾形收爾聲反爾聽使心如止水湛然而靜不撓於物不汨於私庶其可論此乎中中子退而齊三日乃敢復請戾契子遂揚袂聳冠箕坐曰可哉天之道以隂陽而立地之道以剛柔而立人之道以仁義而立消於上者息於下往居外則來居內晝夜寒暑各司其半隂不終於隂而陽生焉陽不終於陽而隂生焉隂陽合德則三光明六氣順此天之中也剛以克柔柔以克剛剛柔相濟五才互用則煦嫗孕和而生植蕃此地之中也存心以仁制事以義或施而恩或果而斷喜怒愛惡不失其偏則家齊國治而天下平此聖人之中也雖然天地不能以自中必得聖人以為中聖人之所以能中天地者毋亦損其過益其不及治其偏使歸於正而已矣其見於經者曰裁成曰輔相曰彌綸曰參贊曰經綸曰成變化而行鬼神凡若此者豈非天地待聖人而後中乎中中子曰博矣微矣中中之辨矣然而天人相去逺甚果何道以中哉戾契子曰蟋蟀以秋吟蜉蝣相隂出物性猶能知天地之故孰謂夫天人相逺哉孰謂夫天地之中不中於聖人乎孰謂夫聖人之中不中於天地乎況人與天地本同一體吾之耳目口鼻其天地之日月風雷山嶽河海乎吾之骨肉毛髮其天地之土石草木乎吾之噓吸出入其天地之噫氣乎是故運動法乎周流張弛法乎闔闢憂喜法乎慘舒吾心既正則天地之心其有不正者乎吾氣既順則天地之氣其有不順者乎其感通之妙如機之發矢如樞之運戶如橐之鼓風神用不測自有不期然而然者矣中中子矍然起曰吾問中中而聞聖人之中因聖人之中而聞天之中地之中又聞戾契之為中也幸哉幸哉中中子者金華王藻子章戾契子則宣城貢師泰父也鶻戒并序海濵之家好養鶻道遇臂鶻而過者其容甚戚問之則曰吾旬浹間失四鶻或以强擊或以縱欲或以爭得是以戚焉余讀栁子三說蘇子二戒而愛之然猶各寓意於一物焉今以一物而得三戒遂書以為勸其一曰黃鶻色閃閃若黃金然强力而疾擊遇大禽他鶻不可得者則縱之無不得也一日見羣雁集海上試一縱焉鶻􅑷身奮翅方突入陳中雁呼其儔來救回旋唼喢力不能勝臂者急呼之則毛羽幾盡脫矣籠之數月乃敢復至海上遇大鵠方東向立脫其帽覘之則搏擊如故態鵠見其來凝然不動伸頭掉喙徐擊之正中其腦以死吁不量大小而犯非其分以殞其身宜哉其二曰赤鶻色正赤黠而多能凡擊鳥相向來則已必背而去稍逺出其不意也乃還擊之無不得者或墮在水則舉而擲之地主者甚愛之飼常倍他鶻其後竟以食多而病毛羽翛翛然投以善藥逐其腸中惡敗病乃已自是每節其食視之益勤然神俊終不及前時間出遇野雉雊而起試投之雉竄入叢棘中鶻數擊不得殊困憊張翼而嗄衆嗾犬逐雉出犬闞助之使盡其力乃得主者喜即囓血肉飽啖之明日視鶻死矣吁忘已之弱而貪得不止果異是哉其三曰蒼鶻其狀特小始得二喙畜久而色尤雜以青其搏也必先後之令下上旋轉以無失焉一日乘小舟臂出江上見鵲啄田間大呼而逐之鵲懼無所蔽也則急投之水其一方奮擊其一復至鵲沈而無所得則二鶻自相搏皆溺以死噫向止用其一使自専則鵲固可得也今兩縱之爭以死悲夫俞仲圭好古齊銘渾敦鑿凝以爍五太御三靈覺風氣通人文作厯黃虞物咸若姒姬降王政虐繄宣尼掬金鐸正六經道斯廓既精微亦渾噩傳萬世為民度遵之善逆之惡維好古莫此樂賈循正善善齊銘人性本善善原於天不善其善遂為惡遷善善不己其善則全己善善人人善善己善己善人斯為盡美徒善弗庸於道則否所貴學者不惑不止勗哉循正善善在是皇太子賜書贊謹按賢者在位能者在職孟軻氏之言也至正庚子秋皇太子大書以賜福建行中書省平章政事臣布哈特穆爾平章以戊戌秋來鎮閩海誅鋤凶强保衛良善一年而政敷二年而民信飛艘漕海以餉京師上嘉其功進階升秩錫豫駢蕃於是東宫復有是賜平章既已裝潢成軸又將摹勒立石省署之南用彰寵賚而垂無窮焉間以語戶部尚書臣貢師泰師泰竊惟帝王之道由周孔而後獨孟軻氏得其傳然其論政治之要不過兩言而止蓋有德在位則足以正君善俗有才在職則足以修政立事昔者商宗任官必曰惟其賢惟其能成王立政必曰推賢讓能賢能有益於國家也尚矣今皇太子賜書藩翰重臣而首及於此其有得於三代致治之要哉臣師泰嘗授經宣文進對講席甚幸獲睹殿下問學緝熙之功章翰飛動之勢敷張盛美實臣之職謹再拜稽首贊曰皇帝建極統正萬方明離主震遹為元良育德儲宫潛心端本聖學緝熙造道之閫寶章揮灑爰及燕清昭回雲漢煥爛日星鳳翥鸞鶱龍驤虎躍力斡萬鈞方凝圓爍曰職曰位任能與賢徵諸孟氏錫我良臣羲畫禹疇殷盤周鼎並美齊休以教以警臣拜稽首臣實戅愚敢不敬服以昌令謨伐石刻文樹之南土匪臣是私式訓來者川流於海嶽峙於天百靈衛呵於萬斯年皇太子賜書贊右𢎞化二字出周官三孤二公之辭皇太子書以賜福建行中書省平章政事臣諤勒哲特穆爾者也平章以世胄起家厯踐中外至正二十年由同知淮南行樞密院事擢任兹省既陛辭東宫遂有是賜蓋化者天地之用𢎞者張而大之也日月星辰之照臨雷霆風雨之鼓潤山川河嶽之流峙隂陽寒暑之往來其為化也大矣然其休咎徵驗未嘗不與人事得失相關是以有天下者既立三公論道於其前復立三孤寅亮於其後凡所以盡燮理之道成輔相之功者至哉今皇太子賜書藩屏而首及於此其有見於古先聖王倚注大臣之深意乎平章尚思懋昭明德勉建勳業使海邦廓清民物鬯遂則鋒車趣召還秉國鈞當不逺矣至若揮灑飛動實出天造又非臣愚陋之所敢形容也普平章夀容贊至正二十年秋福建行中書省平章政事普公兼善以鎮南服功詔賜御衣上尊加銀青榮祿大夫位第一用便宜如故事賔客僚佐圖公象以為夀宣城貢某贊曰王封之胄列仙之儒器𢎞德克神明內腴瑩如拱璧粲若明珠燁然出匣之干將亭然照水之芙蕖白玉橫帶黃金刻符停鸞峙鵠擁笏垂魚出則膺申吕方虎之寄入則陳皋夔稷契之謨故能為邦家柱石弼輔範模吁雲臺麟閣尚徵斯圖袁伯長學士畫象贊東海之濵有偉其人玉雪襟度風流搢紳衆鑿以巧我坦以真圭璋聞望黼黻絲綸垂魚秉笏盛服在身山明水清皎乎其神小象自贊峩冠盛服曳玉垂紳紀綱法度森乎在身敢不肅恭以欺明神孟天暐御史小象贊服之華也見乎外德之華也本乎內內外交稱庶免于戾惟其有之克共大祭右豸冠出則秉笏垂紳處則野服葛巾人知出而仕之為榮又安知處之樂為真也風流邱壑庶幾斯人右燕居僧仲謙運使小象贊豸冠之峩佩玉之儺于郊于廟其儀孔嘉明神在天百辟在位儼立執圭承我大祀右豸冠儀觀昂昂意氣堂堂繡衣朱襮燁其有光昔既見之今幸同事我贊爾真維德之幾右燕居阿勒坦布哈御史豸冠贊冠之豸也將以觸邪服之度也將以戒奢豈徒為躬之華庶幾為德之嘉律之於身格之於神規之於人質而能文剛而有仁斯其所以宜於郊廟朝廷也耶胡惠卿畫象贊貌古而莊氣和而剛居家庭而行有常混閭市而名不彰然亦嘗分殽胾於中書授几杖於黃堂明珠在淵燁然有光我贊爾真益夀而康俊用章畫象贊至正十九年冬十月豫以使事道出會稽留止大能仁俊公方丈者信宿其徒惟平間以公畫像示豫為之贊曰有偉其身有燁其神以如是觀孰幻孰真脫屣跏趺若長往而忘世揮麈談笑實與物以皆春既質而文亦肅而溫海天孤月野水閒雲欣笑隱畫象贊飛錫於天竺之峰面壁於龍翔之宫蓋萬派一源之正學而千山百海之竒胸也衆以性求我以相見寶月髙懸華雲普現此所以㸃維摩於上方賜大中於便殿也耶耶溪和尚畫象贊風清月明山峙淵沈人見其貌我識其心慶大夫書了堂二字因為之贊川回山峙卓為竒文力挽河漢一筆萬鈞題玉髓經後集玉髓經世傳張子微受之蔡元定復為之發揮其於卜葬定宅之法固為詳矣然其浩博而精深非専門地理者未易觀也今李君仁齊撮其微㫖著為圖經後集若干卷使夫孝子仁人欲掩其親者一覽而山川靈異隂陽向背可指諸掌斯亦奇矣夫卜宅之法莫善於郭氏葬書而莫精於曾陽氏之學欲知郭書必求之曾陽欲知曾陽必求之玉髓欲求之玉髓其又先之以此集乎或疑玉髓出北巖非元定書也雖然紫陽先生固嘗篤信而辨論之亦豈無所見哉至正十九年十一月晦日題於甬東慈濟寺之竹忩題曹士𢎞先生哀辭後右中朝諸老為廬陵曹士𢎞先生所作傳志詩文一卷凡若干篇而范學士哀辭實當卷首間從其子友仁得而觀之伏讀再三不勝悲感先生在大德丁未間為廣德陳陽村巡檢以史學名家陳陽去師泰家才二十里許先太父祕書府君亦以古學自任年七十餘猶著述不倦四方之士若隆山牟仁父父子四明戴帥初東平王岱宗日集館中相與評論古今治亂得失人物上下有所疑難輒片紙細書往來是正不絶久之積成大軸時先生最號該博某方垂髫恆立侍傍至今尚能記之近年來江東西重罹兵革某家所存大軸皆為煨燼無復存者而先生廬陵手澤意者亦不復完矣今觀此卷豈獨可見曹貢三世通家之好而中朝一時文物之盛從可徵焉嗚呼先生之學若此終不得一施於用固可深慨然既沒世而名愈彰子孫猶能傳其家學以有祿位天於斯文亦厚矣哉題旅獒圖此圖一人執絙牽大犬一人從以墨幟一人函書最後其狀貌衣服大類西域人豈取武王時西旅獻獒事以為之乎不然今日流沙萬里之外炎荒百蠻之國莫不臣妾以獻其所有南北之人見聞習矣何以圖為然因圖以觀召公之書亦豈無所警乎題宋御史汪自强誥後右宋誥命一通開慶元年監登聞鼓院汪公自强拜監察御史之所受也其家失之久矣元至正十二年鄉兵起官軍持此誥易飲酒家士人洪如晦得之以歸御史諸孫某某以授其子汝懋汝懋謹裝潢為卷求題於某竊惟御史公清風徑節聳動朝寧不惟能使權姦巨卿有所警懼而朝廷宗社賴以奠安嗚呼賢者有益於世如此哉是誥失而再得汪氏其復興乎汝懋善保之題程以文遺曹子學書後禮部員外郎程君以文博洽能文章大名曹子學精於篆隸二人在京師日相往來甚厚此卷凡三帖皆以文求書於子學者也以文不惟能文章尤善隸今辭意勤懇謙退若此則其不以自得為足而以所能下人固非小知自私者所可企及矣然非子學書法果有以度越諸君者以文其肯推敬若是耶以文已矣子學其尚保之庶幾他日子孫知程曹有通家之好焉題黃太史上京詩稿後黃太史文名天下而上京道中諸詩尤為傑作葛邏祿易之得其稿以傳且謁諸君為之題其知太史亦深矣易之尚善保之題宇文子貞為郁文海作龍溪山房記後豫以使事過會稽宿大能仁之方丈閩僧郁上人間示宇文君所著龍溪山房記龍溪為臨漳壯縣山房則上人舊居也上人久遊江湖間所至輒以是揭諸座隅其惓惓不忘鄉井之意厚矣昔吾朱夫子在武夷嘗扁其齊曰紫陽上人既有以見於斯而宇文之記又足以發之羇孤牢落之際觀此庶足自慰矣題新安張吳先世碑後宋新安張珏嘗代異母弟逮獄以慰母心天下聞而義之韓蘄王因辟為幕府朱文公嘗以四君子並稱之至其曾孫桂有隱德事繼母復以孝稱江東按察使盧公摯江浙參政燕公楠咸論薦之卒不就學士豫章揭公奚斯銘其墓甚悉不幸毁於兵桂之孫吳避遷錢唐能誦其詞請書於禮部程君以文將重識石間攜以示豫竊論世之人以孝弟稱者間有之矣求其子孫能繼者蓋鮮況厯六七世繼二三百年猶繩繩不絶耶噫吳亦賢矣哉題崔元亨送項太醫敘後大都崇真宫吳大宗師有弟子曰項子虛氏善轉鉛汞為丹砂服之可長生不死劑其餘猶能起人於垂盡其術亦微矣子虛既化去得其傳者蓋鮮豫至錢唐見曹樞密崔照磨所序項元齊切脉治病往往神效問之則子虛之仲弟也嗚呼術得其傳其施於人者猶若是況修己治人之道哉題李咸熙畫李成畫散在天下不少矣既從瘞於宋之諸陵又盡購於其孫尹開封且不幸而焚蕩於水火之餘意者所遺無幾此畫松柏二幅墨色蒼古筆力遒徑上又有端平諸老題識其為神品無疑者第始書成諱而更字咸熙豈即開封所購本而流落人間耶綏安萬夫長察罕溫都爾侯偶得之於兵戈離亂之際信其為連城夜光之寶矣然初本四幅已失其二他日合浦之珠延平之劍豈無會合之期侯其善護之以俟其至題息軒記後天台張本仁名其軒曰息或曰善哉人不可以不息或曰學可息乎本仁間以二者之言質於豫豫曰天以不息而成化功聖人以不息而成治功君子固貴乎不息矣然勞於晝者必息於夜發於春者必息於冬學而不息則學無成仕而不息則老無所止所以君子尤貴乎息也夫明必有息乃可以不息惟不息斯能有息息者育德之基不息進德之本合內外之道也本仁之名軒其庶幾知所擇乎跋五輅圖右五輅圖蓋宣和舊本而柯君九思所藏也五輅者玉金象革木玉輅以祀金輅以封同姓象輅以封異姓革輅以封四衛木輅以封蕃國而鹵簿實兼之其樊纓采就旗麾等衰之數各不同焉然或以多為貴或以少為貴或尚其質或取其文其序不同其色亦異曰先曰次曰綴議禮者之說往往不一此圖所載以象輅居玉輅之後金輅之前未知何所據也然其運意精密設色工緻毫分縷析悉中軌度非妙奪天巧者能造是耶熙暘得此他日上之太常獻之禮官庶將備一代制作之盛典豈徒為好事者珍玩已哉熙暘其尚寶之皇太子賜書跋皇太子恆以燕清之暇怡神翰墨遇得意輒賜中外名臣而福建行中書省右丞臣恩寧溥得八字曰文行忠信為善最樂夫文行忠信孔子教人之法為善最樂漢東平王蒼處家之道也文以廣知行以檢身忠信以立本教雖有四實心學也善行於外樂存乎中亦心學也天下萬事萬物之理皆原於心心一正則施之於家而孝友雍睦施之於朝廷而上下翕和施之於天下而謳歌鼓舞海內稱慶今皇太子揮灑寶章首及於此其真有得於聖賢心學之妙乎右丞世篤忠貞為時良翰是書也豈徒羲畫禹疇足為世守之榮庶幾朝觀夕覩超然有以廓其澄清之志云跋王國寶傳後右沂水王君國寶傳一道撰於越士潘君嚞而翰林承㫖歐陽先生江浙行省參政周伯溫父所題跋也國寶死三十二年矣其子彥琬來為江浙行省左右司都事余時適參政末見其文學議論英發有過人者固已竊計其所從來逺矣及讀是傳乃知國寶隂德之施甚逺而彥琬能以才行稱於人人為不偶然國寶孝義出於天性其行於家則重闈怡愈而子弟恭慎其施於親䣊則生有養而死有歸訟者息而怨者平其推於人則僞鏹焚而紿誤絶私券毁而逋負免其動於鬼神則斷海寧之妖祠訴新昌之滯魄他如去曹江撅栽以便往來之舟論杭市鈔法以權輕重之直凡有利於民而益於官者亦莫不忘其力之弱而快於行之勇也嗚呼國寶孝義若此卒止於征商小職而不得一伸其用亦可悲矣昔者人或以治獄髙大門閭或以還帶致位宰輔或以蠲舍緡而世祿不絶或以平糴價而見禮靈神一念之發通於幽明一行之善格於上下況國寶行於家施於親推於人動於鬼神者無往而非隂德之所致三槐之植君家故事吾將於是乎徵跋韓致用五雲輯録卷後會稽韓君致用間持諸公所著五雲書屋詩文一卷來徵余言按韓氏自魏國忠獻王在宋天聖中中進士第二方唱名太史奏五色雲見其後竟以勳業致位將相至四世孫祕閣公扈駕南來居越之五雲門故其輯録題曰五雲其後子孫往往多以是稱號蓋不忘所自也今致用實魏國之十世孫其築屋讀書亦名之曰五雲而中書參議危君太朴翰林學士張君仲舉各為之記序凡所以論次韓氏德澤及厯世藏書之盛可謂詳且備矣然其所謂五雲者皆即祕閣居里之名而無一辭及於魏國唱名之瑞豈二君姑舉其近而遺其逺也耶雖然五雲為屋扁也屋為書藏也知藏而不知讀知讀而不知好知好而不知樂則六經諸史亦土苴耳其能超然卓見於陳言之表以克造夫聖賢之域乎致用其益勉之跋王憲使朱縣尹倡和詩卷我國家統一天下首立臺憲以綱紀百辟大抵先教化而後刑政敦儒雅而鄙吏術尚寬厚而去文深故當時御史部使者多老成文學之士豫家江東方七八嵗時見牧庵姚公疏齊盧公按治之暇輒率郡士大夫攜酒殽歌妓出遊敬亭華陽諸山或乘小舟直抵湖上踰旬不返二公固不以為嫌而人亦不以此議二公也其流風餘韻至今江東人能言之自後綱紀日密嫌疑頓起甚至出入扃戶又甚則謝絶賔吏久之遂習為常矣今觀繼學王公與縣尹朱子中在宣城時酬倡詩卷乃知王之標致猶不減於姚盧也吁世復有斯人哉至正二十年冬十一月乙亥貢某題於三山香嚴寺之東軒跋鄭希道拙存稿序文江右鄭希道兄弟居匡廬之下彭蠡之濵讀書著文怡然自得及出而施諸政事皆卓卓有過人者希道既沒十餘年其子間以諸名公所作拙存稿序跋來求題豫雖未獲盡覽拙存之著而得觀歐陽揭黃杜危周張諸公詩文或喻以連璧或比之雙鳳或謂其得山川清淑之氣或謂其得茂叔元晦之微而猶惜其陸沈下寮不得置諸館閣以盡發其所藴於是益知其才之果異於人矣嗟乎兄弟競秀一時在古且為難能況子孫又能以家學繼美於後哉跋宣和御書夫以帝王御崇髙之極而能樂山林淡泊之言又為之親灑宸翰以賜志合志合其賢矣哉為子孫者宜世保之跋毛貞士傳君子之所以立身行已求無愧於心而已一有愧於心雖千駟萬鍾視之猶當如草芥焉今之人或有小利僅若豪芒輒昧昧焉易所守以欺夫人甚者吮癰䑛痔無所不為又甚者棄妻子背父母以僥一得卒至於僨身敗事而後已可哀也今貞士不貨殖不要功不苟得凡其所為不惟無愧於己又將以愧天下之欺人者吁亦賢矣跋阮孝子傳天台阮祖立倉卒舁父避灾菽水致養能得其親之歡心視刳肝刲股者雖無驚世駭俗之行然斯其所以為孝也跋汪節婦傳汪節婦四明元寅先生仲女也年二十歸同里故宋提刑陳曾孫紹庭甫四年紹庭亡無子鞠從子鑄為嗣教之有成守志堅確益大陳緒年幾七十乃終嗚呼汪於婦道母儀皆當旌表而有司卒不得上聞其子鑄徒取士大夫歌詩以自慰亦可悲矣豫嘗備員太史見儀曹所具賢母節婦事狀多出中州而大江以南百無一二豈法故有輕重哉其逺近詳略不同者亦理勢使然也豫於是重有感焉跋夏節婦傳黃巖夏氏女年二十一嫁里人黃侃八年而侃亡治喪起冢晝夜哀號不絶教其子三人克自樹立撫其庶二人皆若已出處宗族以義接姻戚以禮婚喪或有不給者輒有所遺有司上其事既旌異之其甥江浙行省理問邱楠又求經略李君為之傳嗚呼江南視中州為益逺賢母節婦少聞於朝今夏夫人節行獨能顯著若此者亦何幸歟跋趙書韋詩世稱韋詩出陶趙書出王或謂自是蘇州詩吳興書信然否當有辨之者跋松雪招隱詞王右軍果止於善書而已耶人於趙魏公亦云今觀所書招隱詞為之慨歎跋李則平憲副所藏東坡墨蹟三卷東坡自言吾文如萬斛泉源不擇地皆可出識者謂豈獨文為然其書法之妙亦類是也此帖蓋少年所書已飄逸俊快如神駒健鵠不可控搏況海上歸來之後乎右蘇文忠公寄陳氏三帖宋諸賢題跋者凡三十人蓋已極盛美之形容矣則平憲副偶得於兵戈擾攘之餘而徴求贊詠猶且不已吁賢人君子手澤為天下後世重果如是哉豫客三山城西之香嚴寺嵗莫風雨憲副則平寄示東坡先生墨蹟二帖其一帖南康八境圖一帖記石墨八境婉麗圓熟頗類二王以年月考之蓋先生壯嵗所書也石墨雖無年月可考筆勢飛動融化又非八境所可比然自謂目昏作小字殊難意必老年所書也一日之間盡覩珍賞豈偶然哉三復之餘謹識於後跋徐明初所藏文靖公四詩右集紫極宫追懷吳鸞稍久出關謁孺子墓道由淡臺而歸古詩一章及次韻春思古詩三章先君文靖公提學江西時手書也今蓄於廣德主簿徐君明初家明初由江西之官江東道經南湖留止家孰出以示余捧玩手澤如新而音容不復可見矣抑先君謁君家墓詩云岧嶤漢士墳弔酹涕汍瀾勳業豈不榮名義夙所難孺子名義著聞而勳業不少槩見者不遇時也際休明之景運抗前人之名義而發揮於勳業安知不在明初乎因涕泣而書其後既以勉明初且以識余心之悲也至元後戊寅六月二十又五日識跋程氏遺安義學本末新安程致和既立義學以教其宗族子弟與凡鄉里之願學者又割田五百畝為義廩以資嫁娶喪葬其用心亦仁矣哉有司方上其事值城陷事廢致和亦走建寧雖倉皇流離而恤姻贍族之心未嘗不慨然思有以復之也夫新安程氏去居河南而有明道伊川二先生先生道南而有紫陽朱夫子今致和於二程則為逺裔於朱氏則為外戚其道德仁義之訓蓋有自來矣嗚呼志之所存天必相之國家治平有日豫雖老尚當拭目盛事跋李經略與裴檢校書後至正二十年春三月江西賊鄧客冥陷延平閏五月圍建寧上下阻絶諸將縮恧不進經略使李公發兵援之檢校裴君直慨然曰顔經略在圍幾一月矣此而不自效雖生何為遂請行得兵數百直抵南鄉距建城半舍而止李公聞之且喜且愳急遣吏賞勞令孤軍無深入墮賊計且曰尤當以古人自任裴君得書感激佩服歸而裝潢成卷持以示豫豫惟唐蔡州之役丞相裴度親往視師帥臣李訴實受軍制今李公統諸將裴君乃承委寄雖其職分前後小大不同而奮義赴功無愧古人則一也保而藏之豈徒為裴氏子孫之榮後之覽者亦將感動而有所興起焉跋張氏承訓堂記後射干生於泰華髙不踰尺而能臨百仞之淵蒙鳩巢於苕葦編羽結髮而終不免於破折無他其所處者異也參政危大朴記道亨張君承訓之堂謂其父直卿之教之也既使不得就文法之習而又日進之以道德仁義之言道亨卒能明經中第厯官清要以顯其身以光其前人吁直卿固為能處其子而道亨亦知所自處者哉承訓名堂信不虛矣年月日跋跋當塗陳氏夀詩後昔吾祖母廣陵夫人李氏年九十先君子文靖公辭禁直自京師歸作愛日軒侍奉於湖山勝處當時秦郵龔公子敬教授宣城一日肩輿至湖上為作愛日軒記有云惟親年且喜且懼愛莫大於愛親而事親之日欲其長也其愛當何如人皆可以長年惟其得之天者厚而所值之時承平若是則享用豈惟親哉將人子之分願亦無不滿者矣子敬此言天下之名言也當塗陳氏兄弟事親色養優享素封之樂元統乙亥母夫人適及八十正月望日然燈張樂稱夀堂上融融如也是年溧水劉君兼美假館當塗偕弟元鼎作詩詠歌之今又四年陳母年八十又四矣人於富貴利達皆可以力致其不可以力致者有二焉曰夀曰賢子孫也然人之生美惡厚薄稟於天惟善可以自致善而獲報則亦天也今陳母之夀如此子孫之賢又如此殆所謂稟之厚美而積善之獲報者哉兼美徴豫識其後豫念先君子奉親之樂如前所云而豫母寧國郡太夫人今年亦七十有二矣板輿輕軒在春暉駘蕩中豫與陳氏兄弟同此樂也至元己卯二月八日宣城貢師泰謹識跋賽音迪延齊氏家傳故贈咸陽忠惠王賽音迪延齊沙木斯鼎厯事太祖憲宗世祖遂能以功業顯著西南萬里之外既沒而廟食猶不絶子孫亦建侯專閫布滿中外非其厚德之積能爾乎雖然積德在於前人培埴實由後嗣為王子孫者其益懋勉以光昭先業毋徒抱遺牒以夸於人曰吾咸陽王諸孫也跋曾克謙入閩記後昔唐天寶之亂杜少陵入蜀李太白走江南雖當間關危苦必有因而後往不然其不至於饑寒流離者幾希今曾君克謙之入閩也果有所因乎無所因而幸以占畢給食學官方且優游道義為文以自解非真有所見者能如是乎余於克謙重有感矣跋髙惟恭字說詩不云乎溫溫恭人維德之基又不云乎溫恭朝夕執事有恪蓋恭者敬之發也敬存乎內則恭見乎外恭之為德大矣施之於身而睟面盎背施之於家而慈孝溫仁施之於鄉䣊於朝廷而彬彬禮讓小大翕和故中庸論至德淵微之極功不過曰篤恭天下平而已矣惟恭能誦詩之言服中庸之訓庶幾其日進於道乎跋江以敬登樓賦詩一變而為騷再變而為賦此賦音節清楚絶類騷體第傷今思古不無沈鬱感慨豈猶有王仲宣之遺愴歟不然其將慕楚大夫之忠憤激烈者矣跋鄭德和所藏閣本智永千文宣文閣所刻智永干文七十三行七百二十四字號稱精妙必得㫖乃敢摹印既摹印必得㫖乃敢分賜然非世戚重臣及左右近侍不與也臣某授經宣閣參贊經筵幾四三年所得僅一二其貴重可知矣兵亂以來又復散失今觀參政鄭旻所藏寧無慨然遂書而歸之跋松泉圖天台潘孟翔客京師間圖其父忠軒讀書之地曰松泉舊隱求大夫士歌詩以歸為夀焉豫惟厯霜雪閲嵗年不改其操者松也出乎巖谷放乎江海混混不息者泉也松類夫君子之貞泉類夫君子之潔隱居以松泉名其將有取於斯與跋陶淵明圖自司馬氏之東也一時勳名氣節之偉風流韻度之雅蓋不可僂數也然人物獨稱陶淵明文章獨稱歸去來詞往往好事者既詠歌以致其敬慕復圖之以為美觀何哉嗚呼三公九卿豈重於一令千言萬語豈多於一詞也耶跋杜孝子傳人子之於其親雖孝如曾閔亦常事爾然千百世之下求如曾閔者復幾人哉黃巖杜誼能以孝通神明而子孫又能以孝揚先德亦已賢矣跋白沙送别聯句豫奉詔總漕閩南道過四明承天台鄭蒙泉韓諫行毛彛仲燕山馬元德會稽王好問括蒼王叔雨四明舒汝臨僧朽石上虞徐季章華隂楊志中諸君欵餞至白沙猶不忍别遂留宿舟中飲酒聯詩明日乃去何真情之甚厚也豫時以醉卧及覺則詩已成矣故不及聯他日復遲豫東海之上握手道舊臨風把酒亦庶見吾黨交義非世俗所能知也因識其後時門生劉中亦侍坐焉至正十九年冬十二月六日識跋諸公所遺馬編修書札師泰於歐陽先生有師生之分於黃學士有兄弟之義於申屠待制有交承之契而張承㫖周太常危參政宇文僉事則又朋友之厚愛者也是皆天下名賢碩師易之悉與之游書問往復繾綣若不忍一日相忘者斯固諸公謙撝下士盛德然非易之才行超卓足以感動乎人能得此哉今歐黃宇文已物故而子迪仲舉年踰八十又皆休致伯溫與某為同年亦將七十矣獨太朴方為朝廷柄用覽觀斯卷不勝感慨跋子山公書陸喜五論瑩喜皆吳士也喜論瑩四五固當矣獨不知喜自謂在第幾爾子山之書其果有所見乎跋王經厯小傳士大夫不幸而遭世變或死或不死蓋其事有不同志有所在也彥芳砥節厲行卒不為所汙亦難矣哉跋楊大同遺姪書夫見理明則其言正其行決金陵楊大同遇難死義蓋已見於遺敬修書矣笑堂偈并序杭之聖安寺主僧公歌藏卜西畨人也心空而行超善以其學教諸子弟間為豫言公歌藏卜華言普喜人則笑吾笑以名堂其亦有知我所以笑者乎豫笑答曰昔莊生以開口而笑為達惠逺以三笑為樂而後之人又有付萬事於一笑者笑固多端矣然皆不若不笑之為愈也笑堂其以笑為不笑乎其以不笑為笑乎豫不得而知之遂為偈曰我觀人世事無一不可笑大慝藏機關小智閃燐爝欲火熱肺肝有若原野燎一旦受苦厄顛頓發狂叫所賴慈悲力普賜光明照遂使迷途者解脫無老少閉門一炷香靈臺湛空妙如走暗方出如睡夢方覺而師於是時歡喜見容貌跏趺笑堂中即此為衆教祭程以文維至正十九年嵗次己亥秋八月辛酉朔越二十四日甲申中書戶部尚書貢師泰中書户部主事李希顔翰林國史院編修官錢用壬諸路寶鈔提舉劉天錫浙江等處行樞密院照磨崔永泰等謹以清酒少牢致祭於中書禮部員外郎程君以文之墓曰嗚呼公之行可以追配古人公之德可以度越諸君類范黃之孤峻得虞揭之雅馴教分六館制掌北門衣繡峨鐵儀曹是掄揚帆使海益張令聞飯止一盂而心常自裕囊無一錢而口不言貧生於升平而客居半世死於離亂而克全其身嗚呼方今作者不滿六七公居二三孰敢第一公既死矣孰與儔匹海濶風髙愴焉自失祭多仲客尚書文嗚呼余昔在京師子方魁天下聲名赫然傾動朝野及余還浙江子亦以使至布宣德音克勤王事今余治粟海閩而子又實來裴回握手情溢乎辭念别離之契濶每太息而歔欷曾不數日竟殞危疾倉皇莫救恍焉如失子之耿介勇足以進德子之俊明才足以任劇故雖以十年之近居六卿之職生也人不以為過死也人皆以為惜嗚呼海天茫茫魂歸帝鄉招之不來我心永傷殽登於俎酒實於觴撫棺泣奠庶幾來享祭部吏虞舜咨文嗚呼舜咨果止是耶汝德之粹圭璧無瑕汝質之茂蘭蕙方葩執矩矱以求方正引繩墨以糾偏邪事雖微而必敬志愈厲而靡他不曲以阿不矯以夸不懦以恧不僭以差左右就辟清苦益加汝既豫信豫亦汝嘉何山裂之夢猶近而大還之遊已遐嗚呼生也無愧死也有華豫於舜咨抑又何嗟祭姜奏差文維至正二十年嵗次庚子八月乙酉朔越二十有八日壬子戶部尚書貢某謹遣部屬某等以特羊酒饌致祭於奏差姜生維顯之柩曰豫昔南來從者八人出則豫吏入則豫生其分雖殊其情實親幸相砥礪各效爾能惟曹與姜亦豫所任曹質而醇姜粹而溫何曹生之訃未幾而姜亦遽殞其身耶然曹死浯洲瘞無一金姜死三山囊無一文於是亦可見能慎其守以無負於期望之心矣嗚呼履行不虧夀夭奚論閩山浙水道阻且深旅櫬之歸尚俟承平一尊遣酹以展豫忱玩齊集卷八
