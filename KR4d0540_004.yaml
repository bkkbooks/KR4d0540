body:
  text: 玩齊集卷四元貢師泰撰七言律詩和石田馬學士殿試後韻丁卯歲學士與先君同為讀卷官在院倡和甚多此則放榜後所作韻也春風馳道入宫牆青鎖深沈引夕郎草染緑波生太液花扶紅日上披香聲名已重千金璧恩寵方隆七寶牀治世斯文今極盛九天星斗自成章送賈有恆赴潞城縣令上黨人參五葉齊郎君今日馬行西滿溪藍水魚初上繞縣青山鶯亂啼小吏報籌衙欲退長官封印手還題洛陽自古多才思好賦新詩寫赫蹄送陳太祝使江浙收禮器樂書二首天子齊明奉宗廟容臺祇飭備儀章雲雷出地雕彞鼎日月懸天畫衮裳驛騎晝停山木䕃船窗風度水花涼過家莫醉紅樓月上國回鸞欲禘嘗六月樓船泛御河太平樂譜自編摩鳯鳴嶰谷曽吹律馬出蒲梢更作歌古尺要將諸部定新聲還用四清和器成早入神庭奏人頌明時瑞應多壽庫庫子山學士上林春滿樹蒼蒼别殿新頒外國香龍虎風雲依日馭斗牛河漢列天章瀛洲敕賜黃金榜學士名髙白玉堂千載太平今有在文昌髙映紫微光崇真宫醮罷敕畫吳宗師像海日曈曨照九衢靈旌霞斾擁髙居尚方敕畫仙官像中使傳宣學士書劒氣朝寒垂白練丹光夜暖出紅蕖石壇醮罷清如水猶聽松隂起步虛贈盧醫豫章盧斌好逺遊落魄燕臺今白頭酒家不識灤都尉女子乃知韓伯休天茄結實庭户晚山藥作花籬落秋投老欲歸尋舊隱忽騎孤鶴過揚州畫馬漢家旌節渡流沙奪得戎王鐡啄騧天上白魚秋弄影月中𤣥兔夜生花九圖妙入將軍筆八駿神空阿母家獨控奚官更超絶長楸錦隊謾如霞送黎兵胡萬户南還將軍仗策去安邉詔下東南萬里天雲海旌麾趨玉帳春江鼓角載樓船黎人滿溜檳榔水蛋户齊分牡蠣田遙想軍中無一事坐驅千騎獵平川送陶翁歸豫章秋雨初晴䆉稏香蟹紅魚白憶江鄉十年客枕雞聲月千里歸帆雁背霜入室親朋羅酒饌上堂兒女挽衣裳逢人莫說京華事漢署今無白髮郎費秀才進所著春秋歸雲滿青山雪滿頭一生辛苦著春秋抱書不向公車獻遣使須煩謁者求翁子行年當富貴虞卿終老豈窮愁玉杯繁露應非舊更請先生為校讐送壽𢎞毅應奉赴興國路經歷院門深鎖落松花東接蓬萊小海斜絳蠟夜深催視草紫泥春早聽宣麻鳯凰池上人辭直鴻雁江南客過家幕府秋來清似水吟詩應對白鷗沙次泗安光上人韻是日聞有供奉之除水氣朝寒生白烟寺前楊栁繫吳船佛燈紅映流蘇座僧榻青裁海艾氊書報誤叨金馬召㕑空應愧木魚懸定知别後相思處楓葉蘆花宛句邉天壽節日大明宫朝罷口占柬張約中博士金門珠箔轉回廊文武分班有舊章花露重沾腰珮濕松風輕度鬢絲涼仗隨騏驥通朝貢杯進䕫龍祝壽康最喜太常張博士清標如雪照鵷行江浙獻嘉禾賀丞相朵公玉燭金穰屬化釣九農和氣洽深仁靈根獨占山河秀顆粒先回宇宙春天上畫圖方入貢江南簫鼓正迎神作書願紀成周治慚愧無才備史臣南城試院和張仲舉博士紅燭搖光坐夜分學宫魚鑰鎖重門歸心已逐南湖雁壯志空慚北海鯤傍几香添霜漸冷隔簾燈過月微昏校文歸向西曹日㑹送䕫龍謁至尊送林希元應奉赴上虞縣尹居庸雪消河水深南行賴有買舟金相如多病因能賦東野長貧為苦吟已許姓名辭鳯闕更傳聲價到雞林白頭作縣臨東海誰識先生去住心送余廷季赴海東僉憲緑髮相從白髮生都門握手倍多情論交豈少新朋友對酒何如老弟兄玉節繡衣江上騎苑花宫栁日邉鶯使星一夜移東海定遣文章到兩京試院和周伯溫待制韻羣仙盛集瀛洲館丹鼎芙蓉徹夜開斗下璿魁聮外府坐間珠唾落中台黃封酒醉賔筵散綘蠟紗籠佩馬回禮樂光華當此日九重側席正需才送蘇伯修侍郎赴淮東亷使黃金臺上受新恩還向長楊謁至尊行殿曉寒頒王節驛亭春暖簇朱轓青蒲葉短烟波濶黃栁枝長雪水渾别後新詩好相寄廣陵冠蓋接都門送吏部郎中王可表出守棣州别殿春深奏選歸雙旌新賜出王畿齊東山水開船近天上星辰聽履稀竹馬總來迎使節金魚猶似掛朝衣遙知最政還車日定草封章謁紫微題張真人父一間堂真人騎鶴下蓬萊詔許諸孫次第來玉佩春隨黃道轉緑章夜並紫雲開香分别殿傳中使書賜名山映上台還向仙都拜家慶碧桃千樹擁霞杯送周舍人赴山南宣慰司照磨紫衣袖窄金圍重花底傳呼出殿遲欲向新年開幕府還思舊日進朝儀雪寒淮水魚方出歲晚江陵橘尚垂料得中朝盡知已重來應是不多時送篤敬夫赴南臺御史御街初日栁梢紅豸角新冠出禁中天上使華恩詔密江南民瘼奏書通九霄風送孤飛鶚萬里雲隨一駒驄欲把真心酬聖主青松多種石臺東題四川張萬户夫人貞節卷白帝樓前巷陌深將軍旌斾正沈沈玉簫聲斷孤鸞曲緑綺絃空别鶴吟豈是人生輕一羽要知妾死重千金春風冢上連枝樹只有韓憑㑹此心贈仙居散人青山四面玉嵯峨中有山人隱薜蘿細雨間門芳草滿微風深澗落花多童窺丹竈時驚鶴客寫黃庭欲換鵝我亦平生愛疏散春來應許謝朝珂送道士王仲逺還江州𤣥妙觀就柬李子威太守羽節參差佩陸離蓬萊坊裏日偏遲花邉奏簡雙鸞至松下攜琴一鶴隨白日常過燕市飯青春忽動庾樓思江州太守吾知己為說年來鬢已絲送大都路陳學録使往江浙造祭器雅樂世祖投戈事籩豆素王宫殿在南城百年禮樂當今日一代文華寄此行潞水朝寒初過雁浙江春晚尚啼鶯還鄉莫為蓴鱸遲祀典由來重兩京送吕師賢赴山北憲使白月微沈曙色紅憐君書劒别匆匆臺髙日望羣烏北海濶雲隨一鶴東俗古尚遺箕子教官清還慕伯夷風遙知六轡巡行處馬上看山日日同送東流葉縣尹江流東下縣南遷一簇人烟野岸邉荻笋洲青鷗鳥狎楊花浪白鱭魚鮮印來聚吏排衙鼓社到隨民出俸錢應是繡衣行部處攔街齊頌長官賢壽吳宗師帝遣真仙位上卿五城迢遞接蓬瀛雲浮紫氣旌幢潤日射紅光劒佩明池館晝間教鶴舞江湖歲晚結鷗盟軒轅曾訪長生術應信崆峒有廣成贈毛李祥還江南白面書生江漢客幾年琴劒落京華聞雞曾度居庸雪立馬還看上苑花楊栁枝長方去國蘼蕪葉短已還家遙知綵袖娛親處酒暈微生兩臉霞送臺典張子誠辟山北憲史芙蓉幕府清如水愛子新來意氣多天近烏臺依執法風清黃閣聽鳴珂燕山北望千峰盡遼海東回一騎過刀筆曾為漢丞相起家應不愧蕭何送安南使者黎括省之四海光華明主德萬方奔走逺臣心來依北斗朝閶闔歸逐南流過鬱林椰子酒酣歌踏踏刺桐花落馬駸駸遙知下國郊迎日首啓金函播玉音送舒亦誠南歸芳草生庭履跡稀裳梨花落燕交飛題詩忽報客將去出户却知春已歸天上雲開黃鵠健江南水長白魚肥人生最是閒中樂早晚相從賦式微送黃子中南還雪風吹寒春尚遲暗黃恰上楊栁枝東門立馬旋沽酒南浦停舟還賦詩去路間關須約伴到家歡喜總忘疲相如自是多才思未必閒居兩鬢絲廣微天師祈雪有應詩以美之九枝鐙照碧壇空龍虎旗髙滿殿風緑簡夜深朝玉陛素幢春淺拂珠宫一天凍色星河合萬里冰華陸海同明日內家應錫宴綵符爭取綴叉蟲送王彬叔赴淮西憲史黃金築臺髙嵯峨抱犢憐君日日過丹鳯銜書辭冀闕白魚供酒過淮河京華逺去交遊少幕府新來贊畫多料得聲名從此起分司行處聽民歌送連子竒歸隱贑州薊門風冷白鵝來萬里孤舟一日開去路定過彭澤縣到家重上鬱孤臺煮茶林下收黃葉珮釣磯邉掃緑苔太史明朝占處士少微依舊傍三台送馬叔敬赴江西醫學提舉栁花飛盡緑隂多萬里歸船發御河自嘆官閒無客到却憐君去有誰過丹成海上收瑤草酒熟江南醉碧荷何日定將醫國手為民談笑起沈痾送黃季亨赴永嘉松山巡檢萬里船開直到門江南楊栁雪紛紛馬前士卒爭誇武坐上將軍喜論文夜月村深宜紡績春風海熟稱耕耘舊時逸少曽遊處緑水青山帶夕曛題河間榮溥孝義堂溥嘗事哈克繖丞相既被罪衆皆散溥獨收尸以葬後又白其寃得復封爵今溥官亦至四品云丞相門前客如市一落陷阱烟塵空解衣哭尸壯士志吞炭報主前人風氣摧青山作平地精貫白日成長虹當時富貴不復見惟有節義垂無窮上都咱瑪大燕紫雲扶日上璇題萬騎來朝隊仗齊織翠轡長攢孔雀鏤金鞍重嵌文犀行迎御輦爭先避立近天墀不敢嘶十二街頭人聚看傳言丞相過沙堤棕閭别殿擁仙曹寶蓋沈沈御座髙丹鳯銜珠裝騕裊玉龍蟠甕注葡萄百年典禮威儀盛一代衣冠意氣豪中使傳宣捲珠箔日華偏照鬱金袍卿雲弄彩日重暉一色金沙接翠微野韭露肥黃鼠出地椒風軟白翎飛水精殿上開珠扇雲母屏中見衮衣走馬何人偏醉甚錦鞲賜得海青歸簫韶九奏南風起沙燕髙低撲繡簾醽緑酒多杯迭進鷓鴣香少火重添舊分宫錦緣衣褶新賜奩珠簇帽簷日午大官供異味金盤更換水晶鹽清涼上國勝瑤池四海梯航燕一時豈謂朝廷誇盛大要同民物樂雍熙當筵受几存周禮拔劒論功識漢儀此日從官多獻賦何人為誦武公詩過栁河野曠山寒露易霜短榆疏栁路茫茫雨來黃潦聚成海風過白沙堆作岡驛館到時逢數騎馳車宿處錯羣羊客懷政爾無聊賴忽見南飛雁一行將干嶺病體朝來正苦寒驛程又報度將干出門莫怪山溪險到嶺不知天地寬鶴背旋風欺客帽馬頭飛雪㸃征鞍此中自是神仙境何用吹笙駕玉鸞榆林有感老夫白髮已如許山後馳驅動數年正為貧民均馬政何嫌富户倍車錢人生要在心無愧物論難齊理自然欲盡微忠報明主簡書深夜手重編送上都吳學録歸河東就試驅車直渡灤河水千里青山半月程自信文章當世用人言書劒到家榮上林久已稱司馬宣室終須召賈生料得鳯池春色滿栁隂立馬共聽鶯上京和周伯溫御史韻漢室論功誰最多封侯第一是蕭何從知將相元無種却笑神仙亦有魔映月蠧魚成脈望倚風飛燕避淘河憑䦨欲說行藏事萬里長空碧似磨挽李千户灤陽草色易黃昏忽報將軍號令新落日青山移石壘因風白野動邉塵雙弓直挫三千士一劒長先五百人太史已書忠孝節佇看髙冢卧麒麟榆林道中兩行官栁夾長隄縷縷青絲拂面齊馬上睡來渾似醉客中詩就却忘題一天煩暑都成雨百里平沙不作泥自笑微臣頻扈從年年載筆度山溪興安道中萬重山後人行路五百年前古戰場落日枌榆接雞犬秋風禾黍沒牛羊自逢治化躋堯舜誰論封疆過漢唐慚愧小臣無補報清時白髮許徜徉寄王魯川推官公庭草緑訟聲稀時見雙雙蛺蝶飛曹吏盡隨衙鼓散理官獨抱獄書歸曾同太守行紅斾更與髙僧别翠微近報兩臺多辟薦殿前早晚賜朝衣送胡斯文辟南臺掾鳯凰臺下水東流潮去潮來白石頭細雨一帆人到岸清風兩袖客登樓幕開江上紅蓮日書寄山中碧樹秋珍重此行多意氣繡衣玉節定重遊送倪秀才從學維揚日日南風吹水立掛帆捶鼓下艂艭青山落酒驀到岸明月照書還倚窗文章少年誰第一才華近日子無雙綵衣在篋須頻著歲晚還時鶴過江送孟景章赴廬州判官先帝初開太禧院一時郎吏盡瓌竒名髙闕下心如鐡官到淮南鬢已絲月照寒庭空視牘雲開秋興偶成詩舊遊天上多相憶早折梅花寄所思送友人還錢唐海門飛雪湧潮頭萬里乘風起壯遊隔岸爭呼楊栁渡到家先買浙江樓才髙班馬非無賦世治蘇張似少謀賴有玉堂知已在人生何必定封侯送宋仁甫赴池州隂陽教授北風吹雪路漫漫萬里荆門客正寒自愛青山同博士也勝白髮老長安城南欵段此時别江上芙蓉到日看我亦春來買舟去九華絶頂望揚瀾贈日者范竹友溪流繞屋緑如苔箇箇琅玕手自栽徑節久宜君子號清懷近為故人開夜窗風雨驚龍起秋谷烟霞待鶴來誰似丹陽袁太守時時車騎一裴回送吳師禮赴池州直學大江西下九華東古殿重扉鎖學宫載酒滿船歌白苧題詩送客憶青楓蒲蓮歲熟倉箱實鹿豕秋肥爼豆豐遙想郡齊多暇日壺觴時在翠微中題括蒼潘照磨具慶堂十年孤客三尺劒七袠雙親萬里家江上離歌催疊雪山中壽酒酌流霞登堂白髮同鳩杖繞徑紅顔共鹿車莫羡飛丹似霜雪括蒼巖畔有松花送徐復初辟掾南臺闔閭城外望金陵千里江流一帶青桃葉風生催客渡杏花雨過别郵亭黃金臺上書方到采石磯邉酒却醒應是紀綱多暇日緑隂清晝坐閒庭芝庭為吳中靈子文賦斜䦨曲檻護春晴五色金花照眼明南極尾低凝瑞采東吳雲近結華英封書欲跨青鸞奏上壽還隨白鹿行謝氏諸郎才總俊唯應幼度最知名送醫士王安重滿天風露氣蒼蒼十二臺髙桂子香白兔夜寒分玉白紅蓮春暖長沙床上醫名就肱三折大藥功成視一方海上謾傳瓜五色長生元不逺昌陽贈寫神鏡塘上人歸京口鶴翎風動碧天涼寶月新凝百鍊霜水面散成千種影波心元只一輪光玉簮道士來空室金粟維摩現十方此去要觀真法相却收畫本過維揚别周鍊師雲臺真館二十八將已仙去真館有臺名偶同白鶴千年來故國青山萬疊起神宫有時採藥幽澗底無事種花深谷中昨夜曽攜龍虎出一壇明月滿旗風送周希元髙士歸廬山萬里江湖第一關波濤洶湧接廬山九華雲度青天闊五老峰回白日間鍊藥房中猿候火散花壇上鶴隨班何時倚棹清溪曲一笑相從覔大還送韓執中還錢唐萬里長江風浪多拂衣長别意如何獻書賈誼非無術決策揚雄自有科羽檄定逢河上捷畫船還聽越中歌何時乞取閒身去共倚湖亭醉碧荷題廬山楊宗鄉思永樓危樓百尺倚匡廬西蜀衣冠幾世居對客每傾桑落酒傳家猶有草𤣥書天寒倚柱招黃鶴日莫憑䦨數白魚萬里岷峨歸未得亂雲飛處正愁豫新蝶杏樹生香蠧化成向人飛下不勝情寒辭薄趐猶粘粉暖溢柔鬚始弄晴燕舞盤中嫌露重鶯歌扇底避風輕春閨未解南華夢乞與滕王為寫生月舫為裳鍊師賦老龍吹浪滿江湖雪兔西飛碧落孤太乙方乘蓮一葉蘂仙還倚樹三珠開窗白露沾瓊佩對酒寒光射玉壺萬頃秋波看不盡却攜靈藥上𤣥都送成誼叔應奉分院上京並呈謝敬德學士太平天子重時巡首詔詞林擢侍臣書載駝車隨劒珮射從熊館代絲綸片雲忽送摩姑雨五月方開芍藥春想得班揚才最贍龍山立馬賦詩頻柬吕仲實左丞十五年前舊供奉一官留滯越王城不因左轄輸公道誰向南州進老生史學是非從筆削人才輕重在權衡甘泉奏對歸來晚猶草封章獻治平送趙國瑞舍人赴澤州同知太行雲起亂山青馬上風吹别酒醒試論文章惟晉國還思典禮在虞廷賣刀民化耕春雨佐印官清戴曉星回首晴霄十萬里大鵬終見徙南溟送明原道赴南豐判官日華西轉萬年枝記得甘泉奏賦歸佩馬新迎州倅節緋魚舊賜從臣衣詩成江驛梅花瘦酒醒山城蕨菜肥為謝南豐舊詩友白鷗春夢繞苔磯送江西傅與礪赴廣州教授買得吳船便欲東更騎羸馬别諸公文聲久許江西盛詩律因歸海外工人羡義陽封介子客從泰畤薦揚雄五羊城下南風起茉莉花香荔子紅彭叔輿赴尼山書院長少年才學動儀曹旋賜朝衣換鵠袍萬水東歸滄海濶千崖北拱岱山髙杏花壇近蒸紅雪楷木林深漲碧濤珍重此行多令譽古來齊魯出英豪寄郡士陶公美問君生事竟何如亂石溪邉小卜居止酒久知揮白墮論詩今喜到黃初天寒門外數株栁歲晚山東一束書賴得西莊頗相近蒼頭時遣寄雙魚天寒落葉滿庭臯此夕思君正鬱陶百里青山來欵段一庭明月舞豪曹賈生未遇才因大王粲雖窮氣自髙何事相逢久相别且燒紅蠟醉春醪挽侯敬文秀才客裏青燈二十年手書細字動成編扁舟觸熱方辭館孤劒橫秋已夢仙山下數椽仍舊屋溪南半頃足新田可憐巨鹿侯芭去誰與揚雄論太𤣥采石和劉顯仁即事韻下水春生巴蜀雪上江人駕武昌船晚風天外三弄笛落日淮南一簇烟斷岸淺莎行獨鶴危磯倒樹立雙鳶綵霞義報明朝霽瑟瑟紅光萬縷懸徐州白雲天際散如衣四面青山落水涯鑿石空遺唐將廟連峰猶豎漢臣旗魚龍浪挾黃樓動牛斗星隨碧漢垂醉倚船窗問河伯濁流何日是清時冠州萬里關山鬢已華冠州橋下御河斜千門烟冷分榆火三月春寒見杏花新水聚船人趂市順風吹斾客還家莫憐書劒頻漂泊擬學東陵老種瓜送江生還江南漕河冰泮水溶溶百尺帆開五兩風戲綵歸人從海上倚門慈母問遼東漁罾荻笋灣灣緑酒斾桃花處處紅莫向江南久留滯龍山還有北來鴻送賈舍人赴廣東宣慰司照磨五月南風起舳艫番禺曽是趙王居貔貅萬竈新趨幕虎豹千門舊直廬茉莉編籬香旖旎蔞藤接屋影扶疏故人畫諾如流水報政還應得最書代祝還呈太師丞相傳宣出紫宸鶯花萬里浙江春捷書近已擒豺虎瑞紀還先慶鳯麟宇宙經綸歸聖主山河帶礪屬元臣幾回凝睇雲霄上夜夜三台拱北宸年來供奉屢遷官聖主恩同宇宙寬左部正慚疏吏牘西曹仍許進儒冠清時有道遭逢易白髮無才補報難却上船頭望江月天風吹露不勝寒新州寄馮養素彥明二都水丞天子時巡猶北駐詞臣將命許南行逺聞都水來新濟到說分司在鄆城玉節遙知連海潤金函近見報河清丈夫莫為離愁惜要把文章佐太平朱仲文編修還江西諸公分題賦詩為餞豫適同載南歸約至揚子橋分别因為賦此瓜州渡口山如浪揚子橋頭水似雲夾岸芙蕖紅旖旎滿江楊栁緑紛紜一杯酒向今朝别萬里船從此處分他日重來須艤棹莫教驚散白鷗羣邳州和劉顯臣韻吳船蕩漾一毫輕楚客飄零萬里情驟雨挾雲行斷岸亂山湧浪入孤城黃河風起鷗無侣紫塞春深雁有程莫怪仲宣多感慨朝來白髮鏡中生晚泊邳州一帶黃河百折灣下邳城外更潺湲烟迷兩岸疑無地日落中原喜有山法重鹽租嚴犯界官多魚稅倍征關白頭父老相逢處猶似圯橋授履還彭城懷古戲馬臺前擁斾旌三齊才破到彭城項王帳底猶虞舞漢祖軍中盡楚聲百二山河功自棄八千弟子勢都傾丹明閒却烏江渡長使英雄恨不平崔鎮喜邵少監至使君五月渡黃河白髮依然壯志多且喜掛帆來舊約何妨釃酒起髙歌船頭北斗五更落柁尾南風連夜過自笑驅馳成底事漪湖間却釣魚蓑髙郵夜泊薄莫秦郵聚客船孤城三面接冰田戍樓月映髙低雪墟市星搖上下天千里緑蕪分曙色萬家紅粟起炊烟南風忽起舟人便幅幅蒲帆盡北懸揚州别韓克莊僉憲紅日東生緑霧收海風吹客到揚州露分仙掌金盤冷香動瓊花玉樹秋使者乘驄開大府仙人騎鶴醉髙樓朝來别我垂楊岸珂佩如雲簇水頭婁家港祠神回寄元臣僉憲子約監郡焚香海上祠神罷獨駕樓船夜半回萬里長風催掛帆一天明月阻登臺繡衣人仰邦侯至玉節官分水部來咫尺相望不相見白蘋洲渚重徘徊江隂君山次陸子方韻畫橋垂栁傍官壕夾岸青山擁雪濤楚相邱墟遺石馬吳王宫殿壓金鰲天迷鴻雁江流濶風撼魚龍海氣髙此日登臨無限意古今消盡幾英豪挽汪尚書妻譙國夫人尚書謝政江南去特許夫人大國封春日上堂尊酒共歲時環坐綵衣重離鸞忽奏雲中瑟别鶴還歸隴上松白髮夫君正愁絶空江何處採芙蓉挽王君佐秀才十里青山宅一區平生甘分隱樵漁新詩自寫因求序故篋常隨為教書杖屨在門人去逺壺觴掛壁客來疏白雲滿地松隂冷孤鶴時時守墓廬和楊德章監憲詠物詩仙子初裁蜀錦裳玉壺清映內家粧一百五日花尚好三十六宫春正長新緑漸生應帶露舊紅微褪為經霜自從深院留題後一任東風上下狂右瓶中百日海棠仙標厭入錦雲鄉却傲冰霜取次芳銀燭髙燒遊太液紫綿初拂侍明光春攙杏帶微生暈暖漏梅梢欲試粧不是東君偏耐冷要將風韻入詩囊右冬日海棠送蜀士史道章訪蕃昌張縣尹上江船裏枕書看雪浪千堆寄一翰太白山人元蜀學蕃昌縣令只儒冠渚花對酒公庭晚沙草憐衣客路寒攜得琅玕滿歸袖謝公堂在碧雲端送赴試春官水落沙痕寄岸齊冬深無雪薺生泥遙知上馬徐州北且看開船句水西待詔門開金騕裊榮恩燕賜玉偏提若將文字追時好萬里雲霄自有梯送內官棄職買書歸蜀立三賢祠內官買書三十萬從此聲名天下知正為身輕歸印早不妨船重到家遲客非杜甫依嚴日人是文翁化蜀時愧我無由能載酒敲門頻問子雲竒挽陳公輔縣尹短衣垂脛寄遺孤自立聲名重里閭座上鼎彞前代器篋中經史外家書縣花春老初封印庭藥秋慵久廢鋤惆悵冰壺清絶處露寒應是泣蟾蜍峨眉山霧作衣裳雲作屏玻璃萬頃著娉婷望夫石上偏多雨織女河邉欲隕星螮蝀夏涼收淺絳蟾蜍秋冷抹長青可憐天際微顰處六代興亡一夢醒詠姚氏瑞蓮雨洗瑤池六月涼侍兒初試錦雲囊花開雙鳯迷歌扇子綴羣蜂背蜜房波淨忽成溪女匹露寒却笑月娥孀合歡帳底鴛鴦夢臂枕猶聨玉雪香題丁元善鍊師陽明樓賀老家西百尺樓好山多處稱仙遊丹光散作霞千縷劒氣吹成月一鉤窗外鶴歸遼海暮袖中龍起鑑湖秋道人久直黃金殿可使歸來雪滿頭謝季衡上人惠松花湯餅雲門寺裏青松樹五月南風花正香膜粉輕披魚子白藥珠重綴蜜胖黃餅和甘露曽分送湯合仙霞更共嘗慚愧老僧多意氣一杯毛骨盡清涼送國子掌儀魏居仁還山東京國相逢二十年當時緑髮盡華顛升堂獻贄吾居後立館司儀子在先夜雨溪聲連客枕夕陽山色滿歸船古來齊魯多竒士側耳聲名起日邉贈淵上人住涇縣延壽寺半生辛苦住城西修竹滿園蔬滿畦正愛閒雲依疊嶂忽隨流水度三溪藤花院靜禪初定槲葉村深路欲迷此去莫憐知已少青山到處好留題登㑹稽寶林寺塔百尺浮圖東海上晴天目力見秋毫莫愁風露衣裳薄且喜雲霄步武髙屋角長松來鶴背城頭荒草落鴻毛䦨干倚遍心猶壯更待持杯酹雪濤送山隂賈縣尹公吏呼籌催坐衙朝朝下馬事如麻三年作官惟飲水萬里還朝先過家賈傅席前因獻策潘郎縣裏只栽花江船明日西與渡兩岸青山白雁斜和王繼學憲使玉泉觀魚韻一方寒玉浸泠泠天上雲開影倒青卓錫黃龍曽聽法撫䦨頳鯉亦通靈明珠碎逐涼風散濕翠空圍月露零此日使君行樂處一時民俗自清寧陪偰少監海修撰飲西湖十年不到西湖上此日重來意倍親尊酒暫陪天上使畫船猶待水邉人題詩香漬箋花舊度曲聲傳玉樹新歸醉小樓明月曙開元鐘鼓正朝真送外兄李學父鵓鳩涼雨睡偏宜正是敲門下馬時萬里風塵從戍早十年江海到家遲書將使節真行錦春上萊衣欲繡絲且買樓船醉雙玉紅蓮白蒻滿西池送醫士張景逺歸太平之黃池秋塘雨白水平堤有客撐船繫屋西司馬賦多方病渴葛洪丹熟尚封泥滿階花落惟金鳯開户香來是木犀昨夜月明天似水櫓聲不覺過龍溪劉山驛開窗坐看千峰頂對酒還思萬里程飛雨逺隨松子落濕雲近向樹頭生正愁絶壁烏鳶背忽聽半空雞犬聲安得身騎遼海鶴遍遊八極醉吹笙出大橫道中朝來數騎嶺頭過忽見青山障白波候吏報來先擊鼓販鮮船至盡吹螺南邉泊久烟塵少天上思深雨露多料得祝釐還報日春風楊栁滿官河武夷道中蒼龍飛起崖中斷九曲溪流直上天駕壑舟船遺故物幔亭簫管㑹真仙大王巖上雲初散玉女門前月正圓醉裏櫂歌聲未已忽看孤鶴下翩翩贈漳南巡檢許以衷將軍早獻安邉策手挽强弓起七閩正為功名輕萬里已知勇略冠千人風鳴鼓角山村曉日射旌旗海戍春匹馬何時渡江水笑談為國掃妖氛懷安縣别莊嘉監憲荔支食罷龍眼熟此日閩南使者過得俸莫嫌三月少買舟已覺一時多盟鷗狎舞迎歸櫂别騎驕嘶動佩珂酒醒青天明月上思君迢遞奈愁何建寧得宣州家書江上干戈猶未息此身何處可偷安居民戰死終無援主將逃生竟被殘已報老妻來太末尚憐孤姪壽長干扁舟十日閩溪上恨不身生兩羽翰題樂逸軒山下長溪溪上村溪山如畫正當門遣懷詩就題蕉葉理釣船歸繫栁根問姓不教通郡縣買書只許遺兒孫相望只是柴桑里何日從君酒一尊題宋仁甫樂山亭當陽城外碧嵯峨獨構危亭意若何嵐氣漸來簷角少水聲偏向石稜多青雲鶴慣荆州舞白雪人傳郢上歌何事近來真得趣新松十萬在巖阿建德城西寺山門東轉步廊深長日禪房占緑隂松徑雨晴添虎跡竹潭風冷聽龍吟上林久說相如賦故里徒誇季子金獨坐胡床看明月不知涼露濕衣襟蘭溪胡仁中家喜雨赤日行空勢似焚老龍一起雨翻盆芙蕖趂水紅侵岸䆉稏盈疇緑繞門自是風雲當盛㑹從知天地有深恩朝來熟睡南窗醒却憶灤陽從至尊龍公夜捲天河水散作虛空風雨聲豈獨榮華霑潤澤要令枯槁遂生成藥欄雙蝶凌晨舞草岸羣蛙徹夜鳴造化功神竟無迹披衣默默坐前榮江山縣萬山深處開孤縣下馬入門風滿庭雨腳逺垂松澗白雲隂低覆稻田青已知賣劒人歸野還憶彈琴客在亭安得寰區皆卓魯最書時復報虞廷台州留别林希元三年直閣常懷士萬里乘槎許問津滄海日華中夜曉赤城霞氣四時春謝公髙卧元非隱陶令歸來豈為貧白髮清心自多壽更從何處覔仙人贈天台李鍊師赤蛟青鳯下晴空家住天台第幾重歲久松脂成琥珀夜深丹氣出芙蓉仙童奏簡騎文虎太乙縣旗起毒龍昨夜從師到天上故山還著白雲封題天台方氏山亭赤城霞氣燭天起四面窗開碧樹涼山鳥晝啼深竹裏溪魚晚近落花旁茯苓酒共仙人飲蛤蜊盤分野老嘗何日投簮東海去秋風同制芰荷香過雁山王事驅馳敢厭勞秋風白髮氣猶豪八千餘里行正逺四十九盤山更髙石壁連雲愁鳥道海門飛雪壯鯨濤同遊賴有孫公子時遺新詩浣鬱陶建寧道中雙玉山前溪水流朝來風雨暗灘頭舟穿亂石方停棹驛傍空巖更近樓江海十年飛野鶴乾坤萬里蕩沙鷗七閩見說多凋弊莫為蓴鱸動客愁延平樓閣近依山上下市橋橫接岸東西四時雲氣浮孤堞萬􅊤泉流㑹一溪道學已同濓洛盛劒光猶與斗牛齊延平祠下歸來晚獨對寒燈待曉雞蒜嶺道中溪雲帖帖雨沈沈頓覺新寒薄暮侵待渡人歸榕葉岸過山驛候荔支林清游暫作還鄉客白髮難忘報國心莫哄行囊輕似羽一錢元自重千金泉州驛别太守偰世玉老夫欲起猶便睡候吏頻催却治行萬里烟雲隨驥足五更風雨雜雞聲乾坤笑我應無補江海逢君倍有情且解金魚沽别酒洛陽橋下正潮平賦韶州王太守養老園手種滿園桃李樹東風披拂爛如霞歌催金縷停鳩杖酒注銀瓶載鹿車白日青春閒衛㦸碧溪流水護仙家使君自是吹簫侣不記菖蒲幾度華漳州漳南五縣半溪洞狂獠恃險時縱橫巨蛇吞象出當道猛虎搏人行近城如何百年漸禮化尚爾兩度煩天兵頑愚無知固可悼承宣亦合思亷平玉泉為宜春黃子中賦銀河迸落青天上盡作山中風雨聲溪岸碧桃千歲在石田瑤草四時生雲流空洞潜蛟舞月湧潺湲睡鶴驚幾度秋髙環珮冷瓊仙吹笛過蓬瀛風涇舟中白髮飄蕭寄短篷春深杯酒憶曽同落花洲渚鷗迎雨芳草池塘燕避風烽火此時連海上音書何日到山中故人别後遙相望夜夜空隨斗柄東送汪仲恭往千山白月團團星斗稀夜深船去疾如飛聲傳海角來鴻雁光湧潮頭出貝璣歲晚正當還漢節天寒誰為寄蘇衣芙蓉絶頂鑱天祿何日相從跨鶴歸和千山孫元實韻霜落梧桐葉上銀秋來白髮似相親詩工不讓唐人律政拙空慚漢吏循誰謂度遼能下士自因逢掖學驚人吳淞江上芙蓉老還憶南山佩可紉和潘叔寬所寄詩韻一笑行藏似賁須誰知白髮事皆殊蒼龍欲化平津劒老蚌應還合浦珠蔡女書傳猶四百山公學在未全孤秋來江海非無志奈此兵塵滿道途風雨吳江秋漸過别來身世轉蹉跎滿階金鳯落將少傍水樹雞生尚多且對清尊歌慷慨莫嫌白髮舞婆娑欲將功業標銅柱誰是當年馬伏波感春㑹稽東望隔兵塵消息傳來總不真楊栁傍人青眼舊梅花笑我白頭新一愁風雨三更夢萬里乾坤二月春寂寞心期誰㑹得獨支笻竹立江濵吳景文居庭牡丹盛開飲後有感韶光天遣屬君家猶是東京第一花金鼎夜寒團絳雪錦機春暖簇紅霞倚風忽作纒頭舞避日還將便面遮薄莫䦨干同醉倚却憐孤客鬢先華題朱教授送行詩卷至正十八年冬余自省府退歸西湖之上郡博士朱君斗瑞來謁出示京師送行詩一卷讀之則揭學士巙丞㫖吳大宗師王尚書沂潘司業迪陳監丞旅胡應奉助劉博士聞馮助教三竒凡九人去今才二十年皆已凋謝無存者為之撫卷嘆息因係之詩曰中朝諸老凋零盡一讀遺詩感慨多萬里還家猶俎豆十年為客尚干戈秋風東海雲帆舉春水西湖畫舫過此去太平應有象杏花深處聽絃歌用謝元功韻贈劉生庸道還錢唐緑隂門巷燕遲歸白日看書見客稀自是病多便野服豈因性僻解朝衣諸生載酒臨滄海獨子開船背落暉有約重來莫相逺好將編簡究精微送方舟上人往靈鷲靈鷲之山出東海小朵飛來不記年佛國夜光珠作闕龍宫春冷玉為泉浮雲不礙遊人履流水還隨釣客船試問禪師去何處夜來騎虎上西天巴陵女子韓希孟貞節尚書子婦魏王孫清白傳家節更文諸將已捐南渡主孤身猶抗北來軍血書夜灑巴陵月烈氣秋橫鄂渚雲欲弔忠魂無覔處唯應瑤席從湘君寄謝丞相康里公海雲飛盡天如水夜夜遙瞻北斗髙正愧無才叨末座忽聞有命轉東曹鵬搏已借扶搖力鯨背終成轉運勞白髮儒生何以報唯應執筆從䕫皋送胡孟然還錢唐并柬周伯溫程以文宇文子貞老夫多家東海上愛子相從又一春官為閒多知性僻客因住久見情親諫章行曳尚書履漉酒誰同處士巾此去故人如問訊一槎將泛越江津送有亨姪還錢唐嗣宗諸姪仲容賢客路飄零雪滿顛曽為頌椒留子美却思戲蠟愛僧䖍十年江海三杯酒百里溪山一釣船何日兵戈得休息敬亭春雨共歸田錢唐壯觀天下竒昔日繁華曾見之夜月管絃唯鼓角春風羅綺盡旌旗湖山謾想遊人樂城郭徒增志士悲今日别離東海上一飄村酒鬢如絲題劉生庸道竹林書室圖劉生讀書竹林下滿耳金石聲琅琅翠隂碎落日當户緗帙亂翻風滿床中夜蛟龍神變化清時鸞鳯瑞文章此君標致誰能寫一幅雲烟墨數行送朱道夫赴廣西巡檢將軍慷慨出幽燕又佩刀弓過海邉桂嶺秋回南去雁潯江夜泊北來船正憐主印官無事更喜迎親祿有田萬里若逢天上使好將詩句寄蠻箋題蘆花被圖秋深江上白蒙茸野客分來一色同酒醒孤篷卧明月帳寒老屋不禁風羽毛乍聚摶空鶴蹤跡真成踏雪鴻夜半何人吹鐡笛夢魂疑在楚江東次韻李清叔元夕絳燭燒烟散滿城九衢車馬似潮聲山河影轉琉璃薄陸海光浮菡萏平蝶睡誤翻歌扇暖鵲驚疑報畫簷晴夜䦨人靜天如水依舊殘星數㸃明玩齊集卷四
