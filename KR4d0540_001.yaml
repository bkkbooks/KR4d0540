body:
  text: 玩齋集卷一元貢師泰撰賦小篔簹賦謂木非喬謂草非繇不蔓而夭不葩而條間庭翳翳密室翛翛名小篔簹有扁之昭或曰子真以篔簹為小耶則仙標出塵直幹凌囂聲諧鳴鳯影挾翔蛟灑清風之葉葉弄明月之梢梢雖並戶而當軒實拂雲而騰霄子以植數少為小耶則兩忩三四一徑五六緗實標黃錦苞凝緑或開樽而射金或援琴而擊玉雖無千頃之多聊可數竿而足然則小篔簹果何在乎主人曰肩高於牆斗大於室門可旋車居僅容膝修及尋丈廣貿咫尺以溉以種充我餘隙匪谷斯盈匪川斯溢減晉林之七賢少唐溪之六逸異蔣詡之三徑慕子猷之一日況城西幽迥堂北愈平安之報維昕與晚遺形尚存先德不逺則又此心之所以思慕而憂悶也篔簹雖小其義實大謹葺謹培式萌孝愛或曰唯唯子誠是在虛心有容直節無懈庶其茂之勿翦勿敗五言古詩古意二首功名果何為輕重天下士得之入雲霄不得墮泥滓朝列三公行莫與匹夫比榮辱既由人富貴非在己胡為竟迷途白首憂不止縱有蓋世勳僅遺一紙史往者尚如斯後來亦徒爾乃知巢許流高蹈良有以又黃金本何物舉世相紛爭賤者可以貴死者可以生既解平城圍亦散六國衡神用信莫測萬寶孰敢嬰亦有高世士唾視瓦礫輕寧為凍餓殍不受汚辱名斯人儻可見吾將與同盟嗟哉首陽薇千載有餘清擬古三首東南有佳人逺在水一方綺疏粲飛樓曲闌圍洞房意態間且靚氣若蘭蕙芳纎阿裼姣服雜佩懸明璫流風回晧雪明月舒其光白面誰家子錦鞍青絲韁翩然一見之下馬立中堂可望不可即五采盛文章又嶰溪有美竹挺挺霜雪中何人斷兩節製為十二筒宫商自相應鳯鳥鳴雌雄一鳴垂衣裳再鳴致時雍從此去不返治道竟少隆鄙哉叔孫氏綿蕝變王風寥寥數千載伊誰啓冥矇后皇如有作聲教垂無窮又採藥鍊神丹鍊久丹自成丹成出寶鼎旭日紅霞明服之不終朝身若一羽輕騎龍跨八極翩然凌太清太清邈金闕玉女羅雲軿飄蕭白霓裳參差紫鸞笙元氣在呼吸因之薄蓬瀛下視寰宇內人事徒蠅營遣懷二首日入栁風息月上花露多東軒頗幽敞夜靜時一過鳥散庭中樹蟲鳴階下莎北斗何低昂疏星沒橫河獨賞誰晤語感慨成悲歌懷哉岩桂臺邈在姑山阿又城東數椽屋牆壁半摧傾驅童旋泥補聊以潛吾生門前一隙地短畦亦縱橫布種才幾日雜蔬盡勾萌夜來涼雨後青青盛滋榮採掇且勿過吾將俟其成感興五首玄陰結層空白晝慘不開鴻鴈失其羣鳴聲亦何哀嗷嗷在江渚欲下復徘徊遊子獨何之感慨激中懷緘書將寄逺霜露白皚皚又芙蓉生緑水水緑花更好採花當及時莫待顔色老美人久不見華髮忽已皓因之遺芳馨聊以慰懷抱失意且勿嗟令名當共保又悲風從西來海樹何蕭瑟薄寒中人肌毛髮為慘栗疏林動鳷鵲壞壁鳴蟋蟀出門忽四顧愴恍若有失仰面對青天青天行白日又客有雙寶劔紫氣射牛斗年少乍得之日夜不去手豈知靈異物佩服終難久一朝騰波去化作蒼龍吼何時復歸來為國殄羣醜又道傍有枯桑中空上無枝豈惟八蠶厄亦受羣蟻萎雨露忽以濡依然發華滋雖非梁棟材猶堪琴瑟絲子能慎封植成功當有時赴京别親友崇堤衛芳塘塘上種楊柳楊柳年年青慈親未白首送我不忍别出門復攜手親友陟高岡立馬望良久離懷急欲醉盡此樽中酒姑孰道中朝發慈姥山莫宿吳公橋日入氣猶溽清懷厭煩囂隔江風雨至緑樹涼蕭蕭鄰舟頗相好有酒忽見招明發波浪濶相望一何遙和吳子彥高齋雨坐韻高城莫色重空齋秋思多蕭條響林籜的皪集池荷開門望青山但見白鳥過獨坐領幽趣悠然發浩歌此意誰與共餘暉在岩阿雨坐有感簡胡仲明劉太初并寄酈隱梅鍊師茂林延鮮飇空庭灑飛雨衆物欣以榮緑苔自清暑蜻蜓飛水上蜉蝣亦生羽感兹晤玄牝翛然契真母紛紛泥淖間變化無恆處又晨氣含餘清夏雨欣衆緑閉門鬱佳興開軒縱遐矚稚菊齊庭葵新篁出林木徘徊感物化生意一何速念此涵育功終焉愧寒曝湖上納涼有懷吳子彥天風吹海樹瑟瑟秋氣涼河漢西北流衆星耿微光昔我同袍友逺在水一方相思不得見展轉清夜長遙聞鳴笳發攬衣月蒼蒼題何氏永思亭上山山有巔涉水水有涯父母恩罔極孝心無盡時風吹庭前樹鳴聲一何悲白日墮青天零露委華滋死者不可作逺者亦可追哀哀蓼莪詩以永千載思送潘仲金赴德興教諭山中思偃息盡日掩重扉方慙素交寡況與知已違春江雨新漲楊柳緑依依攀條未忍别孤帆已如飛芹宫盛襟佩日夕候光輝尊罍雜籩豆笙鏞間絃徽教成毋久淹倚門望東歸嵗莫别陳華仲翩翩五色翰結巢在丹山朝飛白玉池莫宿青雲關偶然落漪上文采何斕斒嵗晚天苦寒況此風雪孱高梧不結實啄食良獨難瑶臺十二層羣仙列佩環奮身一飛去邈矣難追攀次陶公美韻并簡劉景初我行自天北君居在江南南北各相望有如商與參嵗月亦已逺寤寐懷好音默默無所寄時復理橫琴昨日得緘書甚慰契濶心書云各努力隙駒易駸駸履道貴平易為文去艱深感子意良厚所愧力不任姑山竹可支姑溪梅可尋梅竹耐嵗寒相期更自今贈蒼梧縣尹朝觀扶桑日莫望蒼梧雲重華去已逺神氣猶絪緼遺黎在山下飲食而耕耘懷哉賢大夫彈琴詠南薰胡為不我即使我心殷殷秋風洞庭波緑竹愁湘君春日同達兼善祕卿燕蘭亭分韻得工字青山在城西白日在城東車馬出門去光彩何曈曈密樹被暘谷疏華表陰峰迢遞諧雅會委蛇盛儀容席蔭空靄緑杯流渚霞紅秉簡滌煩想舞雩繼遺風俯仰宇宙間修短均化工誰是廣成子長年住崆洞題王維輞川圖開圖縱竒觀江山鬱相繆兩垞矗岧岧重湖渺悠悠邃宇抗疏嶺危亭俯圓流春塢辛夷發夏陌高槐稠竹館翠陰晚萸沜紅實秋逺墅漆未割近園椒欲收驚鳥避溪泉野鹿逐岩幽日莫川上歸涼飈蕩孤舟靄靄雲氣合漠漠煙光浮顧思天寶初綱紀壞不修霓裳按妖拍鼙鼓起姦謀豈無匡濟術乃為間曠留菱歌自來往葩辭更倡酬遂令摹寫間意度猶可求乾坤多變態江海生暮愁白鷗飛不去千載空悠悠河決去年黃河決高陸為平川今年黃河決長堤沒深淵濁浪近翻雪洪濤逺舂天滔滔渾疆界浩浩襄市㕓初疑滄海變久若銀漢連怒聲恣砰磕悍氣仍洄漩毒霧飽魚腹腥風噴龍涎黿鼉出衮衮鴈鳬下翩翩人哭菰蒲裏舟行桑柘巔豈惟屋廬毁所傷墳墓穿丁男望北走老稚向南遷縣官出巡防小吏爭弄權社長夜打門里正朝率錢鳩工具畚鍤排户加笞鞭分程杵登登會聚鼓闐闐雖云免覆溺誰復解倒懸瀰漫勢稍降膏血日已朘流離望安集荒原走疲癲孤還尚零丁旅至才屬聫園池非故態鄰里多可憐貧家租舊地富室買新田頽垣吠黃犬破屋鳴烏犍秋耕且未得夏麥何由全忩泥冷窺風竈土濕生煙傾筐摘餘穗小艇收枯蓮賣嫌雞鴨瘦食厭魚蝦鮮榆膏緑皮滑蓴葅紫芽圓乍見情多感久任心少便金堤塞已潰淇園竹為楗玉璧沈白馬冠蓋相後先舜禹事疏鑿漢唐勞委填瓠子空作歌寶鼎徒紀年昨聞山東飢斗米直十千即今江南旱骨肉皆棄捐倉廩豈不實賑貸猶迍邅恐是廊廟逺不聞道路傳恐是天聽高致使雨露偏小臣思覆載百念倍憂煎躊蹰慘莫發憤結何由宣作詩備採擇孰敢希陶甄平成諒有在更獻河清篇上劉承旨二首大魚但溟海微禽變淮波我生亦何為感物常悲歌念兹秋蘭華含榮在山阿孤貞固自信采掇將誰過安得紉佩服襲此芳馨和又泰山不辭壤河海不擇流所以經世者賢才務旁搜我願為黍稷得植君田疇我願為罍洗得奉君獻酬慎莫令棄置被褐居林丘送子通編修代祀泰岱二首我昔聞泰山其上有神木高標聳乾端深根絞坤軸大枝蛟龍盤小枝鸞鳯宿磅礴數千載居然在空谷風雨不可動況受斧斤辱子今試往觀會當駭心目又我昔聞泰山其下有瑶草秀色貫四時不死亦不老日月孕至和風露長浩浩仙人為我言服之顔色好濁世苦多欲誰能事幽討子今試往求何煩涉蓬島採菱女落日照淮甸中流蕩回光窈窕誰家女採菱在橫塘風吹荷葉低忽見紅粉粧紅粧背人去驚起雙鴛鴦鴛鴦去復來煙水空茫茫貧婦嘆和成誼叔應奉韻一首結髮事夫子相期首俱皓如何割歡愛長年在逺道井臼甘勤勞衣食無完好妾身徒區區妾心實杲杲鳥飛尚投林魚遊亦依藻君非魯秋胡貞心諒同保題王濟川風樹堂凄風被林木雜遝無寧柯欲養親弗待嵗月同流波昔人感終極子今傷如何有哺烏在林有祭獺在河白華與南陔悲思徒增多題潘叔寬望雲圖日入無返照雲出有歸期雲歸在山阿親死獨何之思親不可見亦有墓與祠朝望怡我目夕望慰我思風吹白楊樹露滴青松枝翩翩華亭鶴鳴聲一何悲不有望雲作孰繼南陔詩題張子英間止齋薄宦非夙志況復多艱難力辭乃得去羈紲庶少寬僦屋西溪上聊以挂余冠住久鄰里狎杯酒亦盡歡開軒望逺岫時見孤雲還人生徒擾擾意適心自安君亦何為者而能早休官題蕭山包氏棣萼軒燁燁棠棣花花萼盛敷榮下承上以覆白日光輝生物性且如此況我弟與兄飲酒坐花底怡然恩義并胡為輕薄兒骨肉成戈兵鴻鴈在中野脊令亦飛鳴一詠包家詩怛然感衷情姑蘇半塘别王季野諸友壯志頗磊落别意何綢繆相送屢回顧欲行還暫留花紅隔崇堤草緑遍芳洲所期各努力令德比前修餞張懷玉赴廬州治中清時重世胄寵數超常秩公子玉雪􅐾袍笏照白日近辭中禁榮逺為淮南出冠蓋餞東門悵然若有失别酒起驪歌秋風動蕭瑟淝水清漣漪楚山高崒嵂别駕非常流治郡良有術白馬行翩翩嘉聲已洋溢廟堂多深知賜環當在即賦成誼叔積素齋飛雪委階下皓采滿中堂明月更被之忩户流輝光夜深時起望星斗低以昂庭樹度疏影林花散微香忽若白玉臺衆羽紛頡頏涼飈颯然至坐覺激肝腸徘徊復徘徊衣露白如霜題吳中陸氏菊逸軒疏條鳴疾風落葉紛以觸端居節序移忽焉見佳菊芳苞淡秋黃短叢深雨緑時時一瓢酒亦足慰幽獨飲中有真趣孰識榮與辱嵗晏霜露多白駒在空谷題舒經歷淡齋高人坐堂上青草滿階生鈎簾知雨過拄笏見雲行幽鳥忽飛來餘花落前榮靜觀宇宙間超然忘世情詠琴闕末四座慘無色羇雌動疏林候蟲在空壁攜來京國彈一彈三太息豈傷時序遷知音難再得畫蘭光風吹碧草零露被芳畹美人秉幽貞獨立嵗云晚杳杳楚山深悠悠湘水逺何當結瓊佩寄此情繾綣縉雲縣和余廷心韻薄宦阻佳會暫歸諧夙心夜宿劉山上朝發縉雲陰霜清逺林薄日暮寒潭深相思成白髮誰復理橫琴題方氏敬齋山齋頗幽迥花落更沈沈風來白日靜月出清夜陰坐久衆慮息稍覺諧沖襟悠悠發清悟起步自微吟及此平旦氣見我天地心研幾齋齋居白日靜肅恭儼端委二氣自往來六虛互終始內觀亦何為善惡分自此亳芒精識察昕夕慎操履諄諄四勿戒惓惓三省旨君子淡無營超然悟玄理重九日國學燕集分韻得口字傑構鄰象緯飛題薄箕斗雅會集諸生清談接良友商飈振庭柯旭景耀林莽逶迤滄海濵窈窕居庸口憑虛俯流光慷慨送杯酒遊西山次周伯溫韻嚴鐘啓城鑰百辟聫佩紳斜漢在昴畢搖光正當寅華車出廣陌光采生熙春陰崖凍猶結陽谷景已新雲林白洶湧石磴青嶙峋先皇昔遊幸顧瞻愴兹辰恍若鐵馬起空留玉衣陳鼎湖去雖逺元化同其神憑危俯高樹歷覽窮荒榛梵宇抗疏嶺飛閣騰遐津虛庭潛飈起白日無纎塵長楊十二衢甲第連居民清時治兹久天地涵深仁矧兹風氣完且復俗習淳耦耕雜畎畝獨釣當漪淪高仙去窈邈瑞氣留氤氲於焉契嘉晤頓覺煩抱伸蹇豫敬亭下清池翳修筠時時一瓢酒獨酌不計巡對此重歸思江海愁畸人興州道中畿縣出西北山川何雄深況兹氣候殊岩壑更嶔崟落葉委空谷疏松表高林征馬度前阪浮雲落微陰風吹髮蕭蕭日莫思沈沈豈不厭馳驅嚴程有官針敬亭邈天際行當契沖襟題滕王閣圖雄城控華甸傑閣臨芳洲飛甍起千仭曲闌圍四周丹碧何輝煌文采射斗牛帝子去不返俯仰經幾秋江黑簾雨捲山青棟雲收孤舟天際來揚帆在中流狂飈薄莫起坐覺增煩憂何當掃重翳白日耀神州開圖發長嘆天地一浮漚題疊嶂參雲亭寄老士安監憲層城極高爽傑構峙崢嶸疊嶂散霞綺雙溪迥以明旌節一戾止登覽羣彥并明月懸委佩華星粲長纓涼軒四面敞坐看卿靄生神功倏舒卷變態周八紘終當溥甘澍從龍遊太清涇縣石壁道中萬山從西來中斷忽如劈攢峯阻重關兩崖立堅壁絶壑濆飛流觸石勢逾激神龍宅其下白晝飛霹靂涉險恐羸驂凌高快健翮須臾得仙館頗覺契幽寂入竹敞涼軒掃花吹鐵笛坐久竟忘疲塵襟忽如滌翻思﨑嶇間使我心戚戚過仙霞嶺連山界甌閩兹嶺亦峻極傑觀奠方陲高標麗圜則淋漓割元氣黯淡帶古色綿亘姑蔑墟蒼翠欲四塞仙霞高燭天五采絢赫赩萬仭聳崢嶸百里見孤特稜角露毫芒縷脈界縫緎我行任綱紀逾月來自北道途多艱虞況乃事登陟初緣檟磴危漸轉重關側攢峯與疊巘盡日走崱屴連岡躡衙衙絶壑瞰冒冒逺岫忽已違近隴復相逼躋攀苦分寸跬步輒止疑砉然造曾顛軒豁始有得或列若屏幛或限若户閾或偃若覆釜或俯若鼎鉞或恭若執圭或竦若憑軾或尊若受朝或卑若就職或若孤鶴駕或若萬馬勒或若華蓋張或若芙蓉植或淨若新沐或靚若初飾或爭先若馳或嚴整若飭或若進而拱或若退而劾或傴若將趨或顛若將踣或堅若長城或錯若列國或聫若串珠或牽若徽纒或摶若熊羆或射若虺蜮或冕若華旒或屨若赤繶或顒顒若昂或踽踽若抑或軒軒若舉或悄悄若默或欣欣若喜或慊慊若戚或騃若蠢愚或穎若岐嶷或窮若龜曝或直若隼革或差若頡頏或比若稫稜或倚若弓劔或羅若罟罭或鋭若戈矛或卓若橛杙或渥焉若丹或黝焉若墨或離焉若愁或俯焉若䀌或儼焉若思或慘焉若憶或谽谺若噬或鑱削若剋﨑嶇歷萬狀意態轉惶惑矯首勞脛脰舉膝撑胸臆僕夫盡劬瘁負擔屢蒲伏健駭猿猱勢快羡飛鳥翼長風度林薄草樹紛偃仄雲歸窽竇昏潤滴嵌岩泐涓流半逶迤懸溜竟湢㳁豫章間楩楠榛莽翳柞棫野草績山果瑣碎多不識爛熳錦機翻離披翠羽織竹籟笙鳯鳴藤雨淵珠滴濃淡各異態不豐亦不嗇根露獸鬭敧株朽人直立幽谷嘷怪禽坳塘落鸂鶒古柴蔓草荒廢井苔蘚蝕茒屋列二三亂石羅萬億水耕雜粳稌火種饒黍稷寒泉浸蹲鴟飢食同稼穡憑高謾徘徊得廕暫休息掬水滌煩襟坐愛清湜湜仰看高空青俯視深潭黑其上浩無際其下深莫測豈惟龍蛇都實乃虎豹域前瞻已出險後顧猶未即我行既已逺我志敢不力倉皇問前途日挂半岩昃峻坂注迢迢憂心動惻惻自從黃巢亂近復多盜賊敗屋雖僅存居者間逃匿忩牖旋遮護几案忙拂拭頽然就床枕強起具蔬食新醅薦芋栗晚飯飣蘆蔔豈不念馳驅王事亦孔棘江東戰未已閩南病尤亟所當效微忠孰敢息晷刻吾道豈無補憲度亦有式民風轉移間要在盡悃愊豈徒慰凋疲庶將别淑慝追蹤古聞人上以報皇德謝吳景文送菊寒雨鳴枯林蕭條數間屋何人喚開門送我一枝菊從知主意深逺慰客懷獨修莖挺數尺大花著五六鵝毛發氄黃翠羽攢生緑忽見隱士􅐾頓洗凡子俗縹瓷傍几案徹夜散幽馥我家東籬邊短藂自如簇金錢雜瑣碎採之動盈掬雖非人力巧亦異衆眼肉于今不得見寒暑再往復感慨成悲歌徘徊寄遐矚安得吳江水盡變作醽醁醉酣把長劔天地眇一粟雜體八首卧病荒江上憂心何忡忡親友久不見況此風雨中沙草生滿路庭菊亦成叢荏苒芳春節棲遲孤客蹤有酒且盡醉吾道豈終窮又種蔬屋西頭露葉日已深葉深自可摘慎勿傷其心傷心且當慎況乃衆暴侵豈不念君子憔悴將安任葵藿傾太陽蕙蘭托中林此物雖至微庶可嫓德音又看月當看缺月缺終須圓賞花莫待開花開落還先靜觀萬物理可以全吾天東鄰侈漫舞西家沸繁絃歡燕猶未終飄忽如浮煙宣尼陳蔡間伯夷首陽巔斯人雖已矣清風萬古傳又道傍百草芽春至生漸繁采之多可茹亦足供盤飱豈無粱肉饋野性非所存陶令晚辭秩袁安深閉門古道真可尚薄俗難與論又千金不為恩一語終感德所以古來士慷慨重相得眷兹義利間誰能有真識張儀漫連衡酈生空伏軾魯連不帝秦高論抗六國遂令千載下撫卷長太息又知黑故守白乃為白所汚棄利將求名反為名所誤是非既不真榮辱安所遇顧兹朝暮間何異狙公賦達人本大觀世事皆細故飢餐松下苓渴飲花上露且從海翁遊忘機有鷗鷺又疏林收霽靄方池涵密陰坐深清晝冷餘花散鳴禽緘情何所寄撫我緑綺琴世無鍾子期誰復能知音曲終一長嘆悠悠千載心又偃息北忩下好風從南來開忩延好風懷抱忽為開人生如逆旅造物同嬰孩小知鬭蝸角營營真可哀是非何足論客至且銜杯天台林氏山齋四詠南山有白石石爛春遲遲驅牛上山去牛飽隨所之耕種賴爾力牧養須及時短衣不掩骭吾生竟何為唐虞世云逺安得還雍熙右飯牛山房天台赤城山平地起千尺出海爛紅雲垂天立蒼壁神光燭宇宙晃朗晝相射仙人居其上塵世邈難識與子試往觀會使身生翼右百丈巖飛龍上青天忽聽山石裂怒驅萬壑雷散作半空雪脫巾弄潺湲展席映澄徹毛髮為森立盡洗人間熱浩歌下山去日莫風烈烈右瀑布泉何人吹鳯凰驚起萬竿玉長風自天來湘波蕩晴渌停杯狎間鷗倚杖招黃鵠俯仰宇宙間滄海渺一粟振衣聆鳯吹冉冉秋雲緑右琅玕谷送劉子還江右晨飈起庭柯落葉當階積流光倏雲變感此逺行客逺行歸無期況與親友隔潛魚無縱鱗倦鳥思斂翼物理且如此人事徒役役徘徊激中腸衣上霜露白秋夜和韓與玉齋居在城西庭户頗幽敞涼風起高樹落葉時時響境靜人少來理悟心自賞方欣結同盟慎勿成獨往偕酈蕭梅竹行山居屬多暇數友樂幽尋積雨弄新霽浮雲淡微陰青松架絶壑蕭然灑塵襟論心忘逺道佇目渺寒林行行擷秋芳濁酒時復斟明發重分攜茆山白雲深題朱澤民所作段吉父應奉别業圖逺山何盤桓近壠亦連屬潛飈薄陰崖鮮雲蕩陽谷飛樓表層顛石梁跨縣瀑參差衆樹丹夭矯雙松緑誰與契佳賔雅會諧所欲臨流引霞觴拂石羅野䔩開圖對華軒聊以慰貞獨春日宴蘭亭分韻得王字陰雲翳岩谷野水漫池塘倐焉變新霽百物生輝光散䇿栁風媚浣衣蘭渚薌嘉會侈華簪列坐催流觴鳴禽亦有意睍睆如笙簧悠悠千載間孰繼謝與王光陰亦何速聚散安可常及時不歡樂白髮徒慨慷劉平川盤谷圖崇邱上岧嶤絶壑下深曲繄誰發天巧水墨寫盤谷荒蹊繞層巔修薄翳空麓息陰動清興憑危引遐矚鮮飈度長林冉冉雲相逐晨樵入薈蔚夕釣得漣緑方春薇蕨生及秋禾黍熟低回情乍舒展玩景逾縟我思古人心雅曠良所欲終期駕鴻濛萬里一黃鵠天門山為楊梓人待制賦天門十六峰氣勢凌祝融玉壺晝飛雪丹穴夏生風壁轉六龍影關當九虎雄還應叫閶闔白日照精忠蘭臯雅集弭節蘭江渚散䇿嘉樹林良儔亦以集式慰離索心列坐引疏酌暫歡契沖襟風清暑氣薄日落潭水深高蔭多鳴蜩時時曳餘音豈無繾綣意淹留畏官針煙塵庶可息吾將遂投簪爛柯山分韻得之字嚴城啓晨鑰夙駕踐所之華日動光彩冠蓋盛威儀揚鑣度廣野緩䇿緣清池長林帶崇岡密樹何參差逶迤石梁起夭矯崖洞垂青霞結懸虹白日生涼吹仙人杳莫攀殘棋委臺基坐看星斗出斂襟遂忘疲趙敬德聚星樓連山峙華鄂芳州亦回翔雄城直須女流止下相當曾構逼緯象仰視何低昂濟濟列仙儒冠蓋紛頡頏左曳飛霞裾右佩明月璫瑶席蕩神采綺疏動芳薌周旋中規矩顧盼生輝光良儔豈偶集允為時所望王中甫桃花鸂鶒圖朱桃春晝妍緑竹晚色淨雙禽落清池愛羽時弄影伊誰誤天巧麗采賦姝靚開圖對華尊式慰今夕永玩齋集卷一
