body:
  text: 玩齋集拾遺元貢師泰撰絶句庭前雙荔支細花開滿樹隔牆胡蝶來擾擾飛不去題銘古鼎小像是身本無想忽幻生綃裏一心自空明秋月照寒水五雲詩神龍蟄水底噓氣如丹霞鱗鱗動光耀散作金蓮花右雲溪青烟一緒起白石凝不流輕鷗傍人過落日上簾鈎右雲居朝隨漁樵來莫逐漁樵去天門十二重黄鵠在何處右雲路漂漂荷葉風濯濯菱花雨五采散霞機中有耶溪女右雲渚六丁駕蒼虬蜕骨東海上靈飈一鼓之半天起波浪右雲松題延平圖兩山夾長溪巨石如浮鵠中有雙蟠龍光射萬家屋偶成空庭橄欖樹直榦上㕘天時時風撼動青子落堦前題虞先生遊山詩後九轉丹成骨已僊珠璣滿幅尚清圓偶然飄落人間世猶有神光夜燭天題天台隠士小像鹿􅌁青衣兩髻髽飛流光爛赤城霞静中悟得先天訣手按丹經看落花題白頭鳥太湖浮玉晝生隂翠蔓紅梢取次深無限白頭人不管野禽何事訴春心喜雨赤龍吐火金石流漫膚熏灼汗不收雷公忽捲天河水洗出人間一色秋電光閃閃太隂黒須臾驟雨隨轟霆江流易長亦易退只有南山依舊青寄贈圓脩鍾道人寳塔今成第㡬層浮雲不隔石碐磳誰知庾嶺傳衣後元是當年有髮僧同唐佐堯尊師游麻姑萬松庵謁石佛祠將登絶頂尋丹爐劔匣故跡山髙日莫悵然空歸因賦三絶句雙廟西頭十數家門前秋色老蒹葭野田湖水猶相接時有游魚唼稻花華姑山下華姑廟千尺長松在屋西可是丹青易凋落梁間猶有百年題客來鲁記十年前䆉稏西風滿石田近日山前頗蕪没耕牛賣去納官錢偶成司馬年來多病渇小樓凉雨趂髙眠無端一樹櫻桃熟句引鶯聲到枕邊安石榴花隔女牆髙枝一半過西房我來急借蒲團睡猶自貪看半倚床題段吉甫應奉所臨十七帖後碧桃紅杏倚池邊花露如珠顆顆圓一夜清寒歸醉墨蘭亭空費打碑錢海歌十首黒面小郎棹三板載取官人來大船日正中時先轉柁一時舉手拜神天出得蛟門才是海虎蹲山下待平潮敲㠶轉艙齊著力不見前船正過焦大星煌煌天欲明黄旗上寫總漕名願得順風三四日早催春運到燕京隻嶼山前放大洋霧氣昏昏海上黄聴得柁樓人笑道半天紅日掛㠶檣四山合處一門開雪浪掀天不盡來船過此間都賀喜明朝便可到南臺千户火長好家主事事辛苦不辭難明年載糧直沽去便著緑袌歸作官大工駕柁如駕馬數人左右拽長牽萬鈞氣力在我手任渠雪浪來滔天碇手在船功最多一人唱聲百人和何事淺深偏記得慣鲁海上看風波亞班輕捷如猿猱手把長繩飛上髙你毎道險我不險只要竿頭著脚牢上篷起柂氣力强花布纒頭袴兩襠説與衆人莫相笑喫酒著衣還阿郎書扇送張天爵海昌城頭築城散堂帖忽催簾外官且向文場了清事四郊烽火正平安和謝太守二首老夫看月三茅山風露髙寒兩鬢斑早起偶隨雲水出不知珂佩到柴闗翠竹青梧倚屋山秋寒日影下苔斑道人白晝心如水只有清風為掩闗題細魚圖誰剪胥江一尺濤尚分波面㡬銀刀細鱗可是非神物風雨還隨蜃氣髙鄭静思小像青山緑水是江南鶴􅌁翩翩髮一簪萬疊璚臺看不厭却來海上望晴嵐題張師夔春江聴雨圖雲擁亂山山擁屋天浮野水水浮天江頭見說多風雨蓬底髙人自在眠寄顔經畧羊酥三山五月尚清寒新滴羊酥凍玉柈何物風流可相稱兔豪花瀹水龍圖題倪中凱春山訪隠海上青山面何人為寫真日華僊掌曉雲氣舞衣春竹墅人疑晉桃源世尚秦兵塵方滿目莫惜往來頻禱雨聖泉留題二首數騎朝來出逺林青山可解隔氛祲靈泉久卓穿雲錫近寺猶遺布地金古殿鼪鼯窺荔子空庭鳷鵲下榕隂坐間煩暑都消盡更倚長松一解襟蔞郍盛開紅滿庭四圍山色晚偏青齋分香積松花飯坐對珠函貝葉經刼火不焚唐刻在聖泉偏為福州靈何當灑作天瓢雨頓使朝來老眼醒秋日城南有懐張師夔令尹閶闔風來東海頭釣龍山下萬家秋荒祠槲葉飛黄雀野水荷花浸白鷗對酒謾慚犀首飲移家渾似馬人留舊遊忽憶張公子吹笛雙溪月滿舟即事次李景儀治書韻楊僕船歸百越平捷書今喜出甌寧秋髙劍氣衝南斗天近綸音動北溟萬里聲名雙鬂白百年文物一氊青珠璣忽向三山落誰復歌詩繼魯坰贈相里山人七閩山色曉㕘天萬里東洋海水連欲借長風騎鶴背却來平地看牛眠鋤雲已種三株樹駕壑空遺九曲船誰謂蓬瀛相去逺卷中還有玉堂僊題子固所蔵鮮于墨蹟一自昭陵蔵墨本書名誰復更超羣忽傳河朔専行草不譲呉興變𨽻分黄鵠夜深隨落月白鵝秋冷化孤雲風流賴有張公子雪繭封題比右軍㑹飲香嚴寺次李治書韻三首當門老樹髙百尺分得禪房一段清坐上且歌鸚鵡賦尊前莫聴鷓鵠聲正慚欲隠元非隠却笑逃名誤得名萬里乾坤望霖雨未容莘野卧阿衡先生坐對梅花樹標致元同一色清僊使已傳青鳥信呉姬空唱綵簫聲詩豪太白真無敵老懶知章浪得名試聴髙吟誰得似一時清興屬鈞衡越王城西莫山紫螺女磯頭江水清笑飲未窮尊俎興醉歸猶駐珮珂聲自縁鷗鷺知心事因許漁樵識姓名吟得新詩還袖去解頥今復見匡衡燕潛春樓次亷院使韻海上三山青不㫁小樓分得半閒雲樹深庭桂同碁晚花落瓶梅為酒熏岸幘謾稱人習懶問竒還許客來勤明朝只恐乗槎去撇却芝田野鶴羣晚歸香嚴寺二首烏石山前白石堤獨騎羸馬入招提天寒古屋來松鼠日莫空庭叫竹雞樹老根穿牆壁畫苔荒墨落棟梁題倚闌不覺成深黒隠約孤鐙過殿西身閑暫住城西寺到處青山佀故鄉把酒漫懐年少樂題詩還笑老來狂海風船候㯽榔信溪雨茶煎橄欖香聖主需賢方有詔未應白髮老馮唐城西晚步桃花杏花爛漫紅半巖斜日滿林風青雲客子歌三疊白髮僊人酒一中道路干戈思故國江湖書劔感飄蓬不才已分成樗櫟且把長鑱碧海東遊𤣥沙馬上偶成十里青山馬上看東風拂面尚㣲寒偶隨芳草來僧寺却咲飛花㸃客鞍東野先生方載酒西都博士亦彈冠莫怜白髮江湖逺且為諸公一盡歡秋日移居永源寺者踰月臨别贈浩無涯和尚塵世茫茫浩如海無涯觀海亦竒哉赤龍湧日水底出白馬駕潮天上來北風吹作雨鬢雪平地震動千山雷鳯凰池邉花爛漫玻瓈盆裏青崔巍挽朱郎中夫人江上西風吹白雪山頭衰草怨黄昏朱儲盡説陶家母韓姞原來魏國孫緑綺絃空愁海鸐紫簫聲㫁散文鴛它年太史書彤管更有恩封大里門題仲穆山水翡翠為崖金作坡白雲重疊䕶曽阿背琴童子松間坐束帶仙人馬上過髙閣半天開寳月飛流千尺寫銀河王孫已老丹青在轉覺風流意氣多荆門閘長堤迢遞石嵯峨兩耳波濤枕上多半夜鳴鉦風滿樹五更提板雪生河上灘船重千牛力下水㠶輕一鳥過欲識漕輸誰畫策馬侯祠宇枕坡陀李都事榮夀堂繡衣初拜幕中賔詔許疏封及二親鳩杖御前頒白玉魚軒花下従朱輪郡君得請賢康靖司馬増官説舍人何似一門全夀祉白頭同謝寵章新試院夜坐滿地松隂翠欲流嬋娟偏解妬清幽樺燈照夜官分署葦幙窺寒客擁裘院裏支更鈴語細門前待曉履聲稠紫烟吹散蓬萊近誰得僊壺第一籌縉雲道中時孫網之同行王子充期未至五門宫闕擁官曹詔許乗風看海濤擲地每慚孫綽賦登樓還意仲宣豪梯田稻蔟黄龍甲閣道松森翠鳯毛莫咲江南行客逺舉頭偏見日華髙泉州道中千山落日丹霞北萬里孤城白水南玉椀霜寒凝紫蔗金丸露暖熟黄柑海商到岸纔封舶蕃國朝天亦賜驂滿市珠璣醉歌舞㡬人為爾竟沈酣題張平章凝香閣嚴城控東南列㦸衛華搆日照洞房深芳璘永清晝窈窕帶鎖幃逶迤拂羅袖還因疎雨駐忽逐㣲風溜燕坐飲冲襟即此介純茂開門湖水緑一一來逺岫飛鴻不可攀灝氣横宇宙寄題谷叟莊連山起東南薄海勢逾迥丹霞峙華鄂靈籟挾光景絶壑蔓烟蘿白晝何深冷若人在空谷逶迤逺凡境浮雲謝軒冕雅志尚箕潁意適神逾超理悟心自省日莫梁父吟白髮還一整題倪元鎮小景髙松半為槎細竹亂如棘峰巒逺近見慘澹帶古色幽居在林下可望不可即贈貫朽石我身如朽石石朽身不朽雨灑龍文斑風吹獅子吼凉生玉几香花落金罍酒跏趺黙相對因之葆眉夀風雨送别張道亨僉憲空山自寥閴况此連日雨清晨起開門隨意立東廡風吹橄欖樹青子落當户濕薪就齋厨早飯已及午飯來美虀盤初非厭雕俎相知屬嵗晚落落還可數君去不可留雲㠶在南浦𤣥石歌次彦昭僉憲韻女蝸手煉五色石乖龍角鬭人不識泗濵風捲入英韶九奏功成萬夫力清標一染越江塵嵗月蹉跎竟誰拭秋莖露冷蝕生銅天柱雲收倚蒼壁何人為爾出妖緇萬里遂得相追隨無諸試劍謾屴崱螺女學舞空差池嵌嵓泄雨下墨黒霹靂忽起孤蟠螭夜深星斗散如雪曉日未掛扶桑枝世間頑礦滔滔是草根零落何足記瓦礫不混瓊瑶珍宗廟别有璠璵器使君知已為作歌鵰鶚横飛見髙志青天五嶺秀芙蓉且向三山看空翠和李經畧寄亷院使韻今晨欲别還復留兵塵澒洞何時休海天萬里風浪闊却思䇿馬登崇邱白頭寧復希世用髙門大宅蜂衙閧虞江雖少橘千頭陶家尚有虀百甕羨君慷慨多真情一絲似重九鼎輕明朝沽酒再相約共坐西樓聴雨聲和達道夫寄李經畧韻銀鞍白馬江南使散作五花雲滿地當門下馬看吹簫掀髯别有飛騰志海波漫漫髙山耳白日湘妃為君起黄龍負米去朝天百萬都人盡懽喜老夫雪髮目眵昏作事戾契人見瞋阿誰顧我意最真沙頭一舸鷗鷺親和李治書遊𤣥沙寺建山北起青巃嵸晴天直下雙蛟龍玉刻肺腑烟重重自是身毒飛來峰黄金布地貝闕崇萬年之枝千嵗松亦有野客如茅容寳劔出匣光芙蓉上方笙磬下方鐘桃花流水春溶溶日髙驄馬來相従星斗錯落錦繡胷愧予江海萍梗蹤題牧牛渡水圖兒騎牛兒騎牛雨牛渡水當中流一牛帶犢臨沙洲沙洲泥深没牛足中流浪髙拍牛腹長繩墜手衣裹身前者起顧後俯伏牛背敧傾不自由誰云穏比萬斛舟待兒出險走平地畫圖忽落東海頭東海頭飯牛之子鲁封侯呉水謡呉之水兮有魴有鯉雖有魴鯉食之弗美豈曰弗美不如我漪湖清且駛呉之陂兮有蒲有荷雖有蒲荷食之弗嘉不如我漪湖安無波呉之野兮多黍與稌雖多黍稌食之無補豈曰無補不如我漪水寛且膴漪水之陽兮姑山之隂亦復澒洞兮更阻深寒雨颼颼兮白日雲零零我望不見兮實勞我心北堂詩序北堂者外兄李庭玉奉親之堂而余先人名之鄧公善之書之龔公子敬又為之記也李涇望族世變中㣲庭玉父南翔甫娶於貢余姑也有淑行善居積相與左右家復振迺謀徙居宣城之西未㡬南翔没庭玉益樹立室廬園池務極崇麗而北堂為尤勝晨昏定省婦順子孝以供食膳必於斯堂而嵗時上夀少長咸集綵衣襴斒觴豆交錯亦必於斯堂余以子姪之禮數得列拜堂下㑹飲堂上時宣城稱故家文物之盛皆推先焉後六七年余游京師歸則庭玉已物故又一年先姑亦去世及登斯堂而哭之視其書則鄧公逝矣讀其記則龔公逝矣想余姑之形容思余父之名扁此心之感慨悽愴當何如哉一旦庭玉之子岳攜詩一卷而請曰人非事變斯堂尚存朝出暮歸不勝其悲幸加完葺以存先澤先生能强記之乎嗚呼渭陽之送見舅如母北堂之名想姑如父杯圈不棄猶思手澤而况於斯堂乎且世之子不能守其業者多矣今子不惟能守而又加葺焉是不可以無記且非獨為子之慰實以慰余思也陸氏世系表序江東憲史陸仲賢甫示余族譜一通其昭穆次第取法史遷年表綱舉目張親疎畢録逺近備見葢至於是六十有二世矣余既閱已未嘗不嘆其世徳之逺也先王制禮以服繋親至五世而止非欲人以路人視同姓也不過為之中制耳中世以降而五世外遂至於吉不慶凶不弔視同姓與路人無異於是去先王之意逺矣當是時也使族譜誠具為之後者按而求之某也某所自出某也某所自出將必惕然自省曰吾今千萬人之身其始一人之身也孝弟之心將油然生矣而昧者不知也今仲賢甫汲汲以脩譜為事其知此者乎譜稱陸氏在呉郡者出自漢太中大夫賈唐末之亂或有舉族居杭者錢氏欲用之遂徙家山隂而居四明者又山隂出也聞人代出若呉大將軍遜大司馬抗平原内史機清河内史雲唐國子博士徳明丞相兖國文貞公象宣城公贄呉郡公扆宋尚書左丞楚國公佃文安公九淵待制國史湄南國伯游文學事業照暎前後吾仲甫之譜之作也非獨有以繋凡氏陸者孝弟之心葢必有繩其祖武而興起者矣語有之曰盛徳必百世祀吾於陸氏有徴焉送宗人貢宜仲歸丹陽序至正二年春二月宗人宜仲自溧上執其譜來謁曰將訂吾所自出而收其未續者師泰敬受而合觀之則先世出於大名之滿城其南徙曲阿之栁墅與宣城之南湖其世次行第又甚相契於是合族之人而叙其故明日迺謁我始祖武徳公之墓以及我鲁大父侍郎府君大父大監府君先考集賢府君而祭告焉既畢事請序以别師泰聞之凢天下之受姓命氏未有不本於聖賢之後而族屬之疏且逺未有不原於一人之身也故君子欲訂其出收其續必知姓而後可考氏知氏而後可論族苟戾乎是則宗庶不明昭穆失次雖日諰諰以求其合必如㫁潢絶港其何由達其流而究其源哉然姓與氏族之訛自姬周之末已不能免况歴世寖逺因官因賜因邑因其所能因其所乗因字文之省因聲音之近紛紛錯繆其弊不可勝言乎烏敢據其近似者矯之以為同也唯我貢氏得之黎陽公之字而漢御史大夫禹尤加著稱千有七百年來固未嘗有若向之所謂錯繆者且柳墅南湖之先由大名而渡江也於宜仲於師泰皆為七世祖而二祖之行第相契嗚呼不妄援於已逺而遺於己荒使人皆有以動其不敢忘祖之念其庶㡬乎宜仲之心重有所取也宣城貢師泰序雲溪菴記呉淞江之上三涇之口有髙上人者芟茆架木以棲其身扁曰雲溪門無藩垣室不墁甃引潮為池周以竹樹池上治圃以植蔬果其外平田廣野嘉穀彌望橋其東南用渡來者去即徹之上人旦暮食息其中土床木榻若將終焉余自千山泛舟江上因友人呉景文過雲溪上人曰吾始受學禪林逰方之外甚幸承教於碩師聞人今年七十九而兹屋之成且四十年矣顧惟我佛真佛又何必膠膠然以求佛也我且拂石而棊坐樹而飲棊罷飲酣則于于而步陶陶而歌休休而卧不知天之髙地之逈日月之往來寒暑之代謝也客亦能同我樂乎余時憂患多病莫知所對久乃强起坐溪西南石上㑹有大魚數十尾浮游松竹枇杷之隂授以果饌則波翻沬噴飛濺几席間心甚樂之而不足以知上人之樂也迺相與一笑而退遊千山記余來機山逾月居恒鬱鬱雖率意而行僑目而眎其髙深幽曠不暇窮也一旦乗小舟縁溪東二里許見連岡矗矗直走飲溪復昻而拱神祠佛宇繡綺上下有浮圖冠其顛者問之千山也山上四望則全呉之勝殆無遺覽里人周彦英居其麓聞余到遣子従行又東三數里少折而西止宿圓脩寺寺外大竹數萬竿乍入委巷寒翠落人衣㡌凛不可留其後穹堂層軒阻以嵌崖帶以崇林雜樹蒙宻蘿蔓聯綴每風従山下回注叢薄則鱗羽森動隙光參差鸞鵠舉而蛟龍驤也鳥多鷓鵲鴶鵴竊脂又有異禽類鴉正黒而小終日飛鳴窻户間若與人相樂者時余病熱多悸亦為之洒然寺故曹宣慰創宣慰入粟萬石得官而家廢子孫因歸之郡人姚氏云歸隠庵記雲間處士呉崇謙世居支縣之蘆城由蘆城徙郡城之南久君怫然不樂者更徙三涇之口自號小村且二十年矣一日由涇北二里許顧瞻草樹叢茂旁多間田將復遷焉道見黄鼠人立而拱明日出如之明日又如之處士曰是若迎我者豈偶然哉吾其終隠於此矣屋後益樹花果阻以重溪溪之外數十步有沙阜穹窿若曝龜然大竹多至萬竿森立如緑玉處士每過輒盡日迺去間見雉雊竹間相嚮而馴未㡬雙兔踴躍伏於前因慨然曰始定宅而鼠拱我今雉兔復見天其告我矣乎夫雉死不變士節之徴也兔穴而蔵菟裘之兆也遂築屋四楹扁曰歸隠語其子野曰我夀當四百七十甲子明年我將死死必塟是至期處士死野謹卜日而蔵焉後十二年余客呉淞江上野間泣請曰野之先世自大梁扈従來永嘉四傳而至忠訓來蘆城又三傳而至我先君先君凡四遷而終於此歸隠之扁手澤也先生其能賜一言乎余聞呉氏之先出姬姓自泰伯譲國來呉遂以國氏至延陵季子而復脩譲徳天下後世聞其風者猶且超然有遺世絶俗之意况為其子孫者哉處士倜儻負氣好周人之急嘗言鑿江引潮溉田數萬頃邑人甚徳之今貽其後者能使食有柔秔香稻甘𤓰㫖芋嘉蔬珍果之饌居有崇堂邃宇凉軒燠館紋筦漪簟之適書有六經諸史浮圖老子醫卜衆技百家之言又有鴈鳬兔雉魚鱉鰌鱣以供其弋釣其志亦欲使後之人自食其力而無媕妸脂韋従人以辱吾隠徳也野字景文慷慨尚義自嚴陵歸即不樂於仕豈將慕季子之髙風而繼先君之志乎雖然隠非君子之得已也不得已而隠則可不當隠而隠則人其以我為矯矣昔之人有二隠者一處北海之濵一處東海之濵其出處窮達不同而為世敎重則無不同者景文去東海不逺他日或有駕四馬之乗載千金之璧即其廬而聘焉者亦當視其時而進退之毋徒諉曰吾歸隠而已庶㡬可為繼志之大者并書以為勸尚賢齋記余客呉淞江之上獲交於呉君景文景文之子克潛顧余尤厚荒村野水之濵即有不樂則杖䇿來往父子間所以慰其窮愁羇苦者久矣一日克潛請曰甚幸奉親有堂燕處有室而禮賔之次在西偏獨弗稱也將闢屋之南嚮以通其明塞北嚮以寧其隩又疏其東西以宜蚤莫之適扁其顔曰尚賢庶㡬賢者之至於斯也有以寓吾崇敬尊奉之意而樂告吾以善道也先生能辱記之乎余曰凡事之請皆其所已知者余復何言哉然亦豈無一得為子問學之助乎竊聞之尚賢之辭嘗載見於易之傳矣其立言取義雖不同其尊徳崇善則無不同者在大有之上九曰履信思乎順又以尚賢也夫處崇髙富有之極而能降従有位之賢固可見上九之謙退不居矣然不知所以致之者實由六五虛中而信順也在大畜之六五曰剛上而尚賢能止健大正也夫以篤實光輝之徳而能外尊無位之賢固可見六五之資人以為善矣而不知其所以然者實由上九剛健而能止也虛中信順故従人之賢而賢者之助日益衆剛健能止故不矜己之賢而在己之賢日加脩非深於易者其孰能之乎雖然世之人或有尚賢者矣而賢者卒不可得何哉豈甘鱻之味不適於口與靡曼之色不悦於目與窈眇之音不入於耳與宫室輿馬之奉不足以便其體而快其心與賢者固不為是也賢者不為是則凡所以崇敬尊奉之者亦必有其道矣詩曰緇衣之宜兮敝子又改為兮又曰中心蔵之何日忘之好賢必若此而後可以稱尚賢之實也否則外雖詡詡相徴逐而内實戾契不相合人亦孰肯樂告以善道哉克潛歸而復諸景文遂刻之楣間以為尚賢齋記記河豚河豚出江海之濵方春時伏游水底盛氣善怒遇物觸之圓張如鼓漁者伺知其處沈鐵䋁木搥下就之即仰浮波面因網取之以為羮味絶美用作鱠作鱐皆可或云暮春柳花飛魚始大肥葢不然出鹹水者肥早此云淡水魚爾然魚状甚惡蝟皮駢齒忿腹短尾又性毒能殺人故人雖愛之而輒疑畏不敢食往年余客江隂見魚出時居人争買取無問肝卵膓胃雜食之且更相餽遺不已比來松江甚嗜之如江隂二州人最為善治河豚及問之則間亦有死於是者矣大抵此魚有三種大者名青郎君小者名班兒皆可食獨河豚載之傳記河豚又有三色淺黒無雜文者最佳褐色黒班者次之文如㸃朱者有大毒其目睛脊血能立殺人必剜去之乙腴白如脂俗號西施乳肝大類鳬鴈者亦有毒然鱻肥在此去之則肉無味矣將食當披薄浸以新水使血浄如浮玉乃入釡或熬取油和肉而棄其滓卵細類粟以酒沃之經宿大可比彈丸能脹人腹至死食者皆棄之獨江隂人飽啖無難色問之無它法在熟煮而已世傳荻筍蒿芽菘菜可去毒故庖者先鋪菜釡底次鋪肝次鋪肉復以菜芼其上和薑桂五味熟烹之或生食則層胡椒釅醯如常鱠絡非良法也昔者養生君子以其為害也往往作為詩文以相告戒而後之人若罔聞知因食以傷生者猶踵相接嗚呼口腹之欲惑人如是哉余今備録之者非以醟滋味也顧惟駞峯熊掌猩唇燕髀之竒一失其時猶且屏而不食况兹鯹穢毒人之物乎君子能慎於彼而或不能忍於此至有拚命直一死之説亦可悲矣因記以為戒三真觀碑三真觀在長興州四安鎮石磵山之麓西北二里許穹林深池左右連屬里人周貴謙與弟進元善信實始創焉中殿像真武神及神之父曰明真母曰瓊真祠祭之法甚謹且備嗣漢天師聞而嘉之以神與父母為三而事神者兄弟亦三遂題觀以今額號貴謙曰通真明悟守道法師進元曰清真守素明道法師善信曰凝真守一崇道法師師先世在宋嘗數舉進士第至師寖㣲因竊力田治生家用復充已而曰何為是囂囂以勞吾形歟乃盡捐其家以為觀衣草食木絶去五味與仙人隠士相羊棲息乎其中而其徒之來日亦衆師委蛻明逺清逸宏敎法師敎門髙士陳君守中實嗣之於是益拓其疆址増其土田崇其門牖廣其屋廬復於殿之左廡起如殿者四楹以祠東岳右廡亦如之以祠三官祠繪象天神地祗鬼物伏衛婐寺魚龍飛走百怪之状撞鍾撃鼓笙磬互答簪星帔霞環珮瑲鳴祈禳奔走神人翕和而邦域之内益少水旱疾癘之苦矣余聞真武者北方黒靈𤣥㝠之神也其星虛危其象龜蛇危上髙旁下如葢故類龜虛上下如連珠故類蛇合二者之名曰𤣥武𤣥武七宿實主過行罰増年延徳列於四司載於六宗自昔祠官方士往往先焉宋避祖諱易𤣥為真而後真武之號行今并以神有父母曰真豈世傳襲之久道書又傳襲之耶然函三為一太極之真也自一而三人性之真也能不漓其真斯不亦長生久視之道乎若是則觀之名三真亦奚疑况我皇元肇基朔漠水徳之符厥有攸緒其主祠北方𤣥武之神又豈無所本哉元統甲戌嵗余以江浙相府掾驛過呉興間謁陳君山中見其神完氣和論議灑然已竊異之及見其徒費惟正潘元徳張君自成李君致堅與諸弟子揖譲進退各共其職夫然後知陳君之賢果能有以服其人也明日衆皆前曰觀始創於至元庚寅被㫖優䕶於延祐戊午迄今凡四十有五年而規制儀文庶克少備獨始未未記敢請以垂久逺余時雖固辭而心則已許之矣别去十年南北之望愈逺而陳君之請愈勤至正甲申夏將理刑㑹稽道出鎮上陳迎笑上手曰礱石待子文久矣余赧焉無以應退即舟中為書其故且貽詩三章俾歌以媚神曰神之徠兮連蜷脩與熈兮後先容穆穆兮離帝前閱光景兮俾民無愆神之駐兮斾墨墨雲黭黭兮沍圜則披髮仗劔兮威以力享庶㡬兮籩豆有式神之返兮斾差差肹饗孚兮𤣥諧樂將徹兮烝顧懐烈騰上下兮降福孔皆余編玩齋集既已卒業貢生欽搜諸敝篋又得先生遺稿數紙雜詩若文共八十一首一日持來予讀之愛而不能捨也仍為校定刻附卷後外有幽懐賦一首詞意頗不類歸之欽俾自録入家集云葢欽與武俱郡庠生従余受詩經武已登壬午鄉薦欽俟後舉貢氏世不乏人矣嵗甲申良月日性又識玩齋集拾遺
