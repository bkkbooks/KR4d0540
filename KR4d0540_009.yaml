body:
  text: 玩齋集卷九元貢師泰撰碑重修南鎮廟碑會稽山在郡城東南十五里地氣廣博而隆厚峰巒蒼翠上出霄漢而天柱石颿卧龍諸山皆環列其下如臣妾之事大君罔不順伏趨嚮周禮職方以為揚州之鎮信夫隋開皇十四年始即山立祠唐天寶十載詔封永興公祭用南郊之日厯代遂著常祀國朝加號王爵以孟春之月遣使齎香幣祀一大牢守吏齋宿具三獻禮其崇報之典視昔有加焉獨廟無守者有司又少涉其地風雨凌暴久而不免於摧敗傾壓矣至正四年春廬陵夏君日孜來為尹以故事謁廟下顧瞻旁皇曰尚可緩乎亟詣郡白狀郡長貳咸是其議俾更新之於是邑人相率分事竭作去其朽蠧易以堅良既增既廓百度具興閲三月工師告成重門廣庭挾以修廡殿寢閑閑齋廬翼翼神庖賔館悉稱𢎞麗且命道士陳道盛守之盡覈故田奉祠事餘以給其食鼓鐘之聲鏗鍧四達齋心竭誠朝夕惟謹然後克稱朝廷敬恭明神之意而山靈川后鬼物衛從百怪之狀亦歘然森布流動於煙雲莽蒼中矣竊惟古者諸侯祭境内山川而天子巡行四嶽則舉望秩未聞其祀鎮山也史傳雖稱秦皇東祀會稽而未聞其廟祭也然則厯世共事弗絶何歟蓋山川能出雲雨則法當報祀而其神明之會非假屋室象設宜無以寓其卷卷欵欵之誠此南鎮之廟所以厯千數百年而益盛也況世傳神禹之興朝諸侯於斯乎嗚呼神人協和而後理化大行六沴不作百穀用登吏兹土者其可昧所重輕哉然廟雖隸縣境而山實一郡之望山雖望於一郡而靈氣周流未嘗不上下磅礴乎吳楚之域斗牛之墟也是役也固以見郡政之舉而夏君亦知所重輕矣因作迎送神詩二章俾郡人歌以侑祀曰神氣磅礴兮下廣深鎮南服兮鬱嶔崟宫庭侐兮孔碩松與柏兮蕭森神之施兮澤濡恵我民兮不疵以愛錫祀兮自天函香兮孔蓋神穆穆兮降升載雲霓兮翠曾來儵忽兮從如雨盻豐融兮于豆于豋湖之頻兮山之陽神燕娛兮中堂龡參差兮拊鼔折瓊華兮奠椒漿神将歸兮載起龍兩股兮旗旖旎神不留兮奈何我之思兮曷已野有稉稌兮隰有蒲荷俾民樂康兮降福不那春秋兮灌薦風雨兮崇阿杭州路新建南嶽廟碑南嶽衡山在荆州之野祝融之墟蓋五嶽之一也自黄帝堯舜以來莫不崇祀而副以灊霍二山漢武南巡以衡山遐逺阻江徙祭其副徴諸典禮班班可見我國家混一天下嵗時遣使代祠惟謹杭州北門外故有霍山行宫圮壊不治比年将吏有别建廟於太平里之通衢以祀神之從者層簷穹棟疎櫺閟戸金碧輝煌規制宏麗戊戌秋九月丞相康里公過而見之進父老曰東嶽在魯境内所在猶廟祀不置況衡山實奠我南服者乎然惟從之祀而象設未正非禮也乃捐金命工中塑嶽帝象旁從六神兩廡繪山川鬼物之狀車馬仗衛出入之儀因其舊而更新之明年正月率僚佐蕆事於廟祼薦興俯小大咸一靈風肅然神若歆享因顧左右曰若是固足以稱神明之居矣然不可不思所以經久者乃割錢唐履泰鄉官田六百畮命龍虎山道士祝升智掌其祠事仍以西太乙宫真人王用亨主領之未幾升智又買廟後民地得六百餘步以增創之然後殊庭真館邃宇重堂莫不秩然並起矣既事執事者請紀其成竊惟漢武因其近以忘其逺即其副而遺其尊曷若廟貌之設猶不失其本真哉況山川之氣無所不通神之周流亦無往不在精誠感召如響斯應秩而祀之又何慊焉乃作迎享送神之曲俾歌以侑祀曰靈連蜷兮夷猶駕文豹兮赤虬不我即兮我心則憂靈繽紛兮來下朱兩轓兮從如雨舞婆娑兮坎其擊鼓鬱金祼兮椒漿烝殽兮芳薌靈醉兮在堂靈之去兮不我留湖水春緑兮吳山秋望回飆兮綢繆祛予灾兮逐予癘降予以福兮夀且祉嵗復嵗兮報祀無已杭州新城碑至正十八年春平章謁太尉曰錢唐東南重鎮地當衝要城郭不完其何以守太尉曰然兹實大役汝其白之丞相丞相謂天方旱民将弗堪議久未決則又曰丞相無憂也當有以處之遂詣太尉請出粟二十萬石以始興築命郡守謝節考觀圖志以諮故實度地植表以正方位視民力上下田賦多寡授之丈尺以均其徭發姑蘇吳興嘉興松江四郡又一州兩縣四隅之民更相作息以亟其成猶慮夫趨事之或息也則督部将先築錢唐門並湖者數百丈為之程勸且誓羣有司曰凡今之為非徒勞民且費也勞之将以休其力費之将以衛其財諸君其勉喻之吾且日視其勤惰矣其自候潮門步自東青門則平江守周仁治之自錢唐門步至豐豫門則吳興通守陸大本判官張士俊治之餘杭則嘉興通守繆思恭治之艮山北新清波則松江通守謝禮推官馬玉麟治之和寧與錢湖則屬之海寧州仁和縣而總其役者實謝節也令下之日風馳電驅小大奔走莫敢不共伐石於山浮木於江舟輸輦載千里相屬荷鍤揮杵萬堵皆興曾不三月而功已告成凡用石之工一百六十二萬木之工一十五萬圬之工一百八萬金之工二萬徒一千三百五十萬土石磚甓灰鐵木植麻枲之數累鉅萬億而不可勝紀也城之周六萬四千二十尺髙三十尺厚視髙加十尺而殺其上得厚四之三焉甃以貞甓錮以堅珉礦塈堊塗雪立虹貫舊城包山距河故南北長今則截鳳山於外絡市河於内故東西廣而廣輪適中焉為門一十有二東曰候潮曰新門曰崇新曰東青曰艮山西曰錢湖曰清波曰豐豫曰錢唐南曰和寧北曰餘杭曰天宗曰北新上各建飛樓四楹而外為甕城門皆左右闢其餘艮山清波各為月城環旋出入互相屏蔽鑿石為樞冶鐵為扇金鋪銅環啓閉有則縣以飛梁塹以重壕内凡二百步設鐙道以上下人馬外凡百餘步岌方臺以便矢石其上則發號之亭邏卒之舍睥睨樓櫓連輥飛礮靡不畢具於是崇墉堅壁若天造地設神鬼變化而形勢為之一新矣經始於十九年七月十三日迄功於是年十月某日平章乃諏吉日戎服上馬監軍司馬握刀抽矢從以鼔吹登城合樂以大落之千夫行酒萬牛共炙髙管遏雲飛旌耀日文學智謀之士貔虎熊羆之将頡頏起坐更迭唱酬逺近觀者盈城溢郭罔不心懼目駭以驚異其儀觀之偉成功之速也既事其賔僚将校相率請文以垂顯刻固辭不獲而其請益堅遂為之記曰杭之為郡左江海右湖山内接京畿外控諸國潮汐晝夜一再往返風颿雨舶瞬息千里象犀珠玉之珍秔稻魚鹽之利常溢於廬市而其俗又機巧多技能故五方之人咸集於此邑屋繁華貨殖填委可謂庶且富矣其城創於隋楊素者週迴三十六里奇廣於唐錢鏐氏者七十里方是時五季迭起干戈相尋錢氏獨能保有兹土以國覲宋及我天兵南下農不弛耕市不易肆涵煦休養又将百年故民生不識兵革而城郭益廢不治十數年來遭時弗靖或遇小警則民心遑遑奔走駭散而守者亦莫知攸措今平章乃能懲禍於既往防患於未形僉謀獨斷以作斯城使國本以壯民生以寧立久安常治之基無一旦隳突之患所以贊襄丞相太尉而翊戴王室者其功烈為何如哉昔者南仲之事文王則城朔方以息四夷之難仲山甫之事宣王則城東方以弭諸侯之亂播之聲詩載諸簡冊千載而下猶使人詠歌欣慕不能自已然則平章之興兹役也其有見於南仲仲山甫之事其君者歟勒銘垂勲其可少乎詩曰於赫皇元囊坤括乾作民父母聲教誕宣二祖九宗垂統繼極皇帝嗣位克肖天徳百年於兹文恬武嬉萬國一家城郭弗治人衆物盛釁生不測海内騷然小大失職皇帝曰咨孰殿東南僉謂康里協於帝心汝作丞相於旬於理懐柔協和以對天子有嘉太尉克綏我民疇其相之平章弟昆仲也死節行錫廟食季也秉鈞兼總宥密睠兹錢唐左湖右江提封千里實為大邦曰隋楊素載興版築五季之際保於武肅宋復休養生齒日繁仁漸義摩則惟我元盛極則否民亦瘁止狂童隳突四郊多壘不有嚴城其何以寧迺究迺度迺經迺營迺召長吏迺集将校令出維行是則是效按圖審勢庀財鳩工師徒響應役夫景從荷鍤成雲揮杵如雨分程考工各立部伍樹幹林比聚甓山巍縣梯輓石鬼運神移力作薨薨和聲許許並驅齊興千雉萬堵崇墉既起壯我雄藩鑿樞承鍵截鐵成關虎符魚鑰式嚴啓閉動静應時内外合制穹樓傑閣倚天絶雲丹碧炫燿五采成文限以長壕防以連埭跨以飛梁洞屬闤闠舟航水塞車馬陸填百貨之委商賈貿遷珠玉象犀南金大貝佅任雕題諸蕃畢萃既庶且富則教其民民曰忠孝敢不敬承忠以事君孝以事父允蹈斯言天錫爾祜昔也無城民何所依今也城成安堵而居昔也我民朝警夕備今也我民户不夜閉我有室家於以康之我有粟帛於以藏之我作我息我出我入變呻為謳伊誰之力伊誰之力相臣将臣固我金湯以衛我人吳山蒼蒼海波不驚天子萬夀四方底平建安忠義之碑至正改元之十八年皇帝重念閩海道逺用兵日久民弗堪命詔浙江等處行中書省平章政事布哈特穆爾以便宜移鎮之公既蒞事務修厥職明年淮寇陳友諒遣其偽将鄧克明等由建昌分三道犯閩又明年春三月陷延平夏五月乙亥圍建寧時經略使巴延布哈在城中遂以總管阮徳柔為參知政事調度諸軍都事余元善檢校趙璋治文書以佐之達嚕噶齊布延特穆爾主餽餉同知陳子琦賈伊爾莊文善各率所部往來接戰仍與理問景福實保萬户劉八十朱建安鎮撫瓮吉喇特田成住李庸嶽丞祖托音布哈劉丞祖唐齡府判㢘達爾瑪周宗仁推官左惟温經厯徐興福清州同知蘇顯忠等分門拒守江西行樞密院副使明安與軍政元帥吕天澤司礮石江西僉憲察伋揭汯江東僉憲余觀詢謀勉勵以奨士氣尋陞陳子琦為郎中賈伊爾為理問莊文善為宣政院判官瓮吉喇特田成住為萬戸既而賊勢益張公急督牙将合諸縣兵援之秋七月丙子復延平戊寅建寧圍解又明年春三月鄧克明復導渠帥胡廷瑞康泰大舉入寇三月庚申陷邵武五月辛未奄薄建寧城下當城西北立十數砦以鐵礮火箭雲車機弩晝夜攻突不少息城中食且盡公聞之顧謂參政張裕曰此劇寇也我當親往督師凡資糧屝屨之在行者子其速治之平章諤勒哲特穆爾左丞特穆爾斯奮然起曰公掌符節義不可行行在我等即日誓諸将於庭禡旗釁鼓行次延平號令嚴肅道路所經果榖如故賊聞官軍且至攻益急平章謂左丞曰賊今深入建圍未可卒解汀州總管陳有定戰數有功以為參政任上流事則賊勢自分左丞曰善然非躬往不可秋八月壬辰左丞馳數十騎冒圍入城中城中軍民呼號喜曰左丞來吾屬生矣時參政阮徳柔實總軍事且以其兵守平政門參政魏留嘉努以其兵守南門賈伊爾陞元帥以其兵守朝天門陳子琦陞總管以其兵守臨江門申號令以嚴備禦者達嚕噶齊蔣濟蘇同知天保四萬戸如故而益以和卓董桓也據要衝以為聲援者右丞章諤勒哲參政鄭􅌈龔思永行樞密院判官賈巴圖也近以舟師次水南者延平達嚕噶齊趙唐古岱也留寓而籌策者仍三僉事更佐以江西經厯葛元喆也在告而分任其事者郎中鄭潛達嚕噶齊布延特穆爾也九月賊梟将辛某復益兵來攻我去城不五十步連置營壘勢危甚乙夘左丞率都事張貞王斌理問伊埒約蘇及掾屬等會諸将於官山新城議所以擊賊者於是阮參政首出拱北門焚橄欖山砦魏參政出南門奪水南砦賈伊爾敗餘黨於菱角塘陳子琦董天麒亦敗之於萬安州獲牛羊馬驢甲胄鎧仗之屬不可勝計賊自相踐溺死者千餘人丙辰賈伊爾乗勝復建陽戊午陳有定復邵武賊散走者輒遮殺之餘悉度關以遁平章左丞既振旅還會府論諸将功公方第其賞賚之等諸将咸曰去年建寧受圍六十四日大小三百餘戰居民壯者執干戈老弱運磚甓婦女治饔飱晝夜目不交睫四面矢石雜下死傷甚衆雖重創且攘臂轉戰不已城賴以完今年圍又一百八日居民力戰視昔勇益倍倉庾竭則悉出穀粟以給餉帑藏虚則傾所有繒帛金寶珠珥以助費至於刳木皮苴草本以待頃刻之命猶分食飲以食戰者雖童孺羸瘠亦乗城怒罵誓不與賊俱生建城幸不陷而我等得以成功者皆吾民奮忠效義之所致也其敢私賞賚而忘吾民耶公曰善哉既行賞乃命榷司發廩鹽四千斛以遺民食仍命有司立石通衢題曰建安忠義之碑為八郡勸以師泰嘗承乏太史也具事始末來徴刻文竊惟先王建邦設都必負谿山之險嚴壁壘之制者所以禦强暴而防禍亂也然而髙城深池卒不能勝一朝之變由民心之不固也是故教之智仁以育其徳道之任卹以和其心勉之樹藝以厚其生薄之賦斂以休其力然後上下相親休戚相係若子弟之衛父兄設有患難雖使之赴湯蹈火猶且不懼又肯疾視其長上而不知救也耶比年横兵連起所在吏民望風遁去連十數城無一能守者甚者反為嚮道甘於臣僕又甚者率其子弟攻其父兄天綱人紀於是極矣獨建安之民能以孤城抗守連嵗非真有所見者能之乎吁偉矣哉夫忠義固本於人心而激昂奨勸則在上之人今相府不有其功而歸之諸将諸将不有其功而歸之於民民其有不效死者乎況建安實徽國文公講道之地郡縣有祠閭里有塾而五劉之忠三蔡之學游胡真氏諸先生遺訓具在凡事上使衆之方尊君親上之道其父兄子弟聞之熟矣兹以數千之遺黎去十萬之强寇休風丕烈卓然冠乎東南而光照海岳厥有由哉為之詩曰元徳天齊帝敬日躋奄有萬國遂式九圍盛極釁生狂狡突隳河蔓南北山延東西於淮於江流禍不已暨於閩邦叫呶蠭起鴟張角拒毒甚虵豕犯我疆場瀆我國紀維爾建安城固以完再至再敗卒莫我干我民繹繹我師桓桓各率爾力以却兇頑倉庾之竭民則我食帑藏之虚民則我給不令而趨不呼而集載戰載守靡日靡夕寇既退矣賞賚斯論相曰女将将曰女民功成不有懿徳是敦窮匑克讓遂有休聞天佑其忠人服其義孰不賈勇以張士氣芝山巖巖建水瀰瀰生既復生死猶不死維學之正維道之隆施於後來烝烝其從抑澆揚淳以激其風伊誰為之徽國文公平章曰都宜錫爾羨敢録以聞稽首北面天子聖明東南實眷刻石垂休臣百其勸江浙等處行中書省平章政事慶通公功徳之碑皇元受天明命撫有萬方承平百年民生熙熙不識兵革一旦釁起汝蔡毒流荆楚以及江浙皇帝重念兹實大藩非得威信重望之臣不可迺至正十二年秋詔遼陽等處行中書省平章政事慶通移鎮之冬十有二月公至視政其時江東之饒信徽廣徳鉛山浙西之常湖建徳悉陷於賊且急犯三關以窺省治公召僚佐将帥語曰皇帝以重地畀我等治方地萬餘里屬郡三十二今若此忍時刻緩乎爾其即率所部分兵以進其或資糧有不供器械有不備凡在行有不給者其責在我紀律不嚴戰鬭不力慢期愒日以殄我師則罪其可辭於是大小震懾莫不用命所向克捷曾不踰時郡縣皆復乃合長吏按視民數盡出詿誤勞來招集俾安其業仍發粟賑之而後流離之民逺近畢至矣省治燬茇舍露處吏告經始公謂故址隘不足以稱大藩之觀宜更大之或以役重費廣白公曰吾方藉此以贍貧民奚為不可是殆非若等所能知也遂伐石於山浮木於江分官董工萬手並作功既落成而民賴以全活者甚衆杭郡學創而復廢會其所入不足取旁郡學院餘財益之規制宏敞視昔有加公率僚屬行舍菜禮彬彬揖讓在泮之士咸稱頌焉其他官寺傳舍樓觀之屬有關於政者罔不完治雄書大扁宏偉端重識者以為如其人十四年冬太師中書右丞相托克托公大舉南征一切軍資取具江浙榖粟䕸薪稾秸之需弓矢刀劍戈矛甲胄之用動以萬計陸運川輸千里相屬使者督趣旁午公能推誠感物以簡御煩周旋上下曲盡其道遂使民不告病官無廢事明年春常州無錫盜起縱兵大掠進逼郡治斷驛道衆議以重兵殱之公曰赤子無知弄兵迫於有司故爾若能諭以大義彼自來歸衆聞之皆投戈解甲請為良民又明年秋義兵元帥方嘉努鈎結同黨相煽為惡出入擁兵馳突白晝殺人掠財物無顧忌公白丞相喀喇公麾左右斬其首以徇杭民大悦初公至杭承兵亂之後有司乗間為市厚斂薄給公私益耗公選於衆分詣屬郡收其隠餘得粟數十萬石公節財用出入尤謹非當於事一毫不妄予人故費雖鉅而嵗漕之入方物之貢未嘗匱也設有市於民必使視其髙下而平其直吏亦不得並縁為奸人皆樂輸之又明年出鎮海寧海寧東距杭百里地瀕海磽瘠其民散處荒落間終嵗力耕猶不足以自給公惻然念之戒士卒不得離部伍輒入人家雖左右僕𨽻人亦鮮識其面居二年如始至既去人益懐之公在政七年朝廷嵗遣使錫賚不絶平居勤儉出天性祁寒盛暑晨出莫歸一日不敢自逸身為将相而自處若寒畯一遇賔客則盡歡乃已禄賜外家無贏財清苦之操老而益勵天下之人識與不識聞其風者無不稱歎與人交恂恂自将至臨事毅然有斷雖萬夫不可奪嗚呼可謂得大臣之體者矣公喀喇氏字明徳祖父莽賚特穆爾贈益國公父烏魯斯光禄大夫四川行省平章政事贈益國公公蚤以勲臣世家之胄遇知仁廟給事内廷後長宿衛擢授中奉大夫大宗正府掌判三遷至資善大夫上都留守出為淮東㢘訪使入為工部尚書拜河南行省參政左丞進資徳大夫甘肅行省右丞遷山東㢘訪使改樞密副使陞同知除侍御史陞中丞領侍儀司事兩陞皆特命也進榮禄大夫江西河南行省平章政事遷太府卿復留守上都提調虎賁侍衛親軍都指揮使司加光禄大夫平章行省遼陽遂來江浙召拜翰林學士承㫖未行改平章行省淮南未行還任江浙加銀青榮禄大夫踰年改福建行省平章未行天子念公久勞於外且南臺按治四省為尤重特拜江南諸道行御史臺御史大夫賜上尊御衣以寵異之實十八年秋九月也公既去之五月杭大夫士及其庶民父老日造丞相府俯伏頓首請曰吾儕小人得不即死以至於今日者丞相與平章力也丞相幸留恵我而平章已去省吾民獨能已於思乎将圖刻於金石樹之省門之外以昭示無窮用敢冒昧以請丞相以屬師泰師泰不敢以固陋辭遂為之銘曰維帝作極維臣其命維獄降賢俾輔元聖龍驤虎躍乗風翼雲統一萬國坤寧乾清有偉康里世著茂蹟帶礪河山子孫奕奕祖也益國錫爵上公父也繼美遹纘大功維賢有子克承克似遇知仁皇入備宿衛能以恭謹出入禁闈帝曰汝衆汝其長之汝賢汝文可判宗正我還汝留我京汝尹出則司憲入則考工克修汝職令聞日隆河南西涼既參既丞樞機宥密貳副繼登執法之司儀表中外玉帶衮衣厯踐台位睠兹江浙新刳於兵疇其鎮之僉曰公能皇帝曰俞汝其予治衛以虎賁錫之弓矢公騎如雲公來自東誓将出師誅止其兇且附且降我疆我理宥詿撫殘其來如子粟施於廩其恵則均物取於市其賈則平内節財用外蘇民力祁寒盛暑朝出暮入民庶安矣我心則寧乃構公堂乃經乃營公堂既成孔廟有翼敷政設教是效是則王師大舉其會如林供億巨萬悉資東南漕粟飛芻千里相屬指顧有方饋餉用足彼蚩者氓梗於毗陵惟徳之綏不煩以兵彼狂者猘於杭之里徳不可懐梟首以示公馬駸駸出鎮海寧公來幾時海波不驚公胡遽行實長南紀公不我留我留不已昔也兇獷我掠我戕今也甫安喣我痍傷昔也姦貪我朘我剥今也甫安去我毒蠚我飢公哺我寒公衣撫我卹我我胡不思天錫我公彌夀遐福以莫不庶以受百禄公曰豈敢天子聖仁惟天子萬夀以福我後人江南浙西道肅政㢘訪使酬徳公徳政碑至正十六年冬皇帝重念江浙用兵之久既遣大臣出鎮之猶慮司風紀者不能深諭㫖意乃以江浙行省左丞酬徳公為江南浙西道肅政㢘訪使時官廩匱乏民力凋耗公私大困公視事慨然嘆曰天下承平則擊奸去邪職也今日之事其在安靖而輯之乃挈綱維申令典務存大體以清治化屬行臺移置會稽公需之物吏白下有司治公曰有司即擾民矣遂出公帑市於民悉當其直民甚便之杭之三關曰昱嶺獨松千秋控扼宣歙諸郡公首議增修堡壘嚴兵守禦賊屢犯輒敗去賴以無虞軍士有暴横者短衣露刃白晝羣行市中殺人而奪之金有司莫禁聞公來皆避逃去且相戒曰監司大人不可犯也異時軍民雜處淆亂無别甚者遂私其室公語其帥於北關門外夾河築五壘徙居之亂少已杭故無城守保結之法久而益懈公更令户大者長萬夫次千夫又次百夫立部伍别旗幟上下相維視他郡最為嚴整郡縣屬兵後吏並縁為姦公取其尤無良者懲之餘皆重於犯法司税者多結市井無賴子分布逺近以漁獵商人令悉禁止物價遂平倉吏嵗當更有司輒視貧富為去取公㢘知其弊父老奉香擁拜道上曰此細故曰幸留意焉吾儕小人有所賴矣西湖書院在憲治之西尊經閣嵗久益壊公出私庾白粳二百石大興修之丹雘髹漆煥然一新識者固知其深有得於治本矣三吳之使來輸忠欵丞相議遣官往報衆未決公獨力贊其成迨今民受賜焉十七年秋上聞而嘉之擢行省右丞賜上尊金幣慰勞甚厚臺臣尋以治狀聞監憲如初按太史周暾所著武功録公以浙東元帥董師江東克復三路二州一十三縣全活十數萬人所至撫摩喣嫗民争歸之及其還鎮於鄞也置修城田以絶横斂復赤秔糧以便輸納增鄉飲田以敦禮讓凡可為斯民計者無不深思而致力焉及今監憲又能維持綱紀周旋上下以康濟時艱非其寛仁雅量包涵容蓄無施不可安能使人翕然嚮化若是哉公字子元號春野蒙古氏曾祖桑烏遜太師中山王祖特哩實克河南行省右丞父旺沁江浙行省平章公由近侍拜南臺監察御史厯四道㢘訪使翰林侍講學士累官榮禄大夫今為江浙行省平章政事銘曰昔我世皇既定四方分命百司乃紀乃綱大江以南釐為十道十道之長維賢允蹈睠兹西浙實為大藩地廣物夥民庶事繁我公之來屬時孔棘務存大體用作民則短衣朱抹白晝掠金片言之出强暴革心奸吏舞文戕我善類罰止其尤罔敢或肆三關雒雒控扼東西連營髙壘賊莫敢窺什伍其民互相保結以戒不虞以安爾業關征有度商賈乃來筦庫弊除吏民畏懐乃新學宫以振教鐸重門廣庭穹堂傑閣公既戾止玉節繡衣來游來觀是式是儀是式是儀邦之司直邦之司直克修厥職皇帝曰都使往南國文錦上尊式彰有徳台鼎甫踐憲命復臨予非汝私實民之心公拜稽首曷敢不欽天子萬夀以宣徳音重修清平山西天元興寺碑杭之吳山西南行數百步其勢委而復起曰清平山右旋而東浮圖居焉曰西天寺延祐丙辰嵗贈太師中書右丞相和寧忠獻王托克托始來江浙為丞相時會西天噶達爾瑪實哩班迪達師駐錫兹山王見而異之曰此佛祖上乗人也涉流沙萬里東來而適與吾遇非夙縁乎乃厚出金帛施之俾拓地創業建大招提且為修息之所越二年王還朝師居山中益久一日謂其徒曰吾歸西天矣遂拂袖去莫知所之後有見之秦隴間者時已百餘嵗矣至正乙未天子以江浙用兵之久民力凋弊思復重臣治之遂以王季子中書平章達實特穆爾階金紫光禄為左丞相凡招降討逆賞功罰罪一切許以便宜居數年政大修舉上聞而嘉之遣使錫勞加儀同三司因感嘆曰此皆先王之教非臣之能也其将何以報國家之恩寵而慰安先王哉間以暇日登覽湖山訪求遺事則寺燬已久獨舊鍾存榛莽間王之名識具在徘徊顧望惕然興懐乃出錫金規復舊制工師效能民吏協勸曾不踰月而穹堂邃宇廣殿重門藏經之室懸鐘之樓香積之㕑栖禪之館罔不畢具繚以周垣甃以文石朱楹雕題寶幢珠絡佛菩薩天人之象香花燈燭之供鐘魚鐃鼓之音鏗鍧炳耀視昔益加盛焉乃更號山曰清平寺曰西天元興又於殿左創屋四楹奉祠先王割田以供祀事餘以飯其僧凡所以盡心圖報者可謂無所不用其極矣王康里氏幼侍武皇厯登華要知樞密院事拜御史大夫以至命相封王其中子特穆爾達實中書左丞相贈太師冀寧文忠王皆以盛徳大業垂勲竹帛王之在江浙也鑿市河以通舟楫出粟米以賑貧民去今三十年深仁厚澤藹然猶洽於民心今丞相復能以宏材大度康濟時艱使朝廷無南顧之憂黎庶有樂生之望豐功偉績光昭前烈兹寺之興豈獨致嚴追逺以永其孝思而已哉庶将祝釐錫福為人臣効忠之勸爾師泰不敏甚幸以文墨論議趨佐下僚用敢備録其始末而為之贊曰大邦維杭左湖右江吳山中起羣峰來降清平之陽元興有寺誰其作之王喀喇氏髙僧達瑪來於西天雄偉博大神光燁然王既見只王心則喜穹堂傑閣斯實創始隻履之歸刼火灰飛王亦遄去樂極於西王有賢嗣出入将相來殿南服為國屏障乃登兹山裴回顧瞻梵宇再新王祠孔嚴丹楹金題寶幢珠絡神象屭贔天龍踴躍趫趨婐侍魔舞鬼歌雨花風枝散亂交加精神感通用錫繁祉人孰不曰忠獻有子忠獻有子克繼克似踐父之位行父之志維父子濟美以輔我家邦以欽於世世四明慈濟寺碑慈濟寺在明城之東鄞江之上故泉州徳化縣尹揚侯秀為乾符觀主太虛容法師創建者也侯郡人仕宋為監舶官入國朝嘗使暹人以其主來朝當涉海時風猛濤怒舟幾覆侯於恍惚中若有見觀音大士者因得無害歸而圖所以報祠焉聞容公東南碩師遂往謀之師曰明之山東玉几峰為阿育王舍利之藏又東補袒洛伽山為觀音示現之地朝廷嵗遣使禮祠兩山而王公僧俗川浮陸走以禱以禳者常肩摩而踵接侯果能即其地之衝創寺以為延接之所則報無踰此者侯曰信然非師不可迺買地度材用創兹寺前建大殿後闢方丈三門兩廡丹雘輝映而正觀之堂栖禪之室庖湢庫庾亦莫不次第興舉矣至大二年上之朝始被今頟賜璽書加䕶仍號師浄妙慈行真辨圓悟法師俾其徒甲乙為之主於是四方禮祠兩山者有所歸焉初寺之興也地瀕舄鹵食飲苦之一日行寺之東偏曰此宜有伏流購其地鑿之果得泉甘美雖大旱不竭他日又将即泉之北創歸寂之塔衆謂泉南大樟能出光怪里人方神之懼興作有犯師笑曰吾已示之矣其夕天童雲外岫公泊舟樹下夢老人求詩謝去明年師夀七十召其徒法言可貴曰我佛世尊教從聞中入流亡所遂得空滅我何以即解脱乎復執可貴手曰汝父儒者生女時夢兩老禪至老禪宗門魁碩也汝今為我弟子豈偶然哉凡我所未了者其在汝乎言已趺坐而逝衆既奉師全身歸諸泉北之塔而傳其業於言言居十年賴以不墜及貴繼之焦心勞思務承師志間顧謂其徒曰昔者寺址甚隘畮不踰七今以衆檀那力已倍之矣昔者田入之數僅二百畝而象山塗田又輒壊於水今幸成堤亦已倍之矣獨莊嚴象設未備桃花渡新庵欲創而未能其何以卒吾業廣吾施乎未幾有弟子普光者歸自江淮得設色雕塑之藝延即大殿立觀世音大士象塗以黄金絡以衆寶旛幢華蓋亦既完好會宣慰使李公允中諤勒哲圖公來視政首謁兹山曰吾聞貴上人将創庵海濵以廣延接此其人行甚髙宜有以助之迺相率捐金力倡其成且名其庵普濟然後規制恢拓棟宇宏麗鐘魚鐃鼔之音香花燈燭之供與東南諸大招提頡頏上下而其所謂發菩提心入三摩地者邦人士益知所禮矣至正戊戌冬予以分部董漕閩廣使過甬東止宿寺之方丈上人欵予甚厚将别執書一卷若有所請而不言問之則狀其寺之始末以求記於予也予既序次其事而復為之歎曰揚侯以孤身逺涉能致暹臣之朝容公以碩徳峻行能起揚侯之敬而言也貴也又能即空捐有以獲殊勝上為天子祝釐下為民庶錫福使愈久而愈大亦何其教之盛而信之篤耶予於是重有感矣銘曰大海渤潏蛟龍窟穴狂飇鼔之顛倒日月揚侯使暹摧檣折颿被髮一呼風平浪恬惟大悲力是名菩薩圓通出現有難斯脱歸謀容公慈濟作宫白衣金色鄞江之東王侯士民其來什伯天子曰都錫爾今額有隆其棟有覺其楹寶幢珠翣鐘鼓鏗鍧曰言曰貴惟容之繼且報且祈庶廣慈濟慈我之寓濟我之航以二者心普施十方補袒洛伽玉几阿育神光咫尺即我身毒即我身毒永祜南服永祜南服為天子祝何千萬年無量夀福重修定水教忠報徳禪寺之碑距慈溪縣四十五里鳴鶴山之陽槖駞峰之東有寺曰定水教忠報徳禪寺左山右湖竒勝為一縣之冠青松夾道緑竹沿澗逶迤曲折行十餘里乃至山門始建於唐乾元間相傳為大梅常禪師開化之地有泉出山東麓甘冽盛夏不竭注之飲雖久不腐故名清泉其所藏大藏經乃唐人書吏部侍郎京兆韓耔材為之記嵗久寺壊宋嘉熙間太師越國公袁韶遂大新之奏賜今額蓋寶葉源禪師所營度也我朝至元甲午東州永禪師來更創大殿去今六十餘年又復傾圮其他屋宇堂室亦廪焉若不可居寺之耆宿與大夫士皆曰此非有大作為不足以成此十七年春見心復禪師應選實來師堅慤而任事辨博而識微既至顧瞻徬徨晨夜勤悴将圖興作會東南兵動徭役繁興寺之力益困一日陞堂白於衆曰吾徒逸居安食惟佛是依今雖財力殫竭獨無一人與我共圖之乎尋有耆舊仁英捐錢五千緡為之倡未幾施者踵至曾不踰年大殿告成又有僧大用勸集衆力於殿壁後塑觀音及諸天龍鬼神之象金碧塗塈五彩輝煥而鐘樓經藏三門兩廡庖湢庫庾以次完葺比其翠幢孔蓋寶函珠笈羽翣華燈珊瑚瑪瑙一切供養之具靡不周備寺舊有兩大桂茂甚宋盧陵麟公住山日嘗製其花為香以遺誠齋楊公公答以五詩有天香來月窟之句師因扁其坐禪之室曰天香正月八日終其徒宗元等既塔於城南雲峰又二年户部尚書貢師泰以秘書卿召過浙水之東其弟子天寧恵禪師天童良禪師相率謁予於舍館執進士趙友藺所為狀請銘乃節次其狀曰師諱明孜字舜田族張氏州之黄巖人初母周嘗事佛好施予出見饑疾者輒傾囊濟之當娠時夢異僧入室乃生師師幼穎悟日記千餘言於浮圖書一過目輒意解年十七辭父母出家留之不可遂往仙居三學寺禮雪山曇和尚落髪受具既而聞天童坦禪師倡道東南即詣之一見問曰達磨不東來二祖不西往其意云何師應聲曰金不博金水不洗水坦曰此子機鋒敏捷宗門令器也自是遍叅碩師聞人若古林茂公竺原道公東州永公元叟端公東嶼海公尤器重之時日溪泳禪師居天寧請師掌三藏相與激揚宗㫖聲譽益著會仙居慈安法席久虚衆推師主之已而三學諸宿曰此吾師受經地其可使為他山重乎遂力挽以歸泰定初行宣政院於江浙丞相脱歡公實領院事首檄師住天台之浄恵寺至順三年移主仙居紫籜山廣度寺至元六年宣政院使納麟髙公選住處之連山尋隠鴈山師方登髙臨深超然自樂而丞相伯勒竒爾布哈公領院事復起師主天寧師辭不獲乃笑曰出處隨縁爾遂行先是寺毁於火師至升堂集衆揚翇曰吾徒赤手尚能有所建立況兹寺力猶可為乎於是衆志堅一施財以資經始曾不逾年而邃殿穹堂重門修廡與凡樓閣庫藏之製靡不雄偉壯麗内外秩然既事會南行臺侍御史左公江浙行省左丞特穆爾公以使過台見而偉之為請於朝錫師金襴袈裟加今號久之平章榮禄方公同知樞密院事資徳公參政正奉公分省院於浙東咸崇信其道為作佛菩薩羅漢諸天龍神象雕金塗砂衆寶羅絡光彩照耀一復舊觀赫然為東南諸刹之冠矣一日召其徒曰世尊臨終示衆有言汝等當觀吾紫摩金色之身今日則有明日則無其為我了徹斯㫖哉語已復請謝别樞密公公至師曰老僧去矣佛法非國王大臣為之外䕶不可也敢以後事為屬明日沐浴更衣浄髮跏趺而化時天大雪草木縞素學徒悲號震動林谷𦵏之日以及民士罔不來會天日澄朗道無游塵既窆大雨隨注衆嗟異之始師家居之南有巨樟竦拔霄漢蜀僧過而指之曰兹樹西偃當有鳴道法者出矣及生時樹果西偃師相貌雄偉言論辨博恢擴真詮開覺迷罔後學烝烝來從如渴得啜凡度弟子若干人得其法者曰藪曰惑曰瑞曰正曰嶽曰恩曰保曰印曰圭曰大曰空曰慧角立名刹咸能蹈道闡法藉藉有聲師喜為詩文雖片言隻字亦出人意表嘗即巾峰下闢軒以居自號鶴松主人每朝夕煮茶欵客引鶴起舞顧影蹁躚翛然自得外慮不入於心也去年秋鶴斃賦詩悼之詞極悽婉聞者悲之不踰年而師亦厭世矣嗚呼師生赤城黄巖之野赫然名動乎東南生能被恩寵於朝廷死能使公卿貴人奔走訃贈非其卓行髙識有以異於人者其何以致是哉銘曰竺乾之學禪為宗有極其奥斯覺雄并包萬有混一空六識皆寂衆妙融嘻師揮翇揚宗風三軍朝氣當機鋒即真破妄明抉蒙度羣弟子道彌崇出其緒餘著事功飛甍傑構連曾穹城霞海日光曈曨菩薩羅漢諸天龍黄金作相巍當中襴袍錫號黄帕封奔走士庶傾王公譽聲流布龎以鴻師今化矣超𤣥蹤靈塔永閟台雲峰勒銘貞石垂無窮玩齋集卷九
