body:
  text: 玩齊集卷十元貢師泰撰墓志銘奉訓大夫紹興路餘姚州知州劉君墓志銘君諱輝字文大本太原人世以武勇顯曽大父宏祖襲爵為金山西四路都萬户國家既平河東詔徙太原十大家于河南始為汴人大父祐峻直不阿哈喇洪劉侯嘗請參謀其軍事每指語僚屬曰此山西將家子不可犯也世祖皇帝在藩邸以南征還過汴因得上謁將大用俄遇疾卒父汝舟讀書通周易嘗遇異人授以皇極數學遂决意不仕自號夷門老人以君官餘姚贈文林郎南陽府內鄉縣尹妣羅氏孔氏皆贈宜人君豐儀美髯論議慷慨自幼端重不戲父喪能哭泣躃踊如成人他日昆弟以分財致訟君獨置不取奉太夫人孔氏别居棗林之南莊且日就其兄文振與姊壻陳子中學焉久而家益貧念無以為養因教授其鄉終日危坐顔色毅然諸生進退悉就規矩時人已謂夷門有子矣河南亷訪司聞之交辟為吏適廣西檄先至君曰此必有知我者遂就辟㑹中使至宣詔百官跪拜聽讀畢復出帝師㫖令具如儀君曰此人臣事主上禮不可使者拂然怒去人皆悚懼已而聞湖南北皆如君言臺臣嘉之遣酒饌慰勞部使者部使者首舉酒釂君曰微文大幾辱我君嘗以邊事馳白御史臺大夫阿爾斯蘭少許可一見特稱異之未幾轉湖南宣慰司令史復調廣西賊犯臨桂義寧從副元帥結喇實策出師討捕審察形勢綜理兵政大捷以還因手書征徭事宜一編上之明年賊復至君以疾不得行兵遂敗主將皆被殺衆益賢君才辟掾湖廣行中書省尋掾江南行御史臺及格除文林郎紹興路同知餘姚州事君至則東西道凃七十餘里橋梁數十里皆治使完整夷好時州民朱氏子以分地奪於强宗僧善能以侵疆壓於豪民皆數十年不能决者君一旦决之由是他縣獄有疑郡輒移君讞山隂陳夀二私鹽事覺殺其幼子以詆官兵嵊縣屠禮二妻為外家誘賣而蔽於富人新昌夏子興愳罪自毒誣有司掠死案牘參錯嵗久無驗君片言之間莫不引伏郡中號稱神明禮部侍郎泰不華來守越首正經界請君計事君曰寬容慎密民必輸情而盡實嚴急苛暴人將畏罪而生姦守大喜曰得之矣遂以州委君君領檄即出宿官廨執事者持文書環左右常千餘人日唯一起居太夫人還坐夜分猶報朱墨稽勾不絶疲精竭神鬚髮皆白既代二年而後成為田五十五萬三千七百畝田一區印署盈尺紙以給田主謂之烏由凡四十六萬三千有竒畫之為流水册次之為魚鱗圖類之為兜率簿第其髙下而差徭之謂之鼠尾冊又總凡六千二百五十詭名自陳而得實者六千七百餘畝站户既迷商得復者一萬一千二百二十畝因而息訟者七十餘家綱舉目張秩然不紊行之數年亷訪使董公用其法頒之屬郡於是浙以東人無大小頌劉侯不絶口矣始君之承命於守也貧民大恱富者咸戚戚不樂覬罷其事君卜之神不吉曰吾知恤民而已焉得聽命於神乃移植小柏于治事之庭祝曰事成否當於柏榮悴占之屬時亢旱而柏鬱然以茂後人愛之如甘棠遂名其堂為瑞柏學士大夫多詠歌以頌美之行省行御史臺謂君才當被顯擢纍上其功不報久之以選授儒林郎松江府上海縣尹縣在東海之濵其民多豪强輕於犯法所謂三甲五甲嘗再挺為亂尤號難治嵗輸粟三十萬石而宋季公田曹氏湖舊額重租耗民多閉償中産之家嵗一當徭即破蕩無幾姦吏乘之後法大壞君始至嘆曰何以使吾民至此極也因出藍田吕氏鄉約朔望率父老子弟㑹坐學宫講行之升降揖拜彬彬禮讓皆樂生自愛交相勸戒莫違君令而君亦知其民之可使也乃令自議其力而定其役之下上初役田四十八萬餘畝後逸其半不數月悉復其舊且長人髙昌二鄉土宜豆麥而使輸粳稻民甚苦焉前丞鄧某力言之雖幸改科而江淮財賦猶徴不已君具白大府得如請而向之所謂重困吾民者亦㑹詔免於是民始無愁苦嗟嘆之聲矣他如學校課講勸懲之篤常平義倉斂散之宜舍館津梁斥候之治賔燕禱祠迎送之謹凡其職分之當為者莫不盡心而效力焉居嵗餘有太夫人之喪號慟幾絶縣人為之罷市兩甲民嘗以頑獷被罪者亦拜哭來祭却之則更哭曰我小人幸教我得為良民今見拒甚是終絶我也君察其誠進之復叩頭謝去君欲奉柩歸河南遇道梗不果邦人士遂相率入錢買地留葬于千山夀安寺之東岡復祠君象於肇嘉濱之普濟寺踰年除奉訓大夫户部主事不赴御史臺以江淮盜起且遣使請君問計亦不赴終喪改知紹興路餘姚州事命下之日州民喜相告曰我侯復來矣老幼扶攜絶江迎謁者相屬于道既視事得末疾民之禱祠候問者日數百人病久不差遂投牒致其仕將歸休太夫人之墓廬州人士流涕持不可逾旬病革且瞑猶瞪目曰吾志未嘗不在餘姚今若此吾其負吾民矣言訖奄然而逝至正十二年九月二十有四日也享年六十一明年夏六月草六日附于太夫人墓左娶汜水陳氏封宜人有淑德子三人長俊民博學能文章次天民次靖民皆修謹善學女三人長適衢州路江山縣尹濟南魏邦凱次適湖北亷訪司書吏許州左孟㴻次適燕人孫鎮兩淮轉運鹽使司副使守謙之子也君平居服食儉素而賔客造謁必盡醉極歡乃已出入户庭不失尺寸之度少暇即屏居默坐意度深逺莫窺其際每語學者曰朱子小學一書魯齊教人心法也人能熟讀自足循序而進不爾雖讀萬卷書亦奚益哉君所至務以德教化民轉譬曲喻不施鞭撲而人自畏服設有呼召具揭姓名門屏間皆至如期與同列論政不直輒赭容力爭如仇事已則匑匑和好不啻兄弟骨肉然間出在外書問太夫人無恙外未嘗及家事嗚呼君歷掾臺省不為不遇所至公卿大臣爭相推挽御史部使者章薦纍數十人不為無相知者然卒不能盡君之用以展君之才使回翔州縣陸沈下僚以死獨非命哉昔者某之為紹興理官甚幸與君同事及校文江浙則君職受卷故相好為厚比來吳中又得太常博士危君素所撰餘姚經界圖記翰林應奉張君翥上海德政記讀之知君行事為甚信因俊民之請銘用不復辭銘曰墨杘選軟秩何超也魁壘卓犖汨下僚也衆皆踽踽獨儦儦也劘忠砥孝玉雪標也規仁矩義化旋焱也往者作則來者教也亷用弗張聞孔昭也匪嗇其酬裔之紹也琢石刻文示不恌也福建道都元帥府奏差潘積中墓志銘華亭潘叔寬間攜其孫立本泣拜請曰洪止一子世英為福建道都元帥府奏差不幸死於盜此其孤也先生辱賜之銘則世英為不死矣余鄉使過吳聞吳人多稱望雲翁讀書有隱德又數見其歌詩及是乃知望雲為叔寬遂不復辭按狀君字積中幼機敏姆抱侍父側聞人議論輒解意少長强力學問尤喜讀史或遇悖逆不平則切齒怒罵如身當其時叔寬治家嚴雖一子顔色不少借君亦朝夕應接無子弟過或勸為吏曰吏治文書刻深不可為儒官則又曰有師道焉非吾職也久之始用御史薦隨牒至閩南㑹旱方雨副帥巴延令賦喜雨詩操筆立就僉憲馬本初聞之亦試以鏡中梅花詞意清婉尤稱賞之遂得補用君喜曰是役雖微將命往來庶可行吾志乎閩去大府逺驛傳尤苦使者暴橫食饜猶榜吏必愜所需乃去君數往來一無所取他日中使至驛驛吏具白故獨無君名府中咸稱之故凡有遣必先君汀寇林頑斷官道蹂鹽場煽毒齊民君悉釋其詿誤復業者一千三十户興化賊陳君信起仙游鈎結洞獠大掠遂陷城邑帥府分遣經歷髙本道督捕選君從行初官軍以斬首差次論賞致有戮平民以為功者君力爭曰賊强民苦脅從非本心也且多殺徒堅賊心請往喻之髙君問從兵當用幾何君曰吾行布宣天子威命在德不在力也即單騎直抵賊壘反覆慰喻皆感泣縛其渠魁以降復業者一千五百户父老鄭天錫儒生洪希文率衆上書請留為令蒲田縣民董安亦以君行境無擾請如仙游郡監佐爭詣大府白狀留贊郡事帥府録其功上之中書省憲府核其實上御史臺且移浙東僉憲王公復驗事既顯白久皆不報或謂功多賞後無以示激勸君曰小臣盡職人不知固當初江淮賊起分兵守關君實董之左丞老老鎮江東遣使起關上兵使者露刃引弓以威脅君君曰吾受命守關兵一轉足則閩危矣且軍中知有元帥令不知左丞檄也使者厲聲曰汝不畏死耶君張髯引頸曰誠不畏頭可與兵不可與使者還白左丞嘆異久之海寇作諸郡分募海舟興化户居多君比行吏私縱豪家巨艦匿海島悉以小漁船應命君立賞使首實得大舶二百艘餘盡免放泉舊有水門議者慮為寇利遣軍督塞之商船貪於私稅奸黨相和咸言不便且密賂君求免君曰水門塞誠非若等利不塞寇由此入焚室廬掠婦女寶貨若等獨得安乎門塞泉果無虞湖兵戍泉者以糧絶致變郡吏多被賊辱望見君曰潘奏差在仙游嘗善遇我不汝害也城福州更私官錢輒取人墓石莫敢孰何君行視城見石刻某氏者問吏具服盡以石歸之民益感恱君行事寬厚大率類此福寧州餘寇未平復至同安募義兵航海㑹捕有報安溪賊已咋縣境君益治兵弗為動後五日賊突入縣廨君坐不起手刃罵賊不絶口遂遇害至正甲午六月三日也年三十三後若干月以其遺歸祔于干山望雲臺先墓之側娶瞿氏先十年卒再娶王氏子一人即立本瞿出也端謹善學克世其家余聞爵不稱德者其後必大若其不在兹乎銘曰死也為君生也為親死安於生寧殺其身嗚呼小臣而克成仁墓祠遹新昭兹刻文義士周光逺墓志銘周君諱顯字光逺世居華亭之干山曽祖楫祖恕父文仲皆不仕君少負竒氣美風度涉獵經史間喜神仙道士之學遊龍虎山禮天師因給事其府久之慨然曰吾以孤身逺去父母將誰養乎遂謝歸踰年而丁父憂哀毁骨立葬祭有禮三年不與燕樂鄉里咸稱周氏有子矣君既終喪益自樹立養母孫氏尤謹君所居里嵗輸官租四萬石其民困於重斂前多負逋慢期君具為約遂無敢後者縣令柴君詣府白事張侯顧問曰汝何以使民皆信從耶令曰此縣民周光逺教我也㑹大水侯愳吏雜署災狀無所徴驗密語君具報盡得虛實部使者復驗信侯益賢之其秋民大饑君盡出積粟賑其鄉人活數千人法當補官竟辭不就兩浙鹽運司更定各場鹽户運使張士瞻至府聞君名召至幕下與計事差次下上無不合意延祐初詔遣平章章閭經理江浙田土令行急趣使者悉召諸有田家詣庭下盛氣臨之人人皆駭懼失色莫敢仰視君徐進曰明公不欺孰敢欺公願少假辭色使得自盡則民信田無不實矣使者雖悍暴亦嘖嘖稱善不已江南創行包銀法省檄已下府君謂銀非土産一受命則民困極矣率父老擁使者泣拜使者感動為白相府㑹詔罷而止朝廷購銅為佛像府將分科吏並緣為市君復率市民力爭之亦得免吳淞江故道塞水溢諸郡詔所司開浚御史臺分官督視僉事范君素知君才請問方略君取方尺紙為圖指畫形勢甚悉畢事御史舉酒勞曰是役也爾與有力焉先是府監守性緩急不同少忤即推案上馬去㑹宣撫使行郡有奸民投間各為紿狀訴二侯受賄不法事下嘉興守杜侯覆治君曰父母有過子當力諫今侯以論政不合使姦民迎合詆誣而吾徒坐視不顧設不幸中計奈何遂趣二侯備論所以皆感悟痛自責相好如初杜侯聞之亦抵姦民罪君平居如無能者及聞義則奮不顧事長姊恂恂惟謹弟昌先君十三年卒撫其孤如己子交朋友接姻族御奴𨽻內外各愜其意鄉里子弟有失學者則聘名師教之故人皆彬彬興於禮讓或有小過更相勸曰周君聞之得無不我直乎於是義聲日起而上下翕然稱譽不絶口矣君嘗以捕蝗跣涉得軟腳病往往而劇泰定二年十二月草一日竟以是疾卒享年四十八明年某月日葬于所居山之北麓娶同郡張氏有淑德子二人瑾􅛁皆績學踵行克世其家孫三人同生德生道生至正甲午余以使過吳㑹時君卒已草九年而瑾死亦四年矣􅛁走謁泣拜以郡人王澤狀請銘乃略其文而銘之曰聞義而勇不謀於人好仁而公不私其身江流既清原田既均惸惸匹夫與有令聞孰食其報在子與孫元故朱君拱之墓志銘君諱柯字拱之朱文公四世孫也曽大父某始自建寧徙居華亭君幼穎悟姆抱侍父側聞人語即解意與羣兒嬉戲嘗莊坐如成人既冠益勇於學日取論語孟子大學中庸詩禮記各誦數百過遇有疑輒從先生長者質問辨析必得其義乃已夜則遍閲諸史百家之書至忘寢食飢渴君外甚樂易而內實嚴正雖終日歡洽未嘗有違禮故居家庭接賔友處鄉黨遇姻族無大小疏戚皆畏而愛之里中事有不直悉詣君取決君出片言折之無不各當其意間有歉於心者即退自省曰某等不才慎勿令朱君知也君家無餘財而好周人之急甚者罄所與無吝色君嘗謂士不通經不足為學故其家子弟皆明經篤行循循有禮節君性雅曠嗜閒靜晚益治圃於居之西鑿池疊石築堂其上曰時春搆亭左右周以花竹風晨月夕則巾車畫舫飲酒賦詩或緩歌長吟或投壺彈棊解衣岸幘諧笑終日仰天長吁人莫窺其際也至正三年冬十月感微疾飲食卧起如平時十二月五日召其所親愛者語至夜半曰吾與君等别矣遂翛然而逝年四十有七娶孫氏子男三人長靈次熙次雙驢女二人孫男一人回孫以是月草四日辛酉葬于白嶺之原既十有五年矣其子熙以鄉先生沈存狀來請銘銘曰紫陽蒼蒼道久彌光葉大枝蕃散于四方華亭之裔遹當四世潛德弗庸蔚有竒氣如彼楩柟弗棟弗梁如彼椅桐弗徽弗張天賦之秀宜畀之厚胡嗇其祿復褫其夀子孫詵詵戩榖爾臻我銘有徴視此刻文貞素先生墓志銘至正十五年春二月五日壬戌貞素先生曹氏卒踰月己酉葬于修竹鄉千山之原從子慶孫狀先生世系行實來請曰慶孫甚幸承教叔父叔父死墓未得銘敢以其孫於菟請師泰游吳楚間久髙先生之行遂不復辭按狀先生諱知白字又𤣥號雲西先世有諱靄者在唐中葉自閩之霍童山徙居溫之許峰沒而為神有驅厲捍患之功祀久不絶其族益蕃衍若文肅公叔逺文恭公豳皆其後也宋宣和中十八世孫景修始遷華亭長谷之西景修生某某生從龍從仕郎監行在省倉從龍生潤之承信郎幹辦平江府糧料院潤之生德逺德逺生先生先生生於咸淳壬申三月草八日丙戌蚤孤鞠于母謝氏教之成人則從祖教授君澤之也先生身長七尺美鬚髯性機悟善識事至元甲午詔遣中書左丞某公鑿吳淞江先生以策從行功居多大德戊戌庸田使柳公行水復獻填閼成隄之法公甚德之己亥丁母艱哀毁盡禮服除以大府薦教諭崑山意甚不樂遂辭去嘗游京師王侯巨公多折節與之交章辟屢上先生悉辭謝曰吾聞燕趙多竒士庶幾見之豈齪齪求官者比耶即日南歸長谷中隱居讀易終日不出庭户尤喜黃老氏之學扁其居曰常清淨曰窪盈曰厚堂曰古齊蓋於是超然有所得矣晚益治圃種花竹日與賔客故人以詩酒相娛樂醉即漫歌江左諸賢詩詞或放筆為圖畫掀髯長嘯人莫窺其際也四方士大夫聞其風者爭內屨願交平居於姻族鄉黨賙恤惟恐後尤篤於友義若文士許應元李冲劉世賢詩僧崇古生則飲食之死則為治喪葬罔不曲盡其情焉學者尊之曰貞素先生有歌詩凡若干卷浦城楊公仲𢎞為之序先生外和內剛寡嗜欲年八十有四風日清美猶杖屨閭里間鄉人士愛敬之皆迎謁環擁欣欣有喜色牟公成甫嘗稱其志尚清素有司馬子長之風侍書學士虞公記厚堂亦謂其尚氣義樂閒退皆足以知先生矣夫人河內李氏宋觀文殿大學士贈少保諱曽伯之曽孫先二十年卒子南永柳州路馬平縣都博鎮巡檢女五人長適上海瞿天祐早卒繼室以季女次適嘉定髙巴延次適常德路達嚕噶齊哈喇哈達封大興縣君次適同里陸泳孫男三人長騶虞早世次於菟幼彪曽孫二人俱幼銘曰振鐸之封氏别為宗曰閩曰甌自南徂東有偉先生凛焉髙風遐觀闊步𤣥館儒宫既介而通亦嗇而豐不倚於立不詭於從翼翼其心冲冲其容采山薇蕨涉水芙蓉菱歌忽斷五湖三江有次其藏琢石穹窿諡私而公靖節文中元故處士夏君墓志銘華亭夏處士諱濬字景深其先自彬以上居湖州之長興彬生杞與椿始占籍為邑人至元丙子天兵南下游軍徇郡邑急擊華亭杞能率衆內附以功署其邑宰而椿遂不復仕居家治生産以志行自髙急人之難如扞頭目創義孰教鄉人子弟出見津梁道路有不治輒治之嵗庚寅丙午之飢出粟活人甚衆事聞旌其門曰義士義士生兩浙都轉運鹽使司玉泉場監運世澤涉獵經史倜儻負才初為嘉興瞰浦稅使徴商有法轉杭州獄丞多平反處士實監運子也處士始生之夕監運夢僧持錫鉢坐堂上狀貌甚偉心異之覺而得處士幼機悟異常兒稍長讀書通大義不事章句居常慨然曰士生天壤間能行已惠人足矣亦何必居官為政哉於是深自刻厲課童樹桑種果力耕作謹儲蓄久而家益饒衣止大帛食無兼味朝作暮息未嘗一日侈然自放見粒米寸帛棄道上輒䠞額不樂遇斷梗浮苴即親持以歸鴨雞羊豕之畜非賔祭不妄殺其存心愛物如此而好善樂施雖纍千金弗靳也至正丙戌郡城火延所居宅處士抱神主祭器去因輒嘆先祖以義名門今將營居室顧里中纍纍露處於情獨能已乎乃亟發廩以濟災者復曰義孰先志所存尤不可後也更即故址大作新之殿堂門廡宏麗邃嚴中像燕居旁列配從尊壘爵洗之器皆範金而為之聘名師設教如初逺方貧而來者給筆札衣食朔望率諸生行舍菜禮彬彬揖讓視昔加盛焉立義莊以贍父母妻三族月給米鈔嵗給布帛冠婚喪祭助各有差人有病者施以善藥死無斂者槥而歸之郡環水皆橋梁多處士創大者費巨萬若渠堰道路宫寺與凡役於公上者亦無不力先之東嶽祠嵗久就圮間過而見之曰吾施於人或庶幾矣神其可緩乎乃建大殿堂廡闢東西門中甃露臺周繚以垣像繪之設穆穆乎其有容民吏禱禳者始有所嚮矣處士天性孝友執親之喪哀毁盡禮嵗時祭祀設父母遺像奠哭如始喪時兄某卒撫其子若孫猶已出奉幼姑甚謹厚奩槖以嫁之居家嚴遇子孫不少假顔色與人交無妄言久而益敬晚頗好浮屠學創萬竹山房居禪衲為方外交又築堂于屋舍西偏曰愛間蓄古法書名畫周彛漢鼎其中日從賔朋觴詠以相娛樂乙未冬十月朔某日語家人曰今年六十有三吾當歸老萬竹矣乙巳疾作命子孫治後事正坐翛然而逝容貌三日不變處士生之年為至元癸巳月為丁酉日為壬子以卒之年十二月庚午葬于縣西集賢鄉集賢涇先塋之側夫人吕氏有淑行子男三人長文舉次文彥忠翊校尉紹興路同知餘姚州事次文德孫男五人頥䝉益大有中孚女三人孟貞適俞珊竹台安貞適陸鑄皆仕族居貞幼既葬之四年其孤某以士人陳亨道狀泣拜請曰昔曽大父之殁巴西鄧先生為之銘今我先人卒葬已久宜銘者非先生乎銘曰維富與義孰克取而比維處與出不可揉而一發于身不靳于人晦于時不慊于施維墓有刻式昭爾德湖州路儒學正潘君墓志銘潘君諱著字澤民其先大梁人幾世祖權官至某處提刑扈宋南來生子振仕通判纍贈朝請大夫始占籍嘉興焉振生行恕以父澤入官後知寧國縣行恕生誨入國朝以選教授郡儒學誨生逵嘗長幕涇縣逵生四子長應同韶州路經歷次應定饒州路儒學教授次亨衢次即君也君八嵗失父鞠於經歷君既長使習吏事曰吾家世業儒吏非吾習也遂從仲兄偕受易書於竹岡葉先生先生殁再從吳朝陽氏授春秋中鄉試備榜補吳郡甫里書院直學已而嘆曰是果足以發吾志邪遂北走京師游於公卿論議英發聞者莫不聳敬時大臣有羅致館下者其勢熖熏灼不喜人忤意獨直君言數引薦之久而益驕縱亡顧籍君曰太橫弗去將及於祻遂拂衣歸翰林學士黃溍卿禮部尚書王師魯國子監丞陳衆仲及在朝諸名臣相率為歌詩以壯其行既至杭丞相府以常選俾録廣德儒學三年士論歸之改諭銅陵銅陵阻山帶江地僻陋學校久廢不治君至則葺宇舍築垣牆創彌髙亭延名師碩儒以教子弟踰年以內艱去居喪悉遵朱子家禮屏浮屠不用郡人賢之服除調烏程始學田不滿百而膳士常數十不給則往往貸諸人君曰兹大縣不當爾乃率好義者益買田二百畝建尊經閣大作新之平章三旦八公董師吳興察君材署郡幕府力辭因留正郡學其講道設教悉取法安定胡先生學者翕然向風是嵗貢春官者四人一時得士之盛東南諸郡莫之先也既代辟浙東元帥府史君辭不獲至則歷陳軍政得失時雖不能盡用而用輒便於民凡遣兵餽糧幾數十萬亡敢慢期者於是府中諸史皆嘆服潘君為不可及君間使海寧行御史臺方留為掾檄至而君已病暑暴卒矣君學有源委善歌詩屬文有聖筆全經一編發明春秋微㫖甚悉事母舒氏周氏克盡孝其兄經歷死養嫂氏撫諸姪曲盡其道處宗姻以睦遇僮僕以恩性不嗜飲而客至必盡歡乃已平居恂恂若不能言遇事則奮然不顧嗚呼君負才氣倜儻若此自謂功名可以立談取乃今回翔偃蹇沈滯下寮終不得一展其志亦可悲矣雖然孝友行於家忠信施於人以布衣而傲睨王侯之間生有令聞死克善終又何憾耶君生於至大元年十月二十八日卒於至正十八年六月一日夫人石氏有賢行先君兩月卒其年八月二十四日合葬於海寧州彭坡之原子男三人長興仁次興宗次興祖女一人尚幼豫以總漕閩南道出海上興仁數過豫泣拜求志其父墓及還至杭則猶請不已遂為銘曰君才黼黻標玉雪孰儷其華疇比潔履斯為順施可烈圭以璋合環以玦翼角之全齒足缺超光越景困羈紲彭湖渤潏山嶻嶭墓門鑱珉堅嫓鐵吁嗟潘君名不滅孫元實墓志銘千山之陽泖水之濵有隱君子曰孫元實諱華號果育齊其先出吳長沙桓王富春人也十世祖德修唐季為侍御史遭亂避地永嘉始為永嘉人曽祖䕫宋郡馬娶趙氏父處仁娶朱氏來松江生三子又為松江人君生之夕母夫人夢一道士豐儀美髯長揖而進曰欲得托身夫人家可乎覺而得君頷下猶有髯在君幼穎悟異常兒授之書隨口成誦年十三肄業郡庠時翰林學士張周卿方出為守朔旦課諸生春隂詩君操筆立就其結句云柳花只在斜陽外不肯分明過小橋守大稱賞之及長通經考史於百家諸子無不考覽尤好岐黃氏之學嘗畜善藥遇人疾病雖小家亦往治之巨室貴人禮一不謹雖餽以千金終不肯一顧三薦為醫學教授皆不赴未幾有㫖待詔尚方以母老力辭江浙左丞張公某論君才行卓異不當流為醫請署吏庸田又不就與母同弟居內外無間言既死撫其二子皆使有成君好修潔戴折角巾衣鶴氅衣望山臨水步趨翛然或著紫紽袍束帶佩玉騎馬行市中人爭隨觀之年幾八十而肌膚猶若冰雪其所為詩歌流麗清逺意出天巧絶類王維孟浩然所居闢小閣中列古彛鼎法書名畫焚香靜坐終日書非佳墨熟紙不作飲饌非精潔不食士非賢不與之交也君生於某年某月某日卒於至正十八年六月一日將以明年十二月十二日葬於縣之修竹鄉居里之旁娶林氏生三子長程廣德路建平縣儒學教諭先卒次穆次􅍬女三人其長二人未行次適華亭周􅛁孫男二女四至正丙申秋豫客華亭一見如平生歡間握手語豫曰不意離亂中得與公遇我死公能銘我墓乎明年秋豫將使閩廣􅍬衰絰走錢塘泣拜請曰先君死將瞑猶顧􅍬言銘我者非貢公不可君言若此銘其可辭銘曰珠玉雖珍不掩乎水碧空青鸞鳯雖靈不嫌乎鷗鷺潔清吾於華亭得見斯人宣慰副使僉都元帥府事上騎都尉河南郡伯邱君墓志銘至正十八年秋詔遣使經略江南明年春論次東藩之有功者上之朝於是江浙行省理問官邱楠進階朝列大夫父世榮贈奉政大夫湖廣等處行中書理問官樂清縣男再贈中順大夫浙東道宣慰副使僉都元帥府事上騎都尉河南郡伯母黃氏項氏並河南郡君既受命適豫使過海上楠以福建行省都事某狀來乞銘按狀宣慰君字仁里其先福州人五代末因避亂徙居永嘉平陽州之儒立里曾祖某祖某故不仕父慶祖承務郎漳州路總管府判官君儀觀竒偉性倜儻少孤能自樹立讀書涉大義事母吳夫人孝二弟如山富孫皆幼君善撫教之及長慨然曰世多以分財傷骨肉義吾不忍為也盡以先人田宅遺二弟别築室以奉吳夫人夫人有母馮年老養不給心甚憂之君察其意即迎奉以終其身嫁四妹皆得所歸每傷幼喪其父觸事輒愴然興感因即近里創寺曰報恩立祠其中買田度僧以共祠事君好善樂施雖傾財無所靳急人難忘其身之危也人或有鬭者出片言折之亡不慰解故鄉鄰事少不直輒相告曰吾何爭質之邱君足矣君平居絶口不言人過人有一善則嘖嘖稱道不已君生於至元某月某日卒於元統甲戌八月十五日享年五十有七後三年為至元七年九月草三日葬於前倉嶺薦􅓝鄉清華山之原子男二人長杞早卒次楠由工部奏差從軍有功纍遷至今官能謹身持法以贊藩服人多賢之女一人適溫州録事判官鄭先孫男二人聰生元童女一人幼銘曰於淑郵施孔周嗇其酬嗣兹顯被恤典羡則衍清華封坎其宫昭令終福建等處鹽運使司判官張君墓志銘浙東宣慰司都事舒莊狀其友張君元禮世次履歷謁豫於甬東慈濟寺之舍館曰莊與張君居同郡學同師而又情相好而不幸死且葬矣墓未有銘敢以其子椿請按狀君字仲和竹居其别號也世為越州人宋寶祐間六世祖某徙明之奉化再遷而城居曽大父曄大父均父文勝俱隱不仕君幼而敏悟長好讀書從鄉先生許山心授尚書纍薦不第因授徒昌國之翁洲書院至順初陜西饑令民有能入粟者以次受賞君聞之慨然曰古之人嘗有入粟致位公卿者矣吾何嫌顧吾行何如耳遂傾所貯入之官得蘆花場鹽司管勾既視事知豪亭專務掊尅貸私錢不數月輒沒入人工本而場官又用大量收民鹽取其羡抵大家租小户殊不聊生君嚴為令禁止之課嘗最于諸場嘗遇旱有司禱不應君齊潔祀神海上雨立至秩滿調江西萬安縣灘頭巡檢先是寨兵豪猾不用令稍忤即相率為紿狀排去之君居數嵗帖然化服大獠蕭八反畨禺君以調從征多克捷大府上其功未報會有遣解馬赴京師當大暑行數千里無一死損歸代授進義副尉大嵩場鹽司丞君至則政益修民用悅服乃出錢建嵩江書院聘名師訓其里人朔望舍菜後升堂㑹諸生講論道德士民至今思之歷兩考授保義副尉江浙省富藏庫使處心亷平其課自裕至正己丑春丁母夫人范氏憂居喪三年未嘗出門户晚築别墅于月湖之濵未幾改敦武校尉溫州路都稅課司大使不赴嵗癸巳以昭信校尉福建等處都轉運鹽使司判官致其仕一日顧諸子孫曰吾仕雖不顯幸無大過今老矣將闢義孰以教鄉人子弟創義廪以食宗族之貧者汝能成吾志則庶其無憾矣明年甲午正月十五日以疾卒又明年正月甲申葬于鄞縣陽堂鄉宫􅦗之原君生于某年某月某日至是夀七十三矣君天性孝輕財好施居鄉黨恂恂有禮於諸子百家書無不博覽尤精于管郭氏之學葬地其生時所自營也娶髙氏繼姚氏子男二人長即椿次桂先卒女二人長舜英適郡人髙傳次舜華適上虞縣儒學教諭朱矩孫男四人熙慶元路儒學録次黨次薦次勳為桂後嗚呼君子懷抱才器猥居下寮不得一展所學以終其身而無怨言固已難矣况能黽勉力行以求無愧于其職哉若張君者謂之不賢可乎是宜銘銘曰績學砥行維士選也陸沈委吏亦何傎也不愧其心職之踐也雖嗇而豐嗣方衍也築宫于嵩文教闡也慶流蜂涌昭厥善也徵詞垂休視斯瑑也贈承直郎國子監丞鄭君墓志銘至正十九年冬豫以總漕閩廣使過餘姚江浙行省郎中劉君仁本張君啓原理問邱君楠皆乞銘其先墓余既辭不獲及至四明則員外郎鄭君文寶復以福建行省都事髙明狀來請其父贈國子監丞君銘余方愧前所著文猝猝不暇擇今已治行其暇為之乎明日遣其弟守仁來請又明日監察御史周君亷亦以書來趣乃節其狀而敘之曰君諱應先字復古其先為閩著姓五代時以朱文進之亂始來天台三世至承務郎維明遂築居黃巖之天長街傳八世至琳有孝行通尚書登宋進士第於君為曽大父琳生世仁修職郎淮東制置司幹辦公事于君為大父世仁生希欽博學能文章郴州桂陽縣主簿纍官宣義郎則君父也宣義年五十生君君生十四年而宣義卒母陳氏亦相繼沒君居喪能哀毁盡禮葬即廬墓讀書益刻志自樹然性好施有所積輒以豫人凡宗戚昏喪分財給助惟恐後嵗丙午丁未大祲君與夫人杜氏謀曰鄉里飢餓若此我輩不委溝壑足矣其能坐視弗救乎乃傾粟以濟之未幾官行賑助法吏知君力已竭將議免君曰前者私恩耳今法也其何辭遂鬻資産以應令自是家日益廢所遺者書數千卷爾然客至猶治酒殽燕飲無虛日重幣聘名師以教諸子嘗曰汝等能力學不失為儒者貧庸何傷君平居行事務盡其心而已故雖不必人知而人亦未嘗不知君也君生于元貞己卯十二月十六日卒于元統甲戌三月十三日享年五十有七以其年十二月三日葬于方山壕麓祖塋之側葬二十年以文寶貴贈今官階承直郎杜氏贈恭人子男五人長天祐次即文寶次天偉次守仁游京師有詩名次文定女二人孫男十三人女五人鄭氏凡十一世皆葬于州之方山其菴曰奉思則扁于宋丞相謝深甫其井曰孝義則杜清獻公範之所題也文寶復能以聰敏剛介贊襄藩省以有恤恩何其世澤之甚逺耶銘曰方山如矩有堂有斧傳十一世維君之宇閟其幽光令德攸緒命自天錫爰作石語黃詢饒墓志銘黃詢饒名寬福寧州翁潭里人也家世仕族有故譜載春申君歇至其大父汝慈凡三十餘世歷歷可考父芝生二子長容次詢饒也詢饒性耿介少知自重不妄與人交寡言力學纍薦不第益刮劘為古文家無儋石之儲而能怡其親友其兄故一州人皆髙詢饒行自以為不及壬辰兵亂詢饒避遷他所及歸盡失其故業又連遭父母兄嫂之喪貧不克葬遂憂感以卒實至正辛丑十二月某日也詢饒年四十四不娶無後州人袁參政聞而悲之曰吾州賴有黃先生不幸絶矣我不為之斂將何以慰其死而勸賢者乎乃買地治葬于石輦之陽以明年六月甲申遷詢饒柩并其四喪而合葬之于是州人士嘖嘖益賢詢饒而義袁君之為也宣城貢師泰過其州詢饒友人陳興祖張浩來求銘銘曰命孰使之窮身孰使之凶孰豐其行而嗇其逢孰茂其初而遏其終謂天夢夢孰義其封東陽曽君墓志銘連江縣東行五十里為爐峰又東十里至于海髙者㙗崿唅呀低者斥鹵沮洳民尚耕漁最號窮僻豫被命北還道過其地見四人者素冠麻衣拱立道左問之則東陽儒澤里曽氏子也既止客舍則復拜曰勝等不肖不幸先君死且葬矣唯是隱德下里名弗克彰願得大人君子賜之銘庶殁存有榮耀焉謹以里人林元亨狀請豫哀其言之戚也乃為次第其狀曰曽氏之先浮光人自唐末避亂來居于是子孫世業儒因名里儒澤君諱賢字希聖曽祖諱若晦宋儒林郎祖諱同父諱夀君生九嵗喪父能自樹立事母以孝稱久而家益裕君長身修髯儀狀魁偉讀書修行居家庭有禮節遇宗族有恩義好施豫恥言人之過設鄉校以教子弟之來學者鄰里事或不直得君片言即謝去故一邑之人皆稱曽君曽君云君先娶黃氏生二子長即勝次曰廣再娶姚氏亦生二子曰回曰忠既皆婚娶悉以田宅僮奴分遺之退居半山之間日登髙臨深賦詩飲酒以為樂因自號半山君生于至元戊戌六月十二日卒于至正辛丑八月十一日春秋六十有四卒之日顧謂諸子曰吾生承平晚遭離亂今得正而斃焉幸矣汝等其慎自勉其冬十一月庚申勝等奉柩合葬于里南䕫山之原嗚呼海濵窮僻之地君以善行拔出乎流俗而諸子又能不沒其父名是宜銘銘曰連江之濵東陽之涘有儒者族曽世其美曽君希聖克紹其先馴行恭謹恂恂不愆俎豆其鄉弦歌其里衆口一辭善譽兹起我行將北道止海隅君雖死矣實見諸孤倉皇留銘為來者勸匪曽之私亦邑之憲故中奉大夫江南諸道行御史臺治書侍御史劉公壙志銘公諱貞字廷幹號晦叟本彭城人其五世祖諫諫生昕皆以明經教授鄉里曽大父諱賢佐金末舉進士監支桃園屯戍軍馬糧草使始居益都遂為益都人妣張氏大父諱份萊州判官贈嘉議大夫禮部尚書上輕車都尉彭城郡侯妣丁氏贈彭城郡夫人父諱克誠纍官南臺監察御史贈申奉大夫河南江北等處行中書省參知政事護軍彭城郡公以竒節聞天下妣侯氏贈彭城郡夫人公魁碩負氣博覽經史善書明律試江西浙東西三道亷訪司書吏更䕃補都大庸田司知事掾江浙行省除兩浙運司知事辟南臺令史歷江浙行省檢校官平江路推官江西行省左右司都事擢南臺監察御史升都事入拜監察御史改宣徽院判官出為嘉興路總管海道都漕運萬户浙東亷訪使時年幾七十數上書乞致仕不報拜江浙行中書省參知政事尋遷江南諸道行御史臺治書侍御史公慨然曰吾辛苦四十年受國厚恩值時多艱報效職也顧老病若此其敢尸祿以曠官哉至正戊戌秋始决意辭去更號知止翁東絶江南踰嶺止居武夷山中明年盜犯閩關乃走建寧又明年下延平沿流至閩縣之歸善里未逾月病革出手書以後事囑家人翛然而逝三日神色不變公由將仕郎纍官中奉大夫平生勵操清苦所至政譽旁溢中外稱良御史賢太守者必曰劉君劉君云公生于前至元己丑正月二十九日卒于至正辛丑六月十六日享年七十有三是年七月十日權厝于雙溪里延祐寺之東原娶唐括氏繼丁氏先公卒俱贈彭城郡夫人唐括夫人生子一人曰時敏蚤卒以姪憲後女一人贅兩浙運司鮑郎場管勾能梓外孫男二人曰文煥江浙行宣政院照磨曰文照幼女一人適江浙行省照磨嶽師訥嗚呼公生也無愧死也無恨雖當流離轉徙之餘克保爵夀以終其得于天者亦已厚矣書其槩納諸壙中且為銘曰山之東閩之中吁始終名無窮臨清御河運糧萬户府經歷鄧君墓志銘至正十九年十月十五日封敦武校尉臨清御河運糧萬户府經歷南昌鄧君死于賊二十一年三月里人車允德間走至閩其子僉江西征行都元帥孔哲孫南臺監察御史仁傑始聞訃發喪呼號痛絶大夫士咸赴弔明日師泰亦往焉孔哲等若有所請而悲不能言也又明日遣允德來致其辭曰先君不幸遭罹􅍔患孔哲等抱痛終天不敢以衰絰見先生幸哀而賜之銘師泰聞江右人久髙鄧君行義今又辱與御史交遂不復辭按狀君諱德明字正甫别號梓林本安松里熊𤣥隱之仲子其母蕭夫人有女弟事三磚鄧子美無嗣因鞠為子君既後鄧氏益治生産通有無更大其第宅聘名師教二庶弟既婚娶悉以鄧氏田園歸之每嵗暮必分遣子弟出粟以貸貧人及期無以償亦不較也四方賔客至者皆厚為之禮不給輒資之無不各慰其情鄉鄰有鬭者得君一言即解去或有所覬則密出私財豫之事已終不言江淮飢流民羣聚率數百人橫行鄉村掠財物無顧忌居民往往逃避君為飲食善導之出境故君所居里獨無擾郡有武陽渡距城一舍江岸闊逺使者至遇風雨無所止息君白有司置傳江上且請身率先之未幾軍興他驛皆斷絶獨武陽不廢君之力也十四年汝潁賊犯豫章進逼城下民吏多奔潰君召孔哲及孫漢傑語之曰省治所在萬一失守江右其可保乎汝曹尚戮力盡忠以共王事于是急募兵得萬餘人分列東西兩岸以遏賊鋒逾月賊退復移兵佐參政托迪克復撫州建昌功上大司徒平章旌其門曰耆德忠義之門仍授孔哲敦武校尉義兵百户漢傑忠翊校尉同知婺源州事君以孔哲階上品封今官十八年四月淮冦乘暴漲復犯豫章翼日城陷省印失所在君力求得之即遣孫漢臣從馮參政驥走撫州歸諸大司徒先是仁傑以誅詹天麒功為漳州推官尋擢江西行省都事奉詔諭豫章賊賊聞仁傑且至疑君為間盡徙鄧氏一百五十餘口山南之潛江君曰自兵興來吾家起義八年三世受恩今吾年九十四矣尚忍不義而生乎遂不食死舟中君性沈毅不妄言笑平居無所好獨喜畜良馬觀池魚識者固已知其所負矣娶胡氏先十七年卒葬所居之南梅溪山子男六人曰用章曰用文曰用中曰用和以子仁傑官封儒林郎江西等處行中書省左右司員外郎曰用平曰孔哲即僉都元帥官武略將軍孫男一十六人曰漢傑即婺源州同知曰仁傑即御史官奉議大夫曰漢英進義副尉龍興路進賢縣主簿曰漢臣曰顯進義校尉南康路建昌州判官曰漢忠忠顯校尉同知萍鄉州事曰漢興漢廣並行省宣使曰漢臣樞密院宣使曰漢皓吉安路白鷺州書院山長曰漢鼎曰漢輔曰漢霖曰漢東曰漢佐曽孫男一十一人𤣥孫男五人孔哲等將以某年月日遷君柩與胡夫人合葬焉為之銘曰百年其身五世其仁御逸吾神漁樂吾真生德吾鄰死名吾賔義魄忠魂江月山雲袁隱君墓志銘長溪之西東山之下有隱君子曰袁順卿父質而有文介而能通治身居鄉優游而有餘死且十二年矣豫被召北還道過長溪方入舍館客有戎服來謁者北士握刀列㦸擁左右既升階即鞠跪帖帖謙若下士乃知為江西參政袁君天祿而隱君之第四子也明日至則禮益恭拱而前曰先君早棄諸孤葬雖久居大山長谷間未得名士巨卿為之銘唯先生是望豫謂子伏義立功遂有顯爵而諸兄又皆出為世用推恩褒恤當不逺矣姑俟之銘未晚也又明日復至執里人黃寬狀俯伏再拜曰唯兹海濵幸辱過臨銘其不獲則重不孝矣豫嘉參政之能篤于其親也用不復辭按狀隱君諱邦寧世居柘陽里曽祖某祖世南歷官順昌縣尹初母于夫人無子聞洪源林氏先塋松上開花大如牡丹已而生三子衆異之夫人乃鞠其季為繼及長果倜儻有氣節當至正丙子初能守其鄉邦雄資埒封君生子曰陽臻則隱君父也隱君年少遭家不造出贅柳營陶氏克自樹立內治生産以約為豐外爬羅巨細事無不解由是順昌遺業復大振矣隱君事婦姑如事其母鄉鄰貧者必出粟以周之賢士來者必倒屣以迎之凡喪有不舉者悉為營葬焉屬時多艱牢盆失利奸民扇為私販因行剽掠莫之誰何隱君居當經行處間顧族閭曰是不可以無備因使鄉人子弟習為兵得二千餘人寇至輒敗去人咸稱隱君假令不死其才豈止排難解紛而已耶隱君生于至元壬寅二月十四日卒于至正辛卯三月十一日春秋五十以明年十一月某日葬眉洋之原陶氏端靜自衛理家教子井井有敘今有司旌其門曰貞節袁母陶氏云子男五人長洋福寧州尹次深文武德將軍海道僉都元帥次安文昭信校尉同知興化路事蚤卒次即天祿官中奉大夫次達文西白巡檢死于兵女一人適林受曽嗚呼隱君負才與行用不於其身而于其後之人可銘矣銘曰器堅而良且潛其光水涯山顛時之杌􅑾行之戻契乃全其天欲㢮而張將弱而强為圖族先惟後用顯行賁恤典我銘匪愆故承直郎福建道宣慰使司都元帥府經歷髙君墓志銘福建都元帥府經歷髙君諱本祖字本祖世饒州安仁縣儒家曽祖元素祖起宗父君嚞宋待補太學生母易氏君幼學於牧心楊先生穎悟有詩名言呐呐若不能出諸口而行義推于鄉里蚤受知于疏齊盧公淡齊張公以御史薦將辟海北憲史廣東部使者知君賢羅致之君不忍逺違其親遂奉以行已而丁外艱扶柩歸葬哀毁跋涉幾不能生服除遷廣西從使者按行諸郡獄多平反㑹八桂科斂臺覺諸史率以贓敗君獨無有憲使詰訴者曰何以無髙書吏耶訴者頓首謝曰髙書吏亷不敢以私囑囑之則敗吾事由是臺憲益賢之既書考巡檢荔浦縣之南源寨辟帥府令史以嫌去調恭城縣之西嶺寨巡檢復以疾免改將仕佐郎常德路照磨常德多官湖自監守以下各私其一謂之分例湖照磨所得當錢六千緡君不受悉以歸諸官日坐幕府閲故牘刮劘宿弊豪猾為之屏跡行省遂辟君掾未幾又辭歸創樓以奉母夫人蜀郡虞公題之曰春暉君有二寡姊皆别築室居之且割田以資其養延師以教其子易夫人朝夕往來杯酒上夀怡怡愈愈醉即擁輿而還後除漳州路知事階將仕郎君以漳逺不欲去太夫人曰汝母以我故重違君命也且二姊在足慰我心矣君既至凡事之不如令者悉更正之比及考改延平路知事未行丁內艱服除進承事郎天富南監場司令病不及行朝議以君嘗有德于漳也擢君為經歷士民聞之喜曰髙君來吾屬安矣君為政一切務從寬簡㑹有詔減民租三分君以龍巖被兵久力請盡蠲今年租賦李志甫反南勝縣士蕭景茂罵賊死陳端才妻蔡不受汚自沈于河君悉上其事以旌異之海寇朱八任有仁出沒漳潮間潮吏來捕得之郡遣龍溪主簿方吉夫為衛北行君以事出郡監典住受賄縱賊反誣潮吏君嘆曰受賄縱賊何異賊耶白大府復械賊送潮人歌之㑹廷選守令擢文林郎汀州路清流縣尹時蓮城賊魏梅夀聚衆剽掠勢方張君單騎直抵其壘賊聞髙縣尹且至開門迎拜君反覆慰諭賊皆感泣不數日縣境帖然以功升承直郎帥府經歷君執直不阿人莫敢干以私汀州賊何源林頑為亂君率兵萬餘人覆其巢穴乃大修壁壘屯田積穀以實邉餉寬民征毗陵華玉以罪流上杭重賂權貴將求內徙隂持百金來見君叱絶之及君還汀州遮道請留不果為刻石頌之賊陳君信起仙游君復統兵往捕距賊不數里遙見賊方渡溪軍吏曰賊勢盛不可迫擊君怒罵曰汝欲挫吾士氣邪躍馬疾馳士卒大呼隨之賊皆披靡追至半舍擒其先鋒一百餘人得所掠財物婦女悉給其主翰林待制林泉生為撰平寇碑甚詳凱還部使者率僚佐詣門勸酒勞君已而又出諭汀延復大歷户七千二十六口二萬八千四百一君在軍久感瘴癘還至延平疾革或勸之歸君曰吾死于行吾事畢矣遂卒實至正十二年九月十九日也享年六十有七别號本齊娶江氏生女四人長適戴鏞次適李某餘蚤卒以從子善繼為後君之未沒也嘗謂善繼曰我死必歸葬先塋側今死十年矣善繼間泣拜請曰屬時艱葬雖未克如志幸得先生銘以俟他日庶幾先君為不亡矣遂銘不辭銘曰行之隆而位不崇才之豐而夀不充澤止於躬嗣繼其從有祿有功克保令終匪天夢夢視君之逢故朝散大夫僉海北海南道肅政亷訪司事楊君墓志銘君諱杰字子俊姓楊氏冀寧人曽祖某祖𢎞蚤卒贈奉議大夫冀寧路治中妣李氏贈正平縣君以守節旌其門父鉉江西亷訪司經歷年六十二以奉議大夫禮部郎中致其事以君官贈朝散大夫同僉中政院事騎都尉𢎞農郡伯母龎氏𢎞農郡君君有孝行侍父母不忍一日舍去年四十始出仕以儒貢閩憲史辟南臺察院書吏出官為福建元帥府照磨擢海北亷訪司知事丁外艱服闋改湖北升山南經歷調廣西拜西臺監察御史遂僉海北憲君為吏即有譽與同列李廷佐齊名其辟南臺從御史按行宣政院官吏贓鎮江萬户寧某不法人咸稱之在福建時以鞫獄有聲及任海北守法不阿照磨劉某徇私干政君沮之劉恚數譖毁君及劉掾中臺君六年不調遂辭歸金陵以父母兄嫂喪俱在江南不得歸冀寧乃卜城南地敘葬之日課僮奴蒔竹種松若將終身焉既而御史劾劉贓汚復起君任湖北㑹朝廷遣敕使行天下湖南北之司憲者多被罪君逺迓見之敕使雅知君慰勞甚至及在山南憲監苛暴自恣好用大杖擊人君曰此不法非風憲體也始甚難之既則欽服一年而紀綱大振比遷廣西吏民擁道涕泣不忍君去廣西猺獠相扇為變逼圍靜江城危甚君督師將出戰賊遂遁後以御史將赴西臺值靈川興安賊梗咸勸君無遽行君曰吾無愧于心行復何疑賊果追之知為君也皆散去既視事出按四川四川平章和尚與憲監某有隙互相詆誣連逮百餘人君取搆釁者置之法餘悉釋之二公赧服所至贓吏望風去聞海北命下遂上御史印就道之官一年慨然嘆曰吾父兄官止五品今杰出素望矣且年將七十其可不知止足哉遂謝政去比還湖湘則賊已陷武昌由宜陽至臨江則豫章圍又急乃道寧都入閩居閩中十年乃終嗚呼君亦知幾者哉君平生清苦尚氣節歷官皆在風紀門無私謁少頗嗜酒母夫人臨終執其手囑之曰汝名未立宜以酒為戒自是不飲酒者三十年娶白氏纍贈𢎞農郡君子二人長忠松溪縣主簿辟福建行省掾吏次德湖廣行省宣使君之兄二人長默䕃湖州録事判官次熙纍官御史臺都事無子君以德後之孫八人曽孫一人君以十九年十二月六日卒于善化里之寓館享年七十有八以某年月日權厝于侯官縣五里山之原又四年宣城貢師泰為之銘曰侃侃楊君邦之司直有則有儀不矯不激執我矩矱以贊紀綱艾耆益恭維憲之望縣車雷陽散䇿海嶼振振孫子左挈右顧天佑醇德克保令終我貽爾銘以志幽宫安仁縣太君蔡氏權厝志浙東道宣慰司副使僉都元帥畨昜朱文選母夫人蔡氏以至正十八年四月十六日卒于浦江之舍館越十日權厝于縣西之福泉山明年夏五余客海昌文選介其友紹興儒學録李允以狀來請曰文選甚愚戅早喪吾父承夫人之訓游學南方至順三年因得以儒服事今上皇帝于桂林潛邸明年皇帝御極入見于明仁殿賜襲衣上尊恩寵甚渥後五年授忠顯校尉泰州萬户府千户戍歙未幾吾父諱可傳亦贈武德將軍泰州萬户府千户追封驍騎尉安仁縣子母封安仁縣太君顧惟先父嘗得銘于武威余公今吾母死且朞未有一辭以刻不肖孤罪莫大焉日夜將走見先生以請而又迫于軍旅之事出則甲胄馳驅入則衰絰號泣以是無須㬰間先生甚幸不棄則吾母為不死而文選庶其有光耀矣按狀夫人諱貞節世居樂平之麟頭里宋虞官文煥曽孫女也大父叔廣以資産雄鄉里父祥甫宋太學上舍釋褐母彭氏畨昜縣丞伯皋孫女無子鍾愛夫人有求婚者輒沮之曰吾兒不以與庸衆人獨賢武德君而許妻之武德業儒家故貧父母又年老及夫人之歸悉屏華飾練衣布裳身任勤苦晝夜益治絲枲紡織用資不給遂使衣有餘帛食有餘肉而孝養之供賔祭之設靡不完好鮮潔克盡其禮矣武德卒夫人教諸子愈嚴凡有行非得請不敢專及文選在官而夫人之訓猶不置遇食飲稍豐即止之曰獨不思汝父貧時乎汝不負吾言即老身安矣至正十二年春正月江東弗靖行省調兵鎮姑孰衆懼不敢行夫人舉酒酌之曰戮力圖報正在今日文選遂行越三月歙陷夫人攜諸婦孫走匿山谷中數濵於死明年始迎養鎮所又明年行御史臺中丞總兵江淮分遣擊賊于裕溪之更樓口踰月捷聞夫人喜曰果不負吾言矣又明年還歙冬十有二月城再陷夫人避遷錢唐將解舟文選追至溪滸夫人望見曰汝幸不死尚欲顧家耶文選感泣還收散卒得二百七十人銜枚夜進大破賊衆十七年城又陷文選殊死戰不利率孤兵退駐建德以待援明年夏四月御史臺以婺州寇急調鎮浦江夫人以憂思成疾每進藥輒揮去曰吾年老遭世如此得善終足矣奚以藥為遂卒夫人生於宋咸淳壬申六月二十三日夀八十有七子男三人長文載金竹府儒學正先夫人十年卒次即文選次文遂女亦巽適番昜劉聲逺孫男必明必强女德媯適樂平蔡烜孫夫人從孫也銘曰有碩蔡宗番里之雄乃生夫人婉婉德容既歸朱門益順以恭縞衣綦巾易約為豐相夫以孝訓子以忠忠孝之食是封大邑象服魚軒命自天錫白髮迎養逢時孔棘眉夀令終墓則有刻嫓彼彤管永作母則故張母夫人權厝志至正丁酉夏六月十日甲辰宜州張公亮母夫人卒於杭州之新莊橋里既藁殯於西湖雷峰之下二年矣公亮一日走豫海寧寓舍泣拜請曰不肖孤賴先人之訓以文學教授蘇之常熟因吏浙西憲府苟薄祿以為養及迎吾母至三月而宣州陷又一年而杭受兵憂惶驚懼遂以成疾而卒日夜思念四郊多壘而雷峰之殯且不安將以今年秋八月某日權厝於慈南嶺之安福山先生幸哀而志焉惟某先太夫人為公亮從姑公亮則豫弟也志其敢辭乎夫人本姓魏氏諱德嬡宋參政敏肅公良臣之七世孫父諱願國初為軍資庫使母史氏升大族庫使與郡人寧國縣尹胡君君用同為庫職夫人方五嵗胡夫人鄭氏見而愛之養為己女遂姓胡氏及笄縣尹君謂夫人令德宜得賢配時郡士張君允恭有俊譽遂歸之張氏世居河東自武德大夫立扈宋來居宣城之經武里其子澤之仕至觀察使君其五世孫也夫人貌端而溫言簡而文性靜而通喜讀書目數過即不忘而於織絍組紃之事尤極工巧家有長姑早寡夫人遇之甚謹事無大小悉聽處置終其身無間言張氏族貧有散居城西墓廬者遇隂雨風雪夫人輒䠞額不樂顧婢子曰某當寒某當飢奈何即遣蒼頭致繒絮糗􅖲需其返問無恙始怡然食飲由是宗黨多德之夫人生於貴族長於富室而聘於儒家無毫髮吝驕氣婦道母儀雍雍如也今雖不幸不得即葬先壠猶幸得免鄉閭之禍以妥靈於湖山間豈非天於善人固有以相之歟夫人生於至元癸未二月二十八日夀七十有五子二人長即公亮娶同郡湯氏繼畨昜余氏江浙儒學提舉諱謙之女次相生蚤卒女二人長淑英適溧水史疇次道瑩庶生愛之如己出適南陵秦偲早卒孫男五人林某某某某女一人正適豫兄江隂州尹次子本之銘曰吁嗟夫人敏肅之孫柔靜且惠克配德門既宜其家遂及諸昆恤我宗戚亦莫不均在母則慈在婦則孝曰賔而筵曰祭而芼中壼之懿小大是效書之琬琰可作母教子婦孫女白髮來迎眉夀令終于杭之城慈雲權厝式昭兹銘尚俟底平以歸先塋朱夫人韓氏墓志銘夫人姓韓氏諱妙靜故宋魏國忠獻王四世孫膺胄始扈蹕南來居於越子孫散處城邑其在山隂柘林者族尤盛夫人之所出也曽大父巨源江西提刑大父友諒漕試解元父淵三江鹽司管勾夫人生有淑質性專靜不樂華靡善事父母遇有疾湯藥必親嘗乃進處兄弟十數人中各盡禮意父母尤鍾愛之里中朱氏亦令族有子善學負俊材謹於擇配夫人歸之即今福建等處行中書省左右司郎中居仁也夫人年甫十九舅姑皆已早卒獨生母王氏在夫人晨夕侍養不少懈補紉浣濯皆身為之而王母於夫人篤愛亦至焉夫人以不及養舅姑每春秋祭祀必哭泣灌奠盡哀乃已或饋之蔬果時饌亦先薦進然後敢食王母沒夫人治家益勤於親族婚喪慶吊禮行甚謹然未嘗輒自往嘗從郎中官錢唐姑蘇親戚或載酒饌請遊湖山間夫人終不一出曰游觀非婦人事也平居好施遇隂雨風雪鄰里有不給者即遣蒼頭束薪負米往遺之孤嫗無歸者養之終其身夫人嫁時得分田二十畝其後韓氏貧悉以歸其兄弟晨起坐堂上誦佛書數過飯止蔬筍日中間一肉食其於利泊如也郎中嘗笑語夫人吾仕久益貧奈何夫人正色曰商賈趨利以求富君子學道以立身君能潔己治人貧庸何傷郎中感其言所至行益力名益著夫人蓋不為無助矣郎中多仕逺方夫人教諸子甚嚴雖隆暑不冠帶不許見聘名師程課之蚤莫不少休宗族內外二百餘人斬斬有序一不率教則衆讓之故無少長皆敬憚夫人至正丁亥秋感憂疾久不差鄰里亦為禱明年正月疾革顧諸子曰吾為朱門婦三十餘年雖不能大興而家幸不纍而父清白我死矣為我謝而父尚善保之語畢而逝實十有三日也夫人生於大德四年七月三日享年四十有九子男六人克恭克寬克信克惠夫人出也庶二人克敏燕京奴孫男三人童童觀童畿孫訃至京師郎中於時從事中書省適使南方大臣聞其喪出錢千緡為賵明年郎中以工部八作司提舉始贈宜人且謂夫人有德於我家葬必得善地我親視其竁乃可窆十八年秋克信以國子生為朝官奉詔祠神海上執事與其兄克恭謀曰吾父長幕府閩省事重歸未有期又亂離若此其可使吾母久於藁殯乎乃卜地濠洲之濵璜山之麓將請命郎中以今年冬十二月某日葬焉前期來乞銘克信肄業成均豫為司業而郎中又豫契也銘其可辭銘曰有碩韓宗維相之别世著令德遂望於越夫人之生有德有儀歸于朱門君子是宜溫溫其恭翼翼其敬為父則式為母則訓孝於王母養不及姑哀號灌奠始終弗渝淡泊之甘華飾之屏游觀絶跡防範維謹睦姻恤族賑急周貧施於內外其心孔仁教子有方相夫有道東海之濵爾則爾效爾則爾效錫之寵光况其後人孰敢與京璜山萃止濠水匯止勒銘墓門永千百祀徐母葉氏墓志銘平江路儒學正上虞徐昭文喪其父松江府判官諱有傳之五年為至正乙酉月在戊寅日直壬子生母葉氏卒又明年九月壬寅葬於縣之永豐鄉河墩之原既葬十有三年矣以豫使過其里泣拜請曰吾母越州人生於至元丁亥正月朔日事吾父四十年恭慎勤儉將事而敏處衆而和庶其無愧矣先生其幸銘焉豫嘗與松江君同掾江浙行中書省又交昭文久知其言行之可信也故不辭為之銘銘曰母以子顯子以母賢生未酬也死有待焉嗚呼其然不爽不愆將永其傳贈天台郡君王氏墓志銘至正十七年春二月七日今江浙行中書省左右司郎中天台劉仁本母夫人王氏以疾卒既卒之明年冬十一月丙申葬于居里委羽山之原又明年仁本請於朝得封父孠奉訓大夫中書禮部郎中母王氏贈天台郡君其冬師泰奉詔轉漕閩廣道過舜江仁本伏謁泣請曰仁本不肖幸選于鄉吏于部使者纍遷行省幕府以承恤典皆夫人教訓之及也先生世掌太史能不少留為吾母銘乎仁本言若此其復何辭夫人諱可道世為天台人祖某故不仕父撡昌國州都目夫人生有淑質善事父母年二十六嬪于禮部君君本􅋖居郭正肅公再從孫因出為舅氏樂清劉長卿後遂居縣之大球里夫人來時禮部君父母皆沒獨大父朝請公在年過九十治家嚴甚夫人痛傷不及養舅姑晨昏奉朝請尤謹庖爨浣濯皆躬為之每侍食左右食已乃退一日居里灾夫人倉惶掖朝請避遷别業别業去居第數百步夫人日往來看候不少懈朝請公嘗曰新婦孝順我我無以報願新婦生賢子如孝我足矣朝請死夫人哀毁盡禮服除禮部君辟吏黃巖持法平州人愛之而君亦愛州之山水深秀始築室居焉及尹纍調衢處轉攢浦鹽司典史夫人獨留家治壼事日夕課諸子讀書率羣婢紡績至夜分猶不已身衣練素諸子既長猶不得服華靡仁本吏閩時嘗積俸錢歸遺夫人夫人即以豫宗族鄰里之貧者其勤儉好施蓋出天性云夫人嚴而有容靜而有識事上使下咸得其情故鄉里賢夫人如出一口至正間州數被兵時夫人居山谷中子婦俱從怡愈色養若罔聞知及事平出居新第竟以夀終嗚呼天於夫人亦已厚矣夫人生於至元二十一年六月二十四日春秋七十有四子男四人長即仁本次桀溫州路永嘉縣丞次斌台州路儒學教授次章處州路松陽縣尉孫男六人鼎慶元路儒學正槱臨海縣儒學教諭常方舉茂才炘熯尚幼女九人煥如適王公寬溫如適林公存皆士族餘未行銘曰坎之容封之隆為夫人之宫表有式訓有則為夫人之德不僭不忒委羽冒冒請視銘刻李夫人茅氏墓志銘浙以東著姓在慈溪曰茅省元家在餘姚曰李提刑家省元諸孫僖生女淨貞笄聞提刑九世孫今翰林應奉庚孫冠而賢遂以歸焉既歸而孝於舅姑順於夫子睦於宗族宜於家人及舅姑殁能哭泣盡哀葬祭盡禮益相其夫以有名聲教其子以克樹立而諸女之嫁又稱其家不使習於華靡故內外無小大皆曰賢夫人賢夫人云寬而有制靜而有常綜理家政秩然就序應奉雅好客夫人治共饋無倦容其遇妾媵未嘗見疾聲暴氣而人自畏愛之至於織絍組繡亦無不精緻父母家距居室幾六十里日遣子弟奉甘㫖候起居以終其身夫人為女為婦居兩大家咸盡其道故鄉里言閨門者皆取法焉夫人生之年戊戌五月十日卒之年癸巳十月草四日也春秋五十有六子一人伯顔以武功同知奉化州事女四人長季恆適茅俌次季和適茅稱蚤世次季祥適茅俊皆夫人族次文琰出為朱氏女亦夫人姊家也孫五人明德慈溪縣尉明誠舉茂才份僮倌皆幼女一人伯顔將以某年月日遷夫人柩葬於縣之石臺鄉黃㠗山之原顧惟祿不及養抱痛終天聞豫過四明謹遣其子明德執友人乃賢狀來請銘豫讀之有足徵者遂不辭而為之銘曰德之恆兮儀之章兮族則昌兮嫓則良兮嗣彌光兮坎其藏兮死不亡兮婺源程夫人墓碣銘婺源程夫人李氏生七十六年而卒卒二年而葬于里之爐源魚墩葬二十二年為至正辛丑嵗其孫致和避地建寧聞豫以使留三山乘小舟西下執其鄉先生胡初翁所為狀來請曰致和祖母故宋潭州通判樂平果堂先生之季女內附後先生隱不仕嘗過吾里見先祖旅舍中與之論學而知其造詣也許以夫人事焉先祖諱良全字玉淵夫人既歸養舅姑以孝遇姻族以禮處內外以和相夫教子克勤以順年三十生二子四女長即先君先君諱萬警甫十三嵗而吾祖沒諸孤㷀然在髫稚中門户單薄賴夫人以克樹立使程氏子孫有田可耕有屋可廬知誦詩讀書以不變於他業者皆夫人賜也夫人晚年尤好施豫見鄰里飢餓廢疾者輒戚戚不樂必思有以濟之乃已嵗旱父老遍禱不應衆請具夫人姓名祝告之果大雨今吾里不幸陷於賊而致和又流散至此不得以時展省墳墓顧思吾祖母恩德實痛于心願先生志而銘之俟時清寧將歸刻諸墓焉致和善學而敦行豫與其從父禮部員外郎以文為通家友而江東所值患難又相同聞斯言也能不愓然為之興感乎遂銘不辭銘曰番李季女子程之從於母有儀於婦有容副笄童童執奠于宗盛年而婺眉夀而終維爾孫子孝思無窮既坎既封亦拱其松刻銘墓道庶永休風甌寧縣太君彭氏墓志銘福建行中書省左右司郎中周浩母甌寧縣太君彭氏既沒之七年為至正壬寅其春三月浩自南劍來之官謁豫城西寓館泣拜請曰浩無似幸以推擇為冀國公府掾轉御史臺出官照磨檢校中書待罪御史遂來僉閩憲獲以恩封吾父江西理問知事為奉議大夫宣徽院判官驍騎尉甌寧縣子母宜人進封甌寧縣太君命將下而太君以疾卒于豫章之官舍今吾父康强夀考得迎以就養而祿乃不逮吾母每抱痛長號五內為之摧裂仁人君子聞之宜必惻然有以動乎其中者矣惟是墓石未刻先生幸辱賜之銘則豈徒吾母淑德懿範不遂泯滅而浩不孝之罪亦庶其少逭乎按狀太君諱妙夀廬陵安成望族其先有以節孝旌門者至今里中稱旌表彭氏父諱某有隱德母易氏生二女一男太君最長性愈婉貞靜善女工彭君嘗曰吾女當得佳壻不以妻凡子或稱同郡周君恆才行之美彭君謂然遂歸周氏時姑劉宜人孀居已三十年太君事之克盡婦道晨夕起居不少怠飲饌必親調乃進尤善承候顔色以順適其意宜人長子毅既仕有祿食數遣子弟來迎宜人安太君卒不果往後以夀終太君哀痛過甚得疾幾不能生故鄉里謂太君猶有彭節孝遺風焉太君平居待宗族姻黨以禮遇僕隸媵妾以恩親疏輕重各適其當故內外為之譽若出一口初彭隱君沒家甚貧弟妹咸仰給太君及易氏卒喪葬悉不資諸弟中年喜佛書意若有所領悟遂長齊屏魚肉太君年三十即苦心疾遍餌善藥不效每發輒劇然卒未嘗就枕尤善書計居家治生井井有條緒及寇陷其鄉太君倉卒逃避必與孫模俱常謂婦歐昜氏曰承周氏祀者在此孫死不可相棄也後二年浩來閩中亟往迎太君太君曰吾老矣且聞閩南山險灘峻道復多梗今病若此其能逺涉乎未幾太君果卒太君生於大德丁酉某月日卒於至正丁酉某月日享年六十有一以某年月日葬某山之原子男四人曰浩曰澄太君出也曰潤曰法佑庶出也太君撫之一如己出女二長適劉奎次適尹武授孫二人曰模曰某曽孫女一人豫向在京師與浩居相邇故交甚密至正中承乏御史則浩方掾臺府故相知為特深於其請義不得辭銘曰猰㺄狂奔楚氛黑閭里稚耋顛以踣夫君相里邦之式有子司憲正南國令儀娩婉閨壼則甌封啓土自天錫魚軒企望朝靡夕黼翣胡為照窀穸匡山可摧石可泐子孫繩繩食世德謂豫不信視兹刻龍泉縣君潘氏墓志銘故中順大夫新州知州林君之配龍泉縣君潘氏諱妙真處之麗水人也曽祖恕宋平江府吳江縣丞祖應發宋鄉貢進士父弼將仕郎廣東亷訪司照磨母何氏縣君幼專靜能誦小學四書詩禮記及諸女史年十六歸于新州新州諱定老字君則故仕族與潘世為姻家入國朝中微潘氏獨富盛新州㷀然孤立克自力於學照磨君深器之欲以縣君妻焉姻黨咸言縣君生富家習華麗恐不能安其貧及歸林氏即屏紈綺服練素躬治絲枲麻布事大姑周夫人姑徐夫人朝夕執饋膳惟謹二姑並愛重之徐夫人晚苦足疾每起居必親抱持殆病革縣君焚香默禱刲股作肉糜以進翌日遂愈及徐夫人卒事周夫人尤篤夫人性嚴毅縣君左右承順無不曲盡其意夫人嘗語人曰林氏家衰久矣得新婦賢又多男子林氏其將復興乎鄉里親戚聞潘氏名亦往往指為閨門法周夫人年八十二終將葬縣君夢神人示之兆卜果吉其禮親舊無間貧富撫僕𨽻務盡恩信諸子侍前每援引古今人物髙下教以立身大節少有過立責不貸尤通醫書家人遇小疾輒自劑善藥療之平居極儉薄每得珍果嘉膳必以祭遍分家人然後食治家嚴而有法新州得専志學問無內顧憂者實縣君相之也新州登辛酉進士第同知奉化州以恩封宜人再授興化府判以階五品得今封後官新州階四品當進郡封㑹新州卒不果請其在蒲陽時媪有售珥珠者家人請市之縣君曰此珠直當府判數月俸家本儒素惡用此為且非所以示子孫也新州殁後子誠祖以䕃補彬祖以進士舉先後入官咸迎縣君養遇飲食過豐輒不樂常戒之曰汝能勵志清苦雖蔬食飲水吾樂也至正十一年正月左體忽患末疾六月二十三日遂不起縣君生于至元壬午正月十二日至是享年七十子男四人瑞早卒次誠祖從仕郎建寧路松溪縣尹次彬祖從仕郎池州路青陽縣尹次似祖鄉貢進士第一人以恩授處州路儒學正卒孫男十一人公慶鄉貢進士浙東亷訪司書吏次公興公溍公繹公庠公質公亷公綬公異公贊公實女八人曽孫男五人文昭文暉文溫文照文昌女四人誠祖等以某年八月庚子奉縣君柩合葬于麗水縣元和鄉大杉茭洋新州君之墓既葬之十一年彬祖至閩以新州門人行樞密院經歷劉基狀來謁銘師泰惟新州領甲寅鄉薦時先文靖公實為考官及彬祖之舉師泰又忝列校文於林氏有再世之契且劉君之言信而可徵是宜銘銘曰括蒼之望曰林與潘潘有淑女其德孔間來歸于林克順克惠克孝于姑克昌厥裔相其夫子以有令名擢第錫爵卒守専城龍泉疏封實為大縣被服之華式光主奠有子鼎峙各獻爾能父澤是繼世科是承魚軒就養綵服先後白髮希年遹介眉夀鄉鄰之訓閨壼之模母儀婦道綽有令譽大杉之麓封若堂斧茂爾松柏以永千古贈奉訓大夫中書兵部郎中飛騎尉天台縣男張君墓表至正十九年冬江浙等處行中書省左右司郎中張啓原父贈湖省都事德亨加贈奉訓大夫中書兵部郎飛騎尉天台縣男母宜人黃氏加封天台縣君啓原以豫之過鄞也迎謁泣請曰昔先君之卒嘗得銘於江浙行省參政周公伯琦時未有贈今以啓原官再被光寵於不肖孤榮幸極矣惟墓有表實先生是望君字伯通台之黃巖安寧里人本陳姓以父命為張申甫公後母徐氏君幼聰敏動止異常兒教之書即能解意時鄉先生栖筠鄭公教授馬氏義孰君從之游益自力學及試為吏持法平未幾即棄去先公性嚴毅少不合意輒瞑目不語君惴惴立左右候少解進食已乃敢食母夫人疾晝夜侍粥藥衣垢生蟣蝨不解帶日課僮奴治産業久而家漸饒厚遺二妹無所靳遇寡姊尤謹其子女既長皆為之嫁娶焉宗戚鄰里有貧者輒周之婚葬不給者輒助之急人難雖蹈水火不顧距城東二十里飛鳬鄉有山曰西山溪谷深秀水泉甘美嘉花香草紛披崕崿君過而愛之及先公先夫人沒遂卜葬於其下且别竁其傍晚更築室居之教諸孫讀書溉田治圃優游自適足跡不入城府者十年至正十五年十有二月初七日以疾卒越十有四日壬申即其竁祔焉君生於大德五年閏十二月二十日春秋五十有九子二人長即啓原負材善謀方以功名顯次啓完台州路儒學録女一人許嫁黃巖州儒學正余誾孫二人公侃山隂縣儒學教諭公倜幼女一人嗚呼君子之施德於人也不報于其身則在其子孫今兵部君生雖不耀而以子官獲承休命豈偶然也樹表墓門以張厥美宜哉玩齊集卷十
